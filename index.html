zka.\n    3. Czekoladę rozpuść w kąpieli wodnej z odrobiną mleka. Polej rozpuszczoną czekoladą wierzch deseru i wstaw do lodówki na kilka godzin, a najlepiej na całą noc.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/hQx9HoOf9tMu37wPWIkWdS0qJeS5ecsHmwk44nFL.jpg","kcal":472.08,"protein":25.82,"fat":24.84,"carbs":35.33,"ingredients":[{"name":"Jogurt High Protein smak kokosowy - Pilos","grams":200,"measure":"sztuka"},{"name":"Mleczko kokosowe 19%","grams":40,"measure":"łyżka"},{"name":"Mąka kokosowa","grams":20,"measure":"łyżka"},{"name":"Wiórki kokosowe","grams":12,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"g"},{"name":"Mleko 2%","grams":20,"measure":"łyżka"}],"category":"Deser"},{"id":35831698,"name":"Jednoporcjowe słodkości - Ryż na mleku z waniliowym puddingiem","description":"1. Ryż ugotuj na mleku i wodzie z dodatkiem aromatu, erytrolu i soli przez około 10 minut.\n    2 Jabłko zetrzyj na tarce o dużych oczkach i wymieszaj z cynamonem i sokiem z cytryny.\n    3. Do wysmarowanego tłuszczem naczynia włóż 1/2 porcji ryżu, następnie nałóż jabłka i kolejną porcję ryżu. Wstaw do piekarnika nagrzanego do 180 stopni na około 15 minut.\n    4. Podawaj ryż z kleksem puddingu i posiekanymi orzechami włoskimi.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/6QXnbiX4HB88fAdRQ0dYiLthjyC5DZpOvvb3J9Js.jpg","kcal":443.32,"protein":20.02,"fat":8.7,"carbs":75.44,"ingredients":[{"name":"Ryż biały","grams":50,"measure":"g"},{"name":"Mleko 2%","grams":100,"measure":"szklanka"},{"name":"Woda","grams":100,"measure":"szklanka"},{"name":"Aromat waniliowy","grams":3,"measure":"kropla"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jabłko","grams":150,"measure":"średnia sztuka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Pudding proteinowy o smaku waniliowym (Go Active)","grams":100,"measure":"opakowanie"},{"name":"Orzechy włoskie","grams":7,"measure":"łyżka"}],"category":"Deser"},{"id":35831699,"name":"Jednoporcjowe słodkości - Serniczek a’la Bueno","description":"1. Herbatniki rozkrusz w blenderze na drobny pył i ułóż na spodzie naczynia.\n    2. Żelatynę rozpuść w gorącej wodzie i odstaw do wystudzenia.\n    3. Serek wiejski, skyr, krem o smaku orzechów laskowych, erytrol i sól zblenduj na jednolitą masę. Dodaj przestudzoną żelatynę i zmiksuj ponownie całość. Przełóż masę na herbatniki.\n    4. Następnie, jako kolejną warstwę, wyłóż pudding proteinowy.\n    5. Czekoladę z mlekiem rozpuść w kąpieli wodnej i wylej na wierzch deserku. Wstaw do lodówki na co najmniej 3-4 godziny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/DRBShqoLn0VtTuhhTsIRw0mAgOQwpJwsDeSCWjDK.jpg","kcal":477.52,"protein":37.39,"fat":20.11,"carbs":36.26,"ingredients":[{"name":"Herbatniki","grams":15,"measure":"sztuka"},{"name":"Serek wiejski lekki 3%","grams":100,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Żelatyna","grams":3,"measure":"opakowanie"},{"name":"Woda","grams":30,"measure":"łyżka"},{"name":"Duo pasta czekoladowa orzech laskowy i biała (Jumbo)","grams":20,"measure":"g"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pudding proteinowy o smaku orzecha laskowego (Ehrmann)","grams":100,"measure":"opakowanie"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Mleko 2%","grams":10,"measure":"szklanka"}],"category":"Deser"},{"id":35831704,"name":"Jednoporcjowe słodkości - Serniczek czekoladowo-orzechowy","description":"1. Piekarnik rozgrzej do 170 stopni (grzanie góra-dół).\n    2. Serek, kakao, pastę z orzechów laskowych (15 g), jajko, erytrol i sól zblenduj na jednolitą masę.\n    3. Przelej masę do foremki wysmarowanej tłuszczem i wstaw do nagrzanego piekarnika na około 30 minut. Studź sernik w otwartym piekarniku przez pierwsze 15 minut, następnie wyciągnij na blat i po ostygnięciu wstaw do lodówki.\n    4. Czekoladę rozpuść w kąpieli wodnej z odrobiną mleka wylej na wierzch sernika. Posyp posiekanymi drobno orzechami laskowymi. Wstaw do lodówki najlepiej na cała noc.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/Y4nGEFbaq5L9LFGqO6EcU5a1WbqJ8kiRabTbwKOH.jpg","kcal":504.77,"protein":49.62,"fat":25.78,"carbs":35.63,"ingredients":[{"name":"Kakao w proszku","grams":30,"measure":"łyżka"},{"name":"Orzechy laskowe","grams":22,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Mleko 2%","grams":20,"measure":"szklanka"},{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"}],"category":"Deser"},{"id":35831706,"name":"Jednoporcjowe słodkości - Serniczek z białą czekoladą, pieczoną brzoskwinią i owsianą kruszonką","description":"1. Warstwa sernikowa: żelatynę rozpuść w gorącej wodzie i odstaw do wystudzenia. Czekoladę rozpuść w kąpieli wodnej z odrobiną mleka i lekko przestudź. Skyr, ricottę, aromat, przestudzoną żelatynę i rozpuszczoną czekoladę zblenduj na jednolitą masę. Jeśli masa będzie dla Ciebie zbyt mało słodka - dodaj erytrol. Przełóż masę do słoiczka i wstaw do lodówki.\n    2. Piekarnik rozgrzej do 190 stopni. Brzoskwinię przekrój na pół, skrop oliwą i solą. Ułóż w naczyniu żaroodpornym wnętrzem do góry i wstaw do piekarnika na 25-30 minut.\n    3. Kruszonka: w miseczce umieść masło, płatki, mąkę i erytrol. Połącz składniki w dłoniach. Wyłóż równomiernie na papier lub naczynie i wstaw do piekarnika na ostatnie 10-15 minut.\n    4. Upieczoną brzoskwinię przestudź i pokrój na mniejsze kawałki. Będzie się rozpadać w dłoniach - to dobrze ;). Wyłóż ją na przygotowany serniczek. Na wierzchu posyp przygotowaną kruszonkę.\n    5. Podawaj udekorowane świeżą miętą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/jd2nWG7gYomR6RXGp9tK5op1y23TzsNuG6qjIzTV.jpg","kcal":424.83,"protein":24.26,"fat":22.1,"carbs":33.82,"ingredients":[{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Ser Ricotta","grams":75,"measure":"łyżka"},{"name":"Żelatyna","grams":4,"measure":"opakowanie"},{"name":"Woda","grams":20,"measure":"szklanka"},{"name":"Biała czekolada","grams":12,"measure":"kostka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Brzoskwinia","grams":85,"measure":"mała sztuka"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Płatki owsiane","grams":10,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":5,"measure":"łyżeczka"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831709,"name":"Jednoporcjowe słodkości - Serniczek ze śliwkami i z kruszonką","description":"1. Piekarnik rozgrzej do 180 stopni (grzanie góra-dół).\n    1. Serek wiejski zblenduj na jednolitą masę. Następnie dodaj jajko, erytrol, budyń i aromat. Ponownie zmiksuj.\n    1. Przełóż masę do foremki wysmarowanej odrobiną masła lub oliwy.\n    2. Śliwkę pokrój w drobną kostkę i ułóż na wierzchu ciasta.\n    3. Składniki na kruszonkę rozgnieć razem i przykryj nią śliwki.\n    4. Wstaw serniczek do nagrzanego piekarnika na ok. 35-40 minut. Po upieczeniu zostaw na ok. 15 minut w otwartym piekarniku, a następnie odstaw do wystudzenia i wstaw do lodówki. Najlepiej smakuje po kilku godzinach w lodówce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/F1LPHTiZQvMlb18wLg6gu9zX5JdqjBf1m3jhvpsh.jpg","kcal":457.37,"protein":32.34,"fat":16.94,"carbs":44.46,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":200,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Budyń waniliowy bez cukru","grams":20,"measure":"g"},{"name":"Aromat waniliowy","grams":3,"measure":"kropla"},{"name":"Śliwki","grams":80,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":15,"measure":"łyżeczka"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Erytrytol","grams":7,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831710,"name":"Jednoporcjowe słodkości - Sernikobrownie z malinami","description":"1. Piekarnik rozgrzej do 180 stopni (grzanie góra-dół).\n    2. Składniki na brownie zblenduj na jednolitą masę. Wylej do naczynia wysmarowanego tłuszczem.\n   3. Analogicznie zrób z warstwą sernikową: zblenduj wszystkie składniki i wylej na masę brownie.\n   4. Jeśli chcesz, powciskaj kilka malin w warstwę jasną.\n   5. Wstaw ciasto do nagrzanego piekarnika na 30 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/WWl6FlPSKdNvopS73GvI7VGjbXR9Tj4NvaNSWnXR.jpg","kcal":386.87,"protein":21.43,"fat":7.86,"carbs":67.8,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":20,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":15,"measure":"łyżka"},{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Skyr waniliowy (Pilos)","grams":100,"measure":"opakowanie"},{"name":"Budyń waniliowy bez cukru","grams":10,"measure":"łyżeczka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Maliny","grams":30,"measure":"garść"}],"category":"Deser"},{"id":35831712,"name":"Jednoporcjowe słodkości - Sezamowy deser z musem malinowym","description":"1. Serek, skyr, tahini, erytrol i sól umieść w naczyniu blendera i zmiksuj na jednolitą masę.\n    2. 140 g malin rozpaćkaj widelcem na mus.\n    3. W słoiczku umieść 2 biszkopty, 1/3 porcji musu truskawkowego, 1/3 porcji sezamowego kremu, kolejno ponownie 2 biszkopty, 1/3 porcji musu truskawkowego, 1/3 porcji sezamowego kremu i na koniec ostatnie 2 biszkopty, reszta musu i kremu. Udekoruj świeżymi malinami i świeżą miętą (opcjonalnie).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/lb1qrKcaA9FDZ9CHeXsH7wW7TMSxGH792ZWwyK4i.jpg","kcal":436.12,"protein":32.59,"fat":12.97,"carbs":50.03,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":75,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Tahini masło sezamowe","grams":15,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Herbatniki","grams":35,"measure":"g"}],"category":"Deser"},{"id":35831713,"name":"Jednoporcjowe słodkości - Szarlotka w słoiku","description":"1. Ciasteczka owsiane rozkrusz na pył za pomocą malaksera. Wyłóż je na spód słoiczka.\n    2. Serek, ricottę, aromat i erytrol zblenduj na jednolitą masę i wyłóż na ciasteczka.\n    3. Jabłko obierz i pokrój w drobną kostkę. Podduś je na odrobinie wody w małym garnku z dodatkiem cynamonu. Jeśli masz kwaśne jabłka - możesz je nieco dosłodzić np. erytrolem. Duś, aż jabłka zmiękną, a nadmiar wody odparuje. Wyłóż przestudzone jabłka na masę z ricottą.\n    4. Orzechy posiekaj i posyp nimi wierzch deseru. Wstaw do lodówki na kilka godzin.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/ZgwqKQTLln6LqkClgWesWVRk4YikIM0mVbznbCOd.jpg","kcal":451.24,"protein":22.86,"fat":20.28,"carbs":48.74,"ingredients":[{"name":"Ciasteczka owsiane","grams":18,"measure":"sztuka"},{"name":"Ser Ricotta","grams":75,"measure":"opakowanie"},{"name":"Serek naturalny lekki (Bieluch)","grams":150,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Jabłko","grams":150,"measure":"średnia sztuka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Orzechy włoskie","grams":7,"measure":"łyżka"}],"category":"Deser"},{"id":35831714,"name":"Jednoporcjowe słodkości - Truskamisu pistacjowe","description":"1. Truskawki zblenduj na mus.\n    2. Skyr, ricottę, erytrol, pastę pistacjową (20 g) i sól również zblenduj na gładką masę.\n    3. W naczyniu układaj kolejno: 2 biszkopty namoczone w musie truskawkowym, trochę musu truskawkowego, 1/2 porcji kremu pistacjowego, 2 biszkopty namoczone w musie truskawkowym, resztę musu truskawkowego i drugą porcję kremu pistacjowego. Całość posyp posiekanymi pistacjami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/CmbtEAevAy9YGfOnZ93HrGGlJTU6lcdS3tuIyaNM.jpg","kcal":430.55,"protein":30.09,"fat":20.38,"carbs":34.41,"ingredients":[{"name":"Truskawki","grams":100,"measure":"garść"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Ser Ricotta","grams":100,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Pistacje","grams":20,"measure":"łyżka"},{"name":"Herbatniki","grams":12,"measure":"mała sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Deser"},{"id":36524751,"name":"Jednoporcjowe słodkości - Fit Riso z kokosem, musem mango i miętą","description":"1. Do garnka wlej mleko, wsyp ryż i sól. Zagotuj i zmniejsz moc kuchenki. Gotuj bez przykrycia,\nmieszając co chwilę, by się nie przypalił.\n2. Po około 15 minutach ryż powinien być gotowy (jest to zależne od tego, jakiego ryżu użyjesz, więc\nw zależności od tego, zmodyfikuj czas lub dolej wody). Dodaj do niego erytrol, wiórki kokosowe\noraz aromat i wymieszaj.\n3. Pudding ryżowy przełóż do słoiczka i pozostaw do wystudzenia.\n4. Połowę mango zmiksuj na gładki mus. Drugą część pokrój w kostkę.\n5. Do słoiczka na pudding ryżowy wyłóż warstwę musu mango. Następnie dodaj skyr lub proteinowy jogurt kokosowy.\nNa górę dodaj mango pokrojone w kostkę i świeżą miętę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/5/pVCaDF34gO6D5RSdbB4oQgmEKEwCXEuuf7eHyGXF.jpg","kcal":481.44,"protein":24.26,"fat":7.58,"carbs":79.81,"ingredients":[{"name":"Ryż biały kleisty","grams":50,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":275,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Wiórki kokosowe","grams":3,"measure":"łyżeczka"},{"name":"Ekstrakt waniliowy","grams":2,"measure":"kropla"},{"name":"Mango","grams":200,"measure":"g"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Mięta","grams":1,"measure":"g"}],"category":"Deser"},{"id":36524752,"name":"Jednoporcjowe słodkości - Jednoporcjowy skyrnik z malinami","description":"1. Piekarnik rozgrzej do 160 stopni (termoobieg).\n2. Skyr dokładnie wymieszaj z jajkiem, erytrolem i budyniem na gładką masę.\n3. Przelej do małego naczynia żaroodpornego. Na wierzchu połóż maliny.\n4. Piecz ok. 40 minut.\n5. Skyrnik po upieczeniu wystudź i wstaw na minimum godzinę do lodówki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/5/o47L9PSIBcAcY1h9CDOC2pCzVbTPEppVVKArbDnV.jpg","kcal":378.08,"protein":40.09,"fat":5.84,"carbs":41.39,"ingredients":[{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Budyń waniliowy bez cukru","grams":25,"measure":"łyżeczka"},{"name":"Erytrytol","grams":40,"measure":"łyżka"},{"name":"Maliny","grams":60,"measure":"garść"}],"category":"Deser"},{"id":36524754,"name":"Jednoporcjowe słodkości - Matcha pudding z musem malinowym","description":"1. Nasiona chia wymieszaj z napojem sojowym, połową erytrolu i matchą. Pozostaw na 10-15 minut.\n2. Po tym czasie przemieszaj ponownie, przełóż do słoiczka i wstaw do lodówki na całą noc.\n3. Zostaw kilka świeżych malin do dekoracji, a pozostałe włóż do rondelka i podduś razem z pozo-\nstałym erytrolem na mus.\n4. Rano na gotowy pudding chia wyłóż mus malinowy. Następnie dodaj pudding proteinowy, a na\ngórę dodaj świeże maliny.\n5. Gotowy pudding posyp płatkami migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/j6tNZRLA1PMGxkCJF9wKHebvu99rz5RpcGUn7uPR.jpg","kcal":430.24,"protein":26.11,"fat":18.65,"carbs":44.17,"ingredients":[{"name":"Nasiona chia","grams":30,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":250,"measure":"szklanka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Matcha tradycyjna (Ekogram)","grams":4,"measure":"łyżeczka"},{"name":"Maliny","grams":150,"measure":"garść"},{"name":"Pudding proteinowy o smaku waniliowym (Go Active)","grams":100,"measure":"opakowanie"},{"name":"Migdały płatki","grams":6,"measure":"łyżeczka"}],"category":"Deser"},{"id":36524755,"name":"Jednoporcjowe słodkości - Straciatella z borówkami","description":"1. Ciasteczka rozdrobnij na pył za pomocą malaksera.\n2. Twaróg zmiksuj ze skyrem, ekstraktem i erytrolem.\n3. Czekoladę posiekaj lub zetrzyj na tarce o grubych oczkach, a następnie wymieszaj z twarogiem.\n4. Do szklanki lub słoiczka wyłóż warstwę z połowy rozdrobnionych ciasteczek. Następnie ułóż\n½\nporcji puddingu, warstwę twarogową i resztę puddingu.\n5. Wierzch posyp resztą ciasteczek i udekoruj borówkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/tFXMquoQbdKX64CsrdAcWVyodSMEVXIbyvyytVsX.jpg","kcal":450.24,"protein":44.82,"fat":12.64,"carbs":39.33,"ingredients":[{"name":"Ciasteczka owsiane kakaowe (Sante)","grams":25,"measure":"g"},{"name":"Ser twarogowy chudy","grams":100,"measure":"plaster"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Pudding proteinowy o smaku czekoladowym (Go Active)","grams":100,"measure":"opakowanie"},{"name":"Borówki amerykańskie","grams":25,"measure":"garść"}],"category":"Deser"},{"id":45609809,"name":"Cloud matcha","description":"1. Wymieszaj matchę z gorącą wodą. Dodaj śmietankę i odrobinę soku z cytryny i dobrze wymieszaj (najłatwiej za pomocą ręcznego spieniacza).\n2. Do szklanki przelej wodę kokosową, dodaj kostki lodu, a na wierzch dodaj \"chmurkę\" z matchy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/jaNRlZFEkTiEKdrX68FhX029yFWS0Kk70dWHrlOA.jpg","kcal":152.26,"protein":3.52,"fat":9.72,"carbs":13.08,"ingredients":[{"name":"Matcha tradycyjna (Ekogram)","grams":5,"measure":"łyżeczka"},{"name":"Woda","grams":20,"measure":"szklanka"},{"name":"Śmietanka 30% 500 ml (Łaciata)","grams":30,"measure":"opakowanie"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Woda kokosowa","grams":250,"measure":"ml"}],"category":"Napój"},{"id":45609833,"name":"Ratunkowy napar na przeziębienie","description":"1. Cytryny sparz wrzątkiem, obierz ze skóry i pozbaw pestek. \n2. Imbir obierz - najłatwiej to zrobisz skrobiąc korzeń za pomocą łyżeczki. \n3. Wszystkie składniki zmiksuj wraz z wodą dokładnie. Przecedź przez sitko. Otrzymany płyn przelej do pojemniczka na kostki lodu i zamroź.\n4.W razie potrzeby jedną kostkę zalej ciepłą wodą (ok. 70-80 stopni) i wypij ciepły napar.","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/RGl8ZnogKiDXIxjjhKGxnmof5cOkP4Yboqej0Lks.jpg","kcal":128.94,"protein":4.21,"fat":1.3,"carbs":35.98,"ingredients":[{"name":"Cytryna","grams":255,"measure":"średnia sztuka"},{"name":"Korzeń imbiru","grams":50,"measure":"sztuka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Kurkuma mielona","grams":4,"measure":"łyżeczka"},{"name":"Woda","grams":200,"measure":"szklanka"}],"category":"Napój"},{"id":45609944,"name":"Zdrow(sz)a gorąca czekolada","description":"1. Wszystkie składniki - oprócz czekolady - umieść w garnuszku i zagotuj ciągle mieszając, żeby nie powstały grudki i płyn zgęstniał (ok. 3 minuty).\n2. Jak wszystkie składniki się połączą dodaj posiekaną czekoladę, wymieszaj i podgrzewaj jedynie do jej rozpuszczenia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/X1Zv3NEGYlveUJgd1ubYnseoLGbMg5wFLDYV6MCP.jpg","kcal":252.28,"protein":9.41,"fat":9.61,"carbs":35.6,"ingredients":[{"name":"Napój sojowy czekoladowy wzbogacony","grams":250,"measure":"filiżanka"},{"name":"Kakao w proszku","grams":7,"measure":"łyżka"},{"name":"Budyń o smaku czekoladowym bez cukru","grams":7,"measure":"g"},{"name":"Czekolada gorzka 70-85% kakao","grams":20,"measure":"opakowanie"},{"name":"Erytrytol","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Napój"},{"id":45612097,"name":"Omlet francuski bez węglowodanów","description":"1. Do miski wbij jajka, dopraw solą i pieprzem i roztrzep je dokładnie na puszystą masę za pomocą rózgi lub widelca przez ok. 2 minuty. \n2. Rozgrzej patelnię i roztop na niej masło. Wylej masę jajeczną i od razu mieszaj za pomocą sylikonowej szpatułki na środku i kiedy omlet zacznie się ścinać rozlej go na całą patelnię. \n3. Kiedy będzie już ścięty od spodu posyp parmezanem i ułóż kawałki ricotty. Dopraw pieprzem i posyp rukolą.\n4.  Omleta złóż na pół i podawaj z pomidorkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/frSVe1C55JriqBNsG4bVLPuUIoyfQjsgbdxYuGBk.jpg","kcal":392.8,"protein":29.37,"fat":26.69,"carbs":9.73,"ingredients":[{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Masło","grams":5,"measure":"łyżeczka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Ser Ricotta","grams":40,"measure":"łyżka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Śniadanie"},{"id":45612126,"name":"Śniadaniowe ciacho","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Wszystkie składniki (oprócz malin i pasty pistacjowej) zblenduj na jednolitą masę, przelej do foremki wysmarowanej tłuszczem. \n3. Wstaw do piekarnika na 25 minut.\n4. Podawaj z malinami i pastą pistacjową.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/723P29vqtEYQW4UuxnIPqsHhQlzE4NE4AoOuB2DM.jpg","kcal":541.33,"protein":40.43,"fat":20.08,"carbs":51.23,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":100,"measure":"g"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":30,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"łyżeczka"},{"name":"Budyń bez cukru","grams":10,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Pistacje","grams":10,"measure":"łyżka"}],"category":"Śniadanie"},{"id":45612167,"name":"Gofry z serka wiejskiego","description":"1. Zblenduj ze sobą serek, mleko, jajka i oliwę na jednolitą konsystencję.\n2. Do masy dodaj mąkę, skrobię, proszek do pieczenia i erytrol. Zmiksuj jedynie do połączenia składników. Odstaw masę na 25-30 minut.\n3. Rozgrzej gofrownicę wysmarowaną tłuszczem. Do porządnie rozgrzanej gofrownicy wlej ciasto na gofry. Smaż przez 4-5 minut w zależności od mocy gofrownicy. Nie otwieraj gofrownicy w trakcie.\n4. Studź gofry na kratce.\n5. Podawaj z ulubionymi dodatkami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/iFZZmeBmmBU9gJvTMjDDJuzK3S3zWOz9JBs3BgoT.jpg","kcal":522.37,"protein":27.11,"fat":19.36,"carbs":59.49,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":65,"measure":"szklanka"},{"name":"Skrobia ziemniaczana","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Serek wiejski lekki (Delikate)","grams":100,"measure":"małe opakowanie"}],"category":"Śniadanie"},{"id":45612178,"name":"Jogurtowe racuszki z brzoskwinią","description":"1. Mąkę, proszek do pieczenia, sodę, szczyptę soli i erytrol wymieszaj w misce.\n2. Dodaj jogurt, jajko i wymieszaj. Odstaw na 10 minut.\n3. Brzoskwinię pokrój w kosteczkę lub w plastry i dodaj do ciasta, wymieszaj.\n4. Na patelni rozgrzej odrobinę masła (przesmaruj przed każdym placuszkiem, będą miały pyszny posmak) i nakładaj łyżką porcję ciasta. Smaż placuszki na średniej mocy pod przykryciem z dwóch stron po kilka minut.\n5. Podawaj z ulubionymi dodatkami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/xD0ti5TxN7C4oWgRkvL6cXMQERMB8PfDzAwPRWGE.jpg","kcal":756.26,"protein":31.41,"fat":19.1,"carbs":116.55,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":130,"measure":"szklanka"},{"name":"Jajko kurze","grams":65,"measure":"duża sztuka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":150,"measure":"małe opakowanie"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"},{"name":"Brzoskwinia","grams":200,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":45612196,"name":"Dutch baby z figami i camembertem","description":"1. Piekarnik rozgrzej do 220 stopni (góra-dół). Podczas nagrzewania wstaw od razu do piekarnika małą patelnię np. żeliwną lub małe naczynie żaroodporne (śr. ok. 16-18 cm). \n2. Mleko zmiksuj z mąką, szczyptą soli i erytrolu. Następnie dodaj 2 jajka i wymieszaj (lub zmiksuj) wszystko na gładką masę. \n3. Figi i ser pokrój w plastry. \n4. Kiedy naczynie w piekarniku będzie bardzo dobrze rozgrzane rozprowadź na jego dnie masło, a następnie wylej ciasto. Na wierzchu ułóż plastry sera i fig. \n5. Wstaw do piekarnika i piecz ok. 15 minut.\n6. Po upieczeniu dutch baby posyp świeżym tymiankiem i polej syropem klonowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/fkanEVgyBbv02pDgRz4NuMYTz5hzkKKDbF6Yj9iy.jpg","kcal":454.91,"protein":27.51,"fat":14.84,"carbs":53.74,"ingredients":[{"name":"Mleko 1,5%","grams":60,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":2,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Camembert lekki 12%","grams":30,"measure":"plaster"},{"name":"Figa","grams":80,"measure":"mała sztuka"},{"name":"Tymianek świeży","grams":1,"measure":"łyżeczka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":45612210,"name":"Grzanki z serem pleśniowym i figami","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Musztardę wymieszaj z miodem i posmaruj sosem pieczywo. Posyp tymiankiem. \n3. Na wierzch ułóż ser pleśniowy i plastry fig. \n4. Zapiekaj ok. 10 minut. \n5. Gotowe grzanki posyp posiekanymi pistacjami lub innymi orzechami - np. włoskimi lub pekan.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/uJ2KvDCJVy5xVURMkEwEuRCgPog2KobgnzhSwKDn.jpg","kcal":446.6,"protein":19.04,"fat":17.48,"carbs":59.11,"ingredients":[{"name":"Chleb orkiszowy","grams":80,"measure":"kromka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Ser pleśniowy niebieski","grams":40,"measure":"g"},{"name":"Figa","grams":80,"measure":"mała sztuka"},{"name":"Pistacje","grams":5,"measure":"łyżka"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":45612220,"name":"Bułeczki z serka wiejskiego","description":"1. Serek wiejski zblenduj z jajkiem i oliwą na gładką masę.\n2. Dodaj mąkę, proszek do pieczenia i sól. Opcjonalnie możesz dodać inne przyprawy - takie, jakie lubisz.\n3. Wymieszaj składniki i ugnieć na gładką kulkę (będzie nieco wilgotne, takie ma być). Powstałą kulkę podziel na 4 mniejsze i uformuj 4 lekko spłaszczone bułeczki. Możesz z góry zrobić nacięcia.\n4. Upiecz bułeczki w air fryer w 160 stopniach przez około 16-17 minut.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/BEgyGAjb9uGVPMOZ4Yji42MdI6Nf4sDLTkSnQ972.jpg","kcal":1167.14,"protein":55.56,"fat":33.62,"carbs":158.87,"ingredients":[{"name":"Serek wiejski lekki","grams":200,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":220,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"}],"category":"Śniadanie"},{"id":45612230,"name":"Omlet szarlotka","description":"1. Skyr wymieszaj z jajkiem.\n2. Dodaj mąkę, cynamon, proszek do pieczenia i budyń. Opcjonalnie możesz dodać także ok. 10 g erytrolu. Wymieszaj.\n3. Jabłko pokrój w małą kostkę. Dodaj do masy. Wymieszaj.\n4. Rozgrzej patelnię przesmarowaną oliwą i wylej masę na omlet. Przykryj i smaż na niewielkiej mocy przez kilka minut (ten omlet wymaga cierpliwości). Dopiero jak będzie wyraźnie ścięty - przewróć na drugą stronę i smaż jeszcze chwilę.\n5. Podawaj z ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/hiJCOhDblm0b08hub7wzgShdFNciv5xHCaSyE590.jpg","kcal":426.19,"protein":24.17,"fat":8.14,"carbs":66.37,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":40,"measure":"łyżeczka"},{"name":"Budyń w proszku śmietankowy","grams":15,"measure":"g"},{"name":"Skyr jogurt typu islandzkiego","grams":150,"measure":"opakowanie"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":2,"measure":"ml"},{"name":"Jabłko","grams":140,"measure":"średnia sztuka"}],"category":"Śniadanie"},{"id":45612240,"name":"Słodkie kanapki z twarożkiem i domową konfiturą","description":"1. Jagody mrożone wrzuć do garnuszka razem z 10 g erytrolu i sokiem z cytryny. Podgrzewaj aż jagody się rozmrożą, puszczą wodę i nieco zmiękną. Mąkę ziemniaczaną wymieszaj z 3 łyżkami zimnej wody i dodaj do gotujących się jagód. Gotuj cały czas mieszając, aż do zgęstnienia i wyłącz kuchenkę.\n2. Twaróg rozgnieć z pozostałym 10 g erytrolu, aromatem waniliowym i mlekiem.\n3. Bułkę opcjonalnie zapiecz na grzankę. Podawaj z twarożkiem i jagodową konfiturą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/SCepAfM65C2W2pI0QSGD64MEsDaD2F9y92YMBpRJ.jpg","kcal":364.86,"protein":29.47,"fat":2.11,"carbs":55.03,"ingredients":[{"name":"grahamka","grams":70,"measure":"sztuka"},{"name":"Ser twarogowy chudy","grams":100,"measure":"g"},{"name":"Mleko 1,5%","grams":20,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Jagody mrożone","grams":50,"measure":"garść"},{"name":"Mąka ziemniaczana","grams":4,"measure":"łyżeczka"},{"name":"Woda","grams":30,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":45612247,"name":"Placuszki dyniowe","description":"1. Wymieszaj wszystkie składniki oprócz oliwy na jednolitą masę. Odstaw na 10-15 minut.\n2. Rozgrzej patelnię z oliwą i smaż małe placuszki na niewielkim ogniu pod przykryciem z dwóch stron.\n3. Podawaj z ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/nrrmZppi2BPndT7Ng1lVZ3bXbYKEqrSteUISj4Et.jpg","kcal":337.44,"protein":18.83,"fat":10.73,"carbs":42.35,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":50,"measure":"g"},{"name":"Dynia olbrzymia purre bez soli","grams":50,"measure":"g"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":45612285,"name":"Śniadaniowe ciasto z jabłkami","description":"1. Wymieszaj lub zmiksuj ze sobą jajka, mleko, aromat i skyr. Dodaj suche składniki (mąkę, proszek do pieczenia, erytrol, cynamon i sól). Wymieszaj na gładką masę i odstaw na 10 minut.\n2. Jabłko pokrój w drobną kostkę i dodaj do masy. Wymieszaj i przelej masę do foremki (silikonowa lub zwykła wysmarowana tłuszczem, średnica ok. 18 cm).\n3. Piekarnik rozgrzej do 180 stopni (góra-dół) i wstaw ciasto do piekarnika na ok. 35-40 minut (do suchego patyczka). Możesz na koniec zwiększyć temperaturę do 190 stopni, jeśli chcesz, by bardziej się przypiekło z wierzchu.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/J4JRV3Q4tis7HL9zlgOiIkglWAIl36E3FbpZn7jY.jpg","kcal":690.63,"protein":42.67,"fat":12.19,"carbs":106.47,"ingredients":[{"name":"Jabłko","grams":280,"measure":"średnia sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":80,"measure":"łyżeczka"},{"name":"Erytrytol","grams":40,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":45612307,"name":"Ciasto na naleśniki orkiszowe","description":"1. Wszystkie składniki zblenduj na jednolita masę. W zależności czy chcesz zrobić naleśniki na słodko czy na słodko - pomiń lub dodaj erytrol.\n2. Smaż naleśniki na mocno rozgrzanej patelni z dwóch stron. Nie musisz używać do tego tłuszczu, jeśli masz dobrą patelnię, jednak możesz też po prostu przesmarować oliwą/masłem między każdym naleśnikiem. To są niewielkie ilości. Powinny wyjść 3 cienkie naleśniki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/mKfUW64I7lJID7R5js9CLT0aH1piYQps02oWJkYk.jpg","kcal":261.09,"protein":14.43,"fat":6.47,"carbs":36.04,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":45,"measure":"łyżeczka"},{"name":"Woda gazowana","grams":25,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":75,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"}],"category":"Śniadanie"},{"id":45612328,"name":"Ziołowy Dutch Baby dla dwojga","description":"1. Mąkę, jajka, mleko, sól zblenduj na gładko. Dodaj na końcu dodaj posiekane zioła i wymieszaj. Odstaw na 15 minut.\n2. Piekarnik rozgrzej do 220°C razem z foremką. Gdy jest gorąca, dodaj masło i rozprowadź po dnie. Wlej ciasto i piecz naleśnik ok. 15–20 minut, aż się pięknie zarumieni.\n3. Na gorący naleśnik wyłóż pesto, szynkę, burratę, polej oliwą i posyp świeżymi ziołami oraz pieprzem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/Z4Z4jaUNnGwWOn7QRzfTFP4WrnqI1iHOZMbeUuA7.jpg","kcal":1115.41,"protein":57.11,"fat":78.03,"carbs":44.92,"ingredients":[{"name":"Mąka pszenna","grams":45,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":65,"measure":"szklanka"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":6,"measure":"łyżka"},{"name":"Bazylia świeża","grams":5,"measure":"garść"},{"name":"Pesto","grams":30,"measure":"filiżanka"},{"name":"Szynka parmeńska","grams":45,"measure":"plaster"},{"name":"Ser Burrata","grams":165,"measure":"sztuka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":45612343,"name":"Omlet piernikowy z konfiturą śliwkową","description":"1. Jajka zmiksuj z jogurtem, mąką, słodzikiem, kakao, przyprawą do piernika i proszkiem do pieczenia. \n2. Wylej masę omletową na rozgrzaną, lekko natłuszczoną patelnię i smaż pod przykryciem aż boki omletu będą dobrze ścięte. \n3. Odwróć omlet na drugą stronę, na wierzchu dodaj pokruszoną czekoladę, przykryj i smaż jeszcze przez chwilę aż omlet będzie całkowicie ścięty, a czekolada się rozpuści.\n4. Omleta przełóż na talerz i posmaruj konfiturą ze śliwek - najlepiej wybierz taką bez dodatku cukru.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/jkTtUPa69TDAHli6l8il7Fkqe5xYUZiYAqabHho7.jpg","kcal":452.37,"protein":28.76,"fat":16.19,"carbs":50.42,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Przyprawa do piernika bez cukru","grams":3,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Powidła śliwkowe bez dodatku cukru (Krokus)","grams":20,"measure":"łyżka"}],"category":"Śniadanie"},{"id":45612405,"name":"Sałatka z soczystym kurczakiem i awokado","description":"1. Ten krok jest opcjonalny, ale sprawia, że kurczak jest bardziej soczysty. Rozbij pierś tak, aby była równej grubości. Kurczaka umieść w wodzie (ok. 3 szklanki wody i 3 łyżki soli). Odstaw do lodówki na około godzinę. Po tym czasie opłucz i osusz kurczaka, natrzyj przyprawami i oliwą. Piecz w aif fryerze w 190 stopniach po 7-9 minut z każdej strony.\n2. Składniki na sos: majonez, jogurt, sól, pieprz i posiekaną natkę wymieszaj.\n3. W misce ułóż mix sałat, pokrojone w plastry awokado, upieczoną i upieczoną i pokrojoną w plastry pierś, pokrojone pomidorki. Polej przygotowanym sosem i posyp parmezanem.\n4. Z pieczywa przygotuj grzankę rownież w air fryerze (aż będzie chrupiąca).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/PxfQ1aumb0qZJof9d9XEuCl5lm89YHwcUrG7xwar.jpg","kcal":519.66,"protein":33.89,"fat":27.9,"carbs":37.9,"ingredients":[{"name":"Mix sałat","grams":25,"measure":"garść"},{"name":"Majonez wegański (Go Vege)","grams":15,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":50,"measure":"średnie opakowanie"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Indyk pierś","grams":100,"measure":"porcja"},{"name":"Papryka wędzona w proszku","grams":2,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":2,"measure":"łyżeczka"},{"name":"Pietruszka suszona","grams":1,"measure":"łyżka"},{"name":"Papryka ostra przyprawa","grams":1,"measure":"łyżeczka"},{"name":"Awokado","grams":70,"measure":"plaster"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}],"category":"Sałatka"},{"id":45612511,"name":"Ryżowa sałatka z tuńczykiem","description":"1. Ryż ugotuj i odstaw do przestudzenia.\n2. Jajka ugotują twardo, obierz i pokrój w kostkę.\n3. Tuńczyka rozdrobnij na mniejsze kawałki.\n4. Paprykę i ogórki pokrój w drobną kostkę. Kukurydzę odcedź z zalewy. Cebulę drobno posiekaj.\n5. Przygotuj sos: wymieszaj skyr, majonez, posiekany szczypiorek, dopraw solą i pieprzem.\n6. Wszystkie składniki umieść w większej misce, dodaj sos i wymieszaj. Jeśli potrzebujesz - dopraw jeszcze do smaku.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/1X5hVE4AJBbMZne8lACvFrJ8HRtsyUQ5GVWCojZH.jpg","kcal":1326.46,"protein":82.61,"fat":31.94,"carbs":174.29,"ingredients":[{"name":"Ryż basmati","grams":180,"measure":"szklanka"},{"name":"Tuńczyk w sosie własnym","grams":160,"measure":"opakowanie"},{"name":"Kukurydza konserwowa","grams":60,"measure":"łyżka"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Ogórki kiszone","grams":2,"measure":"g"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Majonez wegański (Go Vege)","grams":45,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":15,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"}],"category":"Sałatka"},{"id":45612529,"name":"Domowy coleslaw","description":"1. Posiekaj drobno kapustę i cebulę. Marchew obierz i zetrzyj na tarce.\n2. Umieść warzywa w misce. Dodaj majonez, jogurt, sok z cytryny, przyprawy i posiekaną natkę. Wymieszaj i w razie potrzeby dopraw jeszcze trochę :).","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/f64zKU1kLC55jZ4xNaG0xJMGohV1f8RT90kwfj0d.jpg","kcal":488.34,"protein":11.48,"fat":26.31,"carbs":59.77,"ingredients":[{"name":"Kapusta biała","grams":357,"measure":"mała sztuka"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Marchew","grams":180,"measure":"średnia sztuka"},{"name":"Majonez wegański (Go Vege)","grams":60,"measure":"łyżeczka"},{"name":"Musztarda ostra","grams":15,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":3,"measure":"szczypta"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Jogurt grecki","grams":60,"measure":"łyżka"}],"category":"Sałatka"},{"id":45612538,"name":"Sałatka z serem i winogronem","description":"1. Na talerz wyłóż rukolę.\n2. Winogrona pokrój na połówki, ser na mniejsze kawałki. Z pieczywa zrób jedną grzankę lub pokrój na mniejsze kawałki i przygotuj grzanki na suchej patelni.\n3. Na rukolę wyłóż pokrojone winogrono, ser, posyp orzechami i grzankami.\n4. Całość skrop oliwą, solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/O599Hm0SOzAUtUZDGtbakmd1VHaIaX0S6i3qhrGn.jpg","kcal":425.81,"protein":17.62,"fat":22.59,"carbs":42.56,"ingredients":[{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Winogrona czerwone","grams":125,"measure":"porcja"},{"name":"Camembert lekki","grams":60,"measure":"opakowanie"},{"name":"Orzechy włoskie","grams":10,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}],"category":"Sałatka"},{"id":45612555,"name":"Lżejsza sałatka jarzynowa","description":"1. Jajka ugotuj na twardo.\n2. Wszystkie warzywa oprócz ogórków kiszonych obierz ze skórki, włóż do garnka, zalej wodą i gotuj do miękkości.\n3. Ugotowane i przestudzone warzywa, a także jajka oraz ogórki kiszone pokrój w kostkę.\n4. Następnie dodaj jogurt, majonez, musztardę oraz przyprawy. Całość wymieszaj na sałatkę.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/XgwC8puH7P4mykquaxbogxtD3WOJi3PX7UKBjnsP.jpg","kcal":868.31,"protein":35.24,"fat":54.01,"carbs":68.82,"ingredients":[{"name":"Marchew","grams":200,"measure":"mała sztuka"},{"name":"Pietruszka korzeń","grams":160,"measure":"sztuka"},{"name":"Ziemniaki","grams":150,"measure":"średnia sztuka"},{"name":"Ogórki kiszone","grams":120,"measure":"średnia sztuka"},{"name":"Seler korzeń","grams":60,"measure":"plaster"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Jogurt grecki","grams":120,"measure":"g"},{"name":"Majonez wegański","grams":50,"measure":"łyżeczka"},{"name":"Musztarda","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":45612579,"name":"Szybkie zapiekanki","description":"1. Bagietkę przekrój na pół i wydrąż lekko środek.\n2. Pieczarki zetrzyj na tarce, ser zetrzyj lub rozdrobnij, szynkę pokrój w drobną kostkę, pietruszkę posiekaj, a czosnek przeciśnij przez praskę. Wymieszaj te wszystkie składniki na taką pastę. Nadziej nią wydrążone bułki i piecz w air fryer (lub piekarniku) w 180 stopniach przez ok. 6-8 minut.\n3. Podawaj z warzywami i/lub ketchupem z dobrym składem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/fdVUEa0r5C4d2bHHHt5NL6g7sLG6sgXjK0yXN3gO.jpg","kcal":384.87,"protein":32.41,"fat":10.78,"carbs":41.02,"ingredients":[{"name":"Bagietka pełnoziarnista","grams":70,"measure":"sztuka"},{"name":"Pieczarki","grams":72,"measure":"średnia sztuka"},{"name":"Szynka delikatesowa z kurcząt (Drobimex)","grams":30,"measure":"opakowanie"},{"name":"Ser Mozzarella light 9%","grams":63,"measure":"sztuka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":30,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":45612609,"name":"Makaron w sosie z pieczonych pomidorków i ricotty","description":"1. Pomidorki przekrój na połówki, a główkę czosnku przekrój na pół w poprzek. Ułóż pomidorki i czosnek w naczyniu żaroodpornym. Polej oliwą, posyp chilli, solą i pieprzem. Wstaw do piekarnika nagrzanego do 200 stopni (góra-dół) i piecz przez 25 minut.\n2. W tym czasie ugotuj makaron al dente.\n3. Upieczone pomidorki umieść w blenderze. Wyciśnij do nich upieczony czosnek. Dodaj też sok z naczynia, który powstał podczas pieczenia. Dodaj ricottę i garść świeżej bazylii. Zblenduj na jednolity sos. Dopraw w razie potrzeby jeszcze.\n4. Ugotowany makaron wymieszaj z powstałym sosem. Posyp parmezanem i udekoruj listkami świeżej bazylii.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/1D6xgp1aqqHssY8luBw9c9ROnqw9GkNDzSxpUhL8.jpg","kcal":506.18,"protein":19.03,"fat":19.72,"carbs":66.02,"ingredients":[{"name":"Makaron","grams":50,"measure":"szklanka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Czosnek","grams":45,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Ser Ricotta","grams":60,"measure":"łyżka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"}],"category":"Obiad"},{"id":45612636,"name":"Cynamonowe knedle ze śliwkami","description":"1. Z zimnych ziemniaków, jajka, mąki i soli zagnieć ciasto. \n2. Przełóż na blat oprószony mąką, uformuj wałek i potnij go na 16 kawałków. Każdy kawałek rozpłaszcz na placuszek. \n3. Śliwki wymieszaj z łyżką erytrolu i cynamonem. Na każdy placuszek nałóż śliwkę i zamknij ją w środku tworząc okrągłe knedle. \n4. Knedle gotuj w lekko osolonej wrzątku, ok. 4 minuty od momentu wypłynięcia klusek na powierzchnię. \n5. Na patelni rozpuść masło z dodatkiem erytrolu i cynamonu. Ugotowane knedle przełóż na patelnię i obtocz każdy delikatnie w słodkim cynamonowym maślanym syropie. \n6. Na talerzach rozsmaruj jogurt, wyłóż porcje cynamonowych knedli i posyp pokruszonymi orzechami (najlepiej prażonymi).","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/ywmcUnDCK3ipcfR8tBhxVF2IvBYON4lFw4NNusPp.jpg","kcal":2117.55,"protein":83.64,"fat":45.61,"carbs":358.83,"ingredients":[{"name":"Ziemniaki ugotowane z solą","grams":500,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":200,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Śliwki","grams":880,"measure":"sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Masło","grams":20,"measure":"porcja"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":4,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"},{"name":"Orzechy laskowe","grams":30,"measure":"łyżka"}],"category":"Obiad"},{"id":45612664,"name":"Makaron z kremowym pesto z cukinii","description":"1. Piekarnik rozgrzej do 200 stopni.\n2. Cukinię pokrój w kostkę. Dodaj sól, pieprz, przeciśnięty przez praskę czosnek i oliwę. Wymieszaj i wyłóż do naczynia żaroodpornego. Wstaw do nagrzanego piekarnika na ok. 20 minut.\n3. W tym czasie ugotuj makaron al dente (nie wylewaj całej wody z makaronu, odlej sobie ok. 1/2 szklanki).\n4. Upieczoną cukinię (razem z sokami, które pościła i z oliwą) zblenduj z pietruszką, orzechami, parmezanem, ricottą. W razie potrzeby dodaj wody z makaronu, gdyby konsystencja była dla Ciebie zbyt gęsta. Możesz dodać jeszcze przypraw lub wcisnąć więcej czosnku.\n5. Wymieszaj makaron z przygotowanym pesto.\n6. Podawaj udekorowane pietruszką lub pomidorkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/1xgeky0YhhB0bcCEeA40zHlF4g7FU43dNkBJ6Jp0.jpg","kcal":537.44,"protein":25.59,"fat":24.65,"carbs":57.36,"ingredients":[{"name":"Makaron","grams":53,"measure":"filiżanka"},{"name":"Cukinia","grams":250,"measure":"mała sztuka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ricotta","grams":90,"measure":"łyżka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"},{"name":"Orzechy nerkowca","grams":10,"measure":"sztuka"}],"category":"Obiad"},{"id":45612669,"name":"Cukiniowe tacos z pastą z awokado i grillowanym halloumi","description":"1. Cukinię zetrzyj na tarce z grubymi oczkami, posól i odciśnij z niej nadmiar wody. Dodaj jajko, mąkę, pieprz i wymieszaj dokładnie. Rozgrzej oliwę na patelni i usmaż 3 płaskie placki z dwóch stron na niewielkim ogniu. Odstaw do wystudzenia.\n\n2. Przygotuj pastę z awokado: dojrzałe awokado rozgnieć widelcem razem z przeciśniętym przez praskę czosnkiem i pieprzem cytrynowym, wymieszaj.\n \n3. Ser halloumi przesmaruj oliwą i zgrilluj na patelni z dwóch stron dosłownie po 20 sekund. Najlepiej użyć patelni grillowej lub grilla elektrycznego, jednak jeśli nie masz to możesz użyć również zwykłej patelni.\n\n4. Gotowe placki z cukinii posmaruj pastą z awokado, wyłóż plastrami grillowanego halloumi, roszponką, plastrami pomidora, piórkami czerwonej cebuli i złóż jak tacos.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2024/11/Xx72uPMyr8Lk2U85J7vGgzw9VfGDRcTe5ZGjF0QR.jpg","kcal":625.82,"protein":35.16,"fat":39.76,"carbs":40.58,"ingredients":[{"name":"Cukinia","grams":200,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka pszenna pełnoziarnista","grams":25,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Ser Halloumi","grams":60,"measure":"g"},{"name":"Cebula czerwona","grams":25,"measure":"g"},{"name":"Pomidor czerwony","grams":120,"measure":"g"},{"name":"Roszponka","grams":25,"measure":"garść"}],"category":"Obiad"},{"id":45612721,"name":"Kopytka z kurczakiem w sosie pieczarkowo-koperkowym","description":"1. Cebulę posiekaj. Kurczaka pokrój w kostkę.\n2. Na patelni rozgrzej oliwę i zeszklij cebulę. Dodaj kurczaka i dopraw solą i pieprzem, przesmaż przez kilka minut, aż kurczak się zetnie.\n3. Pieczarki pokrój w plastry.\n4. Dodaj na patelnie czosnek przeciśnięty przez praskę i pieczarki. Przesmaż i podlej wodą, by nic się nie przypaliło.\n5. Całość smaż co chwilę mieszając i ewentualnie dodawaj odrobinę wody (musi jej być troszkę do zahartowania śmietany, ale nie za dużo, by nie zrobiła się zupa).\n6. Dodaj gotowe kopytka i smaż jeszcze 5-7 minut (w zależności od informacji na opakowaniu).\n7. Kiedy pieczarki będą już podsmażone, kopytka miękkie a kurczak gotowy - w kubeczku wymieszaj śmietanę z 2-3 łyżkami gorącej wody z patelni. Następnie taką zahartowaną śmietanę dodaj na patelnię i wymieszaj, przesmaż jeszcze chwilę całość.\n8. Koperek posiekaj i dodaj do sosu. Dopraw jeszcze całość ewentualnie pieprzem i solą.\n9. Podawaj udekorowane koperkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/YunYJkez80iPIaBE7qVyd2YkIPqW3Crc2HUh2WrK.jpg","kcal":1025.03,"protein":71.23,"fat":31.21,"carbs":118.56,"ingredients":[{"name":"Kopytka","grams":300,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Śmietana 12% (Pewni Dobrego)","grams":100,"measure":"opakowanie"},{"name":"Pieczarki","grams":230,"measure":"duża sztuka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"}],"category":"Obiad"},{"id":45612787,"name":"Zapiekanka warzywna z makaronem i serem","description":"1. Piekarnik rozgrzej do 200 stopni na grzanie górne i dolne.\n2. Papryki pokrój na kawałki, pomidora w kostkę, pieczarki w plastry, cebulę w piórka lub posiekaj drobniej.\n3. W naczyniu żaroodpornym umieść naczynia i polej oliwą. Wstaw do piekarnika na 10 minut.\n4. Ze słoiczka przygotuj 450 ml bulionu (no chyba, że masz własny, domowy :)\n4. Następnie ostrożnie wyciągnij naczynie i dorzuć donaczynia makaron i wlej bulion, wymieszaj. Wstaw do piekarnika na 30 minut.\n5. Dodaj tartą mozzarellę i ponownie wymieszaj i piecz przez kilka minut jeszcze, a gdy makaron wchłonie cały bulion - połóż na wierzchu plastry mozzarelli i piecz do rozpuszczenia sera.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/NFlmUlVRkVZRmQYtkxgb5dowmWfXv4eDeRtUVyhN.jpg","kcal":1573.12,"protein":64.97,"fat":47.47,"carbs":223.76,"ingredients":[{"name":"Makaron orzo","grams":250,"measure":"g"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":120,"measure":"średnia sztuka"},{"name":"Pieczarki","grams":144,"measure":"średnia sztuka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Ser Mozzarella","grams":45,"measure":"plaster"},{"name":"Bulion drobiowy (Winiary)","grams":23,"measure":"łyżka"},{"name":"Mozzarella tarta","grams":50,"measure":"g"}],"category":"Obiad"},{"id":45612916,"name":"Francuska tarta z air fryera","description":"Pomidorki przekrój na połówki, przełóż do airfryera, wymieszaj z oliwą, solą i pieprzem. Odwróć je spodem do dołu i upiecz w 200 stopniach przez 15 minut. Ciasto rozwałkuj i odkrój kawałek wielkości Twojej frytkownicy, a jak pomidorki będą gotowe - połóż na nie ciasto dobrze zabezpieczając brzegi. Piecz ponownie w airfryerze przez 15 minut w 200 stopniach, aż ciast pięknie się zarumieni.\n\nOdkrój boki ciasta od air fryera i zdecydowanym ruchem odwróć koszyk i wyciągnij tartę. Podawaj z ulubionymi dodatkami, ja dodałam ser straciatella, włoską szynkę i bazylię.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/ZyYn9zGxiQjitT6o6qwUJlnwLwKIg3QQdVPp9pD0.jpg","kcal":938.72,"protein":33.13,"fat":60.71,"carbs":65.42,"ingredients":[{"name":"Ciasto francuskie light","grams":130,"measure":"opakowanie"},{"name":"Pomidory koktajlowe","grams":300,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ser Burrata","grams":165,"measure":"sztuka"},{"name":"Prosciutto Cotto","grams":30,"measure":"plaster"},{"name":"Bazylia świeża","grams":10,"measure":"garść"}],"category":"Obiad"},{"id":45612935,"name":"Wysokobiałkowe pizzerinki","description":"1. Piekarnik rozgrzej do 200 stopni.\n2. Serek wiejski wymieszaj z jajkami. Dodaj mąkę, proszek do pieczenia i przyprawy i wszystko dokładnie wymieszaj na gęstą masę. \n3. Masę wykładaj na blaszkę wyłożoną papierem do pieczenia tworząc 8 placków. Wstaw do piekarnika na ok. 15-20 minut aż się zarumienią. \n4. Wyjmij pizzerinki, posmaruj wszystkie ketchupem, dodaj pokrojone pieczarki, cebulę, szynkę oraz tartą mozzarellę. Włóż ponownie do piekarnika i zapiekaj aż ser się zapiecze. \n5. Pizzerinki podawaj z rukolą.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/LMeWJ7y0gzCKaWdS9mMsI0CWrw2hJ0iyaCYIxbFr.jpg","kcal":1485.16,"protein":131.4,"fat":44.13,"carbs":143.6,"ingredients":[{"name":"Serek wiejski lekki","grams":400,"measure":"opakowanie"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":150,"measure":"g"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula","grams":35,"measure":"mała sztuka"},{"name":"Pieczarki","grams":100,"measure":"średnia sztuka"},{"name":"Ser Mozzarella light 9%","grams":125,"measure":"sztuka"},{"name":"Szynka z indyka","grams":60,"measure":"plaster"},{"name":"Ketchup bez dodatku cukru","grams":60,"measure":"łyżka"},{"name":"Rukola","grams":80,"measure":"garść"}],"category":"Obiad"},{"id":45612967,"name":"Bowl z pieczoną dynią i fetą","description":"1. Dynię, cebulę oraz papryki pokrój w grubą kostkę. Skrop połową oliwy, przypraw solą i pieprzem. Wstaw do piekarnika na ok. 30-35 minut (180 stopni). \n2. W miskach układaj naprzemienne pieczone warzywa tworząc kolorowy bowl. Na wierzchu pokrusz w fetę. \n3. Przygotuj sos z pozostałej oliwy, musztardy, octu , miodu oraz papryki (wg upodobań wybierz ostrą lub słodką). \n4. Bowla polej sosem tuż przed spożyciem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/R6umpDXZLw4DLTOazshA6fQb4XF10l0WxnsnzRCi.jpg","kcal":863.96,"protein":30.51,"fat":54.71,"carbs":74.65,"ingredients":[{"name":"Dynia","grams":400,"measure":"g"},{"name":"Papryka czerwona","grams":170,"measure":"duża sztuka"},{"name":"Papryka żółta","grams":170,"measure":"duża sztuka"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Ser Feta","grams":150,"measure":"plaster"}],"category":"Obiad"},{"id":45612980,"name":"Fit Kebab na talerzu","description":"1. Mięso pozbawione tłustych kawałków i obtocz w sosie sojowym, papryce, oregano, soli i pieprzu. Upiecz w air fryerze w 180 stopniach przez 30 minut (lub w piekarniku). Odstaw do wystudzenia. Wystudzone mięso pokrój na podłoże kawałki, nieduże. Rozgrzej patelnię przesmarowaną oliwą i praż kurczaka przez parę minut, co chwilę mieszając do uzyskania pożądanego zarumienienia i dosmażenia.\n2. Frytki przygotuj zgodnie z instrukcją na opakowaniu (najlepiej jak mięso będzie już stygło, wstawić frytki, aby wszystko było ciepłe). Frytki również najwygodniej zrobić w air fryerze.\n3.  W czasie kiedy mięso będzie się piekło przygotuj także surówkę: poszatkuj drobno kapustkę, ogórka pokrój w drobne kawałki lub zetrzyj, czosnek przeciśnij przez praskę, cebulę posiekaj w drobne piórka. Wymieszaj całość z majonezem, solą i pieprzem. Opcjonalnie dodaj troszkę soku z cytryny i posiekanej natki pietruszki.\n4. Podawaj frytki z mięsem, surówką i ketchupem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/gNRYNej0BOBHLmy0XQYKtO4ygiaMoQR1hj74qTzN.jpg","kcal":427.43,"protein":25.05,"fat":19.44,"carbs":40.91,"ingredients":[{"name":"Frytki karbowane mrożone z dodatkiem soli","grams":100,"measure":"g"},{"name":"Mięso z udka kurczaka","grams":100,"measure":"g"},{"name":"Sos sojowy","grams":5,"measure":"g"},{"name":"Papryka wędzona w proszku","grams":1,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Kapusta pekińska","grams":100,"measure":"liść"},{"name":"Ogórek","grams":50,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Majonez wegański","grams":20,"measure":"g"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Ketchup bez dodatku cukru","grams":30,"measure":"łyżka"}],"category":"Obiad"},{"id":45612995,"name":"Makaron ryżowy z wołowiną po azjatycku","description":"1. Cebulę i czosnek posiekaj drobno. Imbir zetrzyj na tarce. Na patelni rozgrzej oliwę i zeszklij cebulę z czosnkiem i imbirem. Przesmaż chwilkę.\n2. Dodaj na patelnię mięso i smaż, aż straci surowość. \n3. W tym czasie wymieszaj składniki na sos: sos sojowy, miód, ocet ryżowy i sos sriracha. Opcjonalnie dodaj trochę wody.\n4. Paprykę pokrój w cienkie paski i dodaj na patelnię, przesmaż.\n5. Dodaj sos do usmażonego mięsa i papryki, wymieszaj i smaż aż całość zgęstnieje.\n6. Makaron ugotuj, odcedź i dodaj na patelnię, wymieszaj. W razie potrzeby dodaj troszkę wody i dopraw, jeśli wolisz nieco ostrzejsze potrawy.\n7. Przełóż makaron na talerz i podawaj posypany posiekanym szczypiorkiem i z kawałkiem limonki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/BCvUhEkWsGn2AxekYjpZBeYYr7qVSGDddwTxDjWc.jpg","kcal":460.37,"protein":28.27,"fat":10.89,"carbs":61.85,"ingredients":[{"name":"Makaron ryżowy","grams":50,"measure":"porcja"},{"name":"Wołowina mielona 5% tłuszczu","grams":100,"measure":"g"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Cebula","grams":25,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":10,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Ocet ryżowy","grams":5,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":6,"measure":"łyżeczka"},{"name":"Limonka","grams":10,"measure":"sztuka"}],"category":"Obiad"},{"id":45613030,"name":"Azjatycki makaron z kurczakiem w orzechowym sosie","description":"1. Kurczaka pokrój w cienkie paski. Wymieszaj go z łyżką (10 ml) sosu sojowego i mąką ziemniaczaną.\n2. Na patelni rozgrzej oliwę i podsmaż kurczaka, aż straci surowość. Przełóż na talerz.\n3. Na tej samej patelni podsmaż starty imbir i przeciśnięty przez praskę czosnek. Dodaj masło orzechowe, pastę miso, chilli, pozostałe 2 łyżki (20 ml) sosu sojowego i sok z limonki, wymieszaj i przesmaż chwilę. Wlej mleczko kokosowe i wodę. Wymieszaj wszystko i dodaj kurczaka oraz makaron. Gotuj całość jeszcze 3 minuty.\n4. Przełóż danie do talerzy, podawaj z kawałkiem limonki i posiekanym szczypiorkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/ssZDzX0hrNjxTFVRiDIjYqFO7O48ft1KdrcSkKMc.jpg","kcal":1010.56,"protein":69.61,"fat":41.45,"carbs":90.54,"ingredients":[{"name":"Makaron udon","grams":200,"measure":"porcja"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"},{"name":"Sos sojowy","grams":30,"measure":"łyżka"},{"name":"Mąka ziemniaczana","grams":6,"measure":"łyżeczka"},{"name":"Miso","grams":30,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":30,"measure":"łyżka"},{"name":"Mleczko kokosowe light 6%","grams":150,"measure":"puszka"},{"name":"Woda","grams":500,"measure":"szklanka"},{"name":"Korzeń imbiru","grams":10,"measure":"plaster"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sok z limonki","grams":6,"measure":"łyżka"},{"name":"Limonka","grams":33,"measure":"sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Chili w proszku","grams":1,"measure":"łyżeczka"}],"category":"Obiad"},{"id":45613042,"name":"Zapiekanka ziemniaczano-porowa","description":"1. Zeszklij posiekaną jasną część pora z czosnkiem na wybranym tłuszczu.\n2. Dodaj tymianek, musztardy i sok z cytryny.\n3. Wlej serek wymieszany z mlekiem, solą i pieprzem, podgrzej do lekkiego zgęstnienia.\n4. Ziemniaki i cukinię pokrój w bardzo cienkie plasterki.\n5. Układaj warstwowo: ziemniaki → sos → cukinia → sos.\n6. Posyp tartym serem.\n7. Piecz 30 min w 190°C pod przykryciem + 15-20 min bez, aż się zarumieni.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/r5uqD1AiCB3832B7dUtL49At33Rbu5TRklnPUZGp.jpg","kcal":1177.75,"protein":62.42,"fat":59.21,"carbs":106.66,"ingredients":[{"name":"Masło","grams":20,"measure":"łyżka"},{"name":"Por","grams":260,"measure":"sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Tymianek suszony","grams":1,"measure":"łyżeczka"},{"name":"Musztarda francuska","grams":20,"measure":"łyżka"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Ziemniaki","grams":225,"measure":"średnia sztuka"},{"name":"Cukinia","grams":250,"measure":"mała sztuka"},{"name":"Serek naturalny","grams":225,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":60,"measure":"szklanka"},{"name":"Mozzarella tarta","grams":100,"measure":"opakowanie"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":45613055,"name":"Kurczak po toskańsku","description":"1. Polędwiczki skrop sokiem z cytryny, obtocz je w nim i natrzyj przyprawami: solą, pieprzem papryką wędzoną i oregano. Upiecz w air fryerze przez 25-30 (w zależności jak grube są kawałki) minut w 180 stopniach.\n2. Na patelni/w garnuszku rozgrzej oliwę. Cebulę posiekaj i dodaj na rozgrzaną patelnię, przesmaż chwilę. Dodaj przeciśnięty przez praskę czosnek i suszone pomidory w paskach i smaż chwilkę ciągle mieszając (uważaj, by nie przypalić). Dodaj wodę, zagotuj i dodaj bulion ze słoiczka. Wymieszaj. Dodaj koncentrat, pieprz, szczyptę oregano i opcjonalnie sól (niewielką ilość). Dodaj serek i wymieszaj. Następnie dodaj parmezan. Zredukuj sos do pożądanej konsystencji. Do sosu dodaj upieczone kawałki polędwiczek i listki świeżej bazylii.\n3. Podawaj np. z ryżem.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/Ny6ZHiOa9lWaIQrGnsympcYlpzHQiqw6q1UK6Bnj.jpg","kcal":1259.06,"protein":130.76,"fat":51.12,"carbs":64.15,"ingredients":[{"name":"Kurczak polędwiczka","grams":400,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Papryka wędzona w proszku","grams":1,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Bulion drobiowy (Winiary)","grams":20,"measure":"łyżeczka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Koncentrat pomidorowy","grams":30,"measure":"łyżka"},{"name":"Pomidory suszone w zalewie","grams":180,"measure":"sztuka"},{"name":"Serek śmietankowy naturalny light  (AH)","grams":130,"measure":"g"},{"name":"Ser Parmezan","grams":32,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"}],"category":"Obiad"},{"id":45613058,"name":"Zapiekanka makaronowa curry","description":"1. Makaron ugotuj al dente według zaleceń producenta na opakowaniu. \n2. Pora pokrój w plasterki, a marchew zetrzyj na tarce na grubych oczkach. Warzywa podsmaż na oliwie z oliwek. \n3. Kurczaka pokrój w paseczki i dodaj do podsmażonych warzyw. Dodaj przyprawy i smaż wszystko razem aż mięso straci surowość. \n4. Do pojemnika blendera włóż mozzarellę, jajko, mleko, szczyptę soli i szczyptę czosnku granulowanego. Wszystko razem zmiksuj na gładki sos.\n5. Piekarnik rozgrzej do 180 stopni. \n6. Do naczynia żaroodpornego włóż ugotowany makaron, warzywa z mięsem, posiekaną natkę pietruszki oraz sos. Wszystko razem wymieszaj. Posyp parmezanem i piecz ok. 20 minut do zrumienienia.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/5agRO5b8xq6V4xTuR6k0jmSCo1PAgLxzIcyeouCw.jpg","kcal":2010.23,"protein":183.45,"fat":57.89,"carbs":183.58,"ingredients":[{"name":"Makaron kokardki","grams":200,"measure":"g"},{"name":"Kurczak pierś","grams":400,"measure":"sztuka"},{"name":"Marchew","grams":120,"measure":"średnia sztuka"},{"name":"Por","grams":130,"measure":"sztuka"},{"name":"Ser Parmezan","grams":64,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":125,"measure":"sztuka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":70,"measure":"szklanka"},{"name":"Natka pietruszki","grams":40,"measure":"pęczek"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Curry przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Kurkuma mielona","grams":1,"measure":"łyżeczka"},{"name":"Imbir mielony","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":2,"measure":"szczypta"}],"category":"Obiad"},{"id":45613078,"name":"Wrap a'la cheeseburger","description":"1. Wołowinę wymieszaj z przyprawami i uformuj z niej cienkiego burgera. Usmaż na oliwie z oliwek. \n2. Kiedy przewrócisz mięso na drugą stronę połóż na nim tortillę i dociśnij tak, aby się do niej przykleiło i rozprowadziło prawie po całej jej średnicy. \n3. Zdejmij tortillę wraz z usmażonym mięsem z patelni i na środku połóż plaster sera (pod wpływem ciepłej tortilli i mięsa powinien się lekko roztopić, więc zrób to dość szybko po zdjęciu tortilli z patelni). \n4. Majonez wymieszaj z keczupem i posmaruj sosem tortillę. \n5. Dodaj sałatę, cebulę pokrojoną w cienkie piórka i ogórka konserwowego pokrojonego w plastry. \n6. Tortillę zawiń jak wrapa.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/YAKngtICmzwWsPYI8zyOgWDbrKFJl79eqD5WVn86.jpg","kcal":525.2,"protein":39.54,"fat":23.63,"carbs":36.78,"ingredients":[{"name":"Wołowina mielona 5% tłuszczu","grams":120,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Ser żółty Active Protein (Ryki)","grams":17,"measure":"plaster"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Majonez wegański","grams":15,"measure":"łyżeczka"},{"name":"Ketchup bez dodatku cukru","grams":15,"measure":"łyżka"},{"name":"Ogórki konserwowe","grams":100,"measure":"g"},{"name":"Sałata rzymska","grams":20,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}],"category":"Obiad"},{"id":45613096,"name":"Udon z kremowym sosem gochujang i tofu","description":"1. Tofu odciśnij z nadmiaru wody w ręcznik papierowy, pokrusz w dłoniach do miseczki i wymieszaj z mąką ziemniaczaną oraz sosem sojowym. Rozgrzej 5 ml (1 łyżeczkę) oliwy na patelni i podsmaż tofu, aż będzie chrupiące. Ściągnij z patelni i odłóż na bok.\n2. W międzyczasie ugotuj makaron.\n3. Na tej samej patelni na kolejnej łyżeczce oliwy zeszklij posiekaną szalotkę. Dodaj po chwili starty imbir i przeciśnięty przez praskę czosnek. Przesmaż chwilkę.\n4. Dodaj na patelnię pastę gochujang (jeśli lubisz ostrzejsze potrawy - możesz dodać jej więcej ;), serek kanapkowy i wodę, wymieszaj, aby składniki się połączyły. Dodaj opcjonalnie jeszcze odrobinkę sosu sojowego i wymieszaj.\n5. Dodaj do sosu ugotowany makaron i wymieszaj, przełóż na talerz i posyp podsmażonym tofu i posiekanym szczypiorkiem. Podawaj z limonką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/YJnKu1Wtir2ELvZsPLMDgf79APiTllL3JLGo24S8.jpg","kcal":605.38,"protein":25.65,"fat":25.11,"carbs":66.24,"ingredients":[{"name":"Udon (Asia Style)","grams":200,"measure":"opakowanie"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":1,"measure":"łyżeczka"},{"name":"Pasta Gochujang","grams":1,"measure":"łyżka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Limonka","grams":10,"measure":"plaster"},{"name":"Tofu wędzone","grams":90,"measure":"opakowanie"},{"name":"Mąka ziemniaczana","grams":6,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"}],"category":"Obiad"},{"id":45613104,"name":"Pieczone gnocchi z ciecierzycą","description":"1. Rozgrzej piekarnik do 200°C.\n2. Na blasze wyłóż gnocchi, ciecierzycę, cebulę i suszone pomidory. Skrop oliwą, dodaj oregano, czosnek, sól i pieprz. Wymieszaj i rozłóż w jednej warstwie.\n3. Piecz ok. 20 minut, mieszając w połowie czasu, aż gnocchi będą chrupiące i złote.\n4. Po wyjęciu z piekarnika posyp wszystko pokruszoną fetą, dodaj szczypiorek i polej kremem balsamicznym.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/sqFSuhYH5QyLWZhaRmMQeKjF0MJpGDw8kWqw5fgf.jpg","kcal":1057.98,"protein":36.01,"fat":31.62,"carbs":153,"ingredients":[{"name":"Gnocchi (GustoBello)","grams":250,"measure":"porcja"},{"name":"Ciecierzyca konserwowa","grams":240,"measure":"puszka (odsączona)"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Oregano suszone","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Ser Feta","grams":40,"measure":"plaster"}],"category":"Obiad"},{"id":45613117,"name":"Fasolka w kremowym sosie pomidorowym","description":"1. Szalotkę posiekaj.\n2. Na patelni rozgrzej oliwę i zeszklij szalotkę. Dodaj przeciśnięty przez praskę czosnek i pastę gochujang. Przesmaż chwilę.\n3. Dodaj na patelnię serek oraz passatę, wymieszaj do połączenia składników. Dopraw szczyptą soli i pieprzu.\n4. Dodaj odcedzoną i przepłukaną fasolkę, wymieszaj i duś przez kilka minut, do zgęstnienia.\n5. Dodaj posiekaną natkę pietruszki.\n6. Podawaj ryżem lub chlebkami naan.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/m2zvFG4f5j8ucSsmSDUs9hLxGxsoXPLLzrqvm5B3.jpg","kcal":387.99,"protein":18.64,"fat":13.04,"carbs":47.52,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Pasta Gochujang","grams":5,"measure":"łyżeczka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Passata","grams":250,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Fasola biała konserwowa","grams":120,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Obiad"},{"id":45613128,"name":"Pity/chlebki naan z patelni","description":"1. Wszystkie składniki wymieszaj i zagnieć w kulkę na gładkie ciasto. Będzie wymagało podsypania mąką, więc możesz delikatnie to zrobić.\n2. Podziel na 4 części i każdą z nich ponownie uformuj w kulkę. Rozwałkuj na placek o grubości ok. 0,5 cm na blacie/stolnicy oprószonym mąką.\n3. Rozgrzej mocno nieprzywierającą patelnię i usmaż po 3-4 minuty z każdej strony każdy kawałek chlebka.\n4. Podawaj np. z fasolką w pomidorowym sosie!","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/oIkaHgtofTZq78HWSukg3JAChnHSO57xzGrWS6gs.jpg","kcal":624.95,"protein":20.31,"fat":16.71,"carbs":97.92,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":130,"measure":"szklanka"},{"name":"Jogurt grecki","grams":150,"measure":"łyżka"},{"name":"Sól","grams":3,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":5,"measure":"łyżeczka"}],"category":"Obiad"},{"id":45613180,"name":"Fit bita śmietana z sezonowymi owocami","description":"1. Serek wiejski zmiksuj z odżywką i śmietan-fixem na gładką i puszystą masę. Opcjonalnie możesz dodać aromat śmietankowy.\n2. Do pucharka lub szklanki wyłóż połowę fit bitej śmietany, dodaj owoce, a następnie wyłóż drugą warstwę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/qFo5KTs3FwtiwACWELmAzrTQewFMNX0fp3F3PLfu.jpg","kcal":302.62,"protein":34.94,"fat":7.68,"carbs":23.96,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":200,"measure":"g"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Śmietan fix (Dr Oetker)","grams":4,"measure":"opakowanie"},{"name":"Maliny","grams":120,"measure":"garść"}],"category":"Deser"},{"id":45613192,"name":"Letnie owoce pod kruszonką","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Brzoskwinie pokrój w kostkę i wraz z malinami umieść w naczyniu żaroodpornym. Dodaj mąkę ziemniaczaną i erytrol i wymieszaj. \n3. Z mąki, płatków owsianych, masła i pozostałego erytrolu zagnieć kruszonkę i posyp nią owoce. \n4. Piecz ok. 45 minut.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/umjtiZqY1b95a3yvtznwZUBmKmpmpAGK00bXeesh.jpg","kcal":605.12,"protein":11.86,"fat":27.68,"carbs":83.23,"ingredients":[{"name":"Brzoskwinia","grams":240,"measure":"mała sztuka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Mąka ziemniaczana","grams":6,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":20,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":40,"measure":"łyżeczka"},{"name":"Masło","grams":30,"measure":"łyżeczka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"}],"category":"Deser"},{"id":45613213,"name":"Najlepsze cynamonki","description":"1. Najpierw przygotuj \"tangzhong\". Dzieki niemu ciasto drożdżowe zachowuje dłużej świeżość, jest wilgotne i mięciutkie. Umieść w małym garnuszk
