<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>FitGoginki</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Wspólna baza przepisów, planer tygodnia i lista zakupów Damiana i Marty." />
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#3f6b4f" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FitGoginki" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
  :root {
    --bg: #f6f2ea;
    --bg-raised: #fffdf9;
    --ink: #23201a;
    --ink-soft: #5c5646;
    --line: #ddd3bf;
    --accent: #3f6b4f;
    --accent-ink: #ffffff;
    --accent-soft: #e3ece6;
    --spice: #c1622d;
    --spice-soft: #f6e6db;
    --heart: #c94c3b;
    --heart-off: #b9ae98;
    --chart3: #4d7ea8;
    --shadow: 0 1px 2px rgba(35,32,26,0.06), 0 8px 24px -12px rgba(35,32,26,0.18);
    --radius: 14px;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1a16;
      --bg-raised: #26231d;
      --ink: #efe9dc;
      --ink-soft: #b3ab97;
      --line: #3a3527;
      --accent: #6fae86;
      --accent-ink: #102016;
      --accent-soft: #223229;
      --spice: #e08a52;
      --spice-soft: #3a2a1c;
      --heart: #e08072;
      --heart-off: #5a5546;
      --chart3: #7fb2d9;
      --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px -14px rgba(0,0,0,0.6);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #1c1a16;
    --bg-raised: #26231d;
    --ink: #efe9dc;
    --ink-soft: #b3ab97;
    --line: #3a3527;
    --accent: #6fae86;
    --accent-ink: #102016;
    --accent-soft: #223229;
    --spice: #e08a52;
    --spice-soft: #3a2a1c;
    --heart: #e08072;
    --heart-off: #5a5546;
    --chart3: #7fb2d9;
    --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px -14px rgba(0,0,0,0.6);
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #f6f2ea;
    --bg-raised: #fffdf9;
    --ink: #23201a;
    --ink-soft: #5c5646;
    --line: #ddd3bf;
    --accent: #3f6b4f;
    --accent-ink: #ffffff;
    --accent-soft: #e3ece6;
    --spice: #c1622d;
    --spice-soft: #f6e6db;
    --heart: #c94c3b;
    --heart-off: #b9ae98;
    --chart3: #4d7ea8;
    --shadow: 0 1px 2px rgba(35,32,26,0.06), 0 8px 24px -12px rgba(35,32,26,0.18);
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  h1, h2, h3, .display {
    font-family: ui-serif, Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-weight: 600;
    text-wrap: balance;
    letter-spacing: -0.01em;
  }
  .tabular { font-variant-numeric: tabular-nums; }
  button, input, select { font: inherit; color: inherit; }
  button { cursor: pointer; }
  a { color: var(--accent); }

  .app-shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 18px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  header.top .brand { display: flex; flex-direction: column; gap: 2px; }
  header.top h1 { font-size: 26px; margin: 0; }
  header.top .sub { color: var(--ink-soft); font-size: 13.5px; }

  nav.tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    box-shadow: var(--shadow);
  }
  nav.tabs button {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: background .15s ease, color .15s ease;
  }
  nav.tabs button[aria-selected="true"] {
    background: var(--accent);
    color: var(--accent-ink);
  }
  nav.tabs button:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .info-banner {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--spice-soft);
    border: 1px solid color-mix(in srgb, var(--spice) 35%, var(--line));
    color: var(--ink);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .info-banner button.dismiss {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }

  section[hidden] { display: none !important; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 18px;
  }
  .search-wrap {
    position: relative;
    flex: 1 1 240px;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 34px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-raised);
    color: var(--ink);
  }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .55; }
  select, .pill-btn {
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-raised);
    color: var(--ink);
  }
  .pill-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .count-tag {
    color: var(--ink-soft);
    font-size: 13px;
    white-space: nowrap;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    transition: transform .12s ease, border-color .12s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
  .card-title { font-family: ui-serif, Georgia, serif; font-size: 16.5px; font-weight: 600; line-height: 1.3; }
  .heart-btn {
    border: none; background: none; flex: none;
    color: var(--heart-off);
    font-size: 20px;
    line-height: 1;
    padding: 2px;
  }
  .heart-btn.active { color: var(--heart); }
  .macros { display: flex; flex-wrap: wrap; gap: 6px; }
  .macro-pill {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .macro-pill.kcal { background: var(--spice-soft); color: var(--spice); }
  .card-meta { color: var(--ink-soft); font-size: 12.5px; }

  /* Detail modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,18,14,0.55);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
    z-index: 50;
  }
  .modal {
    background: var(--bg-raised);
    border-radius: 18px;
    max-width: 640px;
    width: 100%;
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .modal-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 6px; }
  .modal h2 { font-size: 22px; margin: 0; }
  .modal-close { border: none; background: none; font-size: 20px; color: var(--ink-soft); padding: 4px; }
  .modal .macros { margin: 10px 0 18px; }
  .modal h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); margin: 18px 0 8px; font-family: ui-sans-serif, sans-serif; font-weight: 700; }
  .ingredient-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .ingredient-list li { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; border-bottom: 1px dashed var(--line); padding-bottom: 6px; }
  .ingredient-list li span.amt { color: var(--ink-soft); white-space: nowrap; }
  .steps { white-space: pre-wrap; font-size: 14.5px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn {
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 9px 14px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn.danger { border-color: var(--heart); color: var(--heart); background: transparent; }

  .picker-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .picker-row select { flex: 1 1 auto; }

  /* Week planner */
  .week-grid {
    display: grid;
    grid-template-columns: 90px repeat(7, minmax(120px, 1fr));
    gap: 8px;
    overflow-x: auto;
  }
  .week-grid .head-cell, .week-grid .meal-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 6px 4px;
    align-self: center;
  }
  .slot {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    min-height: 84px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 6px;
    font-size: 13px;
  }
  .slot .empty-add {
    border: 1px dashed var(--line);
    background: none;
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 8px;
    font-size: 12.5px;
    height: 100%;
  }
  .slot .rname { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .slot .rmacro { color: var(--ink-soft); font-size: 11.5px; }
  .slot .slot-actions { display: flex; gap: 6px; align-self: flex-end; }
  .slot .slot-actions button { border: none; background: none; font-size: 11.5px; font-weight: 600; padding: 2px 4px; }
  .slot .swap-btn { color: var(--accent); }
  .slot .rm-btn { color: var(--heart-off); }
  .week-toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .week-range, .shop-week-range {
    font-weight: 700;
    font-family: ui-serif, Georgia, serif;
    font-size: 15px;
    padding: 0 4px;
  }
  .head-cell .date-num { display: block; font-size: 15px; color: var(--ink); font-weight: 700; letter-spacing: 0; text-transform: none; }
  .head-cell.is-today { color: var(--accent); }
  .head-cell.is-today .date-num { color: var(--accent); }

  /* Picker modal */
  .modal.picker-modal { max-width: 760px; }
  .picker-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 14px; }
  .picker-toolbar .search-wrap { flex: 1 1 200px; }
  .picker-list { display: flex; flex-direction: column; gap: 6px; max-height: 46vh; overflow-y: auto; padding-right: 4px; }
  .picker-row-item {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    text-align: left;
  }
  .picker-row-item:hover { border-color: var(--accent); }
  .picker-row-item .prname { flex: 1; font-size: 13.5px; font-weight: 600; }
  .picker-row-item .prmacro { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

  /* Toast */
  .toast {
    display: inline-block;
    background: var(--ink); color: var(--bg);
    padding: 10px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
    box-shadow: var(--shadow); margin-bottom: 14px;
  }

  /* Small confirm / prompt modal */
  .modal.confirm-modal { max-width: 380px; }
  .modal.confirm-modal p { margin: 4px 0 18px; font-size: 14px; }
  .confirm-modal input[type="text"] {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); margin: 4px 0 18px;
  }

  /* Copy fallback */
  .modal.copy-fallback textarea {
    width: 100%; min-height: 140px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); padding: 10px; font: inherit; resize: vertical;
  }

  /* Icon button (month rename) */
  .icon-btn {
    border: 1px solid var(--line); background: var(--bg-raised); color: var(--ink);
    border-radius: 10px; padding: 9px 11px; font-size: 13px; line-height: 1;
  }

  /* Portions stepper */
  .stepper { display: inline-flex; align-items: center; gap: 6px; }
  .stepper button {
    border: 1px solid var(--line); background: var(--bg); color: var(--ink);
    width: 22px; height: 22px; border-radius: 6px; font-size: 13px; line-height: 1; padding: 0;
  }
  .stepper .pval { min-width: 44px; text-align: center; font-weight: 700; font-size: 12px; color: var(--ink-soft); }

  /* Shopping item edit */
  .shop-item .qty-edit { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--ink-soft); }
  .shop-item .qty-edit input {
    width: 64px; padding: 4px 6px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); font: inherit; text-align: right;
  }
  .shop-item .edit-btn, .shop-item .reset-btn { border: none; background: none; color: var(--ink-soft); font-size: 13px; padding: 4px; flex: none; }
  .shop-item .qty.overridden { color: var(--spice); font-weight: 700; }

  /* Recipe edit form */
  .edit-form label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em; margin: 16px 0 6px; }
  .edit-form input[type="text"], .edit-form input[type="number"], .edit-form textarea {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); font: inherit;
  }
  .edit-form textarea { min-height: 120px; resize: vertical; }
  .edit-form .macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .edit-form .macro-grid > div { display: flex; flex-direction: column; gap: 4px; }
  .ingredient-edit-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .ingredient-edit-row input:nth-child(1) { flex: 2; }
  .ingredient-edit-row input:nth-child(2) { flex: 1; }
  .ingredient-edit-row input:nth-child(3) { flex: 1; }
  .ingredient-edit-row button { flex: none; border: none; background: none; color: var(--heart); font-size: 15px; padding: 4px; }

  /* Shopping list */
  .shop-list { display: flex; flex-direction: column; gap: 6px; max-width: 560px; }
  .shop-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .shop-item.checked { opacity: .45; text-decoration: line-through; }
  .shop-item input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); }
  .shop-item .name { flex: 1; font-size: 14px; }
  .shop-item .qty { font-size: 13px; color: var(--ink-soft); white-space: nowrap; }
  .empty-state {
    color: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    font-size: 14px;
  }
  .shop-toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }

  footer.note {
    margin-top: 40px;
    color: var(--ink-soft);
    font-size: 12px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
  @media (max-width: 640px) {
    .week-grid { grid-template-columns: 70px repeat(7, minmax(110px, 1fr)); }
  }

  /* Person toggle (Damian / Marta / Razem) */
  .person-toggle {
    display: inline-flex; gap: 4px; background: var(--bg-raised); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px; margin-bottom: 16px;
  }
  .person-toggle button {
    border: none; background: transparent; color: var(--ink-soft);
    padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  }
  .person-toggle button[aria-selected="true"] { background: var(--accent); color: var(--accent-ink); }
  .meal-label .person-tag { display: block; font-size: 10px; text-transform: none; letter-spacing: 0; color: var(--accent); font-weight: 700; margin-top: 2px; }

  /* Add custom shopping item */
  .add-item-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-item-row input {
    padding: 9px 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg-raised); color: var(--ink); font: inherit;
  }
  .add-item-row input#addItemInput { flex: 1 1 260px; }
  .add-item-row input#addItemQty { flex: 0 1 160px; }
  .shop-item.custom .name::after { content: " · własna pozycja"; color: var(--ink-soft); font-size: 11.5px; font-weight: 400; }
  .shop-item .del-btn { border: none; background: none; color: var(--heart); font-size: 13px; padding: 4px; flex: none; }

  /* Statistics */
  .stats-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 10px; }
  .stat-card {
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow);
  }
  .stat-card h3 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); font-family: ui-sans-serif, sans-serif; font-weight: 700; }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-headline { font-family: ui-serif, Georgia, serif; font-size: 30px; font-weight: 700; }
  .stat-headline .unit { font-size: 15px; color: var(--ink-soft); font-family: ui-sans-serif, sans-serif; font-weight: 600; margin-left: 4px; }
  .stat-subrow { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .stat-subrow div { font-size: 13px; color: var(--ink-soft); }
  .stat-subrow strong { display: block; color: var(--ink); font-size: 17px; font-variant-numeric: tabular-nums; }
  .rank-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .rank-list li { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
  .rank-list .rk-num { width: 20px; flex: none; color: var(--ink-soft); font-weight: 700; font-variant-numeric: tabular-nums; }
  .rank-list .rk-name { flex: 1; }
  .rank-list .rk-bar-wrap { flex: 1; background: var(--bg); border-radius: 6px; height: 8px; overflow: hidden; }
  .rank-list .rk-bar { height: 100%; background: var(--accent); border-radius: 6px; }
  .rank-list .rk-val { flex: none; color: var(--ink-soft); font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .custom-stat-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13.5px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .custom-stat-row .cs-del { border: none; background: none; color: var(--heart); padding: 2px 4px; }
  .add-stat-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .add-stat-form input {
    padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); font: inherit;
  }
  .add-stat-form input.cs-label { flex: 1 1 140px; }
  .add-stat-form input.cs-value { flex: 0 1 110px; }
  .chart-svg { width: 100%; height: auto; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 12px; font-size: 12.5px; }
  .chart-legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-soft); }
  .chart-legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .chart-type-select { margin-left: auto; }
</style>
</head>
<body>

<div class="app-shell">
  <header class="top">
    <div class="brand">

 przypraw solą. Zawiń w folię aluminiową i piecz przez ok. 40-45 minut w 180 stopniach do miękkości.\n2. W tym czasie ugotuj kaszę według instrukcji na opakowaniu. \n3. Do miski włóż kaszę, pieczonego buraka, pokrojonego w półplastry zielonego ogórka, pokrojoną w piórka czerwoną cebulę i pokruszoną fetę. \n4. Z pozostałej oliwy, musztardy, soku z cytryny i miodu przygotuj dressing. Polej nim bowla tuż przed spożyciem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/CrOWwPdnEaPSYewUek07XRkiI8znxacDBeaTOi0N.jpg","kcal":507.3,"protein":15.5,"fat":23.5,"carbs":62.5,"ingredients":[{"name":"Buraki","grams":150,"measure":"g"},{"name":"Ser Feta","grams":50,"measure":"plaster"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Kasza jaglana","grams":40,"measure":"łyżka"}]},{"id":51097578,"name":"Bowl śniadaniowy z twarożkiem i jajkiem na miękko","description":"1. Jajko ugotuj na miękko (lub jeśli wolisz na twardo).\n2. Rzodkiewkę i ogórka pokrój w kostkę, a szczypiorek posiekaj. Warzywa wymieszaj z twarożkiem i dopraw solą i pieprzem.\n3. Paprykę pokrój w paseczki, a pomidorki przekrój na pół. \n4. Do miski wrzuć rukolę, obok dodaj ugotowane jajko, twarożek i pokrojone warzywa.\n5. Całość posyp pestkami dyni.\n6. Zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/tZ4qhsAOWMyMpEmbfcRwVxZ7m2kYSLy97YZF2tfG.jpg","kcal":513.0,"protein":38.7,"fat":18.1,"carbs":51.4,"ingredients":[{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Jajko kurze" tion":"1. Gruszkę pokrój w kostkę.\n2. Jajko i skyr rozmąć widelcem na jednolitą masę.\n3. Dodaj mąkę, erytrol, budyń w proszku, proszek do pieczenia i sodę i dobrze wszystko wymieszaj (ciasto będzie dość gęste).\n4. Do ciasta dodaj pokrojoną gruszkę i wymieszaj. Odstaw ciasto na 5-10 minut.\n5. Smaż placuszki na małej ilości oliwy z oliwek z obu stron, pod przykryciem.\n6. Gotowe racuchy polej syropem klonowym i posyp cynamonem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/5GDln7TiD7SktQTTYMMA60kdVJzubLrsQSZkau1E.jpg","kcal":505.0,"protein":22.5,"fat":10.7,"carbs":79.8,"ingredients":[{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"łyżeczka"},{"name":"Budyń waniliowy bez cukru","grams":15,"measure":"g"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Gruszka","grams":180,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Syrop klonowy","grams":10,"measure":"łyżeczka"}]},{"id":43687123,"name":"Burger z szarpanym kurczakiem i chrupiącą cebulą","description":"1. Oczyszczoną pierś z kurczaka umieść w rondelku i zalej wodą (tuż ponad poziom). Delikatnie posól i gotuj ok. 15-20 minut. \n2. Ugotowane mięso poszarp za pomocą dwóch widelców. Na patelni rozgrzej oliwę i obsmaż poszarpaną pierś. Wszystkie pozostałe sosy wymieszaj z imbirem i wlej na patelnię. Wszystko duś jeszcze przez chwilę razem aż sos dobrze oblepi kawałki mięsa.\n3. Cebulę pokrój w piórka i zalej bardzo zimną wodą. Odstaw na ok. 10 minut - dzięki temu cebula nie będzie taka ostra i nabierze chrupkości.\n4. Bułkę przekrój na pół i posmaruj keczupem. Ułóż sałatę, poszarpane mięso i plastry cebuli. Przykryj górną częścią bułki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/0sN3Nimq55ZkLtzOVbtyLjiRPdJTu4PgfoEtvAvc.jpg","kcal":488.0,"protein":37.5,"fat":10.0,"carbs":57.6,"ingredients":[{"name":"Kurczak pierś","grams":120,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Imbir mielony","grams":1,"measure":"szczypta"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":3,"measure":"łyżeczka"},{"name":"Ketchup bez dodatku cukru","grams":30,"measure":"łyżka"},{"name":"Bułka grahamka","grams":90,"measure":"duża sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Sałata lodowa","grams":20,"measure":"garść"}]},{"id":61928704,"name":"Bułka z jajkiem sadzonym","description":"1. Przygotuj jajka sadzone na odrobinie oliwy. \n2. Bułkę przekrój na pół - możesz przygotować grzanki np. w tosterze lub airfryerze. \n3. Pieczywo posmaruj serkiem. Na wierzch dodaj szpinak oraz jajka sadzone. Dopraw solą, pieprzem i posyp posiekanym szczypiorkiem. \n4. Dodatkowo zjedz paprykę i owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/whpdB0s8jI0ydh9TA4s5e7pJ3K4hqYTtjTKkToek.jpg","kcal":500.3,"protein":24.6,"fat":17.9,"carbs":63.5,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżeczka"},{"name":"Bułka żytnia","grams":65,"measure":"duża sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Kiwi","grams":150,"measure":"sztuka"}]},{"id":51097574,"name":"Bułka z pastą z łososia i warzywami","description":"1. Łososia przełóż d ,{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Ogórek","grams":45,"measure":"sztuka"}]},{"id":56307464,"name":"Cukiniowa owsianka z truskawkami i pistacjami","description":"1. Cukinię umyj i zetrzyj na tarce na grubych oczkach.\n2. Do rondelka wsyp płatki, proszek budyniowy i erytrol.\n3. Całość zalej mlekiem i dokładnie wymieszaj (tak, żeby nie było żadnych grudek). Następnie dodaj startą cukinię.\n4. Owsiankę gotuj na małym ogniu, od czasu do czasu mieszając.\n5. Gotową owsiankę przełóż do miseczki, dodaj pokrojone truskawki i pistacje.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/rhzSnukLLgUuXERrJNEkbNYtqYug3XFGan9Tl8Nl.jpg","kcal":506.9,"protein":19.6,"fat":14.5,"carbs":77.7,"ingredients":[{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Budyń bez cukru","grams":16,"measure":"łyżka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Truskawki","grams":140,"measure":"garść"},{"name":"Pistacje","grams":15,"measure":"łyżka"}]},{"id":38873218,"name":"Curry z dynią i szpinakiem","description":"1. Na oliwie podsmaż pokrojoną w kostkę szalotkę wraz z posiekanymi imbirem i papryczką chilli. \n2. Dodaj pastę curry i podsmaż ją przez chwilę. Następnie dodaj soczewicę, dynię, wlej mleczko kokosowe, sok z limonki i odrobinę wody i duś pod przykryciem do miękkości dyni i soczewicy.\n3. Dodaj szpinak. Jeśli danie jest zbyt gęste dodaj jeszcze troszkę wody. Duś do momentu \"zwiędnięcia\" liści szpinaku. Dopraw solą i pieprzem. \n4. Podawaj z ugotowanym ryżem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/KD5UNX42x9WIpVw14tmpNMxceGQ2U9XjTcSBbB1i.jpg","kcal":583.4,"protein":23.3,"fat":9.3,"carbs":106.6,"ingredients":[{"name":"Pasta curry","grams":16,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Korzeń imbiru","grams":2,"measure":"łyżeczka"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Dynia","grams":150,"measure":"g"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Soczewica","grams":60,"measure":"łyżka"},{"name":"Mleczko kokosowe light 6%","grams":50,"measure":"łyżka"},{"name":"Ryż jaśminowy","grams":60,"measure":"łyżka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":47967528,"name":"Curry z kurczakiem i warzywami","description":"1. Ryż ugotuj zgodnie z instrukcją.\n2. Mięso pokrój w paseczki, paprykę i cukinię pokrój w kostkę, a cebulę i czosnek posiekaj na drobne kawałki.\n3. Na oliwie podduś pokrojone mięso z czosnkiem i cebulką. Kiedy się zarumieni dodaj pozostałe warzywa, mleczko kokosowe, 0,5 szklanki wody i przyprawy.\n4. Całość dobrze wymieszaj i duś na małym ogniu pod przykryciem około 15 minut.\n5. Podawaj z ugotowanym ryżem, posypane natką lub kolendrą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/1AijX2RpEoSyQozgWEfkIjKxigg6MJzgXNXEmOxv.jpg","kcal":615.1,"protein":44.8,"fat":19.5,"carbs":65.9,"ingredients":[{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Papryka żółta","grams":75,"measure":"mała sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":35,"measure":"mała sztuka"},{"name":"Oliwa z oliwek","grams":8,"measure":"łyżka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Curry przyprawa","grams":2,"measure":"szczypta"},{"name":"Imbir mielony","grams":2,"measure":"łyżeczka"},{"name":"Mleczko kokosowe light 6%","grams":75,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Ryż brązowy","grams":65,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżeczka"}]},{"id":43687120,"name":"Cynamonowa jaglanka z gruszką i migdałami","description":"1. Kaszę przepłucz pod wodą, a następnie wsyp do garnka i zalej mlekiem.\n2. Dodaj erytrol oraz cynamon i wymieszaj.\n3. Gotuj na małym ogniu około 15 minut (od czasu do czasu mieszając).\n4. Gotową jaglankę przełóż do miseczki, dodaj pokrojoną gruszkę, jogurt i migdały.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/aIGv8ouVzTfx3gaHGvr91qNwB26wrIYLi5Iw7sDo.jpg","kcal":483.9,"protein":21.1,"fat":12.5,"carbs":72.8,"ingredients":[{"name":"Kasza jaglana","grams":40,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Gruszka","grams":160,"measure":"mała sztuka"},{"name":"Migdały","grams":15,"measure":"łyżka"},{"name":"Skyr waniliowy (Pilos)","grams":75,"measure":"łyżka"}]},{"id":34528189,"name":"Cytrynowe kaszotto z bobem i cukinią","description":"1. Bób ugotuj i obierz.\n2. Cukinię i cebulę pokrój w kostkę.\n3. Na patelni rozgrzej oliwę, wrzuć cebulę. Podsmaż na średnim ogniu przez 3 minuty, aż składniki zmiękną. Dodaj kaszę i praż przez 3 minuty, co chwilę mieszając.\n4. Dodaj połowę bulionu, ciągle mieszając. Gdy się wchłonie, dodaj pokrojoną cukinię i kolejną porcję bulionu. Gotuj, aż wywar się wchłonie i w razie potrzeby dodaj jeszcze wodę. Na sam koniec dodaj bób i skórkę z wyparzonej cytryny.\n5. Gdy kasza będzie miękka, dodaj starty parmezan. Dopraw solą i pieprzem, posyp oregano i posiekaną bazylią.\n6. Na deser zjedz pudding proteinowy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2024/12/rXif2AsBKC13l1iQy2JzDADyTVu387VsQ444Hh2F.jpg","kcal":575.4,"protein":39.4,"fat":13.1,"carbs":81.2,"ingredients":[{"name":"Cukinia","grams":150,"measure":"plaster"},{"name":"Cebula","grams":50,"measure":"g"},{"name":"Kasza jęczmienna perłowa","grams":50,"measure":"g"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"},{"name":"Bób","grams":100,"measure":"g"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Skórka z cytryny","grams":1,"measure":"łyżeczka"},{"name":"Wywar warzywny","grams":200,"measure":"szklanka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Pudding proteinowy o smaku białej czekolady (Go Active)","grams":200,"measure":"opakowanie"}]},{"id":53516449,"name":"Cytrynowe placuszki z makiem","description":"1. Jajko i skyr rozmąć widelcem na jednolitą masę.\n2. Dodaj mąkę, erytrol, proszek i sodę i dobrze wszystko wymieszaj (ciasto będzie dość gęste).\n3. Do ciasta dodaj sok z cytryny, mak oraz startą skórkę z cytryny i wymieszaj. Odstaw ciasto na 5-10 minut.\n4. Smaż placuszki na małej ilości oliwy z oliwek z obu stron, pod przykryciem.\n5. Gotowe racuchy podawaj z borówkami i syropem klonowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/mBOtbFHMlVjRe0n2Q5MG0oy7L03jg052H7YbR3k0.jpg","kcal":494.5,"protein":24.3,"fat":15.3,"carbs":67.3,"ingredients":[{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"szczypta"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"},{"name":"Mak","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Syrop klonowy","grams":10,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":150,"measure":"garść"}]},{"id":61928715,"name":"Czekoladowa granola z kaszy gryczanej z jogurtem i owocami","description":"1. Suchą kaszę wsyp na patelnię i praż od czasu do czasu mieszając (ok. 5 minut).\n2. Zdejmij z palnika i dodaj kakao oraz syrop klonowy i dobrze wymieszaj, aby obkleił wszystkie ziarenka. Pozostaw na patelni do przestudzenia. \n3. Do miseczki wyłóż jogurt, pokrojone owoce, orzechy oraz przygotowaną granolę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/3TGQvXTBKffSNZdThTWwuMGOwubrvtrgAREnKVG6.jpg","kcal":506.0,"protein":27.3,"fat":12.0,"carbs":82.8,"ingredients":[{"name":"Kasza gryczana niepalona","grams":50,"measure":"łyżka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżeczka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Truskawki","grams":50,"measure":"garść"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Orzechy laskowe","grams":15,"measure":"łyżka"}]},{"id":47967535,"name":"Czekoladowa gryczanka z borówkami i wiórkami kokosowymi","description":"1. Do rondelka wsyp kaszę, kakao, szczyptę soli i słodzik.\n2. Następnie dodaj czekoladę i mleko. Całość dokładnie wymieszaj i gotuj na małym ogniu około 12-15 minut (od czasu do czasu mieszając).\n3. Gotową gryczankę przełóż do miseczki. Na wierzch dodaj jogurt, borówki i wiórki kokosowe.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/UkuEvRxtjuNOewBdJS2OauXNcNZw4aIFaAQKlt5A.jpg","kcal":521.4,"protein":24.4,"fat":15.9,"carbs":80.2,"ingredients":[{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Kasza gryczana niepalona","grams":50,"measure":"łyżka"},{"name":"Kakao w proszku","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":100,"measure":"garść"},{"name":"Wiórki kokosowe","grams":6,"measure":"łyżeczka"},{"name":"Skyr waniliowy (Pilos)","grams":75,"measure":"łyżka"}]},{"id":38873208,"name":"Czekoladowa jaglanka z jabłkiem i migdałami","description":"1. Kaszę przepłucz pod wodą, a następnie wsyp do garnka i zalej mlekiem.\n2. Dodaj erytrol, kakao i wymieszaj.\n3. Gotuj na małym ogniu około 15 minut\n4. Gotową jaglankę przełóż do miseczki, dodaj pokrojone jabłko, jogurt i posiekane migdały.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/3KLO8NBpbjufSmYYGGjw8KiWyZtOHYaR9lJ2Gg1M.jpg","kcal":494.0,"protein":25.5,"fat":15.9,"carbs":67.8,"ingredients":[{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Jabłko","grams":110,"measure":"mała sztuka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Kasza jaglana","grams":45,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżeczka"},{"name":"Migdały","grams":20,"measure":"łyżka"}]},{"id":51097575,"name":"Czekoladowa owsianka z gorącymi wiśniami","description":"1. Do rondelka włóż płatki owsiane, chia, kakao i posiekaną czekoladę.\n2. Całość zalej mlekiem i dokładnie wymieszaj.\n3. Owsiankę gotuj na małym ogniu przez kilka minut, do momentu zgęstnienia masy (od czasu do czasu mieszając). Pod koniec gotowania dodaj odżywkę i wymieszaj.\n4. W międzyczasie w osobnym garnku podgrzej wiśnie ze słodzikiem (możesz dodać odrobinę wody).\n5. Gotową owsiankę przełóż do miseczki, dodaj podgrzane wiśnie i posiekane orzechy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/2N81LJgC9OrXQQ6ijU517z95BWgzOcq2HkQAvgfJ.jpg","kcal":511.4,"protein":29.4,"fat":16.1,"carbs":66.4,"ingredients":[{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Nasiona chia","grams":5,"measure":"łyżeczka"},{"name":"Wiśnie mrożone","grams":100,"measure":"garść"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":9,"measure":"kostka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Migdały","grams":5,"measure":"łyżeczka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"}]},{"id":61928703,"name":"Czekoladowy budyń jaglany z truskawkami","description":"1. Kaszę przepłucz pod wodą, a następnie wsyp do garnka i zalej mlekiem.\n2. Dodaj erytrol, kakao i wymieszaj.\n3. Gotuj na małym ogniu około 15 minut.\n4. Następnie ściągnij garnek z ognia i zblenduj kaszę na budyń.\n5. Gotowy budyń przełóż do miseczki, dodaj jogurt oraz owoce i masło orzechowe.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/BDFHhedC9oUQ8QQEQbucNbyQFZSPvPtxKPdqxl8l.jpg","kcal":499.7,"protein":30.4,"fat":12.9,"carbs":71.9,"ingredients":[{"name":"Kasza jaglana","grams":55,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":10,"measure":"łyżka"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Truskawki","grams":100,"measure":"garść"},{"name":"Masło orzechowe","grams":10,"measure":"łyżeczka"}]},{"id":53516466,"name":"Domowa zupa pomidorowa z makaronem","description":"1. Pierś z kurczaka oraz obrane i pokrojone na kawałki warzywa umieść w garnku. Zalej wodą, aby wszystkie składniki były przykryte. Dodaj liść laurowy, ziele angielskie oraz pieprz i sól.\n2. Gotuj zupę na wolnym ogniu ok. 60 minut (jeśli pokroisz mięso i warzywa drobniej to czas będzie krótszy).\n3. Kiedy mięso i warzywa będą miękkie dodaj bulion, passatę pomidorową i wszystko wymieszaj. \n4. W trakcie przygotowywania zupy ugotuj makaron. \n5. Zupę dopraw ewentualnie do smaku solą, pieprzem i szczyptą erytrolu. \n6. Serek rozmieszaj z kilkoma łyżkami gorącej zupy w miseczce/szklance i dodaj do garnka. \n7. Zupę podawaj z ugotowanym i podzielonym na kawałki mięsem, makaronem i natką pietruszki.\n8. Na deser zjedz owoce.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/9fAWOMfIITZ9dELoMJWhDrbIL34gnbHMiFA65uOd.jpg","kcal":997.9,"protein":84.2,"fat":16.9,"carbs":131.1,"ingredients":[{"name":"Kurczak pierś","grams":250,"measure":"porcja"},{"name":"Marchew","grams":100,"measure":"mała sztuka"},{"name":"Pietruszka korzeń","grams":80,"measure":"sztuka"},{"name":"Por","grams":50,"measure":"kawałek"},{"name":"Woda","grams":500,"measure":"szklanka"},{"name":"Bulion warzywny (Winiary)","grams":20,"measure":"łyżeczka"},{"name":"Passata pomidorowa","grams":150,"measure":"szklanka"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Makaron jajeczny krajanka","grams":100,"measure":"g"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"łyżeczka"},{"name":"Ziele angielskie","grams":4,"measure":"ziarenko"},{"name":"Liść laurowy","grams":1,"measure":"liść"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Kiwi","grams":150,"measure":"sztuka"}]},{"id":59199279,"name":"Domowy fit kebab","description":"1. Mięso pozbawione tłustych kawałków obtocz w sosie sojowym, papryce, oregano, soli i pieprzu. Upiecz w air fryerze w 180 stopniach przez 30 minut (lub w piekarniku). Odstaw do wystudzenia. Wystudzone mięso pokrój na podłoże kawałki, nieduże. Rozgrzej patelnię przesmarowaną oliwą i praż kurczaka przez parę minut, co chwilę mieszając do uzyskania pożądanego zarumienienia i dosmażenia.\n2. W czasie kiedy mięso będzie się piekło przygotuj także surówkę: poszatkuj drobno kapustkę, ogórka pokrój w drobne kawałki lub zetrzyj, czosnek przeciśnij przez praskę, cebulę posiekaj w drobne piórka. Wymieszaj całość z majonezem, solą i pieprzem. Opcjonalnie dodaj troszkę soku z cytryny i posiekanej natki pietruszki.\n3. Mięso i surówkę zawiń w tortillę i podawaj z keczupem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/0SR5PsY2AceyPAwhTnqEdYu6qRsuCXDogRYSP8gJ.jpg","kcal":492.7,"protein":31.4,"fat":22.5,"carbs":43.0,"ingredients":[{"name":"Mięso z udka kurczaka","grams":120,"measure":"g"},{"name":"Sos sojowy","grams":5,"measure":"g"},{"name":"Papryka wędzona w proszku","grams":1,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Kapusta młoda","grams":50,"measure":"g"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Majonez light","grams":20,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Ketchup bez dodatku cukru","grams":20,"measure":"łyżka"}]},{"id":43687117,"name":"Domowy kebab z kurczakiem i sosem czosnkowym","description":"1. Mięso pokrój w paseczki i wymieszaj z przyprawą gyros. Podsmaż na patelni na oliwie z oliwek. \n2. Kapustę pekińską oraz cebulę poszatkuj. Ogórka kiszonego pokrój w plasterki.\n3. Tortillę podgrzej na suchej patelni z obu stron (nie za długo - gdy będzie bardzo przypieczona stanie się krucha i nie da się rolować). \n4. Ciepłą tortillę posmaruj ketchupem. Połóż na środku kapustę, cebulę, ogórka kiszonego i usmażone mięso. Zawiń tortillę tak, jak kebab. Możesz jej koniec dodatkowo zawinąć w folię aluminiową, co ułatwi konsumpcję.\n5. Dodatkowo przygotuj sos czosnkowy. Skyr wymieszaj z przeciśniętym czosnkiem, solą, pieprzem i szczyptą erytrolu. Kebaba zjedz z sosem czosnkowym.\n6. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/SX5PMBvfCR1VKeZj3mF6mwB93rEaj8t6pvuH4u6r.jpg","kcal":569.2,"protein":40,"fat":14.8,"carbs":70.4,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Gyros przyprawa","grams":5,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Kapusta pekińska","grams":50,"measure":"g"},{"name":"Ogórek kiszony","grams":65,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Ketchup bez dodatku cukru","grams":30,"measure":"łyżka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Erytrytol","grams":1,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Banan","grams":120,"measure":"średnia sztuka"}]},{"id":61928711,"name":"Dorsz po toskańsku w kremowym sosie z komosą ryżową","description":"1. Komosę ugotuj według zaleceń producenta na opakowaniu.\n2. Filet z dorsza umyj, pokrój w grubą kostkę i dopraw kurkumą, solą i pieprzem. Odstaw na chwilę. \n3. W tym czasie na oliwie podsmaż pokrojoną w kostkę cebulę, posiekany czosnek oraz cukinię pokrojoną w półplastry. Dodaj pomidory oraz posiekane oliwki. Dopraw solą, pieprzem i bazylią. \n4. Do sosu dodaj śmietankę i wymieszaj wszystko aż utworzy się jednolity sos. Na końcu wrzuć kawałki dorsza i duś pod przykryciem ok 10-12 minut. \n5. Podawaj z ugotowaną komosą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/y8TvsKnyGErxwotXjnTsuNllJwQpSxYqEkORNnxR.jpg","kcal":588.4,"protein":33.9,"fat":26.9,"carbs":55.0,"ingredients":[{"name":"Dorsz","grams":120,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Oliwki","grams":20,"measure":"sztuka"},{"name":"Śmietanka 30% 250 ml (Łaciata)","grams":30,"measure":"łyżka"},{"name":"Komosa ryżowa (quinoa)","grams":45,"measure":"łyżka"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bazylia świeża","grams":10,"measure":"garść"}]},{"id":59199278,"name":"Dorsz z kaszą i surówką colesław z młodej kapusty","description":"1. Piekarnik nagrzej do 180 stopni.\n2. Kaszę ugotuj zgodnie z instrukcją.\n3. Rybę połóż na blachę wyłożoną papierem do pieczenia, skrop sokiem z cytryny, 1 łyżeczką oliwy oraz przypraw solą i pieprzem. Włóż do nagrzanego piekarnika na ok. 12-15 minut.\n4. Kapustę poszatkuj. Marchew zetrzyj na tarce, a cebulkę pokrój w drobną kostkę. Warzywa wrzuć do miski, dodaj sól, wymieszaj i odstaw na chwilkę aż lekko zmiękną. Następnie dodaj majonez, sok z cytryny i dopraw jeszcze surówkę szczyptą erytrolu i pieprzem. \n5. Ugotowaną kaszę wymieszaj z koperkiem i 1 łyżeczką oliwy. Podawaj z upieczoną rybą i przygotowaną surówką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/9vwYturzBuBTGVATYfsSZ8PFyVhGAz78OPM8Gc1E.jpg","kcal":595.3,"protein":37.5,"fat":21.6,"carbs":68.6,"ingredients":[{"name":"Kasza gryczana niepalona","grams":70,"measure":"łyżka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Dorsz","grams":150,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Kapusta młoda","grams":100,"measure":"g"},{"name":"Szalotka","grams":10,"measure":"sztuka"},{"name":"Majonez light","grams":25,"measure":"łyżka"}]},{"id":36694536,"name":"Dutch baby z nektarynką","description":"1. Piekarnik rozgrzej do 220 stopni. Wstaw od razu do niego naczynie, w którym będziesz piec naleśnika.\n2. Mąkę wymieszaj z mlekiem, erytrolem i szczyptą soli. Wbij jajka i połącz wszystko razem na jednolite gładkie ciasto.\n3. Otwórz piekarnik, włóż do naczynia masło i rozprowadź je po dnie (uważaj, żeby się nie oparzyć!).\n4. Następnie wylej ciasto na masło i zamknij piekarnik. Piecz naleśnika ok. 15 minut.\n5. Po upieczeniu nałóż do środka skyr, migdały oraz pokrojoną nektarynkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/U1u2kUEnSkgOgZw0gmhbHPaIKFnMd94TBDIP2Kd9.jpg","kcal":495.1,"protein":28.8,"fat":20.6,"carbs":51.0,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":60,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":40,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":5,"measure":"łyżeczka"},{"name":"Nektarynka","grams":150,"measure":"duża sztuka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}]},{"id":46076302,"name":"Ekspresowy makaron z łososiem i pomidorkami","description":"1. Makaron ugotuj zgodnie z instrukcją. Piekarnik rozgrzej do 200 stopni. \n2. Do małego naczynia żaroodpornego włóż łososia i przypraw go solą i pieprzem. Dodaj pomidorki, posiekany czosnek i serek śmietankowy. \n3. Wszystko zapiekaj ok. 15 minut. \n4. Po upieczeniu wszystko rozgnieść widelcem, dodaj zioła prowansalskie i wymieszaj z makaronem. \n5. Przełóż na talerz i udekoruj bazylią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/BlGBUxajJury1v5n1vac6XVWGd8koTJOwLEryHas.jpg","kcal":596.2,"protein":39.6,"fat":21.2,"carbs":62.6,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":75,"measure":"g"},{"name":"Łosoś atlantycki","grams":125,"measure":"porcja"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"}]},{"id":47967536,"name":"Fasolka a'la po bretońsku","description":"1. Na oliwie podduś posiekaną cebulkę z czosnkiem.\n2. Następnie dodaj pokrojoną w kostkę paprykę i fasolkę. Zostaw na 2-3 minuty.\n3. Całość zalej pomidorami, przypraw do smaku, dodaj 0,5 szklanki wody, wymieszaj i zostaw na małym ogniu na 10 minut.\n4. Podawaj z pieczywem, posypane natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/2Az7zsrkZUpAtGItBxlYthZXaGS1hAoDrwxfRiC6.jpg","kcal":500,"protein":19.2,"fat":14.3,"carbs":77.0,"ingredients":[{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":50,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":75,"measure":"mała sztuka"},{"name":"Passata pomidorowa","grams":150,"measure":"łyżka"},{"name":"Fasola biała konserwowa","grams":120,"measure":"puszka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Papryka wędzona w proszku","grams":2,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}]},{"id":51097592,"name":"Fasolka w kremowym sosie pomidorowym","description":"1. Szalotkę posiekaj.\n2. Na patelni rozgrzej oliwę i zeszklij szalotkę. Dodaj przeciśnięty przez praskę czosnek i pastę gochujang. Przesmaż chwilę.\n3. Dodaj na patelnię serek oraz passatę, wymieszaj do połączenia składników. Dopraw szczyptą soli i pieprzu.\n4. Dodaj odcedzoną i przepłukaną fasolkę, wymieszaj i duś przez kilka minut, do zgęstnienia.\n5. Dodaj posiekaną natkę pietruszki.\n6. Podawaj z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/m2zvFG4f5j8ucSsmSDUs9hLxGxsoXPLLzrqvm5B3.jpg","kcal":484.2,"protein":21.5,"fat":12.3,"carbs":73.0,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Pasta Gochujang","grams":5,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Passata pomidorowa","grams":200,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Fasola biała konserwowa","grams":100,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}]},{"id":51097585,"name":"Fusilli z brokułem w sosie serowym","description":"1. Makaron ugotuj al dente w delikatnie osolonej wodzie.\n2. Brokuła równiez ugotuj al dente. Pokrój na mniejsze czesci.\n3. Cebule drobno posiekaj, czosnek przecisnij przez praske lub takze posiekaj.\n4. Na patelni rozgrzej oliwe, zeszklij cebule i czosnek (nie przypal czosnku, bo bedzie gorzki).\n5. Dodaj na patelnie smietane, ser oraz przyprawy. Zmniejsz ogien, wymieszaj.\n6. Kiedy sos zrobi sie kremowy, dodaj brokuła, wymieszaj. Skrop całosc sokiem cytrynowym.\n7. Makaron przełóz do miski i pokryj z sosem lub wymieszaj całosc na patelni.\n8. Płatki migdałów opcjonalnie upraz na suchej patelni i posyp nimi\ngotowe danie.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/RG9PSzMnE7Pvt3JCRlSG8YoOo7ivRXkglRmERZsc.jpg","kcal":598.5,"protein":22.8,"fat":30.5,"carbs":64.4,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":65,"measure":"g"},{"name":"Brokuł","grams":125,"measure":"sztuka"},{"name":"Cebula","grams":50,"measure":"średnia sztuka"},{"name":"Śmietana 18%","grams":48,"measure":"łyżeczka"},{"name":"Ser Gorgonzola","grams":30,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":53516455,"name":"Gnocchi w sosie a'la bolognese","description":"1. Gnocchi ugotuj w delikatnie osolonej wodzie.\n2. Czosnek i cebule drobno posiekaj. Marchew i cukinię zetrzyj na tarce. \n3. Na patelni rozgrzej oliwę, delikatnie zeszklij czosnek, a następnie dodaj cebule. Po chwili dodaj pozostałe warzywa i mięso. Wszystko razem podsmaż przez chwilę aż warzywa zmiękną, a mięso straci surowość.\n4. Dodaj pomidory, koncentrat oraz przyprawy. Duś całość 20 minut, co chwilę mieszając. Dopraw.\n5. Ugotowane gnocchi wymieszaj z sosem, przełóż na talerz i udekoruj natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/UqhOdlYBIqA7tblRCar40mmVJ9Q9vchnw6QDiBJ1.jpg","kcal":592.9,"protein":34.2,"fat":17.2,"carbs":82.1,"ingredients":[{"name":"Gnocchi","grams":150,"measure":"g"},{"name":"Indyk mielony 8% tłuszczu","grams":120,"measure":"porcja"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":50,"measure":"średnia sztuka"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}]},{"id":41144614,"name":"Gofry twarogowe z duszonymi śliwkami z cynamonem","description":"1. Gofrownicę rozgrzej do największej mocy. \n2. Twaróg, jajko, budyń, mąkę, mleko, erytrol i proszek do pieczenia zmiksuj na gładką masę. Odstaw ciasto na 5-10 minut. \n3. W zależności od modelu gofrownicy spryskaj/posmaruj ją oliwą lub pomiń ten krok. \n4. Gofry piecz ok. 7-8 minut do zrumienienia aż będą chrupiące. \n5. Śliwki uduś z dodatkiem cynamonu i syropu klonowego. \n6. Gofry podawaj ze skyrem i duszonymi śliwkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/djh2p17yfpk36sECqoBu5bLCr3S1TuLEHyjldZrk.jpg","kcal":490.2,"protein":41.5,"fat":7.0,"carbs":66.9,"ingredients":[{"name":"Ser twarogowy chudy","grams":125,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Budyń bez cukru","grams":15,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"g"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":30,"measure":"g"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Skyr waniliowy (Pilos)","grams":50,"measure":"łyżka"},{"name":"Śliwki","grams":165,"measure":"sztuka"},{"name":"Syrop klonowy","grams":2,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"}]},{"id":53516461,"name":"Gofry z ciecierzycy z cukinią i wiosennym twarożkiem","description":"1. Cukinię wraz ze skórką zetrzyj na tarce o drobnych oczkach, lekko osól i pozostaw aż puści wodę. Następnie bardzo dobrze ją odsącz z nadmiaru płynu.\n2. Do cukinii dodaj jajko, oliwę i przyprawy. Wymieszaj i dodaj mąkę oraz proszek do pieczenia i połącz wszystkie składniki. \n3. Gofry upiecz w bardzo dobrze rozgrzanej gofrownicy na chrupiąco. Pozostaw do lekkiego przestudzenia na kratce. \n4. W między czasie przygotuj twarożek - twaróg rozdrobnij widelcem i wymieszaj z jogurtem, pokrojoną w kosteczkę rzodkiewką i posiekanym szczypiorkiem. Dopraw solą i pieprzem. \n5. Na gofry nałóż twarożek i udekoruj roszponką i pomidorkami przekrojonymi na pół. Posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/4B6OIgYaonbRd8bt94tRYeiBiK19RlXZGPOs83g2.jpg","kcal":509.1,"protein":43.0,"fat":16.6,"carbs":45.8,"ingredients":[{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Jajk "fat":20.5,"carbs":66.8,"ingredients":[{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Buraki ugotowane","grams":120,"measure":"sztuka"},{"name":"Ser Feta","grams":45,"measure":"plaster"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Nasiona słonecznika","grams":4,"measure":"łyżeczka"}]},{"id":59199265,"name":"Grzanki z jajecznicą ze szparagami, parmezanem i szczypiorkiem","description":"1. Jajka wbij do miseczki, dodaj odrobinę soli i pieprzu i roztrzep widelcem.\n2. Szparagi pozbaw twardych końcówek i pokrój na mniejsze kawałki.\n3. Na oliwie z oliwek podsmaż pokrojone szparagi. Dodaj masę jajeczną i zrób jajecznicę.\n4. Pod koniec smażenia dodaj posiekany szczypiorek.\n5. Z pieczywa przygotuj grzanki - na suchej osobnej patelni lub w tosterze/airfryerze. \n6. Gotową jajecznicę połóż na grzankach. Posyp startym parmezanem. \n7. Dodatkowo zjedz pomidorki koktajlowe.\n8. Na deser zjedz owoc.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Kj5BTpyCs4gi2BVGpbqBoLpA7IzmrFHv9nVSR9kj.jpg","kcal":497.6,"protein":26.8,"fat":20.1,"carbs":55.5,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Ser Parmezan","grams":10,"measure":"łyżka"},{"name":"Kiwi","grams":75,"measure":"sztuka"}]},{"id":51097576,"name":"Grzanki z jajecznicą, smażonymi pomidorkami i parmezanem","description":"1. Pomidorki przekrój na pół. Na patelni rozgrzej oliwę i podsmaż je wraz z solą, pieprzem i czosnkiem.\n2. Jajka roztrzep widelcem z dodatkiem soli i pieprzu.\n3. Na patelni rozgrzej pozostałą oliwę i usmaż jajka do momentu uzyskania ulubionej konsystencji jajecznicy.\n4. Z pieczywa przygotuj grzanki - w tosterze lub na suchej patelni.\n5. Gotową jajecznicę ułóż na grzankach. Na wierzchu ułóż podsmażone pomidorki. Grzanki posyp parmezanem oraz posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/iomk7c9PjzyWsyQjNHDNazfcj4wiHzq9F8ACvMU8.jpg","kcal":515.5,"protein":25.8,"fat":20.3,"carbs":57.8,"ingredients":[{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"}]},{"id":51097594,"name":"Grzanki z pastą z fasoli i warzywami","description":"1. Fasolę przepłucz pod wodą i podsmaż na oliwie razem z posiekanym czosnkiem i szczypiorkiem.\n2. Następnie wrzuć całość do blendera, dodaj koperek, sok z cytryny, sól, pieprz, chili i zblenduj na pastę.\n3. Warzywa umyj i pokrój w słupki (ogórka i marchew obierz ze skórki).\n4. Pieczywo zgrilluj na suchej patelni na grzanki (lub w tosterze), a następnie posmaruj przygotowaną pastą.\n5. Grzanki zjedz z pokrojonymi warzywami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/zOkIBSOdn850p5phnoHK02muklMmL1QIjJdJWVwQ.jpg","kcal":478.3,"protein":17.9,"fat":9.6,"carbs":84.0,"ingredients":[{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyż "łyżka"}]},{"id":59199283,"name":"Grzanki z ziołową ricottą i burakiem","description":"1.  Ricottę wymieszaj z drobno posiekaną natką pietruszki, koperkiem i świeżo zmielonym pieprzem.\n2. Z pieczywa przygotuj grzanki - na suchej patelni lub w tosterze/airfyerze. \n3. Buraka pokrój w plastry. \n4. Słonecznik upraż delikatnie na suchej patelni. \n5. Pieczywo posmaruj ziołową ricottą, na wierzch dodaj roszponkę i plastry buraka. Grzanki posyp słonecznikiem.\n6. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/FuPyuSEytpCqS8jwGpdUGCmbYTMTq3i7YNG20O4q.jpg","kcal":509.3,"protein":18.6,"fat":15.9,"carbs":78.5,"ingredients":[{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Ser Ricotta","grams":80,"measure":"opakowanie"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Koper świeży","grams":10,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Nasiona słonecznika","grams":8,"measure":"łyżeczka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Buraki ugotowane","grams":120,"measure":"sztuka"},{"name":"Kiwi","grams":150,"measure":"sztuka"}]},{"id":43687110,"name":"Grzanki ze szpinakiem i serem camembert","description":"1. Szpinak uduś na patelni wraz z przeciśniętym czosnkiem oraz posiekanymi suszonymi pomidorami. 2. Z chleba przygotuj grzanki - w tosterze lub na suchej patelni. \n3. Na ciepłych grzankach połóż uduszony szpinak. Na wierzch dodaj plastry sera camembert. \n4. Dodatkowo zjedz pomidorki koktajlowe.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/Nq9x0iFchDzu8EyMs5yipWRORvgivf4wfPupVZOy.jpg","kcal":506.0,"protein":26,"fat":16.6,"carbs":66.6,"ingredients":[{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Camembert lekki 12%","grams":60,"measure":"opakowanie"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":43687119,"name":"Gulasz węgierski z kaszą gryczaną i ogórkiem kiszonym","description":"1. Wołowinę pokrój w kostkę i obsmaż na złoty kolor na suchej patelni. Przełóż do naczynia żaroodpornego. \n2. Na patelni rozgrzej oliwę i podsmaż pokrojoną w drobną kostkę jedną cebulę. Dodaj puszkę krojonych pomidorów, pół szklanki czerwonego wina (możesz pominąć i dodać do sosu 2-3 łyżki octu balsamicznego), pół szklanki wody i przyprawy: łyżeczkę ostrej papryki, szczyptę pieprzu cayenne lub świeżą papryczkę chilli, 4 listki laurowe, kilka kulek ziela angielskiego i czarnego pieprzu oraz szczyptę soli. Gotuj sos ok. 5-10 minut. \n3. W tym czasie pokrój w ósemki 4 cebule i w kostkę kolorowe papryki. Warzywa włóż do naczynia żaroodpornego razem z wołowiną. Mięso z warzywami zalej sosem. Ewentualnie dodaj wody - tak, aby wszystko było zakryte. Naczynie przykryj i wstaw do piekarnika (180 stopni) na ok. 3 godz. \n4. Gulasz podawaj z ugotowaną kaszą gryczaną i ogórkiem kiszonym.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/CgWNQOU8ZBLaown9e8rm6LruOTaEbahMjNc3xeup.jpg","kcal":2292.2,"protein":162.4,"fat":44.3,"carbs":318.1,"ingredients":[{"name":"Polędwica wołowa","grams":500,"measure":"plaster"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":15,"measure":"łyżka"},{"name":"Pomidory krojone w puszce","grams":400,"measure":"puszka"},{"name":"Wino czerwone","grams":125,"measure":"szklanka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Papryka ostra przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Chili w proszku","grams":2,"measure":"szczypta"},{"name":"Liść laurowy","grams":4,"measure":"liść"},{"name":"Ziele angielskie","grams":2,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Cebula","grams":440,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":240,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":120,"measure":"średnia sztuka"},{"name":"Kasza gryczana palona","grams":260,"measure":"łyżka"},{"name":"Ogórek kiszony","grams":960,"measure":"g"}]},{"id":46076303,"name":"Indyk w curry z kaszą i warzywami","description":"1. Kaszę ugotuj według przepisu na opakowaniu. \n2. Mięso i warzywa pokrój w grubą kostkę. \n3. Na oliwie zeszklij cebulę i dodaj mięso. Gdy mięso się zarumieni dodaj pozostałe warzywa. Dopraw i duś pod przykryciem około 10 minut. Na koniec dodaj serek śmietankowy i przyprawę curry.\n4. Podawaj z ugotowaną kaszą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/NOpGS05jQETkc3WDYhgAU7BRHoQoQcs5Kl9Nc9LN.jpg","kcal":597.3,"protein":50,"fat":17.5,"carbs":65.8,"ingredients":[{"name":"Kasza bulgur","grams":60,"measure":"łyżka"},{"name":"Kumin w proszku (kmin rzymski)","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Curry przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Cebula","grams":70,"measure":"mała sztuka"},{"name":"Papryka żółta","grams":120,"measure":"średnia sztuka"},{"name":"Cukinia","grams":125,"measure":"mała sztuka"},{"name":"Indyk","grams":150,"measure":"g"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"}]},{"id":51097589,"name":"Jaglanka kokosowa z mango","description":"1. Do rondelka wsyp kaszę, chia, kokos, dodaj sól i erytrol.\n2. Całość zalej mlekiem i gotuj na małym ogniu około 12-15 minut (od czasu do czasu mieszając).\n3. Gotową jaglankę przełóż do miseczki, dodaj jogurt kokosowy i pokrojone mango.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/mDnOEPFQghCmoG0VqJBYsFa9SHFtSXwcXT20no2L.jpg","kcal":511.6,"protein":23.9,"fat":15.1,"carbs":71.2,"ingredients":[{"name":"Mango mrożone","grams":100,"measure":"opakowanie"},{"name":"Kasza jaglana","grams":45,"measure":"łyżka"},{"name":"Wiórki kokosowe","grams":12,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Nasiona chia","grams":5,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Jogurt High Protein smak kokosowy - Pilos","grams":100,"measure":"sztuka"}]},{"id":34528277,"name":"Jagodzianki Patki","description":"1. Rozczyn: napój lekko (!) podgrzej, a następnie wymieszaj dokładnie z pozostałymi składnikami i zostaw na 15 min w ciepłym miejscu pod przykryciem.\n\n2. Ciasto: masło roztop i odstaw do przestygnięcia. Napój lekko podgrzej. Do miski wsyp mąkę, erytrol, dodaj ostudzone masło, ciepły napój, jajko, żółtko, szczyptę soli i rozczyn. Gotową masę wyrabiaj przez około 15 min. Wyrobione ciasto przykryj ściereczką i odstaw w ciepłe miejsce na ok. 2h.\n\n3. Nadzienie: jagody umyj, osusz, włóż do miski, a następnie wymieszaj z erytrolem i budyniem.\n\n4. Kruszonka: wszystkie składniki na kruszonkę wymieszaj razem i wyrób chwilę rękoma.\n\n5. Całość: kiedy ciasto wyrośnie, wyrób je rękoma jeszcze chwilę i podziel na mniejsze części. Każdą z nich rozwałkuj na płaski placek (niezbyt cienki), dodaj jagody i delikatnie zlep ciasto. Bułki ułóż na blaszce wyłożonej papierem (zlepieniem od dołu) i zostaw jeszcze na 15-20 min. Nagrzej piekarnik do 180* (góra-dół).\n\n6. Jagodzianki posmaruj z wierzchu zostawionym wcześniej białkiem jajka, a na to dodaj kruszonkę. Wstaw do piekarnika na ok. 20-25 min. GOTOWE 🥳","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/LGSbkz1k4WJ25HBQWuSf8OVcnieEFRgCim35wHIu.jpg","kcal":2994.3,"protein":91.1,"fat":87.7,"carbs":457.6,"ingredients":[{"name":"Drożdże piekarnicze","grams":25,"measure":"g"},{"name":"Mleko 1,5%","grams":50,"measure":"g"},{"name":"Cukier biały","grams":10,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":440,"measure":"g"},{"name":"Mleko 1,5%","grams":110,"measure":"g"},{"name":"Erytrytol","grams":50,"measure":"g"},{"name":"Masło","grams":50,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Żółtko jaja","grams":17,"measure":"duża sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Borówki czarne","grams":500,"measure":"g"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Budyń bez cukru","grams":15,"measure":"łyżka"},{"name":"Masło","grams":30,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"g"},{"name":"Erytrytol","grams":30,"measure":"g"},{"name":"Białko jaja","grams":30,"measure":"sztuka"}]},{"id":41144609,"name":"Jajka na gniazdkach z cukinii","description":"1. Cukinię pokrój w cienki wstążki (najlepiej za pomocą obieraczki).\n2. Na patelni rozgrzej oliwę i przełóż cukinię. Podsmaż ją przez chwilę aż delikatnie zmięknie. Dopraw solą, pieprzem i czosnkiem. \n3. Z cukinii uformuj dwa gniazdka (z dziurką po środku) i wbij do nich jajka.. Smaż na małej mocy, pod przykryciem, aż do ścięcia białka (żółtko powinno pozostać płynne). \n4. Gniazdka przełóż na talerz, posyp szczypiorkiem, czarnuszką (opcjonalnie), solą i pieprzem. \n5. Zjedz z pomidorkami i pieczywem.\n6. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/xHjACjQgoYtO9AGn8x9bg14Q9EAnpj5mcrQvV8qo.jpg","kcal":474.1,"protein":25.6,"fat":16.8,"carbs":60.0,"ingredients":[{"name":"Cukinia","grams":150,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Czarnuszka","grams":5,"measure":"łyżeczka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Śliwki","grams":110,"measure":"sztuka"}]},{"id":47967519,"name":"Jajka na miękko z grzankami i warzywami","description":"1. Jajka włóż do gotującej się wody na około 5-6 minut (chyba, że wolisz twarde, to dłużej).\n2. Pieczywo zgrilluj na odrobinie oliwy na grzanki.\n3. Warzywa pokrój w kostkę, a następnie wymieszaj ze szczyptą pieprzu i soli.\n4. Ugotowane jajka posmaruj majonezem i posyp posiekanym szczypiorkiem. Podawaj z grzankami i warzywami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/76YhUNtfpx9KbEOH6zNa9Nvid1v84CZd9Jr8WfBt.jpg","kcal":508.5,"protein":23.7,"fat":18.4,"carbs":63.1,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":75,"measure":"mała sztuka"}]},{"id":34528182,"name":"Jajka po turecku na tzatzikach","description":"1. Serek wiejski zmiksuj na gładką masę. Ogórki setrzyj na tarce o grubych oczkach i odsącz z nadmiaru wody. Serek wymieszaj z solą, pieprzem, czosnkiem oraz ogórkami i rozsmaruj na głębokim talerzu.\n2. W międzyczasie w garnku zagotuj wodę ze szczyptą soli i przygotuj jajka w koszulce - jajka wbij pojedynczo na wrzątek i gotuj przez około 2 minuty (możesz je wcześniej wbić do miseczki i kiedy woda się zagotuje, to wlać do garnka), a następnie odcedź łyżką cedzakową. Możesz także przygotować jajka na miękko, jeśli wolisz.\n4. Przygotowane jajka dodaj na wierzch tzatzików. Skrop oliwą i posyp koperkiem.\n5. Podawaj z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/itWKMffYSy2JLqTwqpuBfbOxLKswjsnBB8snJbIA.jpg","kcal":508.8,"protein":36.1,"fat":21.5,"carbs":43.0,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Ogórek gruntowy","grams":70,"measure":"sztuka"},{"name":"Czosnek w proszku","grams":2,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}]},{"id":56307454,"name":"Jajka po turecku ze szparagami i koperkiem","description":"1. Serek wiejski zmiksuj na gładką masę. Wymieszaj go z solą, pieprzem i rozsmaruj na głębokim talerzu.\n2. Na rozgrzanej oliwie podsmaż pozbawione twardych końcówek szparagi. Dopraw je solą, pieprzem i czosnkiem.\n3. W międzyczasie w garnku zagotuj wodę ze szczyptą soli i przygotuj jajka w koszulce - jajka wbij pojedynczo na wrzątek i gotuj przez około 2 minuty (możesz je wcześniej wbić do miseczki i kiedy woda się zagotuje, to wlać do garnka), a następnie odcedź łyżką cedzakową.\n4. Przygotowane jajka dodaj na wierzch serka. Obok dodaj podsmażone szparagi. Udekoruj koperkiem i polej oliwą chilli.\n5. Podawaj z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/R3jezEf3TJAsD89Pl8G7hPR9Q4Bd8WiA0a4u6D9T.jpg","kcal":512.2,"protein":40.3,"fat":27.0,"carbs":28.4,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":200,"measure":"opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Szparagi","grams":100,"measure":"g"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":35,"measure":"kromka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}]},{"id":41144616,"name":"Jednogarnkowy gulasz drobiowy z kaszą i ogórkiem kiszonym","description":"1. Mięso pokrój w kostkę i wymieszaj z przyprawami. \n2. Wszystkie warzywa pokrój w kostkę.\n3. W garnku rozgrzej oliwę, wrzuć mięso i smaż przez chwilę.\n4. Dodaj cebulę, marchew i czosnek. Smaż ok. 5 minut, a następnie dodaj paprykę i smaż jeszcze kolejne 5 minut. Następnie dodaj pieczarki i cukinię i smaż jeszcze chwilę wszystko razem aż warzywa będą miękkie a mięso nabierze odpowiedniej konsystencji.\n5. Wodę wymieszaj z mąką i serkiem. Dodaj do gulaszu i wymieszaj. Gotuj przez chwilę aż sos lekko zgęstnieje. Dodaj natkę pietruszki. \n6. Gulasz podawaj z ugotowaną kaszą i ogórkiem kiszonym.\n7. Na deser zjedz owoce.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/96LVD5eI0b71PH94JyK5Vu2kIm91AtDKHFaJ0PI4.jpg","kcal":2540.5,"protein":183.1,"fat":63.2,"carbs":339.1,"ingredients":[{"name":"Mięso z udka kurczaka","grams":600,"measure":"g"},{"name":"Słodka papryka przyprawa","grams":8,"measure":"łyżka"},{"name":"Sól","grams":4,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"łyżeczka"},{"name":"Papryka czerwona","grams":170,"measure":"duża sztuka"},{"name":"Cebula","grams":150,"measure":"duża sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Cukinia","grams":150,"measure":"plaster"},{"name":"Pieczarki","grams":150,"measure":"g"},{"name":"Woda","grams":150,"measure":"szklanka"},{"name":"Serek naturalny","grams":100,"measure":"g"},{"name":"Mąka ziemniaczana","grams":24,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},
