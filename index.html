  function escHandler(e) { if (e.key === "Escape") closeDetail(); }
  function closeDetail() {
    if (backdrop) { backdrop.remove(); backdrop = null; document.removeEventListener("keydown", escHandler); }
  }

  // ---------- Week planner ----------
  const weekGrid = document.getElementById("weekGrid");
  const weekRangeLabel = document.getElementById("weekRangeLabel");
  const jumpDate = document.getElementById("jumpDate");
  const weekPersonToggle = document.getElementById("weekPersonToggle");
  let weekPersonView = "Razem";

  function entriesAt(dateISO, meal, person) {
    return (weekPlan[dateISO] && weekPlan[dateISO][slotKey(meal, person)]) || [];
  }
  // Always APPENDS a new entry rather than replacing the slot — this is what lets several meals
  // (e.g. 7 dinners) pile up on the same day/meal/person before being sorted onto other days.
  function addWeekEntry(dateISO, meal, person, recipeId, portions) {
    weekPlan[dateISO] = weekPlan[dateISO] || {};
    const k = slotKey(meal, person);
    weekPlan[dateISO][k] = weekPlan[dateISO][k] || [];
    const uid = genUid();
    weekPlan[dateISO][k].push({ uid, id: recipeId, portions: portions || 1 });
    pushWeekPatch([dateISO]);
    renderWeek();
    return uid;
  }
  function removeWeekEntry(dateISO, meal, person, uid) {
    const k = slotKey(meal, person);
    if (weekPlan[dateISO] && weekPlan[dateISO][k]) {
      weekPlan[dateISO][k] = weekPlan[dateISO][k].filter(e => e.uid !== uid);
      if (!weekPlan[dateISO][k].length) delete weekPlan[dateISO][k];
    }
    pushWeekPatch([dateISO]);
    renderWeek();
  }
  function updateWeekEntryPortions(dateISO, meal, person, uid, portions) {
    const entry = entriesAt(dateISO, meal, person).find(e => e.uid === uid);
    if (entry) {
      entry.portions = Math.max(1, Math.min(9, portions));
      pushWeekPatch([dateISO]);
      renderWeek();
    }
  }
  // Replaces the recipe shown in an existing entry (the "Zamień" button) — keeps uid/portions,
  // and drops any per-entry override since it belonged to the old recipe.
  function swapWeekEntry(dateISO, meal, person, uid, newRecipeId) {
    const entry = entriesAt(dateISO, meal, person).find(e => e.uid === uid);
    if (entry) {
      entry.id = newRecipeId;
      delete entry.override;
      pushWeekPatch([dateISO]);
      renderWeek();
    }
  }
  function updateWeekEntryOverride(dateISO, meal, person, uid, override) {
    const entry = entriesAt(dateISO, meal, person).find(e => e.uid === uid);
    if (entry) {
      entry.override = { ...(entry.override || {}), ...override };
      pushWeekPatch([dateISO]);
      renderWeek();
    }
  }
  function clearWeekEntryOverride(dateISO, meal, person, uid) {
    const entry = entriesAt(dateISO, meal, person).find(e => e.uid === uid);
    if (entry) {
      delete entry.override;
      pushWeekPatch([dateISO]);
      renderWeek();
    }
  }
  // Moves one entry to any other day/meal/person cell (used by drag-and-drop and the "Przenieś" modal).
  function moveWeekEntry(uid, fromDate, fromMeal, fromPerson, toDate, toMeal, toPerson) {
    const fromKey = slotKey(fromMeal, fromPerson);
    const list = weekPlan[fromDate] && weekPlan[fromDate][fromKey];
    if (!list) return;
    const idx = list.findIndex(e => e.uid === uid);
    if (idx === -1) return;
    const [entry] = list.splice(idx, 1);
    if (!list.length) delete weekPlan[fromDate][fromKey];
    weekPlan[toDate] = weekPlan[toDate] || {};
    const toKey = slotKey(toMeal, toPerson);
    weekPlan[toDate][toKey] = weekPlan[toDate][toKey] || [];
    weekPlan[toDate][toKey].push(entry);
    pushWeekPatch(fromDate === toDate ? [fromDate] : [fromDate, toDate]);
    renderWeek();
  }
  function weekDates() { return [...Array(7)].map((_, i) => addDays(viewedWeekStart, i)); }
  function activeMealRows() {
    const people = weekPersonView === "Razem" ? PEOPLE : [weekPersonView];
    const rows = [];
    MEALS.forEach(meal => people.forEach(person => rows.push({ meal, person })));
    return rows;
  }

  // ---------- Long-press drag-and-drop: move an entry onto any other day/meal/person cell ----------
  let dragState = null;
  // A tap on the recipe's photo/name opens the full detail preview (same modal as the catalog);
  // pressing and holding it instead starts a drag to move that meal onto another day/meal/person.
  function attachEntryInteractions(row, dateISO, meal, person, uid) {
    const head = row.querySelector(".slot-head");
    if (!head) return;
    head.addEventListener("pointerdown", (e) => {
      const startX = e.clientX, startY = e.clientY;
      let dragging = false, moved = false;
      const longPressTimer = setTimeout(startDrag, 350);
      function onMoveCheck(ev) {
        if (!moved && (Math.abs(ev.clientX - startX) > 10 || Math.abs(ev.clientY - startY) > 10)) {
          moved = true;
          if (!dragging) clearTimeout(longPressTimer);
        }
      }
      function onTap() {
        clearTimeout(longPressTimer);
        head.removeEventListener("pointermove", onMoveCheck);
        head.removeEventListener("pointerup", onTap);
        if (!dragging && !moved) {
          const entry = entriesAt(dateISO, meal, person).find(en => en.uid === uid);
          if (entry) openDetail(entry.id, { dateISO, meal, person, uid });
        }
      }
      head.addEventListener("pointermove", onMoveCheck);
      head.addEventListener("pointerup", onTap);
      function startDrag() {
        dragging = true;
        head.removeEventListener("pointermove", onMoveCheck);
        head.removeEventListener("pointerup", onTap);
        const rect = row.getBoundingClientRect();
        const ghost = row.cloneNode(true);
        ghost.className = "slot-entry drag-ghost";
        ghost.style.width = rect.width + "px";
        document.body.appendChild(ghost);
        row.classList.add("dragging-source");
        dragState = { fromDate: dateISO, fromMeal: meal, fromPerson: person, uid, ghost, lastTarget: null };
        positionGhost(rect.left, rect.top);
        function positionGhost(x, y) {
          ghost.style.left = x + "px";
          ghost.style.top = y + "px";
        }
        function onMove(ev) {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          positionGhost(rect.left + dx, rect.top + dy);
          const el = document.elementFromPoint(ev.clientX, ev.clientY);
          const cell = el && el.closest(".slot");
          if (dragState.lastTarget && dragState.lastTarget !== cell) dragState.lastTarget.classList.remove("drop-target");
          if (cell) cell.classList.add("drop-target");
          dragState.lastTarget = cell;
        }
        function onUp() {
          document.removeEventListener("pointermove", onMove);
          document.removeEventListener("pointerup", onUp);
          document.removeEventListener("pointercancel", onUp);
          ghost.remove();
          row.classList.remove("dragging-source");
          if (dragState.lastTarget) {
            dragState.lastTarget.classList.remove("drop-target");
            const t = dragState.lastTarget;
            const toDate = t.dataset.date, toMeal = t.dataset.meal, toPerson = t.dataset.person;
            if (toDate !== dateISO || toMeal !== meal || toPerson !== person) {
              moveWeekEntry(uid, dateISO, meal, person, toDate, toMeal, toPerson);
            }
          }
          dragState = null;
        }
        document.addEventListener("pointermove", onMove);
        document.addEventListener("pointerup", onUp);
        document.addEventListener("pointercancel", onUp);
      }
    });
  }

  // ---------- Shopping list (for the currently viewed week) ----------
  const shopList = document.getElementById("shopList");
  const shopWeekRangeLabel = document.getElementById("shopWeekRangeLabel");
  const shopCounter = document.getElementById("shopCounter");

  function shopKey(name) { return `${isoDate(viewedWeekStart)}|${name}`; }
  function customKey(id) { return `${isoDate(viewedWeekStart)}|custom|${id}`; }
  function customItemsForWeek() { return customShopItems[isoDate(viewedWeekStart)] || []; }

  function aggregateIngredients() {
    const totals = new Map();
    weekDates().forEach(d => {
      const dayMeals = weekPlan[isoDate(d)];
      if (!dayMeals) return;
      Object.values(dayMeals).flat().forEach(entry => {
        const r = getEntryRecipe(entry);
        if (!r) return;
        const portions = entry.portions || 1;
        r.ingredients.forEach(ing => {
          const key = ing.name;
          const prev = totals.get(key) || { name: ing.name, grams: 0, measure: ing.measure };
          prev.grams += ing.grams * portions;
          totals.set(key, prev);
        });
      });
    });
    const list = Array.from(totals.values()).sort((a,b) => a.name.localeCompare(b.name, "pl"));
    // originalName stays the stable identity used for all per-week overrides (qty, name, checked
    // state) — it never changes even if the displayed name is later edited by the user.
    list.forEach(item => {
      item.originalName = item.name;
      const nameOv = shopNameOverrides[shopKey(item.originalName)];
      if (nameOv) { item.name = nameOv; item.nameOverridden = true; }
      const ov = shopOverrides[shopKey(item.originalName)];
      if (ov != null) { item.computedGrams = item.grams; item.grams = ov; item.overridden = true; }
    });
    return list;
  }

  // Combined, category-grouped, sorted (unchecked first, then checked at the bottom within
  // each category) list of recipe-derived ingredients and manually added custom items for the week.
  function shoppingRows() {
    const rows = aggregateIngredients().map(item => ({
      type: "ingredient", name: item.name, originalName: item.originalName, qtyLabel: `${Math.round(item.grams)} g`,
      overridden: item.overridden, nameOverridden: item.nameOverridden, key: shopKey(item.originalName), raw: item,
      category: categoryOf(item.originalName), categoryOverridden: !!shopCategoryOverrides[item.originalName],
    }));
    customItemsForWeek().forEach(ci => {
      rows.push({ type: "custom", name: ci.name, qtyLabel: ci.qty || "", key: customKey(ci.id), id: ci.id, category: ci.category || "Inne" });
    });
    rows.sort((a, b) => {
      const ca = checked.has(a.key) ? 1 : 0, cb = checked.has(b.key) ? 1 : 0;
      if (ca !== cb) return ca - cb;
      return a.name.localeCompare(b.name, "pl");
    });
    return rows;
  }

  function categorySelectHtml(current) {
    return `<select class="cat-select">${SHOP_CATEGORIES.map(c => `<option value="${c}" ${c === current ? "selected" : ""}>${c}</option>`).join("")}</select>`;
  }

  function renderShopping() {
    shopWeekRangeLabel.textContent = formatRangeLabel(viewedWeekStart);
    const rows = shoppingRows();
    const remaining = rows.filter(r => !checked.has(r.key)).length;
    shopCounter.textContent = rows.length ? `${remaining} z ${rows.length} do kupienia` : "";
    shopList.innerHTML = "";
    if (!rows.length) {
      shopList.innerHTML = '<div class="empty-state">Dodaj przepisy do planu na ten tydzień (w zakładce „Mój tydzień”) albo dopisz własny produkt poniżej.</div>';
      return;
    }
    const byCategory = new Map();
    rows.forEach(item => {
      if (!byCategory.has(item.category)) byCategory.set(item.category, []);
      byCategory.get(item.category).push(item);
    });
    SHOP_CATEGORIES.forEach(category => {
      const items = byCategory.get(category);
      if (!items || !items.length) return;
      const group = document.createElement("div");
      group.className = "shop-category-group";
      const heading = document.createElement("h3");
      heading.className = "shop-category-heading";
      heading.textContent = category;
      group.appendChild(heading);
      items.forEach(item => group.appendChild(buildShopRow(item)));
      shopList.appendChild(group);
    });
  }

  function buildShopRow(item) {
    const row = document.createElement("div");
    const isChecked = checked.has(item.key);
    row.className = "shop-item" + (isChecked ? " checked" : "") + (item.type === "custom" ? " custom" : "");
    row.innerHTML = `
      <input type="checkbox" ${isChecked ? "checked" : ""} />
      <span class="name">${escapeHtml(item.name)}${item.nameOverridden ? '<button class="reset-name-btn" type="button" aria-label="Przywróć oryginalną nazwę">↺</button>' : ""}</span>
      <span class="qty tabular ${item.overridden ? "overridden" : ""}">${escapeHtml(item.qtyLabel)}</span>
      <button class="edit-btn" type="button" aria-label="Edytuj produkt">✎</button>
      ${item.type === "ingredient" && item.overridden ? '<button class="reset-btn" type="button" aria-label="Przywróć wyliczoną ilość">↺</button>' : ""}
      ${item.type === "custom" ? '<button class="del-btn" type="button" aria-label="Usuń produkt">✕</button>' : ""}
    `;
    row.querySelector('input[type="checkbox"]').addEventListener("change", (e) => {
      if (e.target.checked) checked.add(item.key); else checked.delete(item.key);
      save(LS_CHECKED, Array.from(checked));
      renderShopping();
    });
    row.querySelector(".edit-btn").addEventListener("click", () => {
      const nameSpan = row.querySelector(".name");
      const qtySpan = row.querySelector(".qty");
      nameSpan.outerHTML = `<span class="name-edit"><input type="text" value="${escapeHtml(item.name)}" /></span>`;
      qtySpan.outerHTML = `<span class="qty-edit"><input type="text" value="${escapeHtml(item.qtyLabel)}" /></span>${categorySelectHtml(item.category)}`;
      const nameInput = row.querySelector(".name-edit input");
      const qtyInput = row.querySelector(".qty-edit input");
      const catSelect = row.querySelector(".cat-select");
      nameInput.focus(); nameInput.select();
      function commit() {
        const newName = nameInput.value.trim();
        const newCategory = catSelect.value;
        if (item.type === "ingredient") {
          if (newName && newName !== item.originalName) { shopNameOverrides[shopKey(item.originalName)] = newName; }
          else { delete shopNameOverrides[shopKey(item.originalName)]; }
          save(LS_SHOP_NAME_OVERRIDES, shopNameOverrides);
          const v = parseFloat(qtyInput.value);
          if (!isNaN(v)) { shopOverrides[shopKey(item.originalName)] = v; save(LS_SHOP_OVERRIDES, shopOverrides); }
          if (newCategory !== guessCategory(item.originalName)) { shopCategoryOverrides[item.originalName] = newCategory; }
          else { delete shopCategoryOverrides[item.originalName]; }
          save(LS_SHOP_CATEGORY_OVERRIDES, shopCategoryOverrides);
        } else {
          const weekKey = isoDate(viewedWeekStart);
          const list = customShopItems[weekKey] || [];
          const ci = list.find(x => x.id === item.id);
          if (ci) { if (newName) ci.name = newName; ci.qty = qtyInput.value; ci.category = newCategory; save(LS_CUSTOM_ITEMS, customShopItems); }
        }
        renderShopping();
      }
      [nameInput, qtyInput].forEach(inp => {
        inp.addEventListener("blur", () => setTimeout(() => { if (!row.contains(document.activeElement)) commit(); }, 0));
        inp.addEventListener("keydown", (e) => { if (e.key === "Enter") commit(); });
      });
      catSelect.addEventListener("change", commit);
    });
    const resetBtn = row.querySelector(".reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", () => {
      delete shopOverrides[shopKey(item.originalName)];
      save(LS_SHOP_OVERRIDES, shopOverrides);
      renderShopping();
    });
    const resetNameBtn = row.querySelector(".reset-name-btn");
    if (resetNameBtn) resetNameBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      delete shopNameOverrides[shopKey(item.originalName)];
      save(LS_SHOP_NAME_OVERRIDES, shopNameOverrides);
      renderShopping();
    });
    const delBtn = row.querySelector(".del-btn");
    if (delBtn) delBtn.addEventListener("click", () => {
      const weekKey = isoDate(viewedWeekStart);
      customShopItems[weekKey] = (customShopItems[weekKey] || []).filter(x => x.id !== item.id);
      save(LS_CUSTOM_ITEMS, customShopItems);
      renderShopping();
    });
    return row;
  }
  document.getElementById("shopPrevWeekBtn").addEventListener("click", () => { viewedWeekStart = addDays(viewedWeekStart, -7); renderShopping(); });
  document.getElementById("shopNextWeekBtn").addEventListener("click", () => { viewedWeekStart = addDays(viewedWeekStart, 7); renderShopping(); });

  const addItemInput = document.getElementById("addItemInput");
  const addItemQty = document.getElementById("addItemQty");
  function addCustomShopItem() {
    const name = addItemInput.value.trim();
    if (!name) return;
    const weekKey = isoDate(viewedWeekStart);
    customShopItems[weekKey] = customShopItems[weekKey] || [];
    customShopItems[weekKey].push({ id: Date.now() + Math.random(), name, qty: addItemQty.value.trim(), category: "Inne" });
    save(LS_CUSTOM_ITEMS, customShopItems);
    addItemInput.value = ""; addItemQty.value = "";
    addItemInput.focus();
    renderShopping();
  }
  document.getElementById("addItemBtn").addEventListener("click", addCustomShopItem);
  addItemInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addCustomShopItem(); });
  addItemQty.addEventListener("keydown", (e) => { if (e.key === "Enter") addCustomShopItem(); });

  document.getElementById("copyListBtn").addEventListener("click", () => {
    const text = `Lista zakupów (${formatRangeLabel(viewedWeekStart)}):\n` + shoppingRows().map(i => `- ${i.name}${i.qtyLabel ? ": " + i.qtyLabel : ""}`).join("\n");
    copyText(text);
  });

  document.getElementById("resetCheckedBtn").addEventListener("click", () => {
    checked = new Set(); save(LS_CHECKED, []); renderShopping();
  });

  // ---------- Statistics ----------
  const statsGrid = document.getElementById("statsGrid");
  const statsRangeLabel = document.getElementById("statsRangeLabel");
  const statsPeriodType = document.getElementById("statsPeriodType");
  const statsPersonToggle = document.getElementById("statsPersonToggle");
  const statsJumpDate = document.getElementById("statsJumpDate");
  let statsAnchor = new Date();
  let statsPersonView = "Razem";

  function periodBounds(type, anchor) {
    const d = new Date(anchor); d.setHours(0, 0, 0, 0);
    if (type === "day") return { start: d, end: d };
    if (type === "week") { const start = weekStartOf(d); return { start, end: addDays(start, 6) }; }
    if (type === "month") return { start: new Date(d.getFullYear(), d.getMonth(), 1), end: new Date(d.getFullYear(), d.getMonth() + 1, 0) };
    if (type === "quarter") { const q = Math.floor(d.getMonth() / 3); return { start: new Date(d.getFullYear(), q * 3, 1), end: new Date(d.getFullYear(), q * 3 + 3, 0) }; }
    return { start: new Date(d.getFullYear(), 0, 1), end: new Date(d.getFullYear(), 11, 31) };
  }
  function shiftPeriod(type, anchor, dir) {
    const d = new Date(anchor);
    if (type === "day") return addDays(d, dir);
    if (type === "week") return addDays(d, 7 * dir);
    if (type === "month") { d.setDate(1); d.setMonth(d.getMonth() + dir); return d; }
    if (type === "quarter") { d.setDate(1); d.setMonth(d.getMonth() + 3 * dir); return d; }
    d.setDate(1); d.setFullYear(d.getFullYear() + dir); return d;
  }
  function formatPeriodLabel(type, bounds) {
    if (type === "day") return `${DAY_NAMES_FULL[bounds.start.getDay()]}, ${bounds.start.getDate()} ${MONTHS_GENITIVE[bounds.start.getMonth()]} ${bounds.start.getFullYear()}`;
    if (type === "week") return formatRangeLabel(bounds.start);
    if (type === "month") return `${MONTHS_FULL[bounds.start.getMonth()]} ${bounds.start.getFullYear()}`;
    if (type === "quarter") return `Q${Math.floor(bounds.start.getMonth() / 3) + 1} ${bounds.start.getFullYear()}`;
    return `${bounds.start.getFullYear()}`;
  }
  function periodKey(type, bounds, person) { return `${type}|${isoDate(bounds.start)}|${person}`; }

  function computeStats(bounds, personFilter) {
    const dishCounts = new Map(); // recipeId -> count
    const ingredientTotals = new Map(); // name -> grams
    const macros = { kcal: 0, protein: 0, fat: 0, carbs: 0 };
    let mealCount = 0;
    for (let d = new Date(bounds.start); d <= bounds.end; d = addDays(d, 1)) {
      const dayMeals = weekPlan[isoDate(d)];
      if (!dayMeals) continue;
      Object.entries(dayMeals).forEach(([key, entries]) => {
        const person = key.split("|")[1];
        if (personFilter !== "Razem" && person !== personFilter) return;
        (entries || []).forEach(entry => {
          const r = getEntryRecipe(entry);
          if (!r) return;
          const portions = entry.portions || 1;
          mealCount++;
          dishCounts.set(r.id, (dishCounts.get(r.id) || 0) + 1);
          macros.kcal += r.kcal * portions;
          macros.protein += r.protein * portions;
          macros.fat += r.fat * portions;
          macros.carbs += r.carbs * portions;
          r.ingredients.forEach(ing => {
            ingredientTotals.set(ing.name, (ingredientTotals.get(ing.name) || 0) + ing.grams * portions);
          });
        });
      });
    }
    const topDishes = Array.from(dishCounts.entries())
      .map(([id, count]) => ({ name: getRecipe(id)?.name || "?", count }))
      .sort((a, b) => b.count - a.count).slice(0, 6);
    const topIngredients = Array.from(ingredientTotals.entries())
      .map(([name, grams]) => ({ name, grams }))
      .sort((a, b) => b.grams - a.grams).slice(0, 10);
    return { mealCount, macros, topDishes, topIngredients };
  }

  function svgDonut(segments) {
    const style = getComputedStyle(document.documentElement);
    const colors = segments.map(s => style.getPropertyValue(s.colorVar).trim());
    const total = segments.reduce((s, x) => s + x.value, 0) || 1;
    let angle = -90;
    const r = 58, cx = 70, cy = 70;
    let paths = "";
    segments.forEach((seg, i) => {
      const frac = seg.value / total;
      const sweep = Math.max(frac * 360, total > 0 && seg.value > 0 ? 0.5 : 0);
      const large = sweep > 180 ? 1 : 0;
      const a1 = angle * Math.PI / 180, a2 = (angle + sweep) * Math.PI / 180;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      if (seg.value > 0) paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${colors[i]}" />`;
      angle += sweep;
    });
    const bgColor = style.getPropertyValue("--bg-raised").trim();
    return `<svg class="chart-svg" viewBox="0 0 140 140" role="img" aria-label="Wykres kołowy makroskładników">${paths}<circle cx="${cx}" cy="${cy}" r="${r * 0.56}" fill="${bgColor}" /></svg>`;
  }

  function rankListHtml(items, valueLabel) {
    if (!items.length) return '<div class="empty-state">Brak danych w tym okresie.</div>';
    const max = Math.max(...items.map(x => x.value)) || 1;
    return `<ul class="rank-list">${items.map((x, i) => `
      <li>
        <span class="rk-num">${i + 1}.</span>
        <span class="rk-name">${escapeHtml(x.name)}</span>
        <span class="rk-bar-wrap"><span class="rk-bar" style="width:${Math.round((x.value / max) * 100)}%"></span></span>
        <span class="rk-val tabular">${valueLabel(x.value)}</span>
      </li>`).join("")}</ul>`;
  }

  function renderStats() {
    const type = statsPeriodType.value;
    const bounds = periodBounds(type, statsAnchor);
    statsRangeLabel.textContent = formatPeriodLabel(type, bounds);
    statsJumpDate.value = isoDate(statsAnchor);
    const stats = computeStats(bounds, statsPersonView);
    const pKey = periodKey(type, bounds, statsPersonView);
    const custom = customStats[pKey] || [];

    const macroKcalFromParts = stats.macros.protein * 4 + stats.macros.fat * 9 + stats.macros.carbs * 4;
    const donut = svgDonut([
      { value: stats.macros.protein * 4, colorVar: "--accent" },
      { value: stats.macros.fat * 9, colorVar: "--spice" },
      { value: stats.macros.carbs * 4, colorVar: "--chart3" },
    ]);

    statsGrid.innerHTML = `
      <div class="stat-card">
        <h3>Posiłki w tym okresie</h3>
        <div class="stat-headline">${stats.mealCount}<span class="unit">zaplanowanych</span></div>
        <div class="stat-subrow">
          <div>Suma kalorii<strong>${Math.round(stats.macros.kcal)} kcal</strong></div>
        </div>
      </div>
      <div class="stat-card">
        <h3>Wartości odżywcze razem</h3>
        <div class="stat-subrow" style="margin-top:0;">
          <div>Białko<strong>${Math.round(stats.macros.protein)} g</strong></div>
          <div>Tłuszcz<strong>${Math.round(stats.macros.fat)} g</strong></div>
          <div>Węglowodany<strong>${Math.round(stats.macros.carbs)} g</strong></div>
        </div>
        ${macroKcalFromParts > 0 ? `
          <div style="display:flex;align-items:center;gap:18px;margin-top:14px;">
            ${donut}
            <div class="chart-legend" style="margin-top:0;flex-direction:column;gap:8px;">
              <span><i style="background:var(--accent)"></i>Białko ${Math.round(stats.macros.protein * 4 / macroKcalFromParts * 100)}%</span>
              <span><i style="background:var(--spice)"></i>Tłuszcz ${Math.round(stats.macros.fat * 9 / macroKcalFromParts * 100)}%</span>
              <span><i style="background:var(--chart3)"></i>Węgl. ${Math.round(stats.macros.carbs * 4 / macroKcalFromParts * 100)}%</span>
            </div>
          </div>` : ""}
      </div>
      <div class="stat-card">
        <h3>Najczęściej przygotowywane danie</h3>
        ${rankListHtml(stats.topDishes.map(x => ({ name: x.name, value: x.count })), v => `${v}×`)}
      </div>
      <div class="stat-card wide">
        <h3>Najczęściej używane składniki</h3>
        ${rankListHtml(stats.topIngredients.map(x => ({ name: x.name, value: x.grams })), v => `${Math.round(v)} g`)}
      </div>
      <div class="stat-card wide">
        <h3>Statystyki własne</h3>
        <div id="customStatsList">${custom.length ? custom.map(cs => `
          <div class="custom-stat-row" data-id="${cs.id}">
            <span>${escapeHtml(cs.label)}</span>
            <span class="tabular" style="display:flex;align-items:center;gap:8px;">${escapeHtml(cs.value)}<button class="cs-del" type="button" aria-label="Usuń statystykę">✕</button></span>
          </div>`).join("") : '<div class="empty-state">Brak własnych statystyk w tym okresie.</div>'}</div>
        <div class="add-stat-form">
          <input type="text" class="cs-label" id="csLabel" placeholder="Nazwa (np. Litry wody)" />
          <input type="text" class="cs-value" id="csValue" placeholder="Wartość" />
          <button class="btn primary" id="csAddBtn">+ Dodaj statystykę</button>
        </div>
      </div>
    `;
    statsGrid.querySelectorAll(".cs-del").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.closest(".custom-stat-row").dataset.id;
        customStats[pKey] = (customStats[pKey] || []).filter(x => String(x.id) !== id);
        save(LS_CUSTOM_STATS, customStats);
        renderStats();
      });
    });
    const csAddBtn = document.getElementById("csAddBtn");
    csAddBtn.addEventListener("click", () => {
      const label = document.getElementById("csLabel").value.trim();
      const value = document.getElementById("csValue").value.trim();
      if (!label || !value) { showToast("Podaj nazwę i wartość statystyki."); return; }
      customStats[pKey] = customStats[pKey] || [];
      customStats[pKey].push({ id: Date.now() + Math.random(), label, value });
      save(LS_CUSTOM_STATS, customStats);
      renderStats();
    });
  }

  statsPeriodType.addEventListener("change", renderStats);
  statsJumpDate.addEventListener("change", () => {
    if (!statsJumpDate.value) return;
    statsAnchor = new Date(statsJumpDate.value + "T00:00:00");
    renderStats();
  });
  document.getElementById("statsPrevBtn").addEventListener("click", () => { statsAnchor = shiftPeriod(statsPeriodType.value, statsAnchor, -1); renderStats(); });
  document.getElementById("statsNextBtn").addEventListener("click", () => { statsAnchor = shiftPeriod(statsPeriodType.value, statsAnchor, 1); renderStats(); });
  statsPersonToggle.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      statsPersonView = btn.dataset.person;
      statsPersonToggle.querySelectorAll("button").forEach(b => b.setAttribute("aria-selected", String(b === btn)));
      renderStats();
    });
  });

  purgeExpiredTrash();
  renderGrid();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").then((reg) => {
        // Ask right away whether a newer sw.js is available (don't wait for the browser's own,
        // sometimes-lazy update check) — important for an installed PWA that gets reopened rather
        // than freshly navigated to.
        reg.update().catch(() => {});
      }).catch(() => {});
    });
    // As soon as a new service worker takes over, reload once so the freshly deployed version
    // shows up immediately instead of requiring the user to manually clear the cache.
    let reloadedForUpdate = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloadedForUpdate) return;
      reloadedForUpdate = true;
      window.location.reload();
    });
  }
</script>
</body>
</html>
