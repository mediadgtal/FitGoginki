średnia sztuka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Kurczak polędwiczka","grams":240,"measure":"sztuka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Płatki kukurydziane","grams":15,"measure":"g"},{"name":"Ser Parmezan","grams":15,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Ser Feta","grams":40,"measure":"plaster"}],"category":"Sałatka"},{"id":63161163,"name":"Proteinowy mus czekoladowy z malinami","description":"1. Żelatynę rozpuść w gorącej wodzie i pozostaw do przestudzenia.\n2. Napój proteinowy zmiksuj dokładnie z masłem orzechowym, bananem i odżywką białkową. \n3. Dodaj przestudzoną żelatynę i jeszcze raz zblenduj. \n4. Masę przelej do słoiczków lub szklanek i odstaw do lodówki na minimum 2 godziny do całkowitego stężenia.\n5. Przed podaniem dodaj na wierzch maliny.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/CeBbGmJCXg9M1hdbnlZWIU5mGERqY7rIe6DYPKVB.jpg","kcal":442.7,"protein":49.38,"fat":10.06,"carbs":42.67,"ingredients":[{"name":"Napój proteinowy o smaku czekoladowym (Go Active)","grams":201,"measure":"ml"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":20,"measure":"miarka"},{"name":"Żelatyna","grams":10,"measure":"g"},{"name":"Woda","grams":75,"measure":"łyżka"},{"name":"Maliny","grams":120,"measure":"garść"}],"category":"Deser"},{"id":63161775,"name":"Domowe batoniki bounty","description":"1. Wiórki kokosowe wymieszaj z mleczkiem kokosowym (użyj stałą część), erytrolem i serkiem naturalnym. Dodaj łyżkę gorącej wody i mieszaj aż powstanie klejąca masa. \n2. Uformuj 8 batoników i włóż do zamrażarki na ok. 30-40 minut. \n3. Rozpuść czekolady z olejem kokosowym. \n4. Schłodzone batoniki zanurz w czekoladzie i odstaw ponownie do zamrażarki na kolejne 30-40 minut. \n5. Batoniki przechowuj w lodówce.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/L2yf7qVw0CWGtUoxBBvk9mJ7YYPN5jjffJMUNHWa.jpg","kcal":1182.4,"protein":15.1,"fat":103.53,"carbs":57.9,"ingredients":[{"name":"Wiórki kokosowe","grams":100,"measure":"g"},{"name":"Mleczko kokosowe light 6%","grams":50,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Woda","grams":15,"measure":"łyżka"},{"name":"Serek Philadelphia light","grams":40,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":30,"measure":"opakowanie"},{"name":"Czekolada mleczna","grams":30,"measure":"opakowanie"},{"name":"Olej kokosowy","grams":10,"measure":"łyżeczka"}],"category":"Deser"},{"id":63171576,"name":"Pudding mango-kokos z nasion słodkiej bazylii","description":"1. W miseczce wymieszaj skyr z mleczkiem kokosowym, erytrolem, aromatem i szczyptą soli.\n2. Wsyp nasiona słodkiej bazylii i dokładnie wymieszaj.\n3. Odstaw na około 15 minut. Po tym czasie ponownie zamieszaj, aby nasiona równomiernie rozłożyły się w masie.\n4. Przełóż pudding do słoiczka o pojemności ok. 250 ml.\n5. Na wierzchu ułóż zblendowane na mus mango.\n6. Wiórki kokosowe podpraż przez 1–2 minuty na suchej patelni, aż lekko się zezłocą.\n7. Posyp nimi mango tuż przed podaniem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/MQewEMgqzabs1NES149uQeoIQdx63DAj58cBkAeN.jpg","kcal":346.36,"protein":22.54,"fat":16.69,"carbs":23.3,"ingredients":[{"name":"Nasiona słodkiej bazylii (Hebar)","grams":20,"measure":"g"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Mleczko kokosowe light 6%","grams":75,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mango","grams":90,"measure":"plaster"},{"name":"Wiórki kokosowe","grams":12,"measure":"łyżka"}],"category":"Deser"},{"id":63215559,"name":"Nocna owsianka matcha-malina","description":"1. Płatki owsiane oraz nasiona chia wymieszaj z mlekiem, połową skyru i matchą. Przełóż do słoiczka i włóż do lodówki. Po 10 minutach przemieszaj delikatnie jeszcze raz owsiankę, a następnie odstaw ją do lodówki na całą noc. \n2. Rano dodaj na wierzch pozostały jogurt, maliny oraz płatki migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/4K7F9Ix2WgwVgR7AQJVTLHUeCjIVnjuy22FaeGkQ.jpg","kcal":417.55,"protein":25.19,"fat":10.8,"carbs":56.98,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Nasiona chia","grams":10,"measure":"łyżeczka"},{"name":"Matcha proszek","grams":3,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Skyr waniliowy","grams":150,"measure":"opakowanie"},{"name":"Maliny","grams":100,"measure":"szklanka"},{"name":"Migdały płatki","grams":5,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":63216011,"name":"Pieczony omlet z jagodami","description":"1. Piekarnik rozgrzej do 180 stopni. Wstaw od razu do niego małe naczynie żaroodporne. \n2. Białka oddziel od żółtek i ubij je ze szczyptą soli na sztywną pianę. \n2. Żółtka wymieszaj z erytrolem, a następnie połącz z białkami (mieszaj delikatnie, aby piana nie opadła).\n3. Do masy dodaj mąkę i wymieszaj do połączenia składników. \n4. W rozgrzanym naczyniu rozpuść masło, a następnie wylej masę omletową. Piecz ok. 15-20 minut. \n5. Omleta podawaj z jogurtem i owocami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/9IkeyenFFspQMX85k2FzNHJ3fju6xXqTXgNzCaQ8.jpg","kcal":401.85,"protein":28.54,"fat":14.98,"carbs":36.08,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":25,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":5,"measure":"porcja"},{"name":"Jagoda czarna","grams":100,"measure":"garść"},{"name":"Skyr waniliowy","grams":150,"measure":"opakowanie"}],"category":"Śniadanie"},{"id":63216666,"name":"Kolorowe tosty z hummusem i mozzarellą","description":"1. Pomidorki koktajlowe pokrój w ćwiartki, cebulę w cienkie piórka, a bazylię posiekaj. Pokrojone warzywa wymieszaj z oliwą, octem winnym oraz dopraw solą i pieprzem. \n2. Z chleba przygotuj grzanki - na suchej patelni, w tosterze lub airfryerze. Natrzyj je delikatnie ząbkiem czosnku, a następnie posmaruj hummusem. \n3. Na wierzchu ułóż sałatkę pomidorową, a na samej górze dodaj kulki mini mozzarelli. Dopraw świeżo mielonym pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/3Sv9XvhNUxGrWt8fpNs32nXKeqPCTmMXXC2VHN23.jpg","kcal":407.88,"protein":22.95,"fat":18.16,"carbs":45.09,"ingredients":[{"name":"Chleb graham","grams":60,"measure":"kromka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Hummus","grams":40,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":150,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Bazylia świeża","grams":4,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Ocet winny","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ser Mozzarella mini light","grams":63,"measure":"opakowanie"}],"category":"Śniadanie"},{"id":63217196,"name":"Lekka pianka truskawkowa z galaretką","description":"1. Połowę galaretki rozpuść w 220 ml wrzątku. Następnie zmiksuj ją do momentu aż zrobi się pianka. \n2. 200 g truskawek zmiksuj na mus. \n3. Do pianki z galaretki dodaj mus z truskawek praz skyr i zmiksuj ponownie do połączenia składników.\n4. Masę przelej do słoików i włóż do lodówki na 2 godziny. \n5. W między czasie pozostałą galaretkę rozpuść również w 220 ml wrzątku i pozostaw do przestudzenia. \n6. Pozostałe truskawki pokrój w ćwiartki lub plastry. \n7. Na stężałą piankę wyłóż owoce i delikatnie zalej galaretką. \n8. Wstaw do lodówki na kolejne 2 godziny lub najlepiej na całą noc.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/daP2cR9TAc9LyQ4akfFjzzMe4vWYM5mreWFWoqRx.jpg","kcal":345.6,"protein":36.87,"fat":1.8,"carbs":49.11,"ingredients":[{"name":"Truskawki","grams":400,"measure":"g"},{"name":"Galaretka o smaku truskawkowym","grams":71,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"}],"category":"Deser"},{"id":63259137,"name":"Waniliowy budyń jaglany z truskawkami","description":"1. Kaszę przepłucz pod bieżącą wodą, zalej mlekiem, dodaj erytrol. Gotuj przesz ok. 15 minut, aż będzie miękka, co chwilę mieszając, aby się nie przypaliła.\n2. Jeszcze ciepłą zblenduj (najwygodniej blenderem ręcznym) na gładki krem. W razie potrzeby dodaj więcej mleka, jeśli wolisz rzadszą konsystencję. Dodaj skyr oraz szczyptę soli. Zblenduj ponownie na jednolitą masę.\n3. Przełóż kaszę do miseczki i podawaj z pokrojonymi owocami i płatkami migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/elwuHwXWhtMVX2IG8xEHwgaIF4rlafmp6qsZJ9Uf.jpg","kcal":477.2,"protein":31.25,"fat":10.52,"carbs":64.13,"ingredients":[{"name":"Kasza jaglana","grams":45,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":375,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Skyr waniliowy","grams":150,"measure":"opakowanie"},{"name":"Truskawki","grams":70,"measure":"garść"},{"name":"Migdały płatki","grams":5,"measure":"łyżka"}],"category":"Śniadanie"},{"id":63368659,"name":"Trufle tiramisu na ricotcie","description":"1. Wszystkie składniki dokładnie wymieszaj (spróbuj masę i jeśli jest dla Ciebie zbyt mało słodka - dodaj więcej słodziku) i zagnieć 8 kuleczek (lub 4 większe, wtedy na porcję przyjmij dwie sztuki).\n2. Obtocz kuleczki w kakao i wstaw do lodówki na około godzinę do schłodzenia.\n3. Podawaj solo lub na jogurcie z owocami.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/BRSZHZ76D7qdFEjChkuM4LbD7BS53VkNQdYVuiUv.jpg","kcal":539.27,"protein":27.78,"fat":26.63,"carbs":44.47,"ingredients":[{"name":"Ricotta","grams":250,"measure":"g"},{"name":"Espresso","grams":20,"measure":"porcja"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mąka kokosowa","grams":60,"measure":"łyżka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":5,"measure":"łyżeczka"}],"category":"Deser"},{"id":63408930,"name":"Twarogowe bułeczki z truskawkami i owsiano-kokosową kruszonką","description":"1. W blenderze zmiksuj twaróg, jajko, aromat waniliowy i 20 g erytrolu.\n2. Wymieszaj pozostałe suche składniki (mąkę orkiszową, proszek do pieczenia, sól).\n3. Dodaj suche składniki do mokrych i wymieszaj, podziel ciasto na 4 części.\n4. Lekko zwilżonymi dłońmi uformuj płaskie bułki i ułóż na blaszce do pieczenia. W każdej z nich zrób delikatne wgłębienie.\n5. Truskawki umyj i pokrój w drobną kosteczkę i dodaj na każdą bułeczkę w miejsce wgłębienia.\n6. Zmiksuj składniki na kruszonkę: płatki owsiane, mąkę kokosową, erytrol, cynamon, 10 ml wody i aromat waniliowy. Posyp nią bułeczki.\n7. Piekarnik rozgrzej do 175 stopni (góra-dól) i piecz bułeczki przez ok. 30 minut (kontroluj, w niektórych piekarnikach po 24-26 minutach są już gotowe).","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/JCeNZ7V8eHE6sO4kYWjxY7MVUW25KqVIZI7HN2xG.jpg","kcal":1049.45,"protein":76.18,"fat":21.98,"carbs":136.51,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Proszek do pieczenia","grams":4,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Truskawki","grams":140,"measure":"garść"},{"name":"Płatki owsiane","grams":25,"measure":"łyżka"},{"name":"Mąka kokosowa","grams":12,"measure":"łyżka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Mąka orkiszowa jasna","grams":130,"measure":"szklanka"}],"category":"Deser"},{"id":63446772,"name":"Pieczona owsianka a'la brownie z czereśniami","description":"1. Piekarnik rozgrzej do 180 stopni.\n2. W małym naczyniu żaroodpornym rozgnieć za pomocą widelca banana na \"papkę\".\n3. Dodaj płatki owsiane, mleko, odżywkę, kakao, skyr (50 g) oraz proszek do pieczenia i wszystko dokładnie wymieszaj.\n4. Do masy dodaj posiekaną gorzką czekoladę i delikatnie jeszcze raz przemieszaj. Na wierzchu ułóż połówki czereśni pozbawione pestek.\n5. Owsiankę piecz 25-30 minut. Po upieczeniu pozostaw do wystudzenia.\n6. Podawaj z pozostałym skyrem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/8wM9Z0ta4UawgI72boR6svgkwna1nBQVnD9m8XWs.jpg","kcal":490.72,"protein":34.54,"fat":9.57,"carbs":71.82,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":10,"measure":"miarka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"szczypta"},{"name":"Czekolada gorzka 70-85% kakao","grams":10,"measure":"kostka"},{"name":"Czereśnie","grams":90,"measure":"garść"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"}],"category":"Śniadanie"},{"id":63447587,"name":"Zapiekany serek wiejski z borówkami","description":"1. Piekarnik rozgrzej do 180 stopni.\n2. Serek wiejski zmiksuj z jajkiem, mąką, budyniem, erytrolem i proszkiem do pieczenia na gładką masę. \n3. Masę przelej do kokilki/małego naczynia żaroodpornego wyłożonego papierem do pieczenia. Na wierzch dodaj borówki. \n4. Piecz 45 minut. Po upieczeniu pozostaw do wystudzenia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Nj2UypjmPt5dJy8gOSQSrhjoG3bgoKtpA59rTpOo.jpg","kcal":462.02,"protein":31.03,"fat":15.42,"carbs":50.21,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"g"},{"name":"Budyń waniliowy bez cukru","grams":15,"measure":"g"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":50,"measure":"garść"}],"category":"Śniadanie"},{"id":63448192,"name":"Malinowy smoothie bowl (na upały)","description":"1. Serek wiejski zmiksuj z mrożonymi owocami i erytrolem na jednolitą masę. \n2. Gęste smoothie przełóż do miseczki i dodaj świeże owoce, granolę i platki migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/jGKOhY0KBeOH86kJ7qYfDGCylfDYcnIkthLByrqE.jpg","kcal":505.1,"protein":28.57,"fat":18.71,"carbs":57.41,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Maliny mrożone","grams":100,"measure":"garść"},{"name":"Banan mrożony","grams":120,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Granola Proteinowa","grams":15,"measure":"garść"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}],"category":"Śniadanie"},{"id":63500262,"name":"Twarogowe bułeczki z air fryera","description":"1. W naczyniu zmiksuj twaróg, jajko, erytrol i cukier waniliowy na jednolitą masę.\n2. W oddzielnym naczyniu wymieszaj suche składniki: mąkę, proszek do pieczenia i sól. Dodaj suche składniki do mokrych. Wymieszaj składniki.\n3. Zwilżoną dłonią chwilę wyrabiaj ciasto, podziel na 6 kawałków i uformuj bułeczki. Każdą bułeczkę przesmaruj za pomocą pędzelka mlekiem i ułóż w koszu air fryera. Piecz przez 10 minut w 170 stopniach (ja mam mocny air fryer, jeśli Twój jest nieco słabszy zwiększ temp. do 175 stopni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/LtyMsIevzx3IM94ElZKRNfNzxN0zx2gzGyeXSnhx.jpg","kcal":864.51,"protein":61.73,"fat":16.28,"carbs":115.78,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":200,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Cukier wanilinowy","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":140,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":20,"measure":"szklanka"}],"category":"Deser"},{"id":63501487,"name":"Chłodnik ogórkowy na skyrze","description":"1. W misie blendera umieść skyr, awokado, czosnek i kostkę lodu. Dodaj sól, pieprz, sok z cytryny. Przelej do miseczki.\n2. Rzodkiewki i ogórka zetrzyj na tarce o dużych oczkach. Koperek posiekaj. Dodaj do miseczki, wymieszaj.\n3. Udekoruj posiekanymi ziołami (koperek, mięta, szczypiorek) i cienkimi plasterkami rzodkiewki oraz świeżo mielonym pieprzem.\n4. Opcjonalnie  posypać prażonymi pestkami słonecznika.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/7hhndnIQrNmonATS8lIXxRoixKg1APXxLC97bxJh.jpg","kcal":131.76,"protein":10.34,"fat":5.54,"carbs":12.59,"ingredients":[{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Awokado","grams":35,"measure":"sztuka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Rzodkiewka","grams":30,"measure":"sztuka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Kostki lodu","grams":20,"measure":"kostka"}],"category":"Zupa"},{"id":63606365,"name":"Tajskie Pad Kra Pao","description":"1. Ryż ugotuj według zaleceń producenta na opakowaniu. \n2. Szalotkę pokrój w drobną kostkę, a chili i czosnek w cienkie plasterki. \n3. Na patelni rozgrzej oliwę (pozostaw odrobinę do przygotowania jajek sadzonych) i podsmaż pokrojone składniki. Następnie dodaj mięso mielone i podsmaż rozdzielając je na małe kawałki. \n4. Tajską bazylię posiekaj. Wymieszaj składniki sosu - sos sojowy, rybny, syrop klonowy, sok z limonki wraz z wodą. \n5. Do podsmażonego mięsa dodaj sos oraz posiekaną bazylię. Wszystko wymieszaj i smaż tak długo aż mięso wchłonie sos. \n6. Na osobnej patelni przygotuj jajka sadzone. \n7. Na talerze wyłóż ryż, mięso w sosie oraz na wierzch dodaj jajko sadzone. Danie posyp świeżym, posiekanym szczypiorkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/pgxB7gzSdKT6pay5N28VqRG3uCdwlXYlcOY10NCu.jpg","kcal":944.56,"protein":58.88,"fat":36.35,"carbs":97.15,"ingredients":[{"name":"Ryż jaśminowy","grams":100,"measure":"łyżka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Mięso mielone z kurczaka","grams":200,"measure":"porcja"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Papryczka chili czerwona","grams":22,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Bazylia tajska świeża","grams":20,"measure":"garść"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Sos rybny","grams":18,"measure":"łyżka"},{"name":"Syrop klonowy","grams":10,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":6,"measure":"łyżeczka"},{"name":"Woda","grams":40,"measure":"szklanka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"}],"category":"Obiad"},{"id":63607893,"name":"Tradycyjne gołąbki z młodej kapusty","description":"1. Kapustę włóż do mikrofalówki na 8 minut (800 W) lub sparz liście w garnku we wrzątku. Muszą być dość miękkie, ale nie rozgotowane. \n2. Ryż ugotuj według zaleceń producenta na opakowaniu i pozostaw do przestudzenia.\n3. Cebulę pokrój w kosteczkę i podsmaż na oliwie z oliwek. \n4. Mięso mielone wymieszaj z cebulą, zimnym ryżem, solą, pieprzem (pozostaw część przypraw do sosu) oraz posiekanym koperkiem. \n5. Piekarnik rozgrzej do 180 stopni. \n6. Na każdy liść kapusty nałóż porcję farszu i zawiń, jak krokieta. Gołąbki ułóż w dużym naczyniu żaroodpornym. Dodaj wodę i przykryj (jeśli nie masz pokrywki, możesz owinąć naczynie folią aluminiową). Gołąbki piecz ok. 1,5 godziny. \n7. W między czasie wymieszaj passatę z koncentratem i przypraw solą i pieprzem. Po upływie czasu pieczenia, wlej do gołąbków sos i piecz kolejne 30 minut już bez przykrycia.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/FUTk5QVefiEzUgtC0BgB74Xj4114bFxJg8ZD6uSB.jpg","kcal":1502.44,"protein":169.56,"fat":27.26,"carbs":155.1,"ingredients":[{"name":"Kapusta młoda","grams":600,"measure":"g"},{"name":"Mięso mielone z indyka","grams":600,"measure":"porcja"},{"name":"Ryż biały","grams":100,"measure":"g"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":3,"measure":"szczypta"},{"name":"Pieprz czarny","grams":4,"measure":"szczypta"},{"name":"Koper świeży","grams":40,"measure":"pęczek"},{"name":"Woda","grams":200,"measure":"szklanka"},{"name":"Passata pomidorowa","grams":500,"measure":"g"},{"name":"Koncentrat pomidorowy","grams":50,"measure":"łyżka"}],"category":"Obiad"},{"id":63608440,"name":"Grecka pita z tzatzikami i tofu","description":"1. Tofu pokrój za pomocą obieraczki do warzyw w cienkie plastry. Wymieszaj je z oliwą, sokiem z cytryny, przeciśniętym czosnkiem oraz przyprawą do gyrosa. Upiecz w airfryerze (lub piekarniku) przez 6- 8 minut w 180 stopniach. \n2. Skyr wymieszaj ze startym na tarce ogórkiem, posiekanym koperkiem, sokiem z cytryny, majonezem oraz solą i pieprzem. \n3. Pitę wrzuć do airfryra na ostatnie 2 minuty pieczenia tofu. \n4. Pitę połóż na talerzu, posmaruj sosem tzatziki, na górę dodaj upieczone tofu oraz pokrojone pomidorki i piórka czerwonej cebuli.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/yvPEjlkp5tEd0Hc3nctx69QbhvqmL03OnO8aJXqd.jpg","kcal":419.16,"protein":24.27,"fat":15.3,"carbs":46.89,"ingredients":[{"name":"Pita pszenna","grams":60,"measure":"duża sztuka"},{"name":"Tofu wędzone","grams":90,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Gyros przyprawa","grams":5,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Majonez light","grams":5,"measure":"łyżeczka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}],"category":"Obiad"},{"id":63682119,"name":"Zielony sok na obrzęki","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. Dodaj tyle wody, aby konsystencja była dla Ciebie odpowiednia. \n2. Jeśli potrzebujesz, możesz dosłodzić koktajl erytrolem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/3wvcQUXdis0v4yKXxZppAqbeotVFp62sbYX0fokR.jpg","kcal":113.95,"protein":2.9,"fat":1.01,"carbs":28.8,"ingredients":[{"name":"Natka pietruszki","grams":40,"measure":"pęczek"},{"name":"Kiwi","grams":75,"measure":"sztuka"},{"name":"Cytryna","grams":60,"measure":"mała sztuka"},{"name":"Jabłko","grams":70,"measure":"średnia sztuka"},{"name":"Woda","grams":250,"measure":"szklanka"}],"category":"Napój"},{"id":63738955,"name":"Fit lody solony karmel","description":"1. Orzechy podpraż na suchej patelni i grubo posiekaj.\n2. Daktyle namocz w gorącej wodzie i odstaw na 5 minut.\n3. W mocnym blenderze zmiksuj wcześniej zamrożonego banana, daktyle, ziarenka z serka wiejskiego, masło orzechowe, aromat waniliowy i sól. Gdyby Twój blender miał z tym problem - dodaj kapkę mleka (ale lody będą musiały wtedy posiedzieć chwilę w zamrażalniku ;).\n4. Dodaj posiekane prażone pekany i wymieszaj.\n5. Wstaw do lodówki na około 2 godziny. Wyjmij chwilę przed jedzeniem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/AlNVZJcg5f9YzYviBzkR46hTp62dWocR1lGafYXp.jpg","kcal":518.66,"protein":26.64,"fat":24.86,"carbs":50.9,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Banan mrożony","grams":120,"measure":"średnia sztuka"},{"name":"Daktyle suszone","grams":20,"measure":"sztuka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Orzechy pekan","grams":10,"measure":"garść"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"}],"category":"Deser"},{"id":63756580,"name":"Orzeźwiająca sałatka z arbuza, ogórka i fety","description":"1. Arbuza i ogórka pokrój w kostkę. Miętę posiekaj. \n2. Dodaj pokruszoną fetę i wstaw do lodówki na min. godzinę, żeby sałatka się mocno schłodziła. Jeśli używasz składników z lodówki, możesz pominąć ten krok i jeść sałatkę od razu. \n3. Przed spożyciem posyp pestkami dyni (możesz je uprażyć na suchej patelni - będą wówczas bardziej chrupiące).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Z0kTfZZNmuY0iOSMZvNAE8SFD0S0gwRqDrNZivPF.jpg","kcal":469.4,"protein":23.03,"fat":31.75,"carbs":28.36,"ingredients":[{"name":"Arbuz","grams":200,"measure":"plaster"},{"name":"Ogórek","grams":180,"measure":"sztuka"},{"name":"Ser Feta","grams":100,"measure":"plaster"},{"name":"Pestki dyni","grams":20,"measure":"łyżka"},{"name":"Mięta pieprzowa świeża","grams":10,"measure":"garść"}],"category":"Sałatka"},{"id":63757049,"name":"Wegański twarożek z tofu","description":"1. Tofu zmiksuj z oliwą, napojem sojowym, sokiem z cytryny i przyprawami na gładką masę. \n2. Posiekaj szczypiorek, dodaj do twarożku i wymieszaj. \n3. Podawaj z ulubionym pieczywem i dodatkową porcją warzyw.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/vDaOzcwfUxE0kLvpny7LkJk8vEWYAxOPZWmSdPNZ.jpg","kcal":286.46,"protein":29.18,"fat":15.69,"carbs":10.22,"ingredients":[{"name":"Tofu naturalne","grams":180,"measure":"opakowanie"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":30,"measure":"ml"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}],"category":"Pasta"},{"id":63757448,"name":"Szpinakowe naleśniki na słodko z twarożkiem i truskawkami","description":"1. Zmiksuj jajko, mleko, wodę, szpinak, mąkę i szczyptę soli na gładkie ciasto. Odstaw na 10 minut. \n2. Usmaż naleśniki na lekko naoliwionej patelni.\n3. Twarożek wymieszaj z erytrolem i aromatem waniliowym.\n4. Naleśniki posmaruj twarożkiem i podawaj z pokrojonymi truskawkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/OEQKOX8tyTUj7ndzZhb4qsikSUTJhQYnQFDGa7k4.jpg","kcal":496.5,"protein":34.75,"fat":15.37,"carbs":55.7,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Woda","grams":20,"measure":"szklanka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"g"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"},{"name":"Twarożek grani","grams":150,"measure":"małe opakowanie"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Truskawki","grams":140,"measure":"garść"}],"category":"Obiad"},{"id":63758457,"name":"Wysokobiałkowa pasta jajeczna z mozzarellą","description":"1. Jajka ugotuj na twardo, pozostaw do ostudzenia, obierz i posiekaj w drobną kostkę. \n2. Paprykę, cebulę pokrój w drobną kostkę, a natkę pietruszki posiekaj. \n3. Mozzarellę odciśnij z nadmiaru wody na ręczniku papierowym i zetrzyj na tarce. \n4. Wszystkie składniki wymieszaj z majonezem, skyrem oraz przyprawami. \n5. Pastę podawaj na ulubionym pieczywie z porcją warzyw.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/4pn0FphJglqFWtqecUTKYXdvTFCvaHhTzW4N0K7Z.jpg","kcal":498.65,"protein":44.19,"fat":29.75,"carbs":12.72,"ingredients":[{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Papryka zielona","grams":60,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Majonez light","grams":15,"measure":"łyżka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Ser Mozzarella light","grams":62,"measure":"sztuka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Pasta"},{"id":63872824,"name":"Leniwe z posypką z bułki tartej","description":"1. Twaróg dokładnie rozgnieć widelcem lub przeciśnij przez praskę.\n2. Dodaj żółtko, erytrol, aromat, sól i mąkę. Krótko zagnieć miękkie ciasto. Jeśli bardzo się klei, dosyp łyżeczkę mąki.\n3. Oprósz blat mąką, uformuj wałeczek o grubości około 2 cm i pokrój na 2-3 cm kawałki.\n4. Wrzuć do lekko osolonego wrzątku. Gotuj około 1-2 minuty od momentu wypłynięcia na powierzchnię.\n5. Delikatnie wyjmij łyżką cedzakową i odsącz.\n6. Na suchej patelni podpraż bułkę tartą przez kilka minut do zarumienienia. Dodaj masło i dokładnie wymieszaj z bułką tartą. Dodaj na odsiejcie kluski, wymieszaj z bułką tartą i przesmaż chwilkę.\n7. Podawaj z ulubionymi owocami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/IQpAQwMfyoRYQbKZZEAcSo3gDSjario0UIbxogpm.jpg","kcal":516.76,"protein":36.7,"fat":23.64,"carbs":39.42,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":150,"measure":"plaster"},{"name":"Żółtko jaja","grams":17,"measure":"duża sztuka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":14,"measure":"łyżeczka"},{"name":"Bułka tarta","grams":16,"measure":"łyżka"}],"category":"Obiad"},{"id":63998638,"name":"Budyń owsiany z czekośliwką","description":"1. W garnku umieść mleko, mąkę owsianą, erytrol, sóli aromat waniliowy. Gotuj cały czas mieszając ok. 5 minut, do zgęstnienia. Wyłącz kuchenkę, dodaj skyr, wymieszaj, a żeby masa była gładsza, możesz zblendować ją blenderem. Przełóż do miseczki.\n2. Umyte śliwki pokrój pozbaw pestki i pokrój na mniejsze kawałki, umieść w małym garnku i dodaj cynamon i kapkę wody. Podgrzewaj, aż śliwki się delikatnie rozpaćkają (możesz im w tym nieco pomóc łopatką ;). Dodaj kostkę czekolady, wymieszaj do roztopienia i wyłącz kuchenkę. Przełóż śliwki do miseczki z budyniem owsianym.\n3. Udekoruj pozostałą gorzką czekoladą i miętą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/O6cHnBanSVIaD16DM01NDMVrnPFuQWsOc8ShKVXp.jpg","kcal":413.25,"protein":23.43,"fat":12.1,"carbs":54.22,"ingredients":[{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Sól","grams":1,"m ://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/1qe4XL67KE1Zskzzf016Q3UpE5sMlll7SRrzyBES.jpg","kcal":380.92,"protein":12.78,"fat":15.36,"carbs":50.53,"ingredients":[{"name":"Kasza kuskus","grams":30,"measure":"łyżka"},{"name":"Bób","grams":80,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":140,"measure":"garść"},{"name":"Ser Feta","grams":20,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":64422599,"name":"Placuszki z białej fasoli na słodko","description":"1. W naczyniu blendera umieść dokładnie przepłukaną fasolę wraz ze wszystkimi pozostałymi składnikami oprócz oliwy. Zblenduj na jednolitą masę. Odstaw na 10 minut.\n2. Rozgrzej patelnię i przesmaruj oliwą.\n3. Smaż placuszki z dwóch stron na średniej mocy pod przykryciem.\n4. Podawaj z ulubionymi dodatkami (dodaj je do składników posiłku).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/7/5rEmaJ7KUmN8m3NfyDWrAzIG5AlEpb6EgmjLaF6G.jpg","kcal":401.19,"protein":26.51,"fat":8.78,"carbs":54.55,"ingredients":[{"name":"Fasola biała konserwowa","grams":75,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Mąka orkiszowa jasna","grams":48,"measure":"łyżka"}],"category":"Śniadanie"},{"id":64543093,"name":"Jajka sadzone na fecie z pieczywem i letnim pomidorem","description":"1. Na patelnię dodaj pokruszoną fetę tworząc 2 kółka. Kiedy feta zacznie się delikatnie rozpuszczać wbij na nią jajka. Przypraw solą i pieprzem. Przygotuj jajka sadzone o konsystencji, jaką lubisz.\n2. Chleb posmaruj serkiem. Pomidora pokrój w plastry, a czerwoną cebulę w cienkie piórka.\n3. Ułóż wszystkie składniki śniadania na talerzu obok siebie.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/UKZ7WH6uQJ2JETaBhCXceP1St8BP6F8BY4swxxXS.jpg","kcal":498.36,"protein":28.49,"fat":22.9,"carbs":45.51,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Ser Feta","grams":40,"measure":"plaster"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"}]},{"id":64543094,"name":"Pełnowartościowy szybki koktajl malinowy z twarogiem","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. \n2. Możesz dodać wody, jeśli wolisz rzadszą konsystencję.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/zvJRfocsaG8vRCdqjH2VfVU8iqFaXgMvQb0Ikpe1.jpg","kcal":503.32,"protein":40.75,"fat":11.04,"carbs":68.66,"ingredients":[{"name":"Ser twarogowy chudy","grams":125,"measure":"duże opakowanie"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":300,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Siemię lniane","grams":10,"measure":"łyżeczka"},{"name":"Otręby owsiane","grams":7,"measure":"łyżka"}]},{"id":64543095,"name":"Prosta bułka z szynką, serem i warzywami","description":"1. Bułkę przekrój na pół i posmaruj serkiem. Na wierzch połóż szpinak, plastry sera i szynki.\n2. Warzywa pokrój, jak lubisz i zjedz razem z kanapkami. Dodatkowo zjedz pestki dyni lub posyp nimi kanapki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/AUhoXzbSBkrC3UWyp6f1AyPjhN80J5rmNGcexh3l.jpg","kcal":500.37,"protein":37.25,"fat":14.56,"carbs":54.72,"ingredients":[{"name":"Bułka grahamka","grams":90,"measure":"duża sztuka"},{"name":"Szynka z indyka","grams":60,"measure":"plaster"},{"name":"Ser żółty Active Protein (Ryki)","grams":34,"measure":"plaster"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":64543096,"name":"Proteinowe racuchy z malinami i pastą migdałową","description":"1. Jajko i skyr rozmąć widelcem na jednolitą masę.\n2. Dodaj mąkę, erytrol, proszek i sodę i dobrze wszystko wymieszaj (ciasto będzie dość gęste).\n3. Odstaw ciasto na 5-10 minut.\n4. Smaż placuszki na małej ilości oliwy z oliwek z obu stron, pod przykryciem.\n5. Gotowe racuchy podawaj z malinami i masłem migdałowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/gvS2YsN4EgSUFhb7DQMgeanmRc6i3bBpus94fEoC.jpg","kcal":499.8,"protein":25.77,"fat":22.43,"carbs":52.49,"ingredients":[{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"g"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Masło migdałowe bez soli","grams":20,"measure":"łyżeczka"}]},{"id":64543097,"name":"Jajecznica z cukinią z pieczywem i pomidorem","description":"1. Cukinię pokrój w kostkę. Na patelnię dodaj suszone pomidory w oliwie. Po rozgrzaniu podsmaż na nich cukinię. \n2. Jajka rozmąć widelcem, dopraw solą i pieprzem i wylej na patelnię. Usmaż jajecznicę o konsystencji jaką lubisz. Posyp posiekanym szczypiorkiem.\n3. Pieczywo posmaruj serkiem. \n4. Pomidora pokrój w plastry, udekoruj piórkami czerwonej cebuli i dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/e70K7bIIBOyEQXYhesYM2gi74tk0qOJ8ti7AUGwU.jpg","kcal":507.71,"protein":25.83,"fat":21.66,"carbs":56.01,"ingredients":[{"name":"Pomidory suszone w zalewie","grams":50,"measure":"sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":64543098,"name":"Omlet sernikowy z brzoskwinią","description":"1. Wszystkie składniki oprócz brzoskwini i oliwy zblednuj na gładką masę.\n2. Gotową masę wylej na bardzo dobrze rozgrzaną patelnię z odrobiną oliwy.\n3. Omlet smaż na małym ogniu pod przykryciem do momentu, aż lekko się zetnie od spodu.\n4. Następnie dodaj na wierzch pokrojoną w cienkie plasterki brzoskwinię (powciskaj w masę) i zostaw jeszcze na 2-3 minut.\n5. Po tym czasie przewróć omlet na drugą stronę (delikatnie, bo jest ciężki) i smaż pod przykryciem jeszcze przez kilka minut.\n6. Gotowy omlet przełóż na talerz. Możesz posypać go np. pudrem z erytrolu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/yzptXP45klkFdv5TB1swfPYoVRnWReoxt6bgQQrR.jpg","kcal":503.75,"protein":44.95,"fat":14.08,"carbs":49.94,"ingredients":[{"name":"Ser twarogowy chudy","grams":125,"measure":"plaster"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Brzoskwinia","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżeczka"}]},{"id":64543099,"name":"Jajka po turecku z bobem i koperkiem","description":"1. Bób ugotuj w lekko osolonym wrzątku do miękkości. Następnie obierz z łupin.\n2. Serek wiejski zmiksuj na gładką masę. Wymieszaj go z solą, pieprzem i czosnkiem i rozsmaruj na głębokim talerzu.\n3. W garnku zagotuj wodę ze szczyptą soli i przygotuj jajka w koszulce - jajka wbij pojedynczo na wrzątek i gotuj przez około 2-3 minuty (możesz je wcześniej wbić do miseczki i kiedy woda się zagotuje, to wlać do garnka), a następnie odcedź łyżką cedzakową.\n4. Przygotowane jajka dodaj na wierzch serka. Dodaj bób, udekoruj koperkiem i polej olejem chili.\n5. Podawaj z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/LQc9VGZ7RaD79MZfzj3BcLU1MTafL3R4jXZ5Ob6L.jpg","kcal":496.92,"protein":37,"fat":24.53,"carbs":32.13,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Bób","grams":80,"measure":"garść"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Olej chilli","grams":10,"measure":"łyżeczka"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}]},{"id":64543100,"name":"Cytrynowe jaglane kaszotto z krewetkami i bobem","description":"1. Bób ugotuj i obierz. Krewetki obierz i oczyść.\n2. Cukinię i cebulę pokrój w kostkę.\n3. Na patelni rozgrzej oliwę, wrzuć cebulę. Podsmaż na średnim ogniu przez 3 minuty, aż składniki zmiękną. Dodaj krewetki i smaż jeszcze razem przez chwilę aż stracą surowość. Dodaj kaszę i praż przez 3 minuty, co chwilę mieszając.\n4. Dodaj połowę bulionu, ciągle mieszając. Gdy się wchłonie, dodaj pokrojoną cukinię i kolejną porcję bulionu. Gotuj, aż wywar się wchłonie i w razie potrzeby dodaj jeszcze wodę. Na sam koniec dodaj bób i skórkę z wyparzonej cytryny.\n5. Gdy kasza będzie miękka, dodaj starty parmezan. Dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/3V4TnJYkRhUlA9VRzu028pxUjkGmCdL35Ruju7g6.jpg","kcal":576.69,"protein":46.38,"fat":16.22,"carbs":63.4,"ingredients":[{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Cebula","grams":50,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Krewetki","grams":120,"measure":"g"},{"name":"Kasza jaglana","grams":50,"measure":"łyżka"},{"name":"Bób","grams":100,"measure":"garść"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Skórka z cytryny","grams":1,"measure":"łyżeczka"},{"name":"Wywar warzywny","grams":250,"measure":"szklanka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Ser Parmezan","grams":24,"measure":"łyżka"}]},{"id":64543101,"name":"Pieczony łosoś z młodymi ziemniakami z koperkiem i fasolką szparagową","description":"1. Piekarnik rozgrzej do 180 stopni.\n2. Ziemniaki oraz fasolkę ugotuj w lekko osolonej wodzie.\n3. W tym czasie ułóż kawałek łososia w naczyniu żaroodpornym, skrop sokiem z cytryny i dopraw solą i pieprzem. Piecz ok. 12-15 minut.\n3. Na maśle podsmaż bułkę tartą.\n4. Przełóż na talerz ziemniaki i posyp koperkiem. Dodaj upieczonego łososia oraz fasolkę i posyp ją bułką tartą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/8O0Y30VPX9ILS2CKcjYSvljcKP2BU45lk4ZNweqU.jpg","kcal":588.01,"protein":37.59,"fat":29.87,"carbs":44.26,"ingredients":[{"name":"Łosoś atlantycki","grams":150,"measure":"porcja"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Masło","grams":5,"measure":"łyżeczka"},{"name":"Bułka tarta","grams":8,"measure":"łyżka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Ziemniaki","grams":150,"measure":"mała sztuka"},{"name":"Fasolka szparagowa","grams":150,"measure":"porcja"}]},{"id":64543102,"name":"Jajko sadzone z młodymi ziemniakami, kalafiorem i kefirem","description":"1. Ziemniaki oraz kalafiora ugotuj w lekko osolonej wodzie.\n2. Ogórka pokrój w paski.\n3. Na odrobinie oliwy przygotuj sadzone jajka.\n4. Ugotowane ziemniaki podawaj z kalafiorem, ogórkiem i sadzonymi jajkami.\n5. Dodatkowo wypij kefir.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/6uczo8RlgTUWGOVMMX6eVXkigotiX20pFbJWw9M6.jpg","kcal":587.51,"protein":33.72,"fat":23.37,"carbs":64.48,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Ogórek małosolny","grams":65,"measure":"średnia sztuka"},{"name":"Kefir 2%","grams":400,"measure":"szklanka"},{"name":"Kalafior","grams":150,"measure":"g"}]},{"id":64543103,"name":"Knedle twarogowe z jagodami","description":"1. Twaróg rozgnieć widelcem razem z jajkiem. Dodaj mąkę budyń i erytrol i zagnieć ciasto. \n2. Masę twarogową podziel na 8 części. Każdą z nich spłaszcz delikatnie i do środka nałóż porcję jagód. Zawiń w kulki tworząc knedle. Masa twarogowa jest bardzo lepiąca - dla ułatwienia możesz delikatnie zwilżyć dłonie.\n3. Knedle ugotuj na wrzątku - ok. 4-5 minut od momentu wypłynięcia ich na powierzchnię (warto po wrzuceniu ich do wody za chwilę delikatnie je poruszyć, aby nie przywarły do dna). \n4. Knedle podawaj ze skyrem waniliowym i płatkami migdałów.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/xRi8wMkVqbUy7cH38KHwudLkbF9rKeDvlGCLn0Nk.jpg","kcal":1161.6,"protein":107.4,"fat":29.05,"carbs":116.59,"ingredients":[{"name":"Ser twarogowy chudy","grams":250,"measure":"plaster"},{"name":"Mąka orkiszowa jasna","grams":80,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Budyń waniliowy bez cukru","grams":10,"measure":"łyżeczka"},{"name":"Jagoda czarna","grams":150,"measure":"garść"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Skyr waniliowy","grams":400,"measure":"opakowanie"},{"name":"Migdały płatki","grams":40,"measure":"łyżka"}]},{"id":64543104,"name":"Sałatka z pieczonymi ziemniaczkami","description":"1. Piekarnik rozgrzej do 220 stopni. \n2. Ziemniaki obierz i pokrój w łódeczki lub kostkę. Wymieszaj z połową oliwy, papryką, tymiankiem, solą i pieprzem. Ułóż na blaszce wyłożonej papierem do pieczenia i piecz ok. 25-30 minut.\n3. Kurczaka pokrój w paseczki, wymieszaj z przyprawą do gyrosa i usmaż na pozostałej oliwie. \n4. Skyr wymieszaj z majonezem i dopraw solą, pieprzem, szczyptą erytrolu i czosnku. \n5. Pomidorki pokrój na pół, ogórka w plastry, a czerwoną cebulę w piórka. \n6. Wszystkie składniki wymieszaj ze sobą, a na górę pokrusz fetę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/9mlGrMUFoJYNtaMRvRiVbgcM4fp0HEExXTEH6n3c.jpg","kcal":584.32,"protein":45.42,"fat":23.91,"carbs":47.9,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"},{"name":"Kurczak pierś","grams":120,"measure":"sztuka"},{"name":"Przyprawa do Gyrosa","grams":1,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Majonez wegański","grams":7,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Ser Feta","grams":30,"measure":"plaster"}]},{"id":64543105,"name":"Makaron z kurczakiem i kurkami w kremowym sosie","description":"1. Makaron ugotuj al dente.\n2. Kurczaka pokrój w kostkę i przypraw solą i pieprzem. Cebulę pokrój w kostkę, a cukinię w półplastry. Kurku oczyść dokładnie.\n3. Na oliwie podsmaż cebulę, a następnie dodaj kurczaka. Kiedy mięso straci surowość dodaj kurki i cukinię i smaż wszystko razem ok. 4 minuty. \n4. Następnie dodaj serek i odrobinę wody z gotowania makaronu (lub wrzątku), posiekany koperek i wszystko razem wymieszaj. Sos dopraw solą i pieprzem.\n5. Dodaj na patelnię ugotowany makaron i wszystko wymieszaj.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/uuT0zpf4q8sCpDol2EH6pOuauZbxXkPXwOk2QkJY.jpg","kcal":586.32,"protein":44.32,"fat":14.5,"carbs":71.7,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":75,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Cebula","grams":50,"measure":"średnia sztuka"},{"name":"Kurczak pierś","grams":120,"measure":"sztuka"},{"name":"Kurki","grams":100,"measure":"garść"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":45,"measure":"łyżeczka"}]},{"id":64543106,"name":"Szybkie gnocchi w zielonym, odżywczym sosie","description":"1. Do naczynia blendera dodaj tofu, sok z cytryny, oliwę, płatki migdałów, czosnek, mleko oraz szpinak. Wszystko zmiksuj na gładkie \"pesto\". W razie potrzeby dodaj odrobinę wody dla uzyskania pożądanej konsystencji. \n2. Gnocchi ugotuj według zaleceń producenta na opakowaniu. \n3. Sos przelej na patelnię i zagotuj. Dopraw solą, pieprzem do smaku. Przełóż do niego ugotowane gnocchi i wymieszaj. \n4. Przełóż na talerz i posyp parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/ic6E3E2gdS0hJfnXRLbUW2w7tGoYVBuZpEG4pCNH.jpg","kcal":575.76,"protein":26.51,"fat":25.05,"carbs":66.12,"ingredients":[{"name":"Gnocchi","grams":150,"measure":"porcja"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Tofu naturalne","grams":90,"measure":"opakowanie"},{"name":"Migdały płatki","grams":15,"measure":"łyżeczka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":30,"measure":"szklanka"},{"name":"Ser Parmezan","grams":4,"measure":"łyżeczka"}]},{"id":64543107,"name":"Sałatka z pieczonym łososiem i dressingiem koperkowym","description":"1. Kaszę ugotuj według zaleceń producenta na opakowaniu i pozostaw do przestudzenia.\n2. Piekarnik rozgrzej do 180 stopni. W naczyniu żaroodpornym ułóż kawałek łososia, skrop cytryną i dopraw solą i pieprzem. Piecz ok. 12-15 minut. \n3. Pomidorki pokrój na pół, a paprykę w paseczki. Cebulę pokrój w cienkie piórka. \n4. Oliwę wymieszaj z sokiem z cytryny, posiekanym koperkiem, szczyptą soli, pieprzu i erytrolu. \n5. Do miski wrzuć szpinak, pokrojone warzywa oraz kaszę. Wszystko wymieszaj z dressingiem. Na górze ułóż upieczonego łososia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/707hAiaQgGvpDn1Lr     ["Napoje", /\bwoda\b|woda gazowana|woda kokosowa|kawa|herbata|\bsok\b|sok z|wino |napój|napoj|espresso|matcha/],

  function guessCategory(name) {
    const n = name.toLowerCase();
    for (const [cat, re] of CATEGORY_RULES) if (re.test(n)) return cat;
    return "Warzywa";
  }
  function categoryOf(originalName) {
    return shopCategoryOverrides[originalName] || guessCategory(originalName);
  }
  // weekPlan: { "YYYY-MM-DD": { "Śniadanie|Damian": [{uid,id,portions,override?}, ...], "Obiad|Marta": [...], ... } }
  // Each day/meal/person slot holds an ARRAY of entries (not a single recipe) so several meals can be
  // stacked on one day (e.g. 7 dinners added to Monday) and later moved onto other days one at a time.
  function slotKey(meal, person) { return `${meal}|${person}`; }
  function genUid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  // Old data (pre-multi-meal) stored a single {id,portions} object per slot instead of an array —
  // wrap it transparently so both localStorage and older Firestore snapshots keep working.
  // Deterministic (not random) uids for anything migrated here: this runs on every load/remote
  // snapshot, and its result is never written back to Firestore — a random uid would come out
  // different on every run, silently invalidating any drag/move/edit already in flight against the
  // previous run's uid. Deriving the uid from the slot's own address keeps it stable across runs.
  function migrateWeekPlan(wp) {
    Object.keys(wp || {}).forEach(dateISO => {
      const dayMeals = wp[dateISO];
      Object.keys(dayMeals || {}).forEach(key => {
        const v = dayMeals[key];
        if (!v) return;
        if (!Array.isArray(v)) {
          dayMeals[key] = v.id ? [{ uid: `legacy-${dateISO}-${key}`, id: v.id, portions: v.portions || 1 }] : [];
        } else {
          v.forEach((e, i) => { if (!e.uid) e.uid = `legacy-${dateISO}-${key}-${i}`; });
        }
      });
    });
    return wp || {};
  }
  let weekPlan = migrateWeekPlan(load(LS_WEEKPLAN, {}));
  let checked = new Set(load(LS_CHECKED, []));
  let recipeOverrides = load(LS_RECIPE_OVERRIDES, {});

  // ---------- Cloud sync (Firebase Firestore, shared between Damian & Marta) ----------
  const syncStatusIcon = document.getElementById("syncStatusIcon");

  function setSyncStatus(icon, text) {
    if (syncStatusIcon) syncStatusIcon.textContent = icon;
    if (syncStatusText) syncStatusText.textContent = text;
  }
  let cloudReady = false;
  let pushTimer = null;
  function doPushNow() {
    pushTimer = null;

    setDoc(SHARED_DOC, {
      favorites: Array.from(favorites),
      checked: Array.from(checked), monthNames,
      shopOverrides, shopNameOverrides, shopCategoryOverrides, customShopItems, customStats,

    }, { merge: true }).then(
      () => setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami."),

    );
  }
  function pushToCloud() {
    if (!cloudReady) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(doPushNow, 500);
  }
  // weekPlan writes are scoped to just the affected date(s) (same "targeted merge" pattern as
  // pushRecipeOverridePatch below) — a two-device household regularly has the app open on both
  // phones at once, and a whole-blob weekPlan push could otherwise silently revert someone else's
  // just-made change to an unrelated day the moment its own stale copy re-saves.
  // A weekPlan edit can happen before the very first Firestore snapshot arrives (cloudReady still
  // false — e.g. a user acts within the first second of opening the app). Simply dropping the write
  // in that case used to mean: the change stayed local-only, then the first snapshot's applyRemote()
  // would overwrite it with the server's still-old value the moment it arrived, silently reverting
  // whatever was just added/moved/removed. pendingWeekPatch queues the intended value per date so it
  // can be (a) flushed as soon as cloudReady flips true, and (b) protected in applyRemote() below
  // against being clobbered by a snapshot that raced ahead of our own not-yet-sent write.
  let pendingWeekPatch = {};
  function pushWeekPatch(dateISOs) {
    saveLocal(LS_WEEKPLAN, weekPlan);
    dateISOs.forEach(d => { pendingWeekPatch[d] = weekPlan[d] || {}; });
    if (!cloudReady) return;
    flushPendingWeekPatch();

  // Firestore's merge:true only skips keys that are entirely ABSENT from the update object — an
  // omitted nested key is left as-is, not deleted. Since a day's object only ever contains whichever
  // slotKeys are currently occupied, simply sending `weekPlan[date]` (missing a just-emptied slotKey)
  // never actually removed that slotKey server-side; the old value silently persisted forever and
  // could resurface on the next sync. Every possible slotKey for the day must be listed explicitly,
  // with deleteField() for the ones that are now empty, so the merge can't leave stale data behind.
  function buildFirestoreDatePatch(dayObj) {
    const full = {};
    MEALS.forEach(m => PEOPLE.forEach(p => {
      const k = slotKey(m, p);
      const v = dayObj && dayObj[k];
      full[k] = (v && v.length) ? v : deleteField();
    }));
    return full;
  }
  function flushPendingWeekPatch() {
    if (!Object.keys(pendingWeekPatch).length) return;
    const localPatch = pendingWeekPatch;
    pendingWeekPatch = {};
    const firestorePatch = {};
    Object.keys(localPatch).forEach(d => { firestorePatch[d] = buildFirestoreDatePatch(localPatch[d]); });
    setDoc(SHARED_DOC, { weekPlan: firestorePatch }, { merge: true }).then(
      () => setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami."),
      () => setSyncStatus("⚠️", "Nie udało się zapisać w chmurze — sprawdź połączenie z internetem. Zmiany zostały zapisane lokalnie.")
    );
  }
  // Debouncing batches rapid successive edits into one write, but that also means a pending write
  // can be silently lost if the tab/app is closed within that window (e.g. right after restoring a
  // recipe from the trash). Flush immediately whenever the page is about to go away or hide.
  function flushPendingPush() {
    if (pushTimer) {
      clearTimeout(pushTimer);
      doPushNow();

    // over whatever this snapshot says — otherwise a snapshot that raced ahead of our own write
    // would silently revert it the instant it arrives.
    Object.keys(pendingWeekPatch).forEach(d => { weekPlan[d] = pendingWeekPatch[d]; });

  const PHOTOS_DOC = doc(fbDb, "household", "photos");

      showToast("Nie udało się zapisać zdjęcia w chmurze (za duże?). Zostało zapisane tylko lokalnie.");
    });
  }
  function pushPhotosToCloud() {
    if (!photosCloudReady) return;

  document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushPendingPhotosPush(); });
  window.addEventListener("pagehide", flushPendingPhotosPush);
  function applyRemotePhotos(data) {

  signInAnonymously(fbAuth).catch(() => setSyncStatus("⚠️", "Nie udało się połączyć z Firebase — aplikacja działa offline, dane zapisują się tylko lokalnie."));
  // onAuthStateChanged can fire more than once per page load (cached auth state, then a fresh
  // token). Without this guard each firing registered a brand new onSnapshot listener on top of
  // the previous one — multiple listeners on the same document occasionally deliver snapshots out
  // of step with each other, which could momentarily reapply stale data over a just-made local
  // edit (e.g. a just-moved meal reappearing in its old slot).
  let listenersAttached = false;
  onAuthStateChanged(fbAuth, (user) => {
    if (!user || listenersAttached) return;
    listenersAttached = true;
    onSnapshot(PHOTOS_DOC, (snap) => {
      if (snap.exists()) applyRemotePhotos(snap.data());
      photosCloudReady = true;

      cloudReady = true;

      setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami.");

  // ---------- Date helpers ----------
  function pad2(n) { return String(n).padStart(2, "0"); }
  function isoDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function weekStartOf(d) {
    const r = new Date(d);
    r.setHours(0,0,0,0);
    const dow = r.getDay(); // 0=Sun..6=Sat
    const diff = dow === 6 ? 0 : -(dow + 1);
    return addDays(r, diff);
  }
  function sameDate(a, b) { return isoDate(a) === isoDate(b); }
  function formatDayNum(d) { return `${d.getDate()}.${pad2(d.getMonth()+1)}`; }
  function formatRangeLabel(weekStart) {
    const weekEnd = addDays(weekStart, 6);
    const y = weekStart.getFullYear();
    if (weekStart.getMonth() === weekEnd.getMonth()) {
      return `${weekStart.getDate()}–${weekEnd.getDate()} ${MONTHS_SHORT[weekStart.getMonth()]} ${y}`;
    }
    return `${weekStart.getDate()} ${MONTHS_SHORT[weekStart.getMonth()]} – ${weekEnd.getDate()} ${MONTHS_SHORT[weekEnd.getMonth()]} ${y}`;
  }

  const mealTypesOf = new Map(); // recipeId -> Set(meal/category names)

    if (r.category) {

    }
  });

  // derived set, so moving a recipe out of "Kolacja" actually removes it from that filter.
  function effectiveMealTypes(id) {
    const ov = recipeOverrides[id] && recipeOverrides[id].mealTypeOverride;
    if (ov) return new Set([ov]);

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- Recipe overrides: user edits layered on top of the original FitPatka data ----------
  function getRecipe(id) {
    const base = recipeById.get(id);
    if (!base) return null;
    const ov = recipeOverrides[id];
    return ov ? { ...base, ...ov } : base;
  }
  function effectiveRecipes() { return RECIPES.map(r => getRecipe(r.id)).filter(r => !r.deleted); }
  // A week-plan entry can carry its own `override` — edited from inside the week planner itself.
  // Unlike recipeOverrides (catalog-wide), this only ever affects this one placed meal: the catalog
  // card and every other day/person using the same recipe stay exactly as they were.
  function getEntryRecipe(entry) {
    if (!entry) return null;
    const base = getRecipe(entry.id);
    if (!base) return null;
    return entry.override ? { ...base, ...entry.override } : base;
  }
  function getWeekEntry(weekCtx) {
    return entriesAt(weekCtx.dateISO, weekCtx.meal, weekCtx.person).find(e => e.uid === weekCtx.uid);
  }
  // Recipe overrides are pushed per-recipe-id (not as part of the big debounced whole-state blob):
  // if two devices have the app open at once, a stale device re-saving its own full snapshot of
  // recipeOverrides could otherwise silently clobber a fresher change (e.g. undo someone else's
  // just-restored recipe) the moment its own unrelated save fires. Writing only the one changed id
  // as a merge means an idle/stale device can never overwrite a key it didn't itself just touch.
  function pushRecipeOverridePatch(id) {
    saveLocal(LS_RECIPE_OVERRIDES, recipeOverrides);
    if (!cloudReady) return;
    setDoc(SHARED_DOC, { recipeOverrides: { [id]: recipeOverrides[id] ?? null } }, { merge: true }).then(
      () => setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami."),
      () => setSyncStatus("⚠️", "Nie udało się zapisać w chmurze — sprawdź połączenie z internetem. Zmiany zostały zapisane lokalnie.")
    );
  }
  function saveRecipeOverride(id, patch) {
    recipeOverrides[id] = { ...(recipeOverrides[id] || {}), ...patch };
    pushRecipeOverridePatch(id);
  }
  function clearRecipeOverride(id) {
    delete recipeOverrides[id];
    pushRecipeOverridePatch(id);
  }

  // ---------- Trash: soft-deleted recipes, restorable for 30 days ----------
  const TRASH_RETENTION_MS = 30 * 24 * 60 * 60 * 1000;
  function moveRecipeToTrash(id) {
    saveRecipeOverride(id, { deleted: true, deletedAt: Date.now() });
  }
  function restoreRecipeFromTrash(id) {
    if (recipeOverrides[id]) {
      delete recipeOverrides[id].deleted;
      delete recipeOverrides[id].deletedAt;
    }
    pushRecipeOverridePatch(id);
  }
  function trashList() {
    return Object.keys(recipeOverrides)
      .filter(id => recipeOverrides[id] && recipeOverrides[id].deleted)
      .map(id => ({ id: Number(id), recipe: recipeById.get(Number(id)), deletedAt: recipeOverrides[id].deletedAt || 0 }))
      .filter(x => x.recipe)
      .sort((a, b) => b.deletedAt - a.deletedAt);
  }
  // Fully forget anything that's been sitting in the trash for 30+ days (run once on load).
  function purgeExpiredTrash() {
    const cutoff = Date.now() - TRASH_RETENTION_MS;
    Object.keys(recipeOverrides).forEach(id => {
      const ov = recipeOverrides[id];
      if (ov && ov.deleted && (ov.deletedAt || 0) < cutoff) {
        delete recipeOverrides[id];
        pushRecipeOverridePatch(Number(id));
      }
    });
  }
  function daysLeftInTrash(deletedAt) {
    const msLeft = (deletedAt || 0) + TRASH_RETENTION_MS - Date.now();
    return Math.max(0, Math.ceil(msLeft / (24 * 60 * 60 * 1000)));
  }

  // ---------- Recipe photos: user's own photo replaces the FitPatka stock photo ----------
  function getPhotoUrl(r) {
    return (r && photoOverrides[r.id]) || (r && r.photo) || "";
  }
  function saveRecipePhoto(id, dataUrl) {
    photoOverrides[id] = dataUrl;
    saveLocal(LS_PHOTOS, photoOverrides);
    pushPhotosToCloud();
  }
  function clearRecipePhoto(id) {
    delete photoOverrides[id];
    saveLocal(LS_PHOTOS, photoOverrides);
    pushPhotosToCloud();
  }
  // Resize+compress an uploaded photo client-side before storing it (keeps each Firestore write small).
  function readAndCompressImage(file, onDone) {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 640;
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        onDone(canvas.toDataURL("image/jpeg", 0.65));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- Month name overrides ----------

  // ---------- Toast (small transient notice, optionally with an action button e.g. "Cofnij") ----------
  let toastTimer = null;
  function showToast(msg, actionLabel, onAction) {
    const old = document.getElementById("appToast");

    const t = document.createElement("div");
    t.id = "appToast";
    t.className = "toast";
    const span = document.createElement("span");
    span.textContent = msg;
    t.appendChild(span);
    if (actionLabel && onAction) {
      const btn = document.createElement("button");
      btn.className = "toast-action";
      btn.textContent = actionLabel;
      btn.addEventListener("click", () => { t.remove(); onAction(); });
      t.appendChild(btn);
    }
    const shell = document.querySelector(".app-shell");
    shell.insertBefore(t, shell.firstChild);
    t.scrollIntoView({ block: "nearest", behavior: "smooth" });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.remove(), actionLabel ? 6000 : 3200);
  }

  // ---------- Custom confirm/prompt modals ----------
  // Sandboxed Artifact iframes silently block window.confirm()/prompt(), so we
  // build tiny in-page equivalents instead of relying on native dialogs.
  function customConfirm(message, onYes) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal confirm-modal" role="alertdialog" aria-modal="true">

        </div>
      </div>

    document.body.appendChild(bd);
    const close = () => bd.remove();
    bd.addEventListener("click", (e) => { if (e.target === bd) close(); });
    bd.querySelector("#ccNo").addEventListener("click", close);
    bd.querySelector("#ccYes").addEventListener("click", () => { close(); onYes(); });

  function customPromptModal(title, defaultValue, onSave) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal confirm-modal" role="dialog" aria-modal="true">
        <div class="modal-head"><h2>${escapeHtml(title)}</h2></div>
        <input type="text" id="cpInput" value="${escapeHtml(defaultValue || "")}" />
        <div class="modal-actions">

          <button class="btn" id="cpCancel">Anuluj</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    const input = bd.querySelector("#cpInput");
    input.focus();
    input.select();
    const close = () => bd.remove();
    bd.addEventListener("click", (e) => { if (e.target === bd) close(); });
    bd.querySelector("#cpCancel").addEventListener("click", close);
    const doSave = () => {
      const v = input.value.trim();
      close();
      if (v) onSave(v);

    input.addEventListener("keydown", (e) => { if (e.key === "Enter") doSave(); });

  // ---------- Robust clipboard copy (async Clipboard API is also unreliable in the sandbox) ----------
  function execCommandCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      ta.remove();
      return ok;
    } catch (e) { return false; }
  }
  function openCopyFallback(text) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal copy-fallback" role="dialog" aria-modal="true">
        <div class="modal-head"><h2>Kopiuj listę</h2><button class="modal-close" aria-label="Zamknij">✕</button></div>
        <p style="font-size:13px;color:var(--ink-soft);margin-top:0;">Automatyczne kopiowanie jest zablokowane w tym podglądzie. Tekst poniżej jest już zaznaczony — skopiuj go ręcznie (Cmd/Ctrl+C), żeby wkleić np. w SMS-ie.</p>
        <textarea readonly></textarea>
      </div>
    `;
    document.body.appendChild(bd);
    const close = () => bd.remove();
    bd.addEventListener("click", (e) => { if (e.target === bd) close(); });
    bd.querySelector(".modal-close").addEventListener("click", close);
    const ta = bd.querySelector("textarea");
    ta.value = text;
    ta.focus(); ta.select();
  }
  function copyText(text) {
    // execCommand runs synchronously with no permission prompt, so it's the most
    // reliable option inside a sandboxed Artifact iframe. The async Clipboard API
    // can throw synchronously or silently hang forever there (permission prompt
    // never settles), so every step is wrapped defensively, with a manual
    // select-and-copy modal as the guaranteed-to-work last resort.
    try {
      if (execCommandCopy(text)) {
        showToast("Skopiowano do schowka ✓");
        return;
      }
    } catch (e) { /* fall through to clipboard API / manual fallback */ }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        let settled = false;
        const timer = setTimeout(() => { if (!settled) openCopyFallback(text); }, 700);
        navigator.clipboard.writeText(text).then(
          () => { settled = true; clearTimeout(timer); showToast("Skopiowano do schowka ✓"); },
          () => { settled = true; clearTimeout(timer); openCopyFallback(text); }
        );
        return;
      }
    } catch (e) { /* fall through to manual fallback */ }
    openCopyFallback(text);
  }

  // ---------- Recipes grid ----------
  const grid = document.getElementById("recipeGrid");
  const searchInput = document.getElementById("searchInput");
  const sortSelect = document.getElementById("sortSelect");
  const mealTypeSelect = document.getElementById("mealTypeSelect");
  const favToggleBtn = document.getElementById("favToggle");
  const resultCount = document.getElementById("resultCount");
  let onlyFavorites = false;

  function matchesSearch(r, q) {
    if (!q) return true;
    q = q.toLowerCase();
    if (r.name.toLowerCase().includes(q)) return true;
    return r.ingredients.some(i => i.name.toLowerCase().includes(q));
  }

  // First letter of a recipe name, with Polish diacritics folded to their plain A-Z equivalent
  // (Ś→S, Ć→C, Ł→L, …) so the A-Z quick-jump row also catches those recipes.
  function alphaKey(name) {
    const folded = name.trim().charAt(0).toUpperCase().replace(/\u0141/g, "L").normalize("NFD");
    return folded.replace(/[\u0300-\u036f]/g, "");
  }

  function sortList(list, sort) {
    if (sort === "name") list.sort((a,b) => a.name.localeCompare(b.name, "pl"));
    if (sort === "kcal-asc") list.sort((a,b) => a.kcal - b.kcal);
    if (sort === "kcal-desc") list.sort((a,b) => b.kcal - a.kcal);
    if (sort === "protein-desc") list.sort((a,b) => b.protein - a.protein);
    if (sort === "protein-asc") list.sort((a,b) => a.protein - b.protein);
    return list;
  }

  // Shared filter used by both the main recipe grid and the week-planner picker.
  function filterRecipes({ query = "", sort = "name", dietId = "", mealType = "", onlyFav = false, letter = "" } = {}) {
    let list = effectiveRecipes();
    if (dietId) {
      const ids = recipeIdsForDiet(dietId);
      list = list.filter(r => ids.has(r.id));
    }
    if (mealType) list = list.filter(r => effectiveMealTypes(r.id).has(mealType));
    if (onlyFav) list = list.filter(r => favorites.has(r.id));
    if (letter) list = list.filter(r => alphaKey(r.name) === letter);
    list = list.filter(r => matchesSearch(r, query.trim()));
    return sortList(list, sort);
  }

  let alphaLetter = "";
  function currentList() {
    return filterRecipes({
      query: searchInput.value,
      sort: sortSelect.value,
      dietId: dietSelect.value,
      mealType: mealTypeSelect.value,
      onlyFav: onlyFavorites,

  function renderGrid() {
    // Rebuilding the grid briefly collapses its height, which can make the browser clamp/lose the
    // scroll position (e.g. right after editing a recipe deep in a long list) — restore it explicitly.
    const scrollY = window.scrollY;
    const list = currentList();
    resultCount.textContent = list.length + (list.length === 1 ? " przepis" : " przepisów");
    updateTrashButton();
    grid.innerHTML = "";
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state">Brak przepisów spełniających kryteria.</div>';
      window.scrollTo(0, scrollY);
      return;
    }
    const frag = document.createDocumentFragment();
    list.forEach(r => {
      const card = document.createElement("div");
      card.className = "card";
      card.tabIndex = 0;
      const photoUrl = getPhotoUrl(r);
      card.innerHTML = `
        <div class="card-top">
          <div class="card-top-main">
            ${photoUrl ? `<img class="card-thumb" src="${escapeHtml(photoUrl)}" alt="" loading="lazy" decoding="async" />` : ""}
            <div class="card-title">${escapeHtml(r.name)}</div>
          </div>
          <button class="heart-btn ${favorites.has(r.id) ? "active" : ""}" aria-label="Ulubione" data-id="${r.id}">${favorites.has(r.id) ? "♥" : "♡"}</button>
        </div>
        <div class="macros">
          <span class="macro-pill kcal tabular">${Math.round(r.kcal)} kcal</span>
          <span class="macro-pill tabular">B ${Math.round(r.protein)}g</span>
          <span class="macro-pill tabular">T ${Math.round(r.fat)}g</span>
          <span class="macro-pill tabular">W ${Math.round(r.carbs)}g</span>
        </div>
        <div class="card-meta">${r.ingredients.length} składników · ${r.servings} porcja${recipeOverrides[r.id] ? " · <em>edytowany</em>" : ""}</div>
      `;
      card.querySelector(".heart-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        toggleFavorite(r.id);
      });
      card.addEventListener("click", () => openDetail(r.id));
      card.addEventListener("keydown", (e) => { if (e.key === "Enter") openDetail(r.id); });
      frag.appendChild(card);
    });
    grid.appendChild(frag);
    window.scrollTo(0, scrollY);
  }

  function toggleFavorite(id) {
    if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
    save(LS_FAV, Array.from(favorites));
    // Only favoriting/unfavoriting needs a full grid rebuild when the "only favorites"
    // filter is active (the card must disappear); otherwise just flip this one heart button
    // in place, which is a lot snappier on a ~600-card list than re-rendering everything.
    if (onlyFavorites) { renderGrid(); return; }
    const btn = grid.querySelector(`.heart-btn[data-id="${id}"]`);
    if (btn) {
      const active = favorites.has(id);
      btn.classList.toggle("active", active);
      btn.textContent = active ? "♥" : "♡";
    }
