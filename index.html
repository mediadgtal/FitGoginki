e":"Koncentrat pomidorowy","grams":15,"measure":"łyżeczka"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Obiad"},{"id":51444279,"name":"Owsiane placuszki z jogurtem i dżemem","description":"1. W naczyniu blendera umieść jajka, płatki, 1/2 opakowania skyru, cynamon i erytrol. Zblenduj na jednolitą masę.\n2. Rozgrzej mocno nieprzywierającą patelnię (opcjonalnie przesmaruj ją delikatnie oliwą z oliwek). Smaż placuszki z dwóch strony, uważając, by ich nie przypalić.\n3. Gotowe placuszki przełóż na talerz.\n4. Podawaj ze pozostałym skyrem, dżemem i posiekaną lub startą gorzką czekoladą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/E8tp36i17BC2YGiKhLZzBYtNa55oIo2etrrQ4q2d.jpg","kcal":400.06,"protein":29.24,"fat":13.45,"carbs":41.56,"ingredients":[{"name":"Płatki owsiane błyskawiczne","grams":35,"measure":"łyżka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Dżem 100% owoców","grams":25,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Czekolada gorzka 70-85% kakao","grams":7,"measure":"kostka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"}],"category":"Śniadanie"},{"id":51446129,"name":"Waniliowe placuszki na serku wiejskim z kremem pistacjowym i malinami","description":"1. W naczyniu blendera umieść jajko, serek wiejski, mąkę, proszek budyniowy, proszek do pieczenia, erytrol i aromat waniliowy. Zblenduj całość na jednolitą masę.\n2. Rozgrzej nieprzywierającą patelnię (opcjonalnie przesmaruj ją delikatnie ręcznikiem papierowym). Usmaż placuszki z dwóch stron po kilka minut do wyrośnięcia.\n3. Gotowe placuszki przełóż na talerz, polej pastą pistacjową (możesz słoiczek wcześniej umieścić w szklane z wrzątkiem na około 10 minut, by była bardziej płynna) i posyp malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/0xMVSBG1eSfgCmpzQ1CyrhZlp9HMuDM28llXqsLZ.jpg","kcal":466.32,"protein":23.92,"fat":17.33,"carbs":54.6,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":40,"measure":"łyżeczka"},{"name":"Serek wiejski","grams":100,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Budyń waniliowy bez cukru","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Krem pistacjowy","grams":15,"measure":"g"}],"category":"Śniadanie"},{"id":51448161,"name":"Owsiane placuszki brownie z sosem malinowym","description":"1. W naczyniu blendera umieść tofu, jajko, mleko, mąkę, kakao, sól i erytrol. Całość zblenduj na jednolitą masę.\n2. Czekoladę posiekaj i dodaj do ciasta na placuszki.\n3. Rozgrzej mocno nieprzywierającą patelnię (opcjonalnie możesz przesmarować ją delikatnie oliwą z oliwek) i smaż placuszki z dwóch stron do wyrośnięcia.\n4. Maliny rozgnieć lub zblenduj na mus.\n5. Placuszki przełóż na talerz i polej malinowym sosem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/WGzSONChnfUyRDHaoOAvlKojIg8DH4R3w9XU5TiV.jpg","kcal":456.58,"protein":29.93,"fat":17.08,"carbs":51.12,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Tofu naturalne","grams":75,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":75,"measure":"szklanka"},{"name":"Płatki owsiane błyskawiczne","grams":30,"measure":"łyżka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":15,"measure":"łyżeczka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Maliny","grams":120,"measure":"garść"}],"category":"Śniadanie"},{"id":51458254,"name":"Czekoladowy mus proteinowy","description":"1. Czekoladę rozpuść w kąpieli wodnej.\n2. Z serka odlej wodę (zostaw same ziarenka - zostaw w razie konieczności dodania do masy - każdy serek ma nieco inną gęstość) i zblenduj z pozostałymi składnikami na jednolitą masę.\n3. Przelej do pucharka, posyp kakao i wstaw do lodówki na ok. 3 godziny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/bvWWNLU4ffbi9Der2nL5dOYuJoZCfiOpX1klzB20.jpg","kcal":426,"protein":24.73,"fat":26.22,"carbs":24.04,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":8,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Czekolada gorzka 70-85% kakao","grams":36,"measure":"kostka"}],"category":"Deser"},{"id":51543723,"name":"Orzechowe placuszki z ciecierzycy","description":"1. W naczyniu blendera umieść opłukaną z zalewy ciecierzycę, 50 g jogurtu, masło orzechowe, płatki owsiane, erytrol, sól, proszek do pieczenia i cynamon. Zblenduj na jednolitą masę.\n2. Rozgrzej mocno patelnię przesmarowaną oliwą i smaż placuszki z dwóch stron do wyrośnięcia i zamienienia.\n3. Podawaj placuszki z pozostałą częścią jogurtu i bananem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/n2oFCbZPwQ2kkwiqEkHcWrypEZh9JTL03bXEk5Qr.jpg","kcal":505.96,"protein":20.71,"fat":20.86,"carbs":63.45,"ingredients":[{"name":"Ciecierzyca konserwowa","grams":40,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Jogurt naturalny","grams":100,"measure":"średnie opakowanie"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"},{"name":"Płatki owsiane błyskawiczne","grams":30,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"},{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":51558864,"name":"Kremowa owsianka z jajkiem Rozkosznego","description":"1. Płatki owsiane umieść w rondelku wraz z wodą i solą, zagotuj, aż płatki z miękną i wchłoną całą wodę.\n2. Zdejmij z ognia, dodaj mleko i odżywkę białkową. Energicznie roztrzep trzepaczką.\n3. Dodaj jajko i roztrzep ponownie bardzo dokładnie i energicznie. Wróć z garnuszkiem na kuchenkę i podgrzej cały czas mieszając, aż owsianka zgęstnieje i zagotuje. Od razu zdejmij z ognia, zanim jajko i odżywka się zetną!\n4. Przygotuj dodatki: wiśnie podduś z odrobiną wody i erytrolu oraz soku z cytryny. Mąkę ziemniaczaną wymieszaj z 2 łyżkami zimnej wody i dodaj do gotujących się wiśni, gotuj do zgęstnienia. Skyr wymieszaj z pastą pistacjową.\n5. Na owsiankę wyłóż krem pistacjowy ze skyrem oraz wiśnie. Podawaj udekorowane pistacjami.\n\nPrzepis jest autorstwa Rozkosznego <3","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/KdbGo7EAeKFTxbGz7Y3DIV25dvsbxaONX7Q0aiwa.jpg","kcal":516.81,"protein":33.51,"fat":19.35,"carbs":53.05,"ingredients":[{"name":"Płatki owsiane","grams":35,"measure":"łyżka"},{"name":"Woda","grams":160,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":80,"measure":"szklanka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Skyr naturalny","grams":40,"measure":"łyżka"},{"name":"Krem pistacjowy","grams":15,"measure":"łyżka"},{"name":"Wiśnie mrożone","grams":80,"measure":"garść"},{"name":"Mąka ziemniaczana","grams":6,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Pistacje","grams":7,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"}],"category":"Śniadanie"},{"id":51821284,"name":"Proteinowa pizza ze skyru","description":"1. Piekarnik nagrzej do 220 stopni (grzanie góra-dół).\n2. W misce umieść 90 g mąki (zostaw pół łyżki do podsypania blatu), skyr, proszek do pieczenia oraz sól i oregano. Wymieszaj i zagnieć na kulkę. Rozwałkuj na 0,5-cm okrąg i wyłóż na papier do pieczenia (możesz też lekko oprószyć go mąką, by pizza nie przywarła).\n3. Posmaruj koncentratem (możesz również doprawić go solą, oregano, czosnkiem), wyłóż plastrami mozzarelli i szynką. Wstaw do nagrzanego piekarnika na około 15 minut.\n4. Podawaj z pomidorkami i rukolą.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/HvdYm8DxC15aSmvLLrM0FN4qmFqHY4yWyAfl6HU5.jpg","kcal":637.29,"protein":52.97,"fat":9.9,"carbs":83.6,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":96,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":2,"measure":"szczypta"},{"name":"Koncentrat pomidorowy","grams":25,"measure":"łyżka"},{"name":"Ser Mozzarella light","grams":60,"measure":"plaster"},{"name":"Szynka prosciutto cotto (Gustobello)","grams":50,"measure":"duży plaster"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Obiad"},{"id":51915791,"name":"Budyniowe gofry z serka wiejskiego","description":"1. Wszystkie składniki zblenduj na jednolitą masę i usmaż gofry w dobrze rozgrzanej, natłuszczonej gofrownicy przez 5-7 minut (w zależności od mocy gofrownicy).\n2. Studź gofry na kratce, aby były bardziej chrupiące.\n3. Podawaj z ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/RZtX1iKHDj2jJGUI9NCDbEMW2d7sIORQMQxFlij0.jpg","kcal":380.7,"protein":19.59,"fat":18.07,"carbs":35.39,"ingredients":[{"name":"Serek wiejski lekki","grams":100,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":18,"measure":"łyżka"},{"name":"Budyń waniliowy bez cukru","grams":20,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":52160393,"name":"Fit HOT-DOG","description":"1. Przygotuj sos: wymieszaj, skyr, musztardę, majonez, sól i pieprz. \n2. Połowę pełnoziarnistej bagietki nakrój wzdłuż i wydrąż środek. Nałóż sos, sałatę, parówki, pokrojone w kosteczkę warzywa (papryka, ogórek) i na sam wierzch plastry mozzarelli. Zapiekaj przez 5-7 minut 180 stopniach w airfryerze.\n3. Polej ketchupem i posyp posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/UnhXIhChbgBRx2jjBzbqcUS2mMZaRPTaNfutG1QX.jpg","kcal":445.3,"protein":27.11,"fat":15.82,"carbs":48.22,"ingredients":[{"name":"Ser Mozzarella light","grams":30,"measure":"plaster"},{"name":"Ogórki kiszone","grams":40,"measure":"mała sztuka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Bagietka pełnoziarnista","grams":70,"measure":"sztuka"},{"name":"Skyr naturalny","grams":40,"measure":"łyżka"},{"name":"Majonez wegański","grams":15,"measure":"łyżeczka"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ketchup bez dodatku cukru","grams":15,"measure":"łyżka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Parówki z kurczaka High Protein","grams":33,"measure":"sztuka"}],"category":"Obiad"},{"id":52428628,"name":"Kremowe orzotto z łososiem","description":"1. Na patelni rozgrzej oliwę. Dodaj posiekaną cebulę, przesmaż chwilkę, aż zmięknie. Dodaj przeciśnięty przez praskę czosnek. Przesmaż chwilkę i dodaj suchy makaron, wymieszaj. Dodaj na patelnię wodę, bulion, i mleko. Wymieszaj. Gotuj na małym ogniu około 10 minut, co jakiś czas mieszając.\n2. Kiedy makaron będzie prawie miękko, dodaj serek i parmezan, wymieszaj. Dodaj szpinak i przesmaż, aż straci objętość. Dodaj skórkę z cytryny (pamiętaj, by wcześniej sparzyć cytrynę) i sok. Wymieszaj. W razie potrzeby dodaj więcej wody, żeby rozrzedzić danie.\n3. Dodaj porwanego na mniejsze kawałki łososia, wymieszaj. Zdejmij z ognia, dopraw świeżo mielonym pieprzem i opcjonalnie szczyptą soli.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/yELt5oDyaSlX5XKtVsMAcIq4zZOlG7qwbdl7Koi5.jpg","kcal":952.35,"protein":59.02,"fat":33.3,"carbs":102.48,"ingredients":[{"name":"Cebula","grams":70,"measure":"mała sztuka"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Makaron orzo","grams":105,"measure":"filiżanka"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Bulion drobiowy (Winiary)","grams":20,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":125,"measure":"szklanka"},{"name":"Łosoś wędzony","grams":100,"measure":"plaster"},{"name":"Ser Parmezan","grams":16,"measure":"łyżeczka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":100,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Skórka z cytryny","grams":6,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Szpinak","grams":50,"measure":"garść"}],"category":"Obiad"},{"id":52445609,"name":"Ciasto naleśnikowe (bogate w białko)","description":"1. Wszystkie składniki (oprócz oliwy) umieść w naczyniu blendera i zmiksuj na jednolitą masę (jeśli robisz naleśniki na słodko - dodaj jeszcze 19015 g erytrolu).\n2. Smaż naleśniki na dobrze rozgrzanej patelni, pomiędzy każdym naleśnikiem przesmaruj patelnię oliwą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/5j4eSShlbyn7IRQCttzDh7zn6v3yRJg7PFmAKUCC.jpg","kcal":440.82,"protein":30.39,"fat":14.96,"carbs":45.89,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":54,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Serek wiejski wysokobiałkowy (Piątnica)","grams":100,"measure":"opakowanie"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"}],"category":"Śniadanie"},{"id":52526208,"name":"Sernik bez tłuszczu z malinami","description":"1. Piekarnik rozgrzej do 160 stopni (góra-dół).\n2. W dużej misce umieść skyry, jajka, erytrol, aromat waniliowy. Delikatnie zmiksuj na średnich obrotach tylko do połączenia składników (to ważne, bo zbyt długo miksowany - opadnie po upieczeniu).\n3. Do masy dodaj budyń i ponownie zmiksuj.\n4. Foremkę o średnicy 18 cm wyłóż papierem do pieczenia i wlej do niej sernikową masę. Wierzch posyp malinami.\n5. Wstaw ciasto do nagrzanego piekarnika na środkową półkę i piecz przez około 1,5h. Po upieczeniu uchyl drzwiczki i studź sernik w ten sposób około 50-60 minut, a następnie przełóż na blat do całkowitego wystudzenia.\n6. Wstaw do lodówki na kilka godzin (najlepiej na noc).","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/9WKS7Y6tRwlajqHZA5qqKrExnhCpsSLZqrKruLLN.jpg","kcal":1117.91,"protein":133.06,"fat":26.55,"carbs":85.83,"ingredients":[{"name":"Skyr naturalny","grams":900,"measure":"opakowanie"},{"name":"Jajko kurze","grams":250,"measure":"średnia sztuka"},{"name":"Budyń bez cukru","grams":40,"measure":"g"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Erytrytol","grams":100,"measure":"szklanka"}],"category":"Deser"},{"id":52768232,"name":"Prosta zielona zupa krem z cukinii i groszku","description":"1. Cukinię oraz cebulę pokrój w kostkę. W garnku rozgrzej oliwę i podsmaż pokrojone warzywa. Dodaj wodę, bulion, mrożony groszek i gotuj do miękkości warzyw.\n2. Dodaj serek, przyprawy i zmiksuj zupę na gładki krem.  Jeśli będzie zbyt gęsty dodaj wodę do odpowiedniej konsystencji i zagotuj zupę.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/QF0OUuo4bhJSjm7rZQfbNKICeWolr5iwzNvheooD.jpg","kcal":635.68,"protein":30.38,"fat":27.66,"carbs":67.55,"ingredients":[{"name":"Cukinia","grams":400,"measure":"średnia sztuka"},{"name":"Groszek zielony mrożony","grams":300,"measure":"g"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Bulion drobiowy (Winiary)","grams":20,"measure":"łyżeczka"},{"name":"Woda","grams":750,"measure":"szklanka"},{"name":"Serek Philadelphia light","grams":120,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":3,"measure":"szczypta"},{"name":"Pieprz czarny","grams":3,"measure":"szczypta"}],"category":"Zupa"},{"id":52768241,"name":"Wiosenna zupa koperkowa","description":"1. Ziemniaki obierz i pokrój w kostkę. \n2. Marchew i cebulę obierz i pokrój na plasterki, a szczypiorek od dymki posiekaj. \n3. W dużym garnku rozgrzej oliwę i podsmaż cebulę, marchew oraz ziemniaki. \n4. Dodaj wywar (możesz dodać litr wody i 2 łyżki bulionu ze słoika), przyprawy oraz szczypiorek. Gotuj zupę pod przykryciem na wolnym ogniu przez ok, 15 minut. \n5. Koper umyj i posiekaj. Kiedy warzywa w zupie będą już miękkie, dodaj go do garnka i gotuj zupę już bez przykrycia kolejne 5 minut. \n6. Na samym końcu dodaj śmietankę i zagotuj zupę.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/csoFuuz0dA4YXVjCf7BTCA4hzvAdgQFWemnWjpdk.jpg","kcal":823.92,"protein":12.56,"fat":50.51,"carbs":93.86,"ingredients":[{"name":"Wywar warzywny","grams":1000,"measure":"szklanka"},{"name":"Koper świeży","grams":40,"measure":"pęczek"},{"name":"Ziemniaki","grams":300,"measure":"mała sztuka"},{"name":"Marchew","grams":150,"measure":"mała sztuka"},{"name":"Cebula dymka","grams":15,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Śmietanka 30 % (Mleczna Dolina)","grams":80,"measure":"łyżka"},{"name":"Sól","grams":6,"measure":"łyżeczka"},{"name":"Gałka muszkatołowa mielona","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"}],"category":"Zupa"},{"id":52769482,"name":"Koktajl na lekki brzuch","description":"1. Babkę płesznik zalej odrobiną gorącej wody i odstaw na 10-15 minut do napęcznienia i przestudzenia. \n2. Wszystkie składniki umieść w kielichu blendera i zmiksuj na gładki koktajl. W razie potrzeby możesz dodać więcej wody.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/9oaXcsUtE7c7N2YCD3GK5VnlVJt95LpL7xIn8reE.jpg","kcal":143.05,"protein":4.04,"fat":1.1400000000000001,"carbs":31.16,"ingredients":[{"name":"Kiwi","grams":75,"measure":"sztuka"},{"name":"Ananas","grams":160,"measure":"plaster"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Woda","grams":300,"measure":"szklanka"},{"name":"Babka płesznik","grams":10,"measure":"łyżka"}],"category":"Napój"},{"id":52769483,"name":"Słoneczny koktajl dla skóry","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. W razie potrzeby dodaj wody dla odpowiedniej konsystencji.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/XLIJlDjqL5n20EZTvJvImJeW8pPVR1DUvZXWNIHL.jpg","kcal":276.64,"protein":9.68,"fat":10.45,"carbs":38.87,"ingredients":[{"name":"Mango mrożone","grams":100,"measure":"opakowanie"},{"name":"Brzoskwinia","grams":100,"measure":"średnia sztuka"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"},{"name":"Kefir 2%","grams":240,"measure":"szklanka"},{"name":"Olej z wiesiołka","grams":5,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"}],"category":"Napój"},{"id":52770603,"name":"Sałatka hawajska","description":"1. Makaron ugotuj al dente według czasu podanego przez producenta. Pozostaw do wystudzenia.\n2. Kurczaka pokrój w kostkę, wymieszaj z przyprawą gyros i usmaż na oliwie. Również pozostaw do wystudzenia. \n3. Pomidorki koktajlowe pokrój na połówki, ogórka  i ananasa w kostkę, a czerwoną cebulę w bardzo cienkie piórka. \n4. Z oliwy, miodu, musztardy, soku z cytryny i odrobiny wody przygotuj sos. Dopraw go solą i pieprzem. \n5. Do miski dodaj roszponkę, ostudzony makaron i kurczaka, pokrojone warzywa i ananasa i wszystko polej sosem. Sałatkę wymieszaj i posyp pestkami (możesz je wcześniej uprażyć na suchej patelni).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/K99hKWKPNawhgxVmwGtyXLQ9yweC0SJp7QcVaLN8.jpg","kcal":501.33,"protein":32.14,"fat":17.08,"carbs":57.85,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Gyros przyprawa","grams":5,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Makaron kokardki","grams":30,"measure":"g"},{"name":"Roszponka","grams":50,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Ananas","grams":160,"measure":"plaster"},{"name":"Pestki dyni","grams":5,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Woda","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":52906757,"name":"Fluffy pancakes z ricottą","description":"1. Przygotuj dwie miski. W jednej umieść białka jaj, sok z cytryny i 10 g erytrolu. W drugiej żółtka, ricottę, mąkę, proszek do pieczenia i również 10 g erytrolu. Możesz również zacząć rozgrzewać patelnię na średniej mocy.\n2. Zmiksuj na gładko masę z żółtkami. Białka ubij na sztywną pianę z sokiem z cytryny i pozostałą ilością erytrolu (10 g). Dodaj do ubitych białek budyń w proszku, zmiksuj do połączenia składników.\n3. Dodaj masę z żółtkami do białek, zmiksuj jedynie do połączenia składników.\n4. Na mocno rozgrzaną patelnię połóż masło, musi być rozgrzana mocno, ale nie na tyle, by masło skwierczało - jeśli tak jest - zdejmij patelnię na chwilę z kuchenki (ja smażę te placuszki na mocy 5 na 10).\n5. Na rozgrzane masło nałóż łyżką dwa placuszki. Nakładaj je tak, by nie rozlewały się za bardzo, układając wieżyczkę. Na te dwa placuszki zużyj większość masy. Wlej na patelnię 1 łyżkę wody i przykryj patelnię miską metalową lub drugą patelnią (placuszki urosną). Smaż je 5-6 minut.\n6. Po tym czasie dołóż pozostałą masę na każdego placuszka i ponownie wlej 1 łyżkę wody i przykryj na 4-5 minut. Możesz zmniejszyć nieco moc - do 4, jeśli zauważysz, że placuszki mogą się przypalić (każda kuchenka jest nieco inna). Obróć placuszki na drugą stronę, wlej łyżkę wody i przykryj na ostatnie około 4-5 minut.\n7. Podawaj z ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/WYCn2DpfVIcoZ0SJgjGOgblFX0Q7SQYCDZj5lrWX.jpg","kcal":401.53,"protein":20.9,"fat":18.49,"carbs":37.89,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżeczka"},{"name":"Budyń bez cukru","grams":12,"measure":"łyżka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Ser Ricotta","grams":60,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":20,"measure":"łyżka"},{"name":"Masło","grams":3,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":53048450,"name":"Kolagenowe pianki","description":"1. W garnku umieść maliny, erytrol i sok z cytryny. Podejrzewaj (nie gotuj) do rozmrożenia malin. Zblenduj na jednolitą masę (najwygodniej za pomocą blendera ręcznego).\n2. Dodaj żelatynę w proszku i podgrzewaj przez kolejne 5 minuty co chwilę mieszając (uważaj, by nie doprowadzić do gotowania).\n3. Przełóż masę do robota miksującego i miksuj przez ok. 15-20 minut na średnich obrotach.\n4. Przełóż masę do foremek (ja zrobiłam w dwóch nieco szerszych keksowkach) i wstaw do lodówki na około 2-3 godziny. Przechowuj w lodówce.","servings":12,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/1hbpoVLjPoQ0UnntIskzTsZkuMlH8Mz81w9tgm24.jpg","kcal":366.39,"protein":27.19,"fat":4.1,"carbs":63.58,"ingredients":[{"name":"Maliny mrożone","grams":500,"measure":"g"},{"name":"Żelatyna","grams":25,"measure":"g"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"}],"category":"Deser"},{"id":53348671,"name":"Makaron z brokułem, papryką i kurczakiem z jednej patelni","description":"1. Kurczaka pokrój w kostkę lub cienkie paski. Wymieszaj go w misce z mąką ziemniaczaną, solą i papryką wędzoną, żeby kawałki lekko się nią pokryły.\n2. Na patelni rozgrzej oliwę i smaż kurczaka kilka minut, aż się zarumieni i zrobi lekko chrupiący. Odstaw na bok.\n3. Brokuła podziel na małe różyczki. Paprykę pokrój w paski, cebulę w piórka. Fasolkę szparagową pokrój na mniejsze kawałki, chyba że masz mrożoną w kawałkach.\n4. Na tą samą patelnię włóż makaron, brokuła, paprykę, cebulę, fasolkę i podsmażonego wcześniej kurczaka.\n5. Dodaj na patelnię: mleczko kokosowe, 2 szklanki wody, bulion Winiary, sos sojowy, sok z limonki, masło orzechowe, czosnek przeciśnięty przez praskę, imbir, curry, paprykę ostrą.\n6. Całość dobrze wymieszaj. Przykryj garnek i gotuj około 10 minut.\n7. Po tym czasie zamieszaj, sprawdź ilość płynu i gotuj jeszcze około 10 minut, aż makaron będzie miękki, a sos lekko zgęstnieje. Jeśli będzie zbyt gęsty, dolej trochę wody.\n8. Na koniec jeszcze raz wszystko wymieszaj, żeby sos dobrze oblepił makaron i warzywa. W razie potrzeby dopraw jeszcze do smaku.\n9. Podawaj z posiekanym szczypiorkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/oHUdbGlrFt2ZDLM60q7yiOY32jzshMQEHHIN0yHF.jpg","kcal":1257.2,"protein":76.32,"fat":42.31,"carbs":148.63,"ingredients":[{"name":"Makaron ryżowy","grams":100,"measure":"porcja"},{"name":"Brokuł","grams":250,"measure":"sztuka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Fasolka szparagowa mrożona","grams":100,"measure":"garść"},{"name":"Mleczko kokosowe light 6%","grams":100,"measure":"puszka"},{"name":"Woda","grams":500,"measure":"szklanka"},{"name":"Bulion drobiowy (Winiary)","grams":30,"measure":"łyżka"},{"name":"Masło orzechowe","grams":30,"measure":"łyżka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sok z limonki","grams":6,"measure":"łyżeczka"},{"name":"Imbir mielony","grams":2,"measure":"łyżeczka"},{"name":"Curry przyprawa","grams":3,"measure":"szczypta"},{"name":"Papryka wędzona w proszku","grams":4,"measure":"łyżeczka"},{"name":"Papryka ostra przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"},{"name":"Mąka ziemniaczana","grams":12,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}],"category":"Obiad"},{"id":53356401,"name":"Bezglutenowy chlebek bananowy","description":"1.\tRozgrzej piekarnik do 175°C.\n2.\tDojrzałe banany rozgnieć w dużej misce na gładką masę.\n3.\tDodaj jajka, oliwę i wanilię. Wymieszaj do połączenia.\n4.\tDodaj składniki suche: mąkę migdałową, mąkę owsianą, erytrol, sodę i sól.\n5.\tWymieszaj tylko do momentu połączenia składników. Nie mieszaj zbyt długo.\n6.\tFormę keksową wyłóż papierem do pieczenia i przelej do niej ciasto.\n7.\tPiecz około 50–55 minut, aż środek będzie upieczony.","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/17lD7SbC3P2mi2ABw4RohRDIF8NgYRPSAAcB9r9I.jpg","kcal":2027.86,"protein":59.17,"fat":132.64,"carbs":172.12,"ingredients":[{"name":"Banan","grams":420,"measure":"duża sztuka"},{"name":"Oliwa z oliwek","grams":40,"measure":"łyżka"},{"name":"Erytrytol","grams":100,"measure":"szklanka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mąka owsiana","grams":75,"measure":"łyżka"},{"name":"Mąka migdałowa","grams":140,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Soda oczyszczona","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Deser"},{"id":53520229,"name":"Nocna owsianka tiramisu z chia i malinami","description":"1. W misce wymieszaj płatki, chia, espresso, 10 g erytrolu, kakao, mleko i sól.\n2. W oddzielnym naczyniu wymieszaj skyr z 5 g erytrolu i malinami oraz kawałkami posiekanej czekolady gorzkiej.\n3. W słoiczku ułóż naprzemiennie: masę z płatkami, skyr z dodatkami, masę z płatkami, skyr z dodatkami, a wierzch oprósz kakao.\n4. Wstaw do lodówki na noc.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/UgVbx6WAHg4bBytsTg3YUylJxHhrMXzuLWCRw17S.jpg","kcal":446.04,"protein":29.93,"fat":10.85,"carbs":59.3,"ingredients":[{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Espresso","grams":40,"measure":"porcja"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Nasiona chia","grams":6,"measure":"łyżka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":5,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Czekolada gorzka 70-85% kakao","grams":7,"measure":"kostka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":53543496,"name":"Pasta z awokado i twarożku","description":"1. Cebulę drobno posiekaj.\n2. W misce umieść wszystkie składniki wraz z posiekaną cebulą i rozgnieć widelcem na pastę.\n3. Podawaj z pieczywem i warzywami. Możesz podać też do pasty jajko sadzone czy łososia wędzonego dla większej ilości białka.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/HoQCreFFlVcZwm2xdXqu53ERGCxwfgHNAT0jWkTA.jpg","kcal":381.73,"protein":19.83,"fat":26.67,"carbs":21.1,"ingredients":[{"name":"Awokado","grams":140,"measure":"sztuka"},{"name":"Twarożek grani","grams":150,"measure":"małe opakowanie"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"}],"category":"Śniadanie"},{"id":53925934,"name":"Brownie z jabłka (jednoporcjowe)","description":"1. Piekarnik nagrzej do 180°C (góra–dół).\n2. Jabłko zblenduj na gładki mus.\n3. Dodaj jajko, kakao, erytrol i szczyptę soli. Dokładnie wymieszaj, aż powstanie gładka masa.\n4. Przełóż do małej foremki lub kokilki.\n5. Jeśli chcesz, wciśnij w środek kostkę gorzkiej czekolady.\n6. Piecz około 35–40 minut w 180°C.\n\t7.\tPo upieczeniu odstaw do całkowitego wystudzenia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/GymgxPXDIWt6uF1y3Q3YrhdziSXb8tuxQw9Te4ZQ.jpg","kcal":240.7,"protein":13.95,"fat":8.35,"carbs":34.25,"ingredients":[{"name":"Jabłko","grams":150,"measure":"g"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":30,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":20,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"}],"category":"Deser"},{"id":54152296,"name":"Gnocchi z ciecierzycą, fetą i pomidorkami","description":"1. Nagrzej piekarnik do 200°C (góra-dół).\n2. Do dużej formy do zapiekania wrzuć: przekrojone pomidorki, ciecierzycę, przeciśnięty przez praskę czosnek i gnocchi.\n3. Polej wszystko oliwą, dodaj chili, bazylię suszoną, sól i pieprz. Wymieszaj ręką albo łyżką, żeby wszystko było w oliwie. Wstaw do nagrzanego piekarnika na 20 minut.\n4. Po tym czasie dołóż kawałki fety. Wstaw na kolejne ok. 15 minut.\n5. Wyjmij z piekarnika, wymieszaj. Podawaj ze świeża bazylią.\n6. Możesz też skropić jeszcze sokiem z cytryny.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/jg9lqpxDOfqnXome5bwLmLdpiQf3MZgaZCtnH3oR.jpg","kcal":1000.38,"protein":36.99,"fat":36.67,"carbs":127.71,"ingredients":[{"name":"Gnocchi (GustoBello)","grams":250,"measure":"porcja"},{"name":"Pomidory koktajlowe","grams":300,"measure":"garść"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Ciecierzyca konserwowa","grams":120,"measure":"puszka (odsączona)"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Papryczka chili suszona","grams":4,"measure":"sztuka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Bazylia suszona","grams":2,"measure":"szczypta"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Ser Feta","grams":100,"measure":"opakowanie"}],"category":"Obiad"},{"id":54264518,"name":"Omlet z brokułem i serem","description":"1. Ugotowane brokuły pokrój w małe kawałki. Cebulę posiekaj.\n2. Na patelni rozgrzej oliwę. Zeszklij cebulkę. Dodaj brokuły i podsmaż chwilę.\n3. Jajka roztrzep z solą, pieprzem i kefirem. Wylej je na patelnię z brokułami, tak, aby równomiernie je pokryły. Przykryj i smaż na średniej mocy kilka minut, aż jajka zaczną się ścinać.\n4. Dodaj starty ser i złóż omlet na pół, przykryj ponownie i smaż jeszcze kilka minut, aż ser się roztopi.\n5. Podawaj z posikanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/jpxL3CFprDgOn2GiwSTW1eesq5ymjtkdJ9AeywTg.jpg","kcal":291.31,"protein":25.47,"fat":16.55,"carbs":12.35,"ingredients":[{"name":"Brokuł","grams":125,"measure":"g"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula","grams":35,"measure":"mała sztuka"},{"name":"Ser żółty Piórko (Goliszew)","grams":20,"measure":"plaster"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Kefir 2%","grams":40,"measure":"g"}],"category":"Śniadanie"},{"id":54541309,"name":"Czekoladowy serniczek na raz","description":"1. Wszystkie składniki, oprócz czekolady i mleka, umieść w naczyniu blendera i zmiksuj na jedwabistą masę. Spróbuj i w razie potrzeby dodaj więcej erytrolu. Przełóż do naczynia i wstaw do lodówki.\n2. W tym czasie przygotuj polewę: czekoladę rozpuść w kąpieli wodnej wraz z odrobiną mleka. Polej nią deserek i wstaw na kilka godzin do lodówki (lub na całą noc). Opcjonalnie udekoruj malinami i posyp jeszcze solą z góry - jeśli lubisz to połączenie.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/GfCPu4UfH5Y6sO5Qsune91TGarAe9fJqFT6msCN6.jpg","kcal":389.74,"protein":31.28,"fat":19.27,"carbs":27.26,"ingredients":[{"name":"Twarożek grani","grams":200,"measure":"duże opakowanie"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":30,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Czekolada gorzka 70-85% kakao","grams":18,"measure":"kostka"},{"name":"Mleko 1,5%","grams":20,"measure":"łyżka"}],"category":"Deser"},{"id":54543022,"name":"Pasta z makreli i jajek","description":"1. Jajka ugotuj na twardo, obierz i pokrój w kostkę.\n2. Makrelę pozbaw kości i dodaj do jajek porwaną na mniejsze kawałki.\n3. Szalotkę i szczypiorek drobno posiekaj.\n4. Do jajek i makreli dodaj wszystkie pozostałe składniki. Opcjonalnie możesz dodać jeszcze małą łyżeczkę musztardy jeśli lubisz.\n5. Podawaj z pieczywem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/OiDdcJbtdxP8LyFCgoAAvYku418RkRyaXKWrfmbf.jpg","kcal":840.33,"protein":68.52,"fat":58.49,"carbs":13.96,"ingredients":[{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Makrela wędzona","grams":200,"measure":"porcja"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"},{"name":"Majonez wegański (Go Vege)","grams":25,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Szalotka","grams":20,"measure":"sztuka"}],"category":"Śniadanie"},{"id":54577281,"name":"Malinowy pudding chia z migdałami","description":"1. Nasiona chia wymieszaj ze 100 g skyru, napojem roślinnym (lub mlekiem) oraz erytrolem. \n2. Maliny rozgnieć widelcem i dodaj do puddingu i wszystko razem wymieszaj. Jeśli używasz malin mrożonych to warto je najpierw rozmrozić. \n3. Pudding wstaw do lodówki. Po 10-15 minutach przemieszaj ponownie i pozostaw na 2 godziny lun najlepiej całą noc. \n4. Na gotowy pudding dodaj pozostały skyr oraz płatki migdałów. Jeśli wolisz słodsze posiłki do skyru dodaj erytrol (najlepiej zmielony na puder).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/gH0EUq5mNRcsUJOgcg568I4Wvu2ngeR2GiZCrssl.jpg","kcal":329.81,"protein":26.2,"fat":14.68,"carbs":26.35,"ingredients":[{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Nasiona chia","grams":24,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":100,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}],"category":"Deser"},{"id":54577295,"name":"Bananowy pudding chia z orzeszkami","description":"1. Nasiona chia wymieszaj ze 100 g skyru, napojem roślinnym (lub mlekiem) oraz erytrolem. \n2. Banana rozgnieć widelcem i dodaj do puddingu i wszystko razem wymieszaj.\n3. Pudding wstaw do lodówki. Po 10-15 minutach przemieszaj ponownie i pozostaw na 2 godziny lub najlepiej na całą noc. \n4. Pozostały skyr wymieszaj z masłem orzechowym i erytrolem  (najlepiej zmielony na puder).\n5. Na gotowy pudding dodaj krem orzechowy i orzeszki ziemne.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/LyZXgi8lxEeTbQEyWNYtrzMgkM8DDysJe3EznYwb.jpg","kcal":409.61,"protein":28.79,"fat":19.32,"carbs":34.8,"ingredients":[{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Nasiona chia","grams":24,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":100,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":10,"measure":"łyżka"},{"name":"Orzechy ziemne","grams":10,"measure":"garść"}],"category":"Deser"},{"id":54577305,"name":"Kawowy pudding chia z czekoladą","description":"1. Nasiona chia wymieszaj z 100 g skyru, napojem roślinnym (lub mlekiem), kawą, kakao oraz erytrolem. \n2. Pudding wstaw do lodówki. Po 10-15 minutach przemieszaj ponownie i pozostaw na 2 godziny lub najlepiej na całą noc. \n4. Na gotowy pudding dodaj pozostały skyr oraz posiekaną gorzką czekoladę. Jeśli wolisz słodsze posiłki do skyru dodaj erytrol (najlepiej zmielony na puder).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/VyLj2JdrN3K4m6ZbALnuOpCiqlv5WsA5TgCLyyIT.jpg","kcal":316.67,"protein":24.44,"fat":14.64,"carbs":25.45,"ingredients":[{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Nasiona chia","grams":24,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":70,"measure":"szklanka"},{"name":"Kawa espresso","grams":30,"measure":"porcja"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"}],"category":"Deser"},{"id":54722805,"name":"Budyniowy skyrnik z malinami (jednoporcjowy)","description":"1. Piekarnik rozgrzej do 180 stopni (grzanie góra-dół).\n2. W naczyniu zmiksuj wszystko, oprócz malin. Przelej masę do silikonowe foremki lub foremki wyłożonej papierem do pieczenia. Na wierz połóż maliny (one opadną).\n3. Wstaw do piekarnika na około 40 minut. Studź na otwartej kratce piekarnika przez pierwsze 30-60 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/ltKeOMHRL5pPkZUD0nayyWi52HsLZxltp9lB3sWa.jpg","kcal":493.09,"protein":46.58,"fat":10.47,"carbs":52.62,"ingredients":[{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Budyń bez cukru","grams":40,"measure":"g"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Maliny","grams":30,"measure":"garść"}],"category":"Deser"},{"id":54722858,"name":"Malinowy pudding chia","description":"1. Zblenduj maliny, mleko, jogurt, erytrol i wanilię.\n2. Dodaj chia, wymieszaj.\n3. Po ok. 20 minutach zamieszaj ponownie.\n4. Wstaw do lodówki na minimum. 6 godzin, a najlepiej na całą noc.\n5. Podawaj z ulubionymi dodatkami: u mnie to dodatkowa porcja jogurtu, świeże owoce czy mięta.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/ymH2Apg0BQyxPaOF0bZ60bI5usdrZbsnYNPo3anC.jpg","kcal":265.25,"protein":8.95,"fat":16.1,"carbs":23.58,"ingredients":[{"name":"Nasiona chia","grams":24,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":50,"measure":"łyżka"},{"name":"Maliny mrożone","grams":60,"measure":"garść"},{"name":"Jogurt grecki","grams":75,"measure":"g"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"}],"category":"Deser"},{"id":54722924,"name":"Proteinowe pancakes (z odżywką białkową)","description":"1. Jajko, aromatt i skyr wymieszaj (za pomocą trzepaczki).\n2. Dodaj mąkę, proszek do pieczenia i odżywkę białkową. Wymieszaj ponownie, aby nie było grudek. Jeśli lubisz bardzo słodkie - dodaj do masy łyżkę erytrolu.\n3. Rozgrzej nieprzywierającą patelnię z odrobiną oliwy i wykładaj na nią placuszki po łyżce.\n4. Smaż z obu stron do zarumienienia, na średniej mocy kuchenki.\n5. Podawaj z pastą pistacjową i malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/MpVKe0xaOir1IZujCx6BvgpAsLImS4ThhI3xOpn7.jpg","kcal":496.71,"protein":43.14,"fat":15.75,"carbs":44.48,"ingredients":[{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Mąka orkiszowa jasna","grams":36,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":2,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Pasta pistacjowa","grams":15,"measure":"g"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"}],"category":"Śniadanie"},{"id":54722993,"name":"Proteinowe tosty francuskie (z odżywką białkową)","description":"1. Zmiksuj jajko, mleko i odżwykę na jednolita masę.\n2. Rozgrzej patelnię i przesmaruj tłuszczem.\n3. Kromki chleba maczaj w masie jajecznej z obu stron.\n4. Smaż około 2 minuty z każdej strony, aż będzie złota, na średniej mocy kuchenki.\n5. Podawaj ze skyrem, truskawkami i startą gorzką czekoladą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/gvCeaCOBqrwoaM4Mxy8o8dUY2HYTgHbSCneaD2d8.jpg","kcal":478.15,"protein":33.7,"fat":16.85,"carbs":47.28,"ingredients":[{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":20,"measure":"łyżka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Truskawki","grams":70,"measure":"garść"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"}],"category":"Śniadanie"},{"id":54782929,"name":"Wiosenna sałatka ze szparagami, ziemniakami i wędzonym łososiem","description":"1. Ziemniaki umyj i pokrój w duże kawałki o podobnej wielkości (jeśli są młode - nie trzeba ich obierać). Ugotuj w osolonej wodzie do miękkości, ale nie tak, żeby się rozpadały. Odcedź i przestudź.\n2. Szparagi pozbaw twardych końcówek i pokrój każdego na 3-4 kawałki.\n3. Na blaszce ułóż ugotowane ziemniaki i szparagi. Polej oliwą i dopraw dolą.\n4. Wstaw do nagrzanego piekarnika do 200-210 stopni, grzanie góra-dół, na ok. 8-10 minut. A na koniec włącz funkcję grill (jeśli masz) na 3-4 minuty. Dzięki temu ładniej się zarumienią.\n5. W tym czasie pokrój: rzodkiewkę w plasterki, cebulę w półksiężyce, łososia w mniejsze kawałki, koperek drobno posiekaj.\n6. Wymieszaj składniki na sos: jogurt naturalny, musztardę, sok z cytryny, sól i pieprz.\n7. Do dużej miski przełóż upieczone ziemniaki, szparagi, dodaj wszystkie pokrojone składniki i łososia. Polej sosem i wymieszaj.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/N9rUG7J1x1hhA2MLvMWZkiUY9MF9v6I6Lr0Z46X4.jpg","kcal":867.46,"protein":49.89,"fat":22.75,"carbs":126.01,"ingredients":[{"name":"Ziemniaki","grams":500,"measure":"średnia sztuka"},{"name":"Szparagi","grams":500,"measure":"duża sztuka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Łosoś wędzony","grams":100,"measure":"plaster"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jogurt naturalny","grams":75,"measure":"łyżka"},{"name":"Musztarda francuska","grams":20,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Sałatka"},{"id":54783126,"name":"Wiosenna sałatka z brokułem, fetą i jajkiem","description":"1. Brokuł ugotuj al sobie i pokrój na mniejsze kawałki. Jajka ugotuj, odstudź i pokrój w grubą kostkę. Ser także pokrój w grubszą kostkę.\n2. Rzodkiewkę pokój w półplastry, cebulę w piórka, a kukurydzę odcedź z zalewy. \n3. Wymieszaj majonez z jogurtem, musztardą i przeciśniętym przez praskę czosnkiem. Dodaj pieprz i opcjonalnie szczyptę soli (ser jest już słony i czasem to wystarcza).\n4. Wrzuć wszystko do miski razy z sosem i wymieszaj.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/D1Ca63JTad7FgLXXqn06tsa4Mogsw3eJXUdzfISg.jpg","kcal":936.92,"protein":59.76,"fat":54.6,"carbs":60.45,"ingredients":[{"name":"Brokuł","grams":500,"measure":"sztuka"},{"name":"Ser Feta","grams":100,"measure":"plaster"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Kukurydza konserwowa","grams":60,"measure":"łyżka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Majonez wegański (Go Vege)","grams":30,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":50,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Musztarda miodowa","grams":7,"measure":"łyżka"}],"category":"Sałatka"},{"id":54783274,"name":"Waniliowo-orzechowy pudding proteinowy z bananem (z odżywką białkową)","description":"1. W misce wymieszaj jogurt, odżywkę białkową, erytrol, masło orzechowe, ekstrakt waniliowy, aż masa będzie gładka.\n2. W szklance, słoiku lub miseczce układaj warstwami: masa jogurtowa → banan → orkisz ekspandowany → masa → banan → orkisz → masa.\n3. Wstaw do lodówki na minimum 1–2 godziny, żeby całość lekko zmiękła i smaki się połączyły lub jedz od razu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/u4RC4IYkgCkbHLIMzJcczEAH7h9Xxs4CUigRjjLw.jpg","kcal":442.41,"protein":40.87,"fat":14.98,"carbs":39.18,"ingredients":[{"name":"Serek wiejski lekki","grams":200,"measure":"opakowanie"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Erytrytol","grams":5,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Orkisz ekspandowany","grams":20,"measure":"garść"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"}],"category":"Deser"},{"id":54831302,"name":"Pistacjowy pudding chia z truskawkami","description":"1. Wymieszaj jogurt, mleko, pastę pistacjową, erytrol i sól na gładką masę.\n2. Dodaj chia i wymieszaj ponownie. Przelej do słoiczka i wstaw do lodówki na kilka godzin (w trakcie możesz przemieszać).\n3. Podawaj z truskawkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/OJM7eCffx9Si4pF2ZVL28PCoBenzreob7vZBRabQ.jpg","kcal":442.61,"protein":28.95,"fat":22.43,"carbs":31.64,"ingredients":[{"name":"Nasiona chia","grams":24,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":50,"measure":"łyżka"},{"name":"Pasta pistacjowa","grams":30,"measure":"g"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Truskawki","grams":70,"measure":"garść"}],"category":"Deser"},{"id":55131710,"name":"Pasta z awokado i białej fasoli","description":"1. Fasolę odcedź z zalewy i dokładnie opłucz.\n2. Wszystkie składniki zblenduj na jednolitą kremową pastę.\n3. Podawaj najlepiej na pieczywie żytnim, z dodatkiem warzyw i ewentualnie wędzonego łososia lub z jajkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/Cn7Yjjec839iEc2HAmouX4gFBjW76CBKYkuarR09.jpg","kcal":515.86,"protein":20.96,"fat":21.4,"carbs":67.12,"ingredients":[{"name":"Awokado","grams":140,"measure":"sztuka"},{"name":"Fasola biała konserwowa","grams":240,"measure":"puszka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Śniadanie"},{"id":55140406,"name":"Wysokobiałkowa sałatka z cieciorką, kurczakiem i awokado","description":"1. Jogurt wymieszaj z sokiem z cytryny, musztardą i miodem. Dodaj przeciśnięty ząbek czosnku. Dopraw solą i pieprzem. \n2. Kurczaka pokrój w paseczki i dopraw ulubioną przyprawą do kurczaka. Usmaż na oliwie i pozostaw do wystudzenia. \n3. Cieciorkę odsącz z zalewy i przepłucz na sitku pod bieżącą wodą. \n4. Sałatę porwij i dodaj do miski. Pomidorki przekrój na pół, awokado pokrój w kostkę, a ogórka w plastry. Warzywa przełóż do miski z sałatą. Dodaj cieciorkę i kurczaka. \n5. Sałatkę polej sosem jogurtowym i posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/5vCgXiVwhCVPvfzu4kCHGIpAm4k3cE1QQ75ir3T5.jpg","kcal":555.39,"protein":37.94,"fat":26.65,"carbs":41.74,"ingredients":[{"name":"Jogurt naturalny","grams":75,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sałata rzymska","grams":40,"measure":"garść"},{"name":"Ciecierzyca w zalewie","grams":100,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Przyprawa do kurczaka","grams":1,"measure":"łyżeczka"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}],"category":"Sałatka"},{"id":55140415,"name":"Wysokobiałkowa sałatka z tuńczykiem, fetą i ogórkiem","description":"1. Jogurt wymieszaj z sokiem z cytryny, majonezem, przyprawami oraz posiekanym koperkiem. \n2. Ogórka pokrój w plastry, paprykę w kostkę, a cebulę w cienkie piórka. \n3. Tuńczyka odsącz z zalewy, fetę pokrój w kostkę lub pokrusz. \n4. Wszystkie składniki wymieszaj ze sobą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/XyCZwsy44W51NJxW9Zwv6LUNUp6Ay1H90xpwPQPS.jpg","kcal":412.21,"protein":41.05,"fat":19.82,"carbs":19.86,"ingredients":[{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Tuńczyk kawałki w sosie własnym","grams":170,"measure":"opakowanie"},{"name":"Ser Feta","grams":40,"measure":"plaster"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Bazylia suszona","grams":1,"measure":"szczypta"},{"name":"Jogurt naturalny","grams":75,"measure":"łyżka"},{"name":"Majonez light","grams":25,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}],"category":"Sałatka"},{"id":55268212,"name":"Czekoladowe naleśniki proteinowe z malinami na gorąco","description":"1. Przygotuj ciasto na naleśniki: zmiksuj mąkę, odżywkę, kakao jajko, mleko, sól. Opcjonalnie możesz dodać łyżkę erytrolu. Usmaż naleśniki na beztłuszczowej patelni lub patelni przesmarowanej delikatnie tłuszczem (masłem, a najlepiej oliwą).\n2. W małym garnuszku podduś maliny z sokiem z cytryny do rozmrożenia i lekkiego podgrzania. Opcjonalnie możesz również dosłodzić erytrolem, ale moim zdaniem lepiej jak pozostaną kwaskowate lekko.\n3. Ricottę wymieszaj ze skyrem i erytrolem.\n4. Naleśniki nadziej ricottą, zwiń w trójkąty, polej gorączce wiśniami, opcjonalnie polej pastą pistacjową - polecam (pamiętaj, by dodać ją do produktów w przepisie, jeśli dodasz).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/VCp8U9pxJiPHuRKfY1DoWkQJBI5haNuxvie5ZYAV.jpg","kcal":511.44,"protein":48.16,"fat":18.5,"carbs":38.45,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":15,"measure":"łyżeczka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":75,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Maliny mrożone","grams":60,"measure":"garść"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Ser Ricotta","grams":100,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":55545303,"name":"Sernik baskijski w lżejszej wersji","description":"1. Przygotuj formę: wyłóż tortownicę (18 cm) papierem do pieczenia.\n2. Zrób spód: herbatniki rozdrobnij na piasek i wymieszaj z roztopionym masłem. Wyłóż na dno formy i dociśnij.\n3. Podpiecz w 180°C przez 8–10 minut, odstaw.\n4. Odsącz ricottę, jeśli jest taka konieczność. W tym celu przełóż ricottę na sitko na około 20 minut, żeby pozbyć się nadmiaru wody.\n5. Przygotuj masę serową: do miski dodaj ser kremowy i ricottę - wymieszaj na gładko. Dodawaj jajka po jednym, mieszając tylko do połączenia. Dodaj erytrytol, sól, wanilię i śmietanę.\n6. Wymieszaj krótko - masa ma być gładka i lekko lejąca, jak gęsta śmietana.\n7. Przelej masę: wlej masę do formy na podpieczony spód.\n8. Piecz w 220°C, góra–dół, przez około 30-35 minut. Jeśli góra jest zbyt jasna, podkręć temperaturę do 240°C na kilka minut, żeby się przypiekła.\n7.\tWyjmij, gdy brzegi są ścięte, góra przypieczona, a środek nadal lekko się rusza. Wyjmij od razu z piekarnika.\n8.\tStudzenie: ostaw sernik do wystudzenia w temperaturze pokojowej. Następnie włóż do lodówki na minimum kilka godzin, najlepiej na całą noc.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/LinC505ftR2Gr3M9kFI0oObDgnrwNbdnybwaCpQj.jpg","kcal":2385.78,"protein":80.75,"fat":200,"carbs":65.67,"ingredients":[{"name":"Serek śmietankowy (Delikate)","grams":450,"measure":"łyżka"},{"name":"Ser Ricotta","grams":250,"measure":"opakowanie"},{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":100,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Herbatniki","grams":60,"measure":"sztuka"},{"name":"Masło","grams":28,"measure":"łyżeczka"},{"name":"Śmietana 12% (Pewni Dobrego)","grams":150,"measure":"łyżka"}],"category":"Deser"},{"id":55584450,"name":"Sushi bowl z krewetkami","description":"1. Ryż ugotuj według zaleceń producenta na opakowaniu. Następnie wymieszaj ocet ryżowy z erytrolem i szczyptą soli i wymieszaj z ciepłym ryżem. Pozostaw do wystudzenia. \n2. Edamame ugotuj w lekko osolonym wrzątku i również pozostaw do wystudzenia.\n3. Krewetki obierz i oczyść, przypraw solą i płatkami chilli i usmaż na rozgrzanej oliwie. \n4. Ogórka i awokado pokrój w plastry, a marchewkę w cienkie słupki.\n5. Nori potnij na paseczki. \n6. W misce ułóż ryż, edamame, pokrojone warzywa, awokado oraz nori i krewetki. Wszystko skrop sosem sojowym oraz posyp sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/KypeycQdaHnF3IiiuImveOabELlpzC7OEQmZ4qPD.jpg","kcal":515.82,"protein":41.51,"fat":13.79,"carbs":60.33,"ingredients":[{"name":"Ryż do sushi","grams":60,"measure":"łyżka"},{"name":"Ocet ryżowy","grams":5,"measure":"łyżka"},{"name":"Erytrytol","grams":2,"measure":"szczypta"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Edamame","grams":25,"measure":"porcja"},{"name":"Awokado","grams":35,"measure":"sztuka"},{"name":"Krewetki","grams":150,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Sezam","grams":2,"measure":"łyżeczka"},{"name":"Algi nori","grams":2,"measure":"sztuka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Płatki chili","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":55584493,"name":"Wiosenny omlet ze szparagami i łososiem wędzonym","description":"1. Szparagi pozbaw twardych końcówek i obsmaż na odrobinie oliwy. Dopraw solą i pieprzem. \n2. Jajka rozmąć widelcem razem z mlekiem. Dopraw solą i pieprzem. Koperek i szczypiorek posiekaj i dodaj do masy jajecznej. \n3. Szparagi zdejmij z patelni, wlej pozostałą oliwę, rozgrzej ją i wylej masę jajeczną. \n4. Kiedy omlet będzie już ścięty od spodu, na jego połowie ułóż szparagi, kawałki łososia oraz \"kropki\" z serka. Zawiń omlet na pół i smaż jeszcze przez chwilę aż środek się zetnie.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/pQGjhxyYTkng3ib6IWA5aYuSM6IJfhF5fbWjIcFS.jpg","kcal":336.71,"protein":30.06,"fat":20.77,"carbs":8.51,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":30,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Szparagi","grams":100,"measure":"g"},{"name":"Łosoś wędzony","grams":50,"measure":"plaster"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":55584503,"name":"Wysokobiałkowe gofry ze szparagami i jajkiem sadzonym","description":"1. Zblenduj ze sobą serek, mleko, jajko i oliwę na jednolitą konsystencję.\n2. Do masy dodaj mąkę, skrobię, proszek do pieczenia i szczyptę soli. Zmiksuj jedynie do połączenia składników. Dodaj posiekany koperek, wymieszaj i odstaw masę na 25-30 minut.\n3. Rozgrzej gofrownicę wysmarowaną tłuszczem. Do porządnie rozgrzanej gofrownicy wlej ciasto na gofry. Smaż przez 4-5 minut w zależności od mocy gofrownicy. Nie otwieraj gofrownicy w trakcie.\n4. Studź gofry na kratce.\n5. Szparagi pozbaw twardych końcówek i obsmaż na oliwie z oliwek. Dopraw solą i pieprzem. Zdejmij z patelni i wbij jajka. Przygotuj jajka sadzone z płynnym żółtkiem.\n6. Gofry wyłóż na talerz, na nie wyłóż szparagi i jajko sadzone. Udekoruj pokrojonymi w plasterki rzodkiewkami oraz kiełkami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/jgIzuy7cu5MgeubiZHxCs5v4ahx7NdNplNoCD197.jpg","kcal":781.58,"protein":46.51,"fat":35.04,"carbs":73.84,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Serek wiejski lekki","grams":100,"measure":"g"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":65,"measure":"szklanka"},{"name":"Skrobia ziemniaczana","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{ "grams":32,"measure":"łyżka"}],"category":"Śniadanie"},{"id":55584640,"name":"Sałatka ze szparagami, truskawkami i grillowanym halloumi","description":"1. Płatki migdałów upraż na suchej patelni i przełóż do miseczki. \n2. Od szparagów odetnij twarde końce, a następnie obsmaż je na odrobinie oliwy. Dopraw solą i pieprzem. Przełóż na bok, a na tej samej patelni zgrilluj plastry sera halloumi. \n3. Truskawki pokrój w ćwiartki lub plasterki. \n4. Do miski przełóż mix sałat, szparagi, truskawki oraz grillowany ser. \n5. Pozostałą oliwę wymieszaj z miodem, musztardą, sokiem z cytryny oraz solą i pieprzem. Przygotowanym sosem polej sałatkę i posyp ją prażonymi pestkami migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/Uk5DwsglF5tz0rd3SRAvvYjwChZdElVoyHCz4Scp.jpg","kcal":412.67,"protein":22.81,"fat":26.5,"carbs":26.1,"ingredients":[{"name":"Mix sałat","grams":50,"measure":"garść"},{"name":"Szparagi","grams":150,"measure":"g"},{"name":"Truskawki","grams":70,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Ser Halloumi","grams":60,"measure":"g"},{"name":"Migdały płatki","grams":5,"measure":"łyżeczka"}],"category":"Sałatka"},{"id":55584673,"name":"Wysokobiałkowy koktajl czekoladowo-orzechowy","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. \n2. Możesz dodać wodę i/lub erytrol, jeśli potrzebujesz.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/m7EOCYncw7tk0IUOVZ4Bi063nibT1iapkkgSAEiu.jpg","kcal":273.9,"protein":29.21,"fat":12.99,"carbs":15.21,"ingredients":[{"name":"Napój migdałowy wzbogacony w wapń","grams":240,"measure":"szklanka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"mea
