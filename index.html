całkowitego wystudzenia.","servings":12,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/W0vtqaL1nqOd4ozY6iGiESMHSfOpK70hqrffcXkZ.jpg","kcal":3023.71,"protein":195.92,"fat":133.68,"carbs":290.5,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":500,"measure":"g"},{"name":"Jajko kurze","grams":250,"measure":"średnia sztuka"},{"name":"Płatki owsiane górskie","grams":350,"measure":"łyżka"},{"name":"Nasiona słonecznika","grams":40,"measure":"łyżeczka"},{"name":"Pestki dyni","grams":40,"measure":"łyżka"},{"name":"Siemię lniane","grams":50,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":12,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":55870674,"name":"Sałatka z awokado, kurczakiem i szparagami","description":"1. Kurczaka przypraw solą, pieprzem i czosnkiem, usmaż lub ugrilluj na odrobinie oliwy. Po lekkim wystudzeniu pokrój w paseczki.\n2. Szparagi pozbaw twardych końcówek i podsmaż krótko (3–5 min), żeby nadal były chrupiące.\n3. Awokado pokrój w kostkę, a pomidorki na pół.\n4. Do miski przełóż sałatę, dodaj pokrojone składniki, szparagi oraz kurczaka.\n5. Pozostałą oliwę wymieszaj z miodem, musztardą i sokiem z cytryny. Przypraw solą i pieprzem. Polej sałatkę przygotowanym dressingiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/xqHW1yS40OFTMbuLPJhTOMrMte5shcqIx3IbKj7K.jpg","kcal":455.84,"protein":30.72,"fat":25.47,"carbs":31.06,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Roszponka","grams":50,"measure":"garść"},{"name":"Szparagi","grams":150,"measure":"g"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Musztarda francuska","grams":20,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":55870994,"name":"Wiosenna sałatka z jajkiem, brokułem i rzodkiewką","description":"1. Brokuły ugotuj al dente w lekko osolonej wodzie i pozostaw do wystudzenia. \n2. Jajka ugotuj na twardo i również pozostaw do wystudzenia. \n3. Z jogurtu, majonezu, musztardy przygotuj sos. Dopraw solą, pieprzem i szczyptą erytrolu. Dodaj posiekany koperek, przeciśnięty czosnek i wymieszaj. \n4. Rzodkiewki pokrój w plasterki, a szczypiorek posiekaj. \n5. Do miski włóż brokuły oraz rzodkiewki. Dodaj obrane i pokrojone w ćwiartki jajka. Polej dressingiem jogurtowym i posyp posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/V9Xx8d4yU0vToA4UkXk8yJpjF9OrzyylXCazSIqt.jpg","kcal":356.58,"protein":22.02,"fat":21.86,"carbs":21.27,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Brokuł","grams":200,"measure":"różyczka"},{"name":"Rzodkiewka","grams":90,"measure":"sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Jogurt grecki","grams":60,"measure":"łyżka"},{"name":"Majonez light","grams":15,"measure":"łyżka"},{"name":"Musztarda","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":55901944,"name":"Marchewkowa babka z kremem cytrynowym i pistacjami","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół). Marchew zetrzyj na tarce o drobnych oczkach.\n2. Wymieszaj mokre składniki na ciasto (jogurt, jajka, oliwę - jeśli masz zwykłą możesz do ciasta dodać łyżkę soku z cytryny), a w oddzielnej misce składniki suche (mąkę, przyprawy, sodę, proszek, 120 g erytrolu - możesz dać więcej, jeśli lubisz BARDZO słodkie babki, sól).\n3. Przesiej suche składniki do mokrych i wymieszaj do połączenia składników. Dodaj startą marchew i wymieszaj. Przelej do silikonowej foremki na babkę i upiecz przez ok. 50 minut na środkowej półce piekarnika. Po upieczeniu studź w otworem piekarniku przez około 15 minut, a następnie na blacie. Babkę wyjmij z foremki dopiero po całkowitym wystudzeniu.\n4. Krem: najlepiej użyć do niego pudru z erytrolu - nie będzie wyczuwalny jako drobinki. Wymieszaj serek, pozostały erytrol, sok z 1/2 cytryny i skórkę z 1/2 cytryny.\n5. Całkowicie wystudzone ciasto udekoruj kremem i posyp posiekanymi pistacjami.","servings":14,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/a5WVEeiPvsqtYGSKFBNllCwT5XHtC95TEB169CZi.jpg","kcal":3293.58,"protein":77.41,"fat":224.79,"carbs":250.4,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":300,"measure":"szklanka"},{"name":"Proszek do pieczenia","grams":4,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":4,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Gałka muszkatołowa mielona","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":150,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":140,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Pistacje","grams":15,"measure":"łyżka"},{"name":"Cytryna","grams":43,"measure":"średnia sztuka"},{"name":"Serek śmietankowy (Delikate)","grams":200,"measure":"opakowanie"},{"name":"Jogurt grecki","grams":125,"measure":"szklanka"},{"name":"Marchew","grams":210,"measure":"duża sztuka"}],"category":"Deser"},{"id":56148957,"name":"Fit fudge z ciecierzycy","description":"1. Ciecierzycę odcedź z zalewy i dokładnie opłucz.\n2. Czekoladę rozpuść w kąpieli wodnej.\n3. Wszystkie składniki umieść w naczyniu blendera i zmiksuj na jednolitą, bardzo kremową masę.\n4. Keksówkę wyłóż papierem do pieczenia (będzie łatwiej wyjąć później) i przełóż masę do foremki. Wstaw do lodówki najlepiej na całą noc.\n5. Podziel na 12 kawałków, przechowuj w lodówce.","servings":12,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/201M5jvV6JvPWZGyFKigNQyGhokoRvPQa27Xv0nB.jpg","kcal":1677.75,"protein":55.91,"fat":93.1,"carbs":178.45,"ingredients":[{"name":"Ciecierzyca konserwowa w słoiku (Nasza Spiżarnia)","grams":400,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":60,"measure":"łyżka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":35,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":150,"measure":"opakowanie"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":75,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":30,"measure":"łyżka"}],"category":"Deser"},{"id":56350553,"name":"Podwójnie czekoladowy chlebek bananowy","description":"1. Piekarnik rozgrzej do 175 stopni (góra-dół).\n2. W misce rozgnieć lub zblenduj banany na gładką masę. Dodaj oliwę i erytrol. Zmiksuj przez 2-3 minuty, aż masa będzie jednolita.\n3. Dodaj jajko i ponownie zmiksuj.\n4. Dodaj jogurt i ponownie wymieszaj jedynie do połączenia składników.\n5. W oddzielnej misce wymieszaj suche składniki: mąkę, kakao, sodę i sól. Przesiej do mokrych składników i wymieszaj jedynie do połączenia składników.\n6. Czekoladę posiekaj i dodaj do masy, wymieszaj.\n7. Przelej masę do foremki (ja użyłam silikonowej keksówki) i piecz przez około 55-60 minut (do suchego patyczka). Wyjmij i pozostaw do przestudzenia - dopiero po wystudzeniu wyjmij z foremki i pokrój.","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/sL7wTGpyBiJssD4XZv1enGinv0lyGgBOdJGHRH6b.jpg","kcal":2412.55,"protein":47.45,"fat":146.22,"carbs":244,"ingredients":[{"name":"Banan","grams":360,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":170,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":110,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Jogurt naturalny","grams":75,"measure":"łyżka"},{"name":"Erytrytol","grams":150,"measure":"szklanka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Soda oczyszczona","grams":4,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":50,"measure":"opakowanie"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":40,"measure":"łyżka"}],"category":"Deser"},{"id":56551970,"name":"Makaron z pieczoną fetą, szparagami i pomidorkami","description":"1. Piekarnik rozgrzej do 200 stopni (góra-dół).\n2. Pomidorki pokrój na połówki. Szparagi pozbaw twardych końcówek i pokrój na 3-4 cm kawałki.\n3. W naczyniu żaroodpornym połóż fetę i na około niej rozłóż pomidorki i szparagi. Całość polej oliwą, posyp oregano, papryką, czosnkiem i pieprzem (opcjonalnie solą, feta jest już słona). Piecz ok. 25-30 minut - aż pomidory się przypieką, a feta zmięknie.\n4. W międzyczasie ugotuj makaron al dente. Zachowaj 100-150 ml wody z gotowania makaronu.\n5. Upieczoną fetę z warzywami wyjmij i wszystko dokładnie wymieszaj dodaj makaron i trochę wody z gotowania makaronu i ponownie wymieszaj, aż sos będzie gładki i oblepi makaron. \n6. Podawaj posypane świeżą bazylią.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Fdau5QMf4SKuOYbvdNLZtl7JRSq4meBIY15WQCah.jpg","kcal":1103.76,"protein":49.51,"fat":55.61,"carbs":106.44,"ingredients":[{"name":"Makaron","grams":100,"measure":"g"},{"name":"Ser Feta","grams":200,"measure":"opakowanie"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Szparagi","grams":200,"measure":"duża sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Oregano suszone","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"}],"category":"Obiad"},{"id":56554538,"name":"Gnocchi w kremowym sosie ze szparagami i szynką","description":"1. Na suchą patelnię wrzuć szynkę pokrojoną na mniejsze kawałki i podsmaż, aż zrobi się chrupiąca. Odłóż na bok. Jeśli jednak wolisz szynkę n a surowo - możesz pominąć ten krok i dodać ją po prostu na koniec do potrawy.\n2. Na patelni rozgrzej odrobinę oliwy i dodaj przeciśnięty przez praskę czosnek (uważaj, by nie przypalić).\n3. Szparagi pozbaw twardych końcówek i pokrój na 3-4 cm kawałki. Wrzuć na tę samą patelnię i smaż 3-5 minut (niezbyt długo, mają być miękkie, ale nadal jędrne i chrupiące).\n3. Gnocchi ugotuj zgodnie z instrukcją. Zachowaj ok. pół szklanki wody z gotowania gnocchi.\n\nTIP: możesz gnocchi także wrzucić na patelnie i lekko podsmażyć - będą miały lepszą teksturę.\n\n4. Do patelni dodaj serek śmietankowy i część wody z gotowania gnocchi, wymieszaj, aż powstanie kremowy sos (w razie potrzeby dodaj więcej wody).\n5. Dodaj sok i skórkę z cytryny, pieprz, podsmażoną wcześniej szynkę i ugotowane gnocchi. Wymieszaj\n6. Przełóż na talerz. Podawaj posypane parmezanem i opcjonalnie świeżymi ziołami (np. bazylią).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/IZF2fTRrBU7z3sLKS5OHbIQKLwVEf6YfdOM9O6V2.jpg","kcal":568.12,"protein":29.45,"fat":20.61,"carbs":67.2,"ingredients":[{"name":"Szparagi","grams":160,"measure":"średnia sztuka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Gnocchi (GustoBello)","grams":150,"measure":"porcja"},{"name":"Szynka Szwarcwaldzka","grams":45,"measure":"plaster"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Skórka z cytryny","grams":6,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"}],"category":"Obiad"},{"id":56569114,"name":"Risotto z krewetkami i szparagami","description":"1. Na patelni rozgrzej oliwę, dodaj posiekaną szalotkę i zeszklij.\n2. Dodaj przeciśnięty przez praskę czosnek i smaż chwilę (20-30 sekund).\n3. Wsyp suchy ryż i wymieszaj ok. minutę.\n4. Wlej na patelnię wodę i dodaj bulion, wymieszaj.\n5. Przykryj i gotuj na średnim ogniu ok. 12-15 minut. Na ostatnie ok. 4 minuty dodaj szparagi pozbawione twardych końcówek i pokrojone na 2-3 cm kawałki.\n6. Kiedy ryż już będzie miękki i kremowy dodaj: krewetki, parmezan, sok i skórkę z cytryny oraz pieprz. Wymieszaj i gotuj jeszcze przez ok. 1-2 minuty, aż krewetki będą gotowe.\n7. Podawaj posypane posiekaną pietruszką.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/1uVR2xEyLkmId8ZvCks9QYSElTOnaWHpJPbb65TR.jpg","kcal":809.36,"protein":59.97,"fat":17.25,"carbs":96.75,"ingredients":[{"name":"Ryż Arborio do risotto","grams":100,"measure":"g"},{"name":"Krewetki","grams":200,"measure":"duża sztuka"},{"name":"Woda","grams":500,"measure":"szklanka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szparagi","grams":200,"measure":"duża sztuka"},{"name":"Skórka z cytryny","grams":6,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Obiad"},{"id":56645040,"name":"Pasta z awokado i twarożku","description":"1. Cebulę drobno posiekaj.\n2. W misce umieść wszystkie składniki wraz z posiekaną cebulą i rozgnieć widelcem na pastę.\n3. Podawaj z pieczywem i warzywami. Możesz podać też do pasty jajko sadzone czy łososia wędzonego dla większej ilości białka.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/HoQCreFFlVcZwm2xdXqu53ERGCxwfgHNAT0jWkTA.jpg","kcal":381.73,"protein":19.83,"fat":26.67,"carbs":21.1,"ingredients":[{"name":"Awokado","grams":140,"measure":"sztuka"},{"name":"Twarożek grani","grams":150,"measure":"małe opakowanie"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"}],"category":"Pasta"},{"id":56645055,"name":"Pasta z makreli i jajek","description":"1. Jajka ugotuj na twardo, obierz i pokrój w kostkę.\n2. Makrelę pozbaw kości i dodaj do jajek porwaną na mniejsze kawałki.\n3. Szalotkę i szczypiorek drobno posiekaj.\n4. Do jajek i makreli dodaj wszystkie pozostałe składniki. Opcjonalnie możesz dodać jeszcze małą łyżeczkę musztardy jeśli lubisz.\n5. Podawaj z pieczywem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/OiDdcJbtdxP8LyFCgoAAvYku418RkRyaXKWrfmbf.jpg","kcal":840.33,"protein":68.52,"fat":58.49,"carbs":13.96,"ingredients":[{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Makrela wędzona","grams":200,"measure":"porcja"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"},{"name":"Majonez wegański (Go Vege)","grams":25,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Szalotka","grams":20,"measure":"sztuka"}],"category":"Pasta"},{"id":56645083,"name":"Pasta z awokado i białej fasoli","description":"1. Fasolę odcedź z zalewy i dokładnie opłucz.\n2. Wszystkie składniki zblenduj na jednolitą kremową pastę.\n3. Podawaj najlepiej na pieczywie żytnim, z dodatkiem warzyw i ewentualnie wędzonego łososia lub z jajkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/Cn7Yjjec839iEc2HAmouX4gFBjW76CBKYkuarR09.jpg","kcal":515.86,"protein":20.96,"fat":21.4,"carbs":67.12,"ingredients":[{"name":"Awokado","grams":140,"measure":"sztuka"},{"name":"Fasola biała konserwowa","grams":240,"measure":"puszka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Pasta"},{"id":56847701,"name":"Naleśniki budyniowe","description":"1. Wszystkie składniki zmiksuj na jednolite ciasto.\n2. Rozgrzej patelnię przesmarowaną oliwą (ja daję oliwę tylko na początku, jeśli masz dobrą patelnię, to nie trzeba dużo tłuszczu do naleśników) i smaż naleśniki z dwóch stron (cierpliwie, lepiej dłużej, a na mniejszej mocy).\n3. Podawaj z ulubionymi dodatkami!","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/O9feo650WeY8awrdXAZ7ehaBnw7CaikIuBP8CYOL.jpg","kcal":348.83,"protein":14.34,"fat":10.11,"carbs":49.71,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"g"},{"name":"Budyń bez cukru","grams":24,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":125,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"}],"category":"Śniadanie"},{"id":56865923,"name":"Gulasz wołowy (wolnowar)","description":"1. Pokrój wołowinę, cebulę, czosnek, marchewki i paprykę na podobnej wielkości kawałki. Na patelni rozgrzej oliwę i obsmaż mięso z każdej strony na złoty kolor, a następnie przełóż je do wolnowaru.\n2. Dodaj cebulę, czosnek, marchewki, paprykę, pomidory z puszki, koncentrat, liście laurowe i przyprawy. Całość zalej wodą i bulionem tak, aby składniki były prawie przykryte.\n3. Ustaw wolnowar (ja mam firmy Crockpot) na tryb low i gotuj 8–10 godzin lub na high przez 4–5 godzin, aż mięso będzie miękkie. Jeśli chcesz, pod koniec możesz zagęścić sos mąką rozmieszaną w odrobinie wody i gotować jeszcze około 30 minut.\n4. Podawaj posypane świeżą natką pietruszki, z ugotowaną kaszą gryczaną.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/5C20pjIdYKq8NGbRub6lF6I0PSI6LjFnuLU08i2J.jpg","kcal":1684.25,"protein":138.73,"fat":40.59,"carbs":214.97,"ingredients":[{"name":"Wołowina mięso gulaszowe","grams":480,"measure":"porcja"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Marchew","grams":120,"measure":"średnia sztuka"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Koncentrat pomidorowy","grams":25,"measure":"łyżka"},{"name":"Liść laurowy","grams":2,"measure":"liść"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Papryka wędzona w proszku","grams":4,"measure":"łyżeczka"},{"name":"Majeranek suszony","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":12,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Kasza gryczana niepalona","grams":200,"measure":"łyżka"}],"category":"Obiad"},{"id":56965588,"name":"Pasta łososiowa z koperkiem i kaparami","description":"1. Łososia pozbaw skóry i przełóż do miseczki. Rozdrobnij widelcem.\n2. Dodaj serek oraz majonez. \n3. Koperek i kapary posiekaj i dodaj do pasty. \n4. Wszystko razem wymieszaj i dopraw pieprzem.\n5. Podawaj z ulubionym pieczywem i warzywami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/e3RNiseJvc7TZYCccfOHyiR50qhS2daunHziuzRZ.jpg","kcal":412.17,"protein":37.61,"fat":25.79,"carbs":8.12,"ingredients":[{"name":"Łosoś wędzony na gorąco","grams":125,"measure":"opakowanie"},{"name":"Serek naturalny lekki (Bieluch)","grams":75,"measure":"opakowanie"},{"name":"Majonez light","grams":25,"measure":"łyżka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Kapary","grams":10,"measure":"łyżka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Pasta"},{"id":56966171,"name":"Błyskawiczna pasta jajeczna ze szczypiorkiem","description":"1. Jajka ugotuj na twardo. Następnie wystudź i obierz ze skorupek. \n2. Szczypiorek posiekaj. \n3. Jajka przełóż do miseczki i rozgnieć za pomocą widelca razem z majonezem oraz musztardą. \n4. Dodaj szczypiorek i dopraw pastę solą i pieprzem. Wszystko razem wymieszaj.\n5. Pastę podawaj z ulubionym pieczywem i warzywami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/uE7RmEmuCBplWkGTh2NfHxY3YpKwL5rtcFubKkxG.jpg","kcal":201.21,"protein":13.29,"fat":14.89,"carbs":3.5300000000000002,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Musztarda","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":56966798,"name":"Pasta twarogowa z suszonymi pomidorami","description":"1. Twaróg zmiksuj z suszonymi pomidorami na gładką pastę. \n2. Natkę pietruszki posiekaj i dodaj wraz pestkami dyni do pasty. Dopraw solą i pieprzem i wymieszaj. \n3. Pastę podawaj z ulubionym pieczywem i warzywami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Gh6MbQXWQ2OkIjqNfdDiPBhMe47KBqn9aSzZQfwR.jpg","kcal":436.13,"protein":56.02,"fat":14.73,"carbs":25.21,"ingredients":[{"name":"Ser twarogowy chudy","grams":250,"measure":"duże opakowanie"},{"name":"Pomidory suszone w zalewie","grams":60,"measure":"sztuka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":57084311,"name":"Domowy hummus","description":"1. Ciecierzycę opłucz z zalewy i wrzuć do naczynia blendera. \n2. Dodaj tahini, sok z cytryny, kmin rzymski, sól i pieprz. \n3. Miksuj składniki dolewając stopniowo bardzo zimną wodę. Nie ma jej w składnikach, ponieważ ilość wody zależy od rodzaju ciecierzycy jaką używasz. Dodawaj wodę do momentu aż powstanie gładka i aksamitna pasta. \n4. Gotowy hummus przełóż do miseczki, polej oliwą i posyp posiekaną natką pietruszki.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/ZguJ1XzPx4UnxELfXMk3F9rsHuI26lYVFrQIBxU2.jpg","kcal":804.04,"protein":34.82,"fat":38.01,"carbs":70.58,"ingredients":[{"name":"Ciecierzyca w zalewie","grams":400,"measure":"opakowanie"},{"name":"Sól","grams":3,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Kumin w proszku (kmin rzymski)","grams":4,"measure":"łyżeczka"},{"name":"Tahini masło sezamowe","grams":30,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Pasta"},{"id":57085937,"name":"Wysokobiałkowa pasta z tuńczyka","description":"1. Jajko ugotuj na twardo, pozostaw do wystudzenia i obierz. Następnie pokrój w drobną kostkę lub zetrzyj na tarce o grubych oczkach. \n2. Tuńczyka odsącz z zalewy i przełóż do miseczki. Suszone pomidory i szczypiorek posiekaj, a ogórka kiszonego pokrój w drobną kostkę. \n3. Składniki wymieszaj ze skyrem, majonezem i musztardą. Dopraw pieprzem i ewentualnie solą. \n4. Podawaj z ulubionym pieczywem i warzywami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/5zylRy068M4hDLnp0sdsUm5ZFMQwgQg2yHzZweLa.jpg","kcal":413.64,"protein":55.59,"fat":15.98,"carbs":12.27,"ingredients":[{"name":"Tuńczyk w sosie własnym","grams":160,"measure":"opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ogórki kiszone","grams":120,"measure":"średnia sztuka"},{"name":"Pomidory suszone w zalewie","grams":20,"measure":"sztuka"},{"name":"Majonez light","grams":20,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"}],"category":"Pasta"},{"id":57155176,"name":"Cebulowa pasta z tofu","description":"1. Cebulę posiekaj.\n2. Na patelni rozgrzej oliwę, dodaj cebulę i zeszklij ją. Smaż, mieszając do jakiś czas, do momentu, aż cała będzie złocista i pięknie zarumieniona.\n3. W naczyniu blendera umieść przygotowaną cebulę i wszystkie pozostałe składniki i zblenduj na kremową pastę. W razie potrzeby możesz dodać więcej przypraw lub soli, opcjonalnie płatki chilli, jeśli lubisz ostrzejsze smaki.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/MOnnNc6uWHYrzIcXPyqrl1JYsPFmwu4D8CVZ3DBi.jpg","kcal":556.94,"protein":29.71,"fat":36.17,"carbs":34.31,"ingredients":[{"name":"Tofu wędzone","grams":180,"measure":"opakowanie"},{"name":"Cebula","grams":440,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Pieprz czarny","grams":4,"measure":"szczypta"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"}],"category":"Pasta"},{"id":57194915,"name":"Pasta z tofu i suszonych pomidorów","description":"1. Do kielicha blendera wrzuć wszystkie składniki.\n2. Zblenduj na jednolitą masę - gdyby było zbyt mało kremowe - dodawaj stopniowo kapkę wody (jeśli nie oszczędzasz kalorii - możesz też zwiększyć ilość oliwy).","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/sqNYR2l5Yoq8wkTMztgArmR89lpYulq3gjAivgSJ.jpg","kcal":543.64,"protein":28.34,"fat":38.44,"carbs":29.5,"ingredients":[{"name":"Tofu wędzone","grams":180,"measure":"opakowanie"},{"name":"Pomidory suszone w zalewie","grams":100,"measure":"sztuka"},{"name":"Przecier pomidorowy","grams":15,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":57215681,"name":"Udon z kurczakiem w paprykowo-orzechowym sosie","description":"1. Kurczaka pokrój w cienkie paski i dopraw solą. Wymieszaj z mąką ziemniaczaną. Na patelni rozgrzej oliwę i usmaż kurczaka, aż straci surowość. Przełóż na chwilę na talerzyk.\n2. Szalotkę posiekaj. Zeszklij na tej samej patelni.\n3. Papryki pokrój w cieniutkie paski. Dodaj do cebuli, przesmaż chwilę.\n4. Dodaj na patelnię przygotowanego kurczaka i smaż 3-4 minutki.\n5. W tym czasie wymieszaj składniki na sos: masło orzechowe, sos sojowy, srirachę, miód, sok z limonki, przeciśnięty przez praskę czosnek i kapkę lub dwie wody - dla konsystencji. Dodaj sos na patelnię, wymieszaj, przesmaż.\n6. Makaron ugotuj wg instrukcji na opakowaniu, odcedź i dodaj na patelnię. W razie potrzeby dodaj trochę wody (może być ta z gotowania makaronu).\n7. Wymieszaj wszystko dokładnie, a jak składniki się połączą to przełóż danie na patelnię, posyp posiekanym szczypiorkiem i podawaj z limonką.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/OwpcXbJGwyOZbPjJENLD4Hor36vPZk7J2ErTdoXI.jpg","kcal":1021.12,"protein":67.35,"fat":38.85,"carbs":101.88,"ingredients":[{"name":"Udon (Asia Style)","grams":200,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"},{"name":"Mąka ziemniaczana","grams":12,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":45,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":6,"measure":"łyżeczka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sok z limonki","grams":6,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Papryka zielona","grams":60,"measure":"średnia sztuka"},{"name":"Szalotka","grams":20,"measure":"sztuka"}],"category":"Obiad"},{"id":57256947,"name":"Prosty serek wiejski z warzywami i pieczywem","description":"1. Serek wymieszaj z pestkami, posiekanym szczypiorkiem, szczyptą soli i pieprzu.\n2. Pomidorki pokrój na pół, a ogórka w słupki.\n3. Serek wiejski zjedz z pokrojonymi warzywami i pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/FCTHT39KJeCyI9caGLOI4eiTjqRrXxxxrpJ0OwTn.jpg","kcal":431.18,"protein":29.18,"fat":15.13,"carbs":46.36,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Pestki dyni","grams":5,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}],"category":"Przekąska"},{"id":57257799,"name":"Najszybsza kanapka z grahamką","description":"1. Bułkę przekrój na pół i posmaruj masłem, a następnie dodaj sałatę, szynkę i pokrojonego pomidora. Posyp posiekanym szczypiorkiem.\n2. Ogórka pokrój w słupki i zjedz razem z kanapkami. \n3. Dodatkowo zjedz orzechy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/JcSDFMSdlhIHolBWiE9edE5aw2Qr34lbHlmLPd81.jpg","kcal":408.35,"protein":23.72,"fat":15.82,"carbs":44.47,"ingredients":[{"name":"Bułka grahamka","grams":70,"measure":"sztuka"},{"name":"Miks tłuszczowy klasyczny (Finuu)","grams":5,"measure":"łyżeczka"},{"name":"Szynka z piersi kurczaka","grams":60,"measure":"plaster"},{"name":"Sałata masłowa","grams":30,"measure":"garść"},{"name":"Pomidor czerwony","grams":90,"measure":"mała sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Orzechy włoskie","grams":15,"measure":"łyżka"}],"category":"Przekąska"},{"id":57258183,"name":"Klasyczna prosta sałatka caprese","description":"1. Pomidory i mozzarellę pokrój w plastry. Ułóż naprzemiennie na talerzu. \n2. Skrop oliwą i octem balsamiczny oraz dopraw solą i pieprzem.\n3. Udekoruj listkami bazylii i posyp pestkami dyni. \n4. Sałatkę zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/4nNcuO7Mvb2CvtkkTU9zedDHH1RLllAK1gAnYtZe.jpg","kcal":456.2,"protein":35.54,"fat":24.01,"carbs":27.03,"ingredients":[{"name":"Pomidor czerwony","grams":180,"measure":"mała sztuka"},{"name":"Mozzarella light","grams":125,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Ocet balsamiczny","grams":3,"measure":"łyżeczka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}],"category":"Przekąska"},{"id":57258556,"name":"Jogurt z gotową granolą i owocami","description":"1. Jogurt przełóż do miseczki. Jeśli potrzebujesz możesz wymieszać go z erytrolem lub innym słodzikiem.\n2. Dodaj granolę, owoce oraz migdały.","servings":1,"photo":"https://d1wxteijfk37ar.c zanej patelni.\n3. Szparagi pozbaw twardych końcówek i pokrój na 0.5 cm kawałki (główki odłóż do dodania w późniejszym etapie).\n4. Na patelnię dodaj suszone pomidory (jeśli masz w całości to je wcześniej pokrój w cienkie paski) i szparagi (bez główek). Posól i przesmaż 5-6 minut.\n6. Dodaj na patelnię wodę, bulion i serek. Wymieszaj, żeby składniki się połączyły.\n7. Dodaj na patenię gnocchi, wymieszaj i duś całość jeszcze 2-3 minuty, aż gnocchi będą miękkie. Dopraw pieprzem. W razie potrzeby dodaj więcej wody.\n8. Przełóż na talerz podawaj posypane parmezanem i pietruszką.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/LusPOMAfeyMdNjLBPqBbKQwpeeYaCFVAP9rDvbNa.jpg","kcal":1062.43,"protein":39.97,"fat":36.55,"carbs":148.78,"ingredients":[{"name":"Gnocchi (GustoBello)","grams":300,"measure":"porcja"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Szparagi","grams":260,"measure":"duża sztuka"},{"name":"Pomidory suszone w zalewie","grams":80,"measure":"sztuka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":135,"measure":"łyżka"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"}],"category":"Obiad"},{"id":57862879,"name":"Nocna owsianka kokosowo-czekoladowa","description":"1. W słoiczku wymieszaj płatki owsiane, nasiona chia, mleko i jogurt kokosowy i wstaw do lodówki na noc.\n2. Rano dodaj na wierzch pudding czekoladowy, wiórki kokosowe i maliny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/pr7aNynWFHiWU4fH22tccyGhAvUjxqRsCM0yR9er.jpg","kcal":471.97,"protein":30.92,"fat":13.81,"carbs":57.33,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure ozgniecionym ząbkiem czosnku. Tak przygotowaną marynatą posmaruj każdego ziemniaka, a następnie wszystkie posyp tartym parmezanem. \n5. Ziemniaki piecz ok. 15- 20 minut.\n6. Upieczone ziemniaki posyp posiekanym koperkiem lub szczypiorkiem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/k1hq3uh6g03w4D0Gc1wsmD2OyKRq8DfjUt8q457z.jpg","kcal":640.46,"protein":17.12,"fat":24.9,"carbs":91.1,"ingredients":[{"name":"Ziemniaki","grams":500,"measure":"g"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"łyżeczka"},{"name":"Papryka wędzona w proszku","grams":1,"measure":"łyżeczka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"}],"category":"Obiad"},{"id":58177609,"name":"Aromatyczne kofty z indyka z sosem tzatziki","description":"1. Cebulę i paprykę pokrój w drobną kostkę, a kolendrę posiekaj. \n2. Mięso wymieszaj z oliwą, przyprawami, przeciśniętym czosnkiem i pokrojonymi warzywami oraz kolendrą. Z masy uformuj kotleciki i nadziewaj je na patyczki do szaszłyków. \n3. Kofty upiecz w piekarniku (180 stopni ok. 15 minut) lub przygotuj na grillu. \n4. Przygotuj sos tzatziki: ogórka zetrzyj na tarce o grubych oczkach i odciśnij z nadmiaru wody.  Jogurt wymieszaj z przeciśniętym ząbkiem czosnku, majonezem oraz startym ogórkiem. Przypraw solą, pieprzem i szczyptą erytrolu.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/dqwWPzXuzqefMZKPTCNvmIx1ITdGMYttCEUjEfYe.jpg","kcal":1075.18,"protein":127.81,"fat":49.2,"carbs":34.13,"ingredients":[{"name":"Mięso mielone z indyka","grams":500,"measure":"porcja"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Oregano suszone","grams":1,"measure":"łyżeczka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Rozmaryn suszony","grams":1,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Jogurt naturalny typu greckiego","grams":200,"measure":"opakowanie"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Ogórek","grams":180,"measure":"sztuka"},{"name":"Majonez light","grams":25,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":58180693,"name":"Wiosenna sałatka cezar z grillowanymi szparagami","description":"1. Pokrojonego w paski kurczaka zamarynuj w oregano, soli, pieprzu i oliwie.\n2. Podsmaż mięso na patelni. Przełóż mięso na talerz do ostudzenia, a następnie na tej samej patelni podsmaż szparagi pozbawione twardych końcówek.\n3. W misce ułóż porwaną sałatę oraz pomidorki przekrojone na pół. Dodaj cebulę pokrojoną w cienkie piórka.\n4. Na wierzchu ułóż usmażonego kurczaka i szparagi.\n5. Jogurt wymieszaj z majonezem, sokiem z cytryny, przeciśniętym przez praskę czosnkiem oraz solą i pieprzem.\n6. Sałatkę polej sosem i posyp parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Pobel8uyAtfb8BTZZapgmqe1WNmi5WO8FcQOw2Ng.jpg","kcal":393,"protein":35.64,"fat":19.65,"carbs":20.35,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Jogurt naturalny","grams":75,"measure":"małe opakowanie"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Sałata rzymska","grams":40,"measure":"garść"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Ser Parmezan","grams":16,"measure":"łyżeczka"}],"category":"Obiad"},{"id":58181386,"name":"Szparagi na burracie","description":"1. Szparagi pozbaw twardych końcówek, a następnie gotuj w lekko osolonej wodzie przez 3 minuty. Odcedź i przelej zimną wodą.\n2. Na suchej patelni upraż płatki migdałów na złoty kolor. Przełóż na chwilkę na bok. \n3. Na tej samej patelni rozgrzej odrobinę oliwy i podsmaż szparagi. Dopraw je solą i szczyptą erytrolu. \n4. Na półmisku rozłóż ser burrata. Na wierzch wyłóż grillowane szparagi i posyp migdałami. Dodatkowo dodaj skórkę startą z cytryny (pamiętaj, aby sparzyć ją wrzątkiem przed starciem). Polej pozostałą oliwą.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Hng6yHzCT2AJiWblGFUdLDZhq3Aik62gDrFjG3SK.jpg","kcal":546.19,"protein":18.7,"fat":47.75,"carbs":15.8,"ingredients":[{"name":"Szparagi","grams":250,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ser Burrata","grams":125,"measure":"sztuka"},{"name":"Migdały płatki","grams":15,"measure":"łyżka"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":58182267,"name":"Najprostsze muffinki z rabarbarem i białą czekoladą","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Rabarbar umyj, obierz i pokrój w kostkę. Białą czekoladę posiekaj. \n3. W jednej misce wymieszaj wszystkie suche składniki - mąkę, erytrol i proszek do pieczenia. \n4. W drugiej misce wymieszaj jajko, mleko, ekstrakt waniliowy oraz olej. \n5. Połącz zawartość obu misek. Wymieszaj wszystkie składniki za pomocą rózgi kuchennej na gładką masę. Nie mieszaj składników zbyt długo. \n6. Masę przełóż do 6 papilotek na muffinki. Na wierzch każdej dodaj rabarbar i białą czekoladę. Delikatnie powciskaj dodatki w ciasto. \n7. Babeczki piecz ok. 30 minut.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/DqLPUxzrfU7SluHywgSYbndIgHmw51q6DY3Xrqea.jpg","kcal":1192.75,"protein":29.74,"fat":64.95,"carbs":122.25,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":150,"measure":"g"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Ekstrakt waniliowy","grams":2,"measure":"kropla"},{"name":"Mleko 1,5%","grams":75,"measure":"szklanka"},{"name":"Olej rzepakowy","grams":50,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Rabarbar","grams":102,"measure":"sztuka"},{"name":"Biała czekolada","grams":18,"measure":"kostka"}],"category":"Obiad"},{"id":58182830,"name":"Sałatka \"Petarda\" z grillowanym halloumi i granatem","description":"1. Ser halloumi pokrój w kostkę i obsmaż na rozgrzanej patelni (bez tłuszczu) z każdej ze stron aż stanie się złocisty. Pod koniec dodaj miód oraz płatki chilli i smaż jeszcze przez chwilę aż wszystkie kawałki obtoczą się w karmelowym słodko-ostrym sosie. \n2. Ogórka pokrój w kostkę, pomidorki na pół, cebulkę i natkę posiekaj. \n3. Obierz granat. \n4. Oliwę wymieszaj z octem balsamicznym , sokiem z limonki, sezamem, solą i pieprzem (możesz to zrobić np. w małym słoiczku - dodaj do niego wszystkie składniki, zakręć i potrząsaj aż utworzy się jednolita emulsja).\n5. Wrzuć do miski wszystkie pokrojone warzywa,  ser, pestki granatu i polej dressingiem. Wymieszaj delikatnie wszystkie składniki.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/LSHdBwGGtPZipLueuygHRTlZbAB8p1PAQFgxSezM.jpg","kcal":786.73,"protein":41.77,"fat":53.95,"carbs":40.4,"ingredients":[{"name":"Ser Halloumi","grams":125,"measure":"kostka"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Ogórek","grams":180,"measure":"sztuka"},{"name":"Cebula dymka","grams":15,"measure":"średnia sztuka"},{"name":"Granat","grams":50,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ocet balsamiczny","grams":6,"measure":"łyżka"},{"name":"Sok z limonki","grams":12,"measure":"łyżka"},{"name":"Sezam","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":58183248,"name":"Domowa lemoniada mango","description":"1. Pomarańczę pokrój w plastry i umieść w dużym dzbanku. \n2. Dodaj wodę, mus z mango, kostki lodu, sok wyciśnięty z limonki oraz erytrol. \n3. Wszystko wymieszaj i na końcu dodaj miętę - zgnieć ją delikatnie przed dodaniem do lemoniady w celu wydobycia większego aromatu.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/oQT84vnNaLSt17glNiMmmyFljQ1h28cviYSw7XOR.jpg","kcal":263.06,"protein":3.63,"fat":0.53,"carbs":62.19,"ingredients":[{"name":"Woda","grams":1500,"measure":"szklanka"},{"name":"Mus z mango 100%","grams":225,"measure":"opakowanie"},{"name":"Kostki lodu","grams":200,"measure":"kostka"},{"name":"Pomarańcza","grams":160,"measure":"mała sztuka"},{"name":"Mięta","grams":4,"measure":"garść"},{"name":"Limonka","grams":10,"measure":"plaster"},{"name":"Erytrytol","grams":20,"measure":"łyżka"}],"category":"Obiad"},{"id":58238307,"name":"Gniecione młode ziemniaczki","description":"1. Małe młode ziemniaki wyszoruj i ugotuj w lekko osolonym wrzątku. \n2. Piekarnik rozgrzej do 200 stopni. \n3. Miękkie ziemniaki ułóż na blaszce wyłożonej papierem do pieczenia. Każdy z nich delikatnie rozgnieć np. za pomocą szklanki. \n4. Oliwę wymieszaj z sypki anymi szparagami","description":"1. Pokrojonego w paski kurczaka zamarynuj w oregano, soli, pieprzu i oliwie.\n2. Podsmaż mięso na patelni. Przełóż mięso na talerz do ostudzenia, a następnie na tej samej patelni podsmaż szparagi pozbawione twardych końcówek.\n3. W misce ułóż porwaną sałatę oraz pomidorki przekrojone na pół. Dodaj cebulę pokrojoną w cienkie piórka.\n4. Na wierzchu ułóż usmażonego kurczaka i szparagi.\n5. Jogurt wymieszaj z majonezem, sokiem z cytryny, przeciśniętym przez praskę czosnkiem oraz solą i pieprzem.\n6. Sałatkę polej sosem i posyp parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Pobel8uyAtfb8BTZZapgmqe1WNmi5WO8FcQOw2Ng.jpg","kcal":393,"protein":35.64,"fat":19.65,"carbs":20.35,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Jogurt naturalny","grams":75,"measure":"małe opakowanie"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Sałata rzymska","grams":40,"measure":"garść"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Ser Parmezan","grams":16,"measure":"łyżeczka"}],"category":"Sałatka"},{"id":58238582,"name":"Sałatka \"Petarda\" z grillowanym halloumi i granatem","description":"1. Ser halloumi pokrój w kostkę i obsmaż na rozgrzanej patelni (bez tłuszczu) z każdej ze stron aż stanie się złocisty. Pod koniec dodaj miód oraz płatki chilli i smaż jeszcze przez chwilę aż wszystkie kawałki obtoczą się w karmelowym słodko-ostrym sosie. \n2. Ogórka pokrój w kostkę, pomidorki na pół, cebulkę i natkę posiekaj. \n3. Obierz granat. \n4. Oliwę wymieszaj z octem balsamicznym , sokiem z limonki, sezamem, solą i pieprzem (możesz to zrobić np. w małym słoiczku - dodaj do niego wszystkie składniki, zakręć i potrząsaj aż utworzy się jednolita emulsja).\n5. Wrzuć do miski wszystkie pokrojone warzywa,  ser, pestki granatu i polej dressingiem. Wymieszaj delikatnie wszystkie składniki.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/LSHdBwGGtPZipLueuygHRTlZbAB8p1PAQFgxSezM.jpg","kcal":786.73,"protein":41.77,"fat":53.95,"carbs":40.4,"ingredients":[{"name":"Ser Halloumi","grams":125,"measure":"kostka"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Ogórek","grams":180,"measure":"sztuka"},{"name":"Cebula dymka","grams":15,"measure":"średnia sztuka"},{"name":"Granat","grams":50,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ocet balsamiczny","grams":6,"measure":"łyżka"},{"name":"Sok z limonki","grams":12,"measure":"łyżka"},{"name":"Sezam","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":58238632,"name":"Najprostsze muffinki z rabarbarem i białą czekoladą","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Rabarbar umyj, obierz i pokrój w kostkę. Białą czekoladę posiekaj. \n3. W jednej misce wymieszaj wszystkie suche składniki - mąkę, erytrol i proszek do pieczenia. \n4. W drugiej misce wymieszaj jajko, mleko, ekstrakt waniliowy oraz olej. \n5. Połącz zawartość obu misek. Wymieszaj wszystkie składniki za pomocą rózgi kuchennej na gładką masę. Nie mieszaj składników zbyt długo. \n6. Masę przełóż do 6 papilotek na muffinki. Na wierzch każdej dodaj rabarbar i białą czekoladę. Delikatnie powciskaj dodatki w ciasto. \n7. Babeczki piecz ok. 30 minut.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/DqLPUxzrfU7SluHywgSYbndIgHmw51q6DY3Xrqea.jpg","kcal":1192.75,"protein":29.74,"fat":64.95,"carbs":122.25,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":150,"measure":"g"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Ekstrakt waniliowy","grams":2,"measure":"kropla"},{"name":"Mleko 1,5%","grams":75,"measure":"szklanka"},{"name":"Olej rzepakowy","grams":50,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Rabarbar","grams":102,"measure":"sztuka"},{"name":"Biała czekolada","grams":18,"measure":"kostka"}],"category":"Deser"},{"id":58238708,"name":"Domowa lemoniada mango","description":"1. Pomarańczę pokrój w plastry i umieść w dużym dzbanku. \n2. Dodaj wodę, mus z mango, kostki lodu, sok wyciśnięty z limonki oraz erytrol. \n3. Wszystko wymieszaj i na końcu dodaj miętę - zgnieć ją delikatnie przed dodaniem do lemoniady w celu wydobycia większego aromatu.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/oQT84vnNaLSt17glNiMmmyFljQ1h28cviYSw7XOR.jpg","kcal":263.06,"protein":3.63,"fat":0.53,"carbs":62.19,"ingredients":[{"name":"Woda","grams":1500,"measure":"szklanka"},{"name":"Mus z mango 100%","grams":225,"measure":"opakowanie"},{"name":"Kostki lodu","grams":200,"measure":"kostka"},{"name":"Pomarańcza","grams":160,"measure":"mała sztuka"},{"name":"Mięta","grams":4,"measure":"garść"},{"name":"Limonka","grams":10,"measure":"plaster"},{"name":"Erytrytol","grams":20,"measure":"łyżka"}],"category":"Napój"},{"id":58955769,"name":"Deser chia a’la bounty","description":"1. Wiórki podpraż na suchej patelni, aż będą złociste. Przestudź.\n2. Wymieszaj skyr, mleko i erytrol. Dodaj nasiona chia i wymieszaj. Odstaw na 15 minut do lodówki i w tym czasie rozpuść czekoladę w kąpieli wodnej. Możesz dodać łyżkę-dwie mleka, aby była bardziej płynna.\n3. Przemieszaj nasiona ponownie, dodaj przestudzone wiórki kokosowe, na wierzchu udekoruj gorzką czekoladą i posyp solą z wierzchu.\n4. Wstaw do lodówki na noc najlepiej lub na kilka godzin.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/vJtdKSo33MlFuXXRwzg6AxscYOKFEh3jshqRwxrp.jpg","kcal":353,"protein":22.93,"fat":19.43,"carbs":23.66,"ingredients":[{"name":"Wiórki kokosowe","grams":12,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Nasiona chia","grams":18,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"}],"category":"Deser"},{"id":59006518,"name":"Truskawkowe NICE CREAM","description":"1. Umieść w misie (Thermomixa lub MC Smarta) owoce i rozdrobnij (15 sekund, obroty na 8).\n2. Zamontuj motylek, dodaj odżywkę i mleko. Ubijaj 2 minuty na obrotach o mocy 3. W połowie zatrzymaj, zgarnij masę ze ścianek i ubij jeszcze chwilę. Opcjonalnie dodaj na końcu garść świeżych truskawek (lekko rozgniecionych) i krótko wymieszaj.\n3. Podawaj od razu z ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/91Pi3S6QFLYvF8WhRqZnJVmH61Q9SLbR8JtT2NWV.jpg","kcal":217.85,"protein":19.09,"fat":2.63,"carbs":31.11,"ingredients":[{"name":"Truskawki mrożone","grams":280,"measure":"garść"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":20,"measure":"miarka"},{"name":"Mleko 1,5%","grams":75,"measure":"szklanka"}],"category":"Deser"},{"id":59120477,"name":"Owsianka a’la mango sticky rice","description":"1. W garnku zagotuj płatki, mleko krowie i 100 ml mleczka kokosowego oraz wiórki, 10 g erytrolu i szczyptę soli. Gotuj, co jakiś czas mieszając, do zgęstnienia. Przestudź lekko, dodaj skyr i wymieszaj, przełóż do miseczki. \n2. W garnku podgrzej pozostałą część mleczka kokosowego (25 ml) z pozostałą częścią erytrolu (5 g), wanilię i kilka kropel soku z limonki. Wymieszaj.\n3. Do owsianki dodaj pokrojone mango i polej sosem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/GcPVFmg2cORkWLV9XfuFLOUfgBRLmSD1VkghEfea.jpg","kcal":454.43,"protein":29.73,"fat":13,"carbs":55.47,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Mleczko kokosowe light 6%","grams":125,"measure":"szklanka"},{"name":"Mleko 1,5%","grams":150,"measure":"szklanka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mango","grams":90,"measure":"plaster"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Sok z limonki","grams":1,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":59127522,"name":"Jednoporcjowy sernik na zimno z truskawkową galaretką","description":"1. Żelatynę rozpuść w 50 ml gorącej wody i odstaw do przestudzenia.\n2. Na dnie naczynia wyłóż biszkopty.\n3. Jogurty wymieszaj z erytrolem (ok. 15 g) i aromatem waniliowym. Dodaj przestudzoną żelatynę i wymieszaj dokładnie. Wylej całość na biszkopty. Wstaw do lodówki aż masa stężeje.\n4. Galaretkę wymieszaj z 200 ml gorącej wody i erytrolem (5-10 g) i odstaw do przestudzenia (ale nie stężenia).\n5. Na jogurtowy spód wyłóż pokrojone truskawki i wylej przestudzoną (nie gorącą!) galaretkę. Wstaw do lodówki do całkowitego stężenia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/nfkSD3TJkmGRYaVNrOqug4TmK2nTUQay58n51gYQ.jpg","kcal":407.64,"protein":56.61,"fat":3.82,"carbs":36.89,"ingredients":[{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Żelatyna","grams":4,"measure":"łyżeczka"},{"name":"Truskawki","grams":70,"measure":"garść"},{"name":"Galaretka bez cukru","grams":20,"measure":"łyżka"},{"name":"Biszkopty","grams":33,"measure":"sztuka"}],"category":"Deser"},{"id":59754377,"name":"Zapiekanka z batatem, szpinakiem i mozzarellą","description":"1. Piekarnik nagrzej do 175 stopni (termoobieg).\n2. Batata obierz i pokrój w cienkie plastry, szpinak posiekaj.\n3. W naczyniu ułóż 3 warstwy: bataty, szpinak, ser.\n4. Na sam wierzch połóż pokrojone pomidorki.\n5. Jajka wymieszaj z mlekiem i przyprawami. Zalej nimi całość i wstaw do piekarnika na ok. 40 minut.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/88RrQVbYe8c8CHApAAVVIkuVJYwAihMqe2j7LkU3.jpg","kcal":696.62,"protein":46.15,"fat":31.26,"carbs":61.05,"ingredients":[{"name":"Batat","grams":200,"measure":"mała sztuka"},{"name":"Mozzarella tarta","grams":50,"measure":"g"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":50,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bazylia suszona","grams":3,"measure":"szczypta"},{"name":"Oregano suszone","grams":3,"measure":"szczypta"}],"category":"Obiad"},{"id":59940075,"name":"Jednoporcjowy serniczek z ricotty i chia","description":"1. Czekoladę rozpuść w kąpieli wodnej.\n2. Czekoladę i pozostałe skladniki, oprócz chia zblenduj na jednolitą masę.\n3. Dodaj chia i wymieszaj.\n4. Przełóż do foremki (ja używam takiego małego rantu o średnicy 8 cm) i wstaw do lodówki najlepiej na całą noc.\n5. Przed wyjęciem nożem oddziel serniczek od rantu i opcjonalnie polej polewą z kakao (łyżeczka kakao + 2-3 łyżki wody + szczypta soli i erytrolu) i udekoruj malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/ZR3DCcJy2AiZNsTIwUtuIOjtczhNqrgfPTmGZO17.jpg","kcal":524.93,"protein":24.09,"fat":36.47,"carbs":28.01,"ingredients":[{"name":"Ricotta","grams":125,"measure":"g"},{"name":"Serek śmietankowy lekki (Delikate)","grams":100,"measure":"łyżka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":18,"measure":"kostka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Nasiona chia","grams":24,"measure":"łyżka"}],"category":"Deser"},{"id":60407641,"name":"Kokosowo-limonkowe risotto z krewetkami i szparagami","description":"1. Podsmaż posiekaną cebulę na oliwie. Dodaj czosnek, imbir i chili, przesmaż chwilę.\n2. Wsyp suchy ryż i podsmaż chwilę razem z przyprawami.\n3. Wlej bulion i wodę (najlepiej dodawaj stopniowo, każdy rodzaj ryżu nieco inaczej chłonie płyn) i gotuj około 6-7 minut, mieszając co jakiś czas.\n4. Dodaj pokrojone na mniejsze kawałki i pozbawione twardych końcówek szparagi oraz krewetki (najwygodniej użyć mrożonych, już oczyszczonych). Gotuj 4-5 min. bez przykrycia.\n5. Wlej mleczko kokosowe i gotuj jeszcze chwilę, aż risotto zrobi się kremowe i gotowe.\n6. Dodaj sok z limonki, dopraw do smaku i gotowe. Podawaj posiekane szczypiorkiem lub najlepiej kolendrą ;).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/Mt7WqCz8Nqtl0udEbUwE9f2YPEYLRBe47tPhXnmJ.jpg","kcal":1027.81,"protein":81.38,"fat":17.54,"carbs":140.37,"ingredients":[{"name":"Ryż do sushi","grams":150,"measure":"łyżka"},{"name":"Krewetki","grams":300,"measure":"duża sztuka"},{"name":"Szparagi","grams":240,"measure":"średnia sztuka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":2,"measure":"łyżeczka"},{"name":"Mleczko kokosowe light 6%","grams":150,"measure":"szklanka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Bulion warzywny (Winiary)","grams":30,"measure":"łyżka"},{"name":"Woda","grams":600,"measure":"szklanka"}],"category":"Obiad"},{"id":60488495,"name":"Warstwowy deser a’la mango sticky rice","description":"Ryż gotuj powoli w mleku z dodatkiem mleczka kokosowego, aż będzie kremowy i lekko kleisty. Dodaj erytrytol i odstaw do lekkiego przestudzenia. Wymieszaj skyr z odżywką kokosową i odrobiną skórki/soku z limonki.\n\nDo szklanki nakładaj warstwami:\n\nryż kokosowy\nkrem kokosowo-limonkowy\nmango\n\nUdekoruj wiórkami kokosowymi.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/WSjFTzPETBdaQjyVHjU7qwFymMqbt6VTuq2dfvJk.jpg","kcal":497.8,"protein":35.36,"fat":10.83,"carbs":65.26,"ingredients":[{"name":"Ryż do sushi","grams":45,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":175,"measure":"szklanka"},{"name":"Mleczko kokosowe light 6%","grams":80,"measure":"szklanka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":10,"measure":"miarka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Mango","grams":90,"measure":"plaster"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Wiórki kokosowe","grams":3,"measure":"łyżka"}],"category":"Deser"},{"id":60529001,"name":"Wegański smalczyk z fasoli","description":"1. Cebulę drobno posiekaj.\n2. Na patelni rozgrzej oliwę i zeszklij cebulę.\n3. Jabłko obierz i drobno pokrój (lub zetrzyj na tarce), dodaj do cebuli i smaż, aż zmięknie.\n4. Dodaj przeciśnięty przez praskę czosnek, przesmaż jeszcze chwilę.\n5. Przełóż zawartość patelni do miski, dodaj odcedzoną i przepłukaną fasolę oraz przyprawy i sos sojowy. Zblenduj na jednolitą masę.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/dKpFbTTL7sqtrCBIxlRMo1PTpXXJId00CwM2bFtT.jpg","kcal":537.35,"protein":22.83,"fat":12.13,"carbs":91.39,"ingredients":[{"name":"Fasola biała konserwowa","grams":240,"measure":"łyżka"},{"name":"Cebula","grams":220,"measure":"średnia sztuka"},{"name":"Jabłko","grams":140,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sos sojowy o obniżonej zawartości sodu","grams":15,"measure":"łyżka"},{"name":"Majeranek suszony","grams":1,"measure":"łyżeczka"},{"name":"Tymianek suszony","grams":1,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"}],"category":"Pasta"},{"id":60906201,"name":"Zapiekanka z orzo i brokułem","description":"1. Brokuła podziel na małe różyczki.\n2. W misce wymieszaj serek Almette, skyr, wodę, bulion, przeciśnięty czosnek i parmezan.\n3. Do naczynia żaroodpornego wsyp surowy makaron orzo, dodaj brokuły i zalej przygotowanym sosem.\n4. Dokładnie wymieszaj.\n5. Piecz około 15 minut w 220°C.\n6. Przemieszaj ponownie dokładnie i piecz jeszcze około 20–25 minut, aż makaron będzie miękki i kremowy.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/tKByffAyfwBEsp4wWAq7LmU5kC2gnJSTFcGQUhIV.jpg","kcal":1259.66,"protein":75.59,"fat":31.36,"carbs":168.38,"ingredients":[{"name":"Makaron orzo","grams":180,"measure":"filiżanka"},{"name":"Woda","grams":400,"measure":"szklanka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":150,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":3,"measure":"szczypta"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Brokuł","grams":300,"measure":"różyczka"},{"name":"Ser Parmezan","grams":32,"measure":"łyżka"}],"category":"Obiad"},{"id":60938126,"name":"Waniliowy serniczek z bananem i czekoladą","description":"1. Herbatniki rozkrusz na „mąkę” i wyłóż na spód naczynia.\n2. Twaróg i skyr zblenduj. Opcjonalnie możesz dodać jeszcze trochę erytrolu i aromat waniliowy (jeśli sam skyr waniliowy to dla Ciebie zbyt mało i wolisz słodsze). Wyłóż twarożek na herbatników spód.\n3. Banana pokrój w plasterki i wyłóż na wierzch.\n4. Czekoladę rozpuść w kąpieli wodnej i polej nią deser. Z wierzchu posyp szczypta soli.\n5. Wstaw na kilka godzin, a najlepiej na całą noc do lodówki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/m2rR3Pdkm32QIhDbC10SSKrQAFDHZPUwfwQmFR9i.jpg","kcal":341.26,"protein":33.27,"fat":7.78,"carbs":35.98,"ingredients":[{"name":"Herbatniki","grams":10,"measure":"sztuka"},{"name":"Ser twarogowy chudy","grams":120,"measure":"duże opakowanie"},{"name":"Skyr waniliowy (Piątnica)","grams":75,"measure":"opakowanie"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Sól","grams":1,"measure":"szczypta"}],"category":"Deser"},{"id":61179191,"name":"Jogurtowa jagodzianka","description":"1. Piekarnik rozgrzej do 170 stopni (góra-dół).\n2. Wszystkie składniki oprócz jagód wymieszaj.\n3. Przełóż masę do małego naczynia żaroodpornego, a na wierzch wyłóż jagody. Opcjonalnie posyp częścią erytrolu po wierzchu jagód.\n4. Wstaw do nagrzanego piekarnika i pecz około 20 minut, aż wierzch się zarumieni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/i8GyuCyqFODJYQz08DOXHw7r52ATljVrXWlYZ7fJ.jpg","kcal":471.63,"protein":17.59,"fat":17.71,"carbs":59.83,"ingredients":[{"name":"Jogurt grecki","grams":120,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":60,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Jagody mrożone","grams":90,"measure":"garść"}],"category":"Śniadanie"},{"id":61332000,"name":"Racuszki z serka wiejskiego z truskawkami","description":"1. Wszystkie składniki oprócz oliwy i truskawek zblenduj na jednolitą masę.\n2. Truskawki pokrój w cienkie plasterki.\n3. Na patelni rozgrzej oliwę i wlewaj po łyżce ciasta. Jak się zetnie od spodu - na każdy placuszek połóż 1-2 plastry truskawek. Smaż pod przykryciem na średniej mocy. Jak już się prawie całkowicie zetną i będą stabilne - przewróć łopatką na drugą stronę i smaż jeszcze chwilę.\n4. Podawaj posypane pudrem z erytrolu i na przykład skyrem waniliowym (dodaj go do składników) lub innymi, ulubionymi dodatkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/QTm70nG3no04Vgmncafl2sV7TAYWeWqcVVulFaYF.jpg","kcal":407.13,"protein":25.23,"fat":13.53,"carbs":45.61,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":60,"measure":"łyżeczka"},{"name":"Serek wiejski lekki","grams":100,"measure":"g"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"}],"category":"Śniadanie"},{"id":61552180,"name":"Wrap z ziemniaków","description":"1. Piekarnik nagrzej do 200 stopni (góra-dół).\n2. Ziemniaki obierz i zetrzyj lub pokrój na bardzo cieniutkie plastry (najlepiej sprawdzi się tu jednak mandolina).\n3. Blaszkę wyłóż papierem do pieczenia, i spryskaj lub posmaruj oliwą za pomocą pędzelka (bardzo delikatnie, tej oliwy ma być tylko tyle, by wrap lepiej się odrywał od papieru).\n4. Plastry ziemniaków ułóż w prostokąt tak, by lekko nachodziły na siebie i nie było zbyt dużych dziur i odstępów (prostokąt wielkości mniej więcej typowego wrapa/lawaszu).\n5. Ziemniaki posyp mozzarellą, szczególnie gęsto te części, gdzie widzisz „prześwity” (na brzegach możesz dać nieco mniej) ;).\n6. Wstaw do piekarnika na 20 minut.\n7. Oderwij delikatnie papier od wrapa odwracając go „do góry nogami” i wewnętrzną część nafaszeruj ulubionymi dodatkami (np. serek śmietankowy, sałata, ogórek, łosoś itp. - pamiętaj, by te dodatki dodać do składników, aby zaktualizowała się kaloryczność). Zwiń jak wrapa.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/tHirrL2NtHWMhXIA6yYwoqiyVvmvVFgJdLnq9yiA.jpg","kcal":304.94,"protein":17.55,"fat":13.75,"carbs":28.17,"ingredients":[{"name":"Ziemniaki","grams":150,"measure":"średnia sztuka"},{"name":"Mozzarella tarta","grams":60,"measure":"g"},{"name":"Oliwa z oliwek","grams":1,"measure":"łyżka"}],"category":"Obiad"},{"id":61656652,"name":"Prosty zestaw z grilla z kiełbaską","description":"1. Kiełbaskę ponacinaj na skos i zgrilluj. \n2. Pieczywo natrzyj czosnkiem i posmaruj masłem i przygotuj grzanki na grillu. \n3. Warzywa pokrój tak, jak lubisz i dopraw solą i pieprzem. \n4. Grilla zjedz z musztardą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/5W7hMxTSgy9jAdWmeqVy9xB8Rj2ftyzoIR2C5YTH.jpg","kcal":525.71,"protein":17.6,"fat":30.08,"carbs":47.21,"ingredients":[{"name":"Kiełbasa grillowana","grams":75,"measure":"sztuka"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Masło","grams":5,"measure":"łyżeczka"},{"name":"Pomidor czerwony","grams":90,"measure":"mała sztuka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}],"category":"Obiad"},{"id":61657900,"name":"Szaszłyki w jogurtowej marynacie z parmezanem","description":"1. Mięso pokrój w grubą kostkę. \n2. Jogurt wymieszaj z oliwą, przyprawami, startym parmezanem i sokiem z cytryny. \n3. Mięso włóż do marynaty, dokładnie wymieszaj i włóż do lodówki na min. 2-3 godziny, a najlepiej na całą noc. \n4. Papryki i cebulę pokrój w grubą kostkę. \n5. Nadziewaj naprzemiennie zamarynowane mięso i warzywa na patyczki do szaszłyków. Przygotuj szaszłyki na grillu. \n6. Gotowe szaszłyki posyp posiekaną natką pietruszki.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/vvn9DszkTORh85L81ulDI1Y2hOICdLMKNAuwe3LD.jpg","kcal":879.79,"protein":108.8,"fat":31.46,"carbs":39.5,"ingredients":[{"name":"Kurczak pierś","grams":400,"measure":"sztuka"},{"name":"Jogurt naturalny","grams":50,"measure":"łyżka"},{"name":"Ser Parmezan","grams":32,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Papryka czerwona","grams":170,"measure":"duża sztuka"},{"name":"Papryka żółta","grams":170,"measure":"duża sztuka"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Obiad"},{"id":61659075,"name":"Sałatka z pieczonymi młodymi ziemniaczkami, szparagami i mozzarellą","description":"1. Piekarnik rozgrzej do 190 stopni. \n2. Ziemniaczki dobrze umyj i osusz. Wymieszaj z oliwą (zostaw odrobinę do skropienia szparagów) i przyprawami. Ułóż na blaszce wyłożonej papierem do pieczenia i piecz ok. 30-40 minut - czas pieczenia zależy od wielkości ziemniaków (jeśli masz większe możesz je przekroić na pół).\n3. Szparagi pozbaw twardych końcówek i pokrój na 3-4 części. Skrop pozostałą oliwą, przypraw solą i pieprzem i dorzuć do pieczenia obok ziemniaków na ostatnie 8-10 minut. \n4. Do miski przełóż rukolę, posiekane suszone pomidory, przekrojone na pół pomidorki koktajlowe i pokrojoną w piórka czerwoną cebulę. Dodaj przestudzone upieczone warzywa i mini mozzarellę. \n5. Oliwę wymieszaj z sokiem z cytryny, miodem i dwoma rodzajami musztardy. Przygotowanym sosem polej sałatkę tuż przed spożyciem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/UW2Vb3bzinzZXwxDg8gslN8U3KeYK9AA5eKdyPlx.jpg","kcal":804.58,"protein":42.56,"fat":38.59,"carbs":82.79,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"g"},{"name":"Szparagi","grams":250,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":2,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"szczypta"},{"name":"Rukola","grams":40,"measure":"garść"},{"name":"Ser Mozzarella mini light","grams":125,"measure":"opakowanie"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżka"},{"name":"Musztarda francuska","grams":10,"measure":"łyżka"}],"category":"Obiad"},{"id":61667529,"name":"Pieczone banany z grilla z czekoladą","description":"1. Banana w skórce natnij wzdłuż na pół. \n2. W powstałą kieszonką włóż kawałki czekolady. \n3. Banana owiń papierem do pieczenia, a następnie zawiń szczelnie folią aluminiową. \n4. Połóż na grillu na ok. 20 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/IcWB1HJHPAew89nfudMQwik9ZHWuyNI2CbPouKRF.jpg","kcal":178.56,"protein":2.26,"fat":5.47,"carbs":32.99,"ingredients":[{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"}],"category":"Obiad"},{"id":61668112,"name":"Domowa lemoniada truskawkowa","description":"1. Truskawki pozbaw szypułek i zmiksuj z 2 szklankami wody i erytrolem. Następnie przecedź przez sitko.\n2. Dodaj resztę wody, sok z cytryny i opcjonalnie dodaj więcej erytrolu, jeśli wolisz słodsze napoje. \n3. Lemoniadę podawaj mocno schłodzoną z kostkami lodu, plastrami cytryny i świeżą miętą.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/HwvSpVJCeaUtE8JJdk6hBKGsgySD2zUMtqrPodlz.jpg","kcal":167.98,"protein":3.74,"fat":1.63,"carbs":43.32,"ingredients":[{"name":"Truskawki","grams":400,"measure":"g"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Woda","grams":1000,"measure":"szklanka"},{"name":"Sok z cytryny","grams":125,"measure":"szklanka"},{"name":"Cytryna","grams":40,"measure":"plaster"},{"name":"Mięta","grams":2,"measure":"garść"}],"category":"Obiad"},{"id":61670205,"name":"Surówka grillowa z kapusty pekińskiej","description":"1. Kapustę pekińską poszatkuj, paprykę pokrój w cienkie paseczki, cebulę w piórka, a ogórka w cienkie półplastry. \n2. Natkę pietruszki posiekaj, a kukurydzę odsącz z zalewy i przepłucz pod bieżącą wodą na sitku. \n3. Majonez wymieszaj z jogurtem, musztardą i sokiem z cytryny. Dopraw solą i pieprzem. \n4. Wszystkie warzywa wymieszaj z sosem na surówkę.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Mg0F9FTChLxbzDtmd8871ipQfBc7bLCpmBDEJW1c.jpg","kcal":245.23,"protein":7.68,"fat":11.57,"carbs":33.55,"ingredients":[{"name":"Kapusta pekińska","grams":200,"measure":"g"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":50,"measure":"sztuka"},{"name":"Kukurydza konserwowa","grams":60,"measure":"łyżka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Majonez light","grams":25,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Obiad"},{"id":61670808,"name":"Pomidory pod pierzynką z parmezanem","description":"1. Pomidory pokrój w plastry i rozłóż na dużym talerzu. \n2. Jogurt wymieszaj z majonezem i przeciśniętym czosnkiem. Dopraw solą, pieprzem i szczyptą erytrolu.\n3. Pomidory polej sosem czosnkowym. \n4. Na wierzch wysyp starty parmezan i udekoruj posiekanym szczypiorkiem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/ZvR8lxOTVXNsiIzGH4DqP41KOV82dTakYfX7nIf3.jpg","kcal":492.28,"protein":22.27,"fat":30.69,"carbs":35.75,"ingredients":[{"name":"Pomidor czerwony","grams":480,"measure":"średnia sztuka"},{"name":"Jogurt naturalny","grams":150,"measure":"małe opakowanie"},{"name":"Majonez light","grams":50,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Ser Parmezan","grams":32,"measure":"łyżka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"}],"category":"Obiad"},{"id":61671641,"name":"Najprostszy pstrąg z grilla z masłem czosnkowym i pietruszką","description":"1. Rybę dokładnie oczyść i pozbaw łusek. \n2. Miękkie masło wymieszaj z przeciśniętym ząbkiem czosnku i posiekaną pietruszką. \n3. Masłem posmaruj wnętrze ryby. Na wierzchu ułóż plastry cytryny. Tak przygotowaną rybę owiń szczelnie papierem do pieczenia, a następnie folią aluminiową. \n4. Połóż na grillu i pozostaw na ok. 20-30 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/wFQAySOmtAkq98nh97WsNnxejKyjlMR9NCrserWl.jpg","kcal":279.5,"protein":33.59,"fat":13.82,"carbs":4.59,"ingredients":[{"name":"Pstrąg tęczowy dziki","grams":159,"measure":"sztuka"},{"name":"Masło","grams":10,"measure":"g"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Cytryna","grams":20,"measure":"plaster"}],"category":"Obiad"},{"id":61783056,"name":"Twarogowe knedle z truskawkami","description":"1. Twaróg rozgnieć widelcem dokładnie. Dodaj jako i mąkę, rozgnieć ponownie, aby składniki się połączyły. Opcjonalnie możesz dodać cynamon lub aromat waniliowy bez kalorii (typu Funky Flavours).\n2. Zagnieć ciasto w kulkę i na blacie opsypanym odrobiną mąki uformuj wałek. Podziel na 6-8 kawałków w zależności od wielkości Twoich truskawek.\n3. Każdy kawałek uformuj w dłoniach w kulkę, rozgnieć na płasko na dłoni, nałóż truskawkę i zagnieć dokładnie zamykając truskawkę w środku.\n4. Gotuj knedle w osolonej wodzie przez 5 minut od wypłynięcia na górę.\n5. Podawaj z jogurtem, pozostałymi truskawkami i płatkami migdałów.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/GS5llz64zGabFDzE6HvJt9iZxEazHsnLL08a8Unp.jpg","kcal":864.39,"protein":71.5,"fat":27.16,"carbs":85.06,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":72,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":200,"measure":"średnie opakowanie"},{"name":"Truskawki","grams":210,"measure":"garść"},{"name":"Migdały płatki","grams":5,"measure":"łyżka"}],"category":"Obiad"},{"id":61784276,"name":"Bowl z pieczonymi ziemniaczkami na kremie z awokado i fety","description":"1. Piekarnik rozgrzej do 190 stopni. Ziemniaki dokładnie umyj, osusz, wymieszaj z odrobiną oliwy i przypraw papryką słodką, czosnkiem granulowanym i solą. Ułóż na blaszce wyłożonej papierem (lub airfryerze) i piecz ok. 25-30 minut. \n2. Pierś z kurczaka natrzyj pozostałą oliwą i posyp przyprawą do gyrosa. Upiecz razem z ziemniaczkami - dorzuć na ostatnie 15 minut.\n3. Awokado, fetę i jogurt zmiksuj na gładką masę z sokiem z cytryny, czosnkiem, solą i pieprzem. \n4. Sos rozsmaruj na dnie miseczki. Dodaj pieczone ziemniaki, pokrojoną upieczoną pierś z kurczaka i pomidorki koktajlowe. \n5 Danie posyp posiekaną natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/HOSt297kY3U5yXG7LCchi3CrH2mZMsyydPpBLJkh.jpg","kcal":541.64,"protein":32.66,"fat":28.71,"carbs":41.95,"ingredients":[{"name":"Ziemniaki","grams":150,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Kurczak pierś","grams":100,"measure":"porcja"},{"name":"Gyros przyprawa","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Ser Feta","grams":20,"measure":"plaster"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Obiad"},{"id":61785007,"name":"Pinsa z kremem z ricotty i szparagami","description":"1. Piekarnik rozgrzej do 220 stopni. Pinsę przełóż na blaszkę wyłożoną papierem do pieczenia. Piecz ok. 6-7 minut aż spód stanie się chrupiący. \n2. Szparagi pozbaw twardych końcówek, a cukinię pokrój w plastry. Warzywa podsmaż na oliwie i dopraw solą i pieprzem.\n3. Ricottę zmiksuj z fetą oraz przeciśniętym ząbkiem czosnku. Dopraw solą i pieprzem. \n4. Przygotowanym kremem posmaruj pinsę. Na wierzch wyłóż warzywa
