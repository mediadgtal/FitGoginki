u 20 g mąki i 100 ml wody i zagotuj ciągle mieszając (najlepiej rózgą) do uzyskania gęstego budyniu. Pozostaw go do całkowitego wystudzenia.\n2. Wystudzony tangzhong połącz w dużej misce z 0,5 kg mąki, jajkiem, żółtkiem, cukrem, drożdżami, erytrolem, ciepłym (ale nie gorącym!) mlekiem oraz szczyptą soli.\n3. Wyrabiaj ręcznie lub za pomocą miksera z hakiem do jednolitego ciasta. \n4. Następnie dodawaj stopniowo miękkie masło i dalej wyrabiaj ciasto aż będzie gładkie, jednolite i lśniące. Ciasto możesz przygotować dzień wcześniej i włożyć na nocne wyrastanie do lodówki lub odstawić w ciepłe miejsce na 2 godziny do wyrośnięcia. \n5. Cynamon wymieszaj z 80 g miękkiego masła i erytrolem.\n6. Wyrośnięte ciasto uderz, aby je odgazować i przełóż na blat podsypany bardzo małą ilością mąki. Jeśli ciasto jest zimne po nocnym wyrastaniu najpierw pozostaw je na 30-45 minut do ogrzania do temperatury pokojowej.\n7. Gotowe ciasto rozwałkuj na duży prostokąt (ok 30x40 cm). Posmaruj powierzchnię nadzieniem i zwiń w rulon wzdłuż długiego boku. Rulon pokrój ostrym nożem na\n8. Cynamonki układaj na blaszce wyłożonej papierem do pieczenia, przykryj ściereczką i pozostaw jeszcze na 30 minut do wyrośnięcia. W tym czasie rozgrzej piekarnik do 180 stopni (góra-dół). \n9. Wymieszaj jajko z mlekiem i posmaruj wyrośnięte cynamonki. Piecz ok. 30-35 minut do zrumienienia. Pozostaw do ostudzenia.","servings":12,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/E8vMxw4OjPnLIAWFcZm7EdgCPK5lXrt7kMlBJdOF.jpg","kcal":3354.15,"protein":92.94,"fat":154.85,"carbs":403.6,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":20,"measure":"g"},{"name":"Woda","grams":100,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":500,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Żółtko jaja","grams":17,"measure":"duża sztuka"},{"name":"Cukier biały","grams":13,"measure":"łyżka"},{"name":"Drożdże piekarnicze suche","grams":8,"measure":"g"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":80,"measure":"g"},{"name":"Cynamon mielony","grams":20,"measure":"łyżeczka"},{"name":"Masło","grams":80,"measure":"łyżeczka"},{"name":"Erytrytol","grams":100,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":30,"measure":"łyżka"}],"category":"Deser"},{"id":45613220,"name":"Pistacjowe tiramisu z malinami","description":"1. Zaparz espresso.\n2. Do miski przełóż ricottę, jogurt, erytrol i pastę pistacjową (w składnikach \"masło orzechowe 100%\"), a następnie zmiksuj wszystko na jednolitą masę.\n3. W naczyniu ułóż naprzemiennie warstwy: namoczone w kawie biszkopty, masa pistacjowa, maliny. Powtórz do wykorzystania składników (w zależności od wielkości naczynia ułóż 2 lub 3 warstwy).\n4. Udekoruj posiekanymi pistacjami.\n5. Po przygotowaniu wstaw na kilka godzin do lodówki, żeby smaki się przegryzły.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/2/X2qYipA0BnxE2XtDQGHIGCzdnH8vAv5lWoLY3AZu.jpg","kcal":1432.83,"protein":65.42,"fat":69.41,"carbs":147.02,"ingredients":[{"name":"Biszkopty","grams":132,"measure":"sztuka"},{"name":"Kawa espresso","grams":50,"measure":"g"},{"name":"Ser Ricotta","grams":250,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Masło orzechowe 100%","grams":45,"measure":"łyżeczka"},{"name":"Pistacje","grams":15,"measure":"łyżka"},{"name":"Maliny","grams":250,"measure":"g"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"}],"category":"Deser"},{"id":45613223,"name":"Smażona brzoskwinia z serkiem waniliowym","description":"1. Brzoskwinię przekrój na pół, pozbaw pestki i posyp cynamonem oraz erytrolem (od wewnętrznej strony).\n2. Na patelni rozgrzej tłuszcz i połóż brzoskwinię (spodem do dołu). Smaż, aż obie połówki będą zarumienione i obróć na drugą stronę i smaż aż będą nieco miększe.\n3. Przełóż brzoskwinię a talerzyk, dodaj serek i posyp płatkami migdałów (możesz je wcześniej uprażyć).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/ugoeWxflDQ5O1UvM69icQtlS1vhH7nI72kmofcy4.jpg","kcal":238.64,"protein":10.36,"fat":13.62,"carbs":21.6,"ingredients":[{"name":"Brzoskwinia","grams":100,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Masło ekstra","grams":10,"measure":"g"},{"name":"Skyr waniliowy (Piątnica)","grams":75,"measure":"opakowanie"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}],"category":"Deser"},{"id":45613228,"name":"Jogurtowe ciasto ze śliwkami","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Śliwki umyj, osusz, pozbaw pestek i pokrój na mniejsze kawałki.\n3. W misce wymieszaj mąkę z proszkiem do pieczenia.\n4. W większej, oddzielnej ubij przez kilka minut jajka. Kiedy się spienią, dodaj erytrol i miksuj na puszystą, jasną masę. Następnie dodawaj stopniowo, powolnym strumieniem oliwę, a potem jogurt, cały czas miksując. Do gładkiej masy dodaj następnie mąkę z proszkiem do pieczenia i całość już tylko krótko wymieszaj.\n3. Przełóż masę do keksówki (ja użyłam silikonowej) i rozprowadź równomiernie ciasto. Na wierzchu poukładaj śliwki. Wstaw do nagrzanego piekarnika i piecz przez ok. 50 minut.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/md0VlXRqUvnrIdzGtDHQTUIKsisoXUbZ8RWEkImK.jpg","kcal":1552.76,"protein":43.78,"fat":97.96,"carbs":129.15,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":130,"measure":"szklanka"},{"name":"Jajko kurze","grams":130,"measure":"duża sztuka"},{"name":"Śliwki","grams":220,"measure":"sztuka"},{"name":"Erytrytol","grams":75,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Oliwa z oliwek","grams":75,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":250,"measure":"łyżka"}],"category":"Deser"},{"id":45613234,"name":"Kakaowe muffinki ze śliwkami","description":"1. Rozgrzej piekarnik do 180 stopni (góra-dół). \n2. W jednej misce wymieszaj mokre składniki – jajko, jogurt oraz oliwę wraz z erytrolem.\n3. W osobnej misce wymieszaj suche składniki – mąkę, kakao, proszek do pieczenia i sodę oczyszczoną. \n4. Dodaj suche składniki do mokrych i szybko wymieszaj jedynie do połączenia składników. \n5. Masę przełóż do 6 foremek na muffinki. Na wierzch dodaj pokrojone śliwki. \n6. Piecz babeczki ok. 25 minut.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/bYoCOCzGb5X7dDTXmj9mkpGoXz5I6N4ZTrpIsYma.jpg","kcal":1079.68,"protein":39.15,"fat":44.18,"carbs":161.97,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":25,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":150,"measure":"małe opakowanie"},{"name":"Erytrytol","grams":50,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":125,"measure":"g"},{"name":"Kakao w proszku","grams":50,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":4,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Śliwki","grams":330,"measure":"sztuka"}],"category":"Deser"},{"id":45613245,"name":"Ciasteczka francuskie z jabłkiem","description":"1. Jabłka obierz i pokrój w kostkę. Podduś z erytrolem i cynamonem. Możesz dodać odrobinę soku z cytryny. Budyń rozpuść w odrobinie wody i dodaj do jabłek. Wymieszaj i pozostaw do przestudzenia.\n2.  Ciasto francuskie ułóż na blaszce wyłożonej papierem do pieczenia i podziel na 5 prostokątów. \n3. Na środek każdego prostokąta wyłóż nadzienie, a brzegi zawiń tak, aby utworzyć ciasteczko. Brzegi posmaruj roztrzepanym białkiem. \n4. Piecz ok. 20 minut w temperaturze 190 stopni. Pozostaw do przestudzenia na kratce.","servings":5,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/v4iOLeX03H2HRw3cp3NaQqSFBCPMmuKob8kfCyY5.jpg","kcal":1320.26,"protein":15.31,"fat":89.65,"carbs":121.62,"ingredients":[{"name":"Ciasto francuskie","grams":275,"measure":"g"},{"name":"Jabłko","grams":220,"measure":"mała sztuka"},{"name":"Erytrytol","grams":35,"measure":"łyżeczka"},{"name":"Budyń bez cukru","grams":8,"measure":"łyżka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Białko jaja","grams":30,"measure":"sztuka"}],"category":"Deser"},{"id":45613254,"name":"Cynamonki Patki <3","description":"Składniki na ciasto:\n\nMąka pszenna typ 480 - 320 g\nZimna woda - 75 ml\nDrożdże instant - 7 g\nCukier - 20 g\nErytrol - 10 g\nsól - 4 g \nJajko (1 sztuka)\nMleko - 120 ml\nMiękkie masło - 35 g\n\nNadzienie:\n\nMiękkie masło - 35 g\nErytrol - 50 g\nCynamon - 5 g\n\nPolewa:\nSerek kanapkowy light - 60 g\nMasło - 15 g\nErytrol - 30 g\nAromat waniliowy (2-3 krople)\n\nSposób przygotowania:\n\n1. Przygotuj wstępny kleik z mąki: 20 g mąki umieść w małym garnku z 75 ml zimnej wody. Zagotuj cały czas mieszając, aż zrobi się taki budyniowy kleik bez grudek. Przełóż go do właściwej miski. Dodaj do niego 120 ml mleka w temperaturze pokojowej i jajko. Zmiksuj do połączenia składników.\n\n2.  W oddzielnej misce wymieszaj suche składniki (pozostałe 300 g mąki, 7 g drożdży, 20 g cukru, 10 g erytrolu, 4 g soli). Dodaj suche składniki do wcześniej zmiksowanych mokrych. Wyrabiaj ciasto przez ok. 10 minut.\n\n3. Następnie dodaj do ciasta 35 g masła (miękkie, w temp. pokojowej) i wyrabiaj ciasto przez kolejne ok. 12 minut. Przełóż ciasto do miski wysmarowanej tłuszczem, przykryj ściereczką i odstaw w ciepłe miejsce na godzinę.\n\n4. Po tym czasie rozwałkuj ciasto na prostokąt od grubości ok. 0,5 cm. Podsyp blat mąką, ale nie przesadzaj z jej ilością, bo ciasto będzie twarde. Posmaruj ciasto miękkim masłem (35 g) i posyp erytrolem (50 g) oraz cynamonem (5 g) (możesz wcześniej wymieszać je razem, ale posypać równomiernie). Zawiń w ciasny rulon zaczynając zwijać od krótszego boku.\n\n5. Za pomocą nitki dentystycznej (najlepiej) pokrój ciasto na 5-6 kawałków. I ułóż w naczyniu wysmarowanym tłuszczem. Przykryj ponownie i odstaw na kolejne 40-50 minut.\n\n6. Piekarnik rozgrzej do 170 stopni (termoobieg) i wstaw cynamonki do nagrzanego piekarnika na około 20-22 minuty. Po upieczeniu odstaw do wystudzenia.\n    \n7. Przygotuj polewę: w garnku podgrzej 15 g masła, 30 g erytrolu, 60 serka kanapkowego i 2-3 krople aromatu. Podgrzewaj ciągle mieszając, aż składniki się połączą i stworzą gładką polewę.\n\n8.  Cynamonki polewaj najlepiej przed podaniem. Możesz je przechowywać ok. 3 dni w szczelnym zamknięciu.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/6JHKscQqf2teoF0a1r31RYsWPFuMF9wf7o16bkl6.jpg","kcal":2074.43,"protein":58.41,"fat":88.09,"carbs":264.93,"ingredients":[{"name":"Mąka Szymanowska pszenna typ 480","grams":320,"measure":"g"},{"name":"Woda","grams":75,"measure":"szklanka"},{"name":"Drożdże piekarnicze suche","grams":7,"measure":"opakowanie"},{"name":"Cukier biały","grams":20,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":4,"measure":"szczypta"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 2%","grams":120,"measure":"szklanka"},{"name":"Masło","grams":35,"measure":"łyżeczka"},{"name":"Masło","grams":35,"measure":"łyżeczka"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":5,"measure":"szczypta"},{"name":"Serek Philadelphia light","grams":60,"measure":"łyżka"},{"name":"Masło","grams":15,"measure":"łyżeczka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":3,"measure":"kropla"}],"category":"Deser"},{"id":45613275,"name":"Dyniowe ciasteczka owsiane","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. W jednej misce wymieszaj puree z dyni, jajko, cukier oraz miód na jednolitą masę.\n3. W drugiej misce wymieszaj mąkę z płatkami owsianymi, sodą, przyprawami i szczyptą soli. \n4. Połącz mokre składniki z suchymi i dodaj do masy posiekaną gorzką czekoladę.\n5. Z masy uformuj 9 kulek i ułóż je w odstępach na blaszce wyłożonej papierem do pieczenia. Każdą z nich delikatnie spłaszcz. \n6. Ciasteczka piecz ok. 12-15 minut. Po upieczeniu pozostaw do całkowitego wystudzenia - wówczas nabiorą chrupkości.","servings":9,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/IvAj6glAMcpiBXYIY6Mv1Q8lVD4PSHXHoGKeuwf6.jpg","kcal":1008.9,"protein":30.87,"fat":36.93,"carbs":143.44,"ingredients":[{"name":"Dynia olbrzymia purre bez soli","grams":150,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":50,"measure":"łyżka"},{"name":"Miód","grams":24,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":65,"measure":"łyżka"},{"name":"Mąka owsiana","grams":65,"measure":"łyżka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Cynamon mielony","grams":4,"measure":"łyżeczka"},{"name":"Kardamon mielony","grams":1,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":50,"measure":"opakowanie"}],"category":"Deser"},{"id":45613277,"name":"Wysokoproteinowy serniczek dyniowy","description":"1. Ciasteczko oreo rozkrusz np. za pomocą widelca i wsyp na dno słoiczka/szklanki. \n2. Skyr wymieszaj z puree dyniowym, serkiem kanapkowym, odżywką białkową, masłem migdałowym, erytrolem (najlepiej zmielonym na puder) oraz przyprawami. Masę przełóż do słoiczka na rozkruszone ciasteczko. \n3. Serniczek schładzaj w lodówce ok. 30-40 minut. \n4. Przed podaniem udekoruj pestkami dyni i posiekaną gorzką czekoladą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/jL8yo5VYRmdOLFMwS9XTkDJIr3fj3NIOHNP5NoOX.jpg","kcal":415.65,"protein":38.01,"fat":18.27,"carbs":26.55,"ingredients":[{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Dynia olbrzymia purre bez soli","grams":50,"measure":"g"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Serek naturalny","grams":25,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Masło migdałowe bez soli","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Przyprawa do piernika bez cukru","grams":1,"measure":"szczypta"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Ciasteczka oreo (Kraft)","grams":11,"measure":"sztuka"}],"category":"Deser"},{"id":45613342,"name":"Chlebek pomarańczowy z żurawiną","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Wymieszaj jajka z jogurtem, sokiem pomarańczowym, olejem i skórką otartą z pomarańczy. \n3. W oddzielnym naczyniu wymieszaj mąkę, proszek do pieczenia, sodę, kurkumę i erytrol.\n4. Dodaj suche składniki do mokrych i szybko wymieszaj, tylko do połączenia.\n5. Ciasto przelej do foremki-keksówki wyłożonej papierem do pieczenia. Na wierzchu chlebek posyp żurawiną. \n6. Piecz ok. 45-60 minut do tzw. \"suchego patyczka\".","servings":12,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/XL31LekWm3SZvtdooOV505uFyo8kUdFtV0pgaSmt.jpg","kcal":1697,"protein":49.01,"fat":78.08,"carbs":199.64,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Jogurt grecki","grams":150,"measure":"g"},{"name":"Sok pomarańczowy","grams":120,"measure":"ml"},{"name":"Skórka z pomarańczy","grams":12,"measure":"łyżka"},{"name":"Olej rzepakowy","grams":50,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":250,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":42,"measure":"łyżeczka"},{"name":"Erytrytol","grams":100,"measure":"g"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"},{"name":"Żurawina","grams":30,"measure":"garść"}],"category":"Deser"},{"id":45613347,"name":"Piernik owsiany","description":"1. Piekarnik nagrzej do 170 stopni (góra-dół).\n2. Przygotuj ciasto: Do pierwszej miski wsyp suche składniki: mąkę owsianą, kakao, proszek do pieczenia, sodę i przyprawy. Wszystko razem wymieszaj.\n3. W drugiej misce ubij jajka razem z erytrolem (przez kilka minut, do momentu uzyskania puszystej masy). Pod koniec ubijania dodaj powolnym strumieniem oliwę i miód (powinien być płynny).\n4. Do miski z suchymi składnikami wlej mleko i wymieszaj. Następnie dodaj ubite jajka z dodatkami. Całość wymieszaj szpatułką (delikatnie).\n5. Gotową masę przelej do keksówki wyłożonej papierem do pieczenia i włóż do nagrzanego piekarnika na około 45-50 minut (do suchego patyczka).\n6. Upieczone ciasto wyjmij z piekarnika i odstaw do całkowitego przestygnięcia, a następnie przekrój poziomo na pół. Ciasto przełóż powidłami śliwkowymi i złóż w całość.\n7. Przygotuj polewę: 50 g czekolady rozpuść w rondelku razem z 30 ml mleka. Polewą polej wierzch piernika.","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/ommekHa2qrQl8MG2BDE0u6oY3IFUXRAeNng8EYP8.jpg","kcal":1866.26,"protein":50.05,"fat":80.21,"carbs":252.01,"ingredients":[{"name":"Mąka owsiana","grams":170,"measure":"łyżka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Erytrytol","grams":50,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":30,"measure":"łyżka"},{"name":"Miód","grams":36,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":10,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":4,"measure":"łyżeczka"},{"name":"Imbir mielony","grams":2,"measure":"szczypta"},{"name":"Przyprawa do piernika bez cukru","grams":20,"measure":"łyżeczka"},{"name":"Powidła śliwkowe","grams":100,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":50,"measure":"kostka"},{"name":"Mleko 1,5%","grams":30,"measure":"szklanka"}],"category":"Deser"},{"id":45613399,"name":"Tajska zupa z kurczakiem","description":"1. Cebulę posiekaj. Pozostałe warzywa umyj, obierz w razie potrzeby i pokrój w większą kostkę.\n2. W garnku rozgrzej oliwę i zeszklij cebulę. Dodaj przyprawy, marchew, następnie paprykę, a jak warzywa nieco zmiękną, dodaj cukinię. Duś warzywa do miękkości (ok.10-15 minut). \n3. Dodaj do nich wodę i bulion ze słoiczka, wymieszaj. Kurczaka pokrój w kostkę i dodaj do gotującej się zupy. Po ok. 3-4 minutach dodaj mleczko kokosowe, gotuj jeszcze chwilę i opcjonalnie dopraw jeszcze zupę do smaku. 4. Zupę podawaj z ugotowanym makaronem ryżowym, limonką i listkami kolendry.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2024/11/EMkLTfUbncoF4mWddFxdaBDB93MphglQXdsWPCVh.jpg","kcal":1048.23,"protein":62.41,"fat":39.9,"carbs":115.12,"ingredients":[{"name":"Makaron ryżowy","grams":100,"measure":"porcja"},{"name":"Papryka czerwona","grams":70,"measure":"g"},{"name":"Cukinia","grams":150,"measure":"g"},{"name":"Marchew","grams":90,"measure":"g"},{"name":"Cebula","grams":50,"measure":"g"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Mleczko kokosowe w puszce 21%","grams":125,"measure":"g"},{"name":"Woda","grams":750,"measure":"szklanka"},{"name":"Bulion warzywny (Winiary)","grams":38,"measure":"łyżka"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Limonka","grams":33,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Papryka wędzona w proszku","grams":1,"measure":"łyżeczka"},{"name":"Papryka ostra przyprawa","grams":1,"measure":"szczypta"},{"name":"Curry przyprawa","grams":1,"measure":"łyżeczka"}],"category":"Zupa"},{"id":45613403,"name":"Rozgrzewająca zupa cebulowa z grzanką","description":"1. Cebulę obierz i pokrój w plastry o grubości około 4 milimetrów. Przełożyć razem z masłem do garnka. \n2. Smaż na niewielkim ogniu przez 35-60 minut, do uzyskania jednolitego, ciemnozłotego koloru. W razie potrzeby podlej odrobiną wody i wymieszaj, by cebula się nie przypaliła. \n3. Po tym czasie dolej bulion, dopraw solą, pieprzem i tymiankiem. Zupę gotuj przez około 15 minut. \n4. W międzyczasie przygotuj grzanki: kawałki bagietki smaż na złoto z obu stron na oliwie. Do miseczki żaroodpornej nalej porcję zupy, połóż na niej grzankę, posyp odrobiną startego sera i zapiecz w piekarniku z włączoną opcją grilla, do momentu roztopienia sera.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/5OQvmBiJoXV6pO3FFzY8qbRohMM9gLf0utU61IF4.jpg","kcal":986.08,"protein":37.88,"fat":39.26,"carbs":130.14,"ingredients":[{"name":"Cebula","grams":600,"measure":"duża sztuka"},{"name":"Masło","grams":28,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Wywar warzywny","grams":500,"measure":"szklanka"},{"name":"Bagietka francuska","grams":120,"measure":"g"},{"name":"Ser Mozzarella light 9%","grams":63,"measure":"sztuka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"}],"category":"Zupa"},{"id":45613408,"name":"Zupa kalafiorowa","description":"1.  W garnku rozgrzej oliwę. Por pokrój w paski i dodaj do garnka. Podsmaż chwilkę, aż zmięknie.\n2. Pozostałe warzywa obierz i pokrój w małą kostkę. Dodaj wraz z kalafiorem  i przyprawami do podsmażonego pora. Zalej wodą i zagotuj. Dodaj bulion. Gotuj do miękkości warzyw (będzie to zależne od kawałków, na jakie je pokroiłaś, dlatego najlepiej pokroić na małe, by przyspieszyć gotowanie).\n3. Gdy warzywa będą miękkie, dodaj serek i wymieszaj. Dodaj posiekany koperek i dopraw solą i pieprzem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/pMpJ2IHS6dz7PmaYgkyqUk4LDPXnOKytP1uEnM2G.jpg","kcal":1180.1,"protein":42.42,"fat":39.71,"carbs":181.57,"ingredients":[{"name":"Kalafior mrożony","grams":450,"measure":"g"},{"name":"Ziemniaki","grams":500,"measure":"g"},{"name":"Marchew","grams":180,"measure":"średnia sztuka"},{"name":"Pietruszka korzeń","grams":80,"measure":"sztuka"},{"name":"Por","grams":130,"measure":"sztuka"},{"name":"Seler korzeń","grams":60,"measure":"sztuka"},{"name":"Bulion drobiowy (Winiary)","grams":90,"measure":"g"},{"name":"Woda","grams":2000,"measure":"ml"},{"name":"Koper świeży","grams":40,"measure":"pęczek"},{"name":"Sól","grams":18,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"łyżeczka"},{"name":"Ziele angielskie","grams":5,"measure":"ziarenko"},{"name":"Liść laurowy","grams":3,"measure":"liść"},{"name":"Serek śmietankowy niskotłuszczowy 15%","grams":125,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"}],"category":"Zupa"},{"id":45613412,"name":"Zupa serowo-brokułowa z grzankami","description":"1. Cebulę pokrój w kostkę, a marchew zetrzyj na tarce o grubych oczkach. Brokuły podziel na mniejsze różyczki. \n2. W garnku rozgrzej oliwę i podsmaż cebulę. Dodaj przeciśnięty ząbek czosnku oraz marchew i smaż jeszcze raz przez chwilę. \n3. Wsyp mąkę i wymieszaj wszystko do połączenia składników. Następnie wlej bulion i gotuj wszystko razem ok. 2-3 minuty. \n4. Dodaj mleko oraz brokuły i gotuj do momentu aż brokuły będą al dente. Na koniec dodaj starty ser i gotuj aż się rozpuści a zupa nabierze kremowej i lekko ciągnącej konsystencji. Dopraw do smaku. \n5. Z chleba przygotuj grzanki, pokrój w kostkę i dodaj do zupy tuż przed podaniem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/OSGFxmpAmuIky2jhG9jKgfNxMch3KrGwwyXMwRlA.jpg","kcal":657.88,"protein":33.48,"fat":26.42,"carbs":82.25,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Cebula","grams":70,"measure":"mała sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":12,"measure":"łyżeczka"},{"name":"Wywar warzywny","grams":500,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Brokuł","grams":250,"measure":"sztuka"},{"name":"Cheddar","grams":40,"measure":"g"},{"name":"Chleb tostowy pełnoziarnisty","grams":46,"measure":"kromka"}],"category":"Zupa"},{"id":45613419,"name":"Krem z pieczonych warzyw","description":"1. Warzywa pokrój, skrop oliwą tak by każde było pokryte, posyp przyprawami i wstaw do nagrzanego do 200 stopni piekarnika na ok. 25 minut (mi wyszły 2 blachy warzyw).\n2. Przygotuj bulion - wymieszaj bulion ze słoiczka w gorącej wodzie.\n3. Upieczone warzywa zblenduj z przygotowanym bulionem, dopraw jeszcze ewentualnie do smaku. \n4. Do zupy dodaj ulubione dodatki -  może to być np. jogurt, ser lub pestki.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/7d9FEidMIw7Kb5SECltt1WssqTx3zrk9UmdHsCH8.jpg","kcal":1482.45,"protein":29.44,"fat":46.61,"carbs":261.48,"ingredients":[{"name":"Batat","grams":700,"measure":"duża sztuka"},{"name":"Marchew","grams":300,"measure":"średnia sztuka"},{"name":"Pietruszka korzeń","grams":80,"measure":"sztuka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Papryka czerwona","grams":360,"measure":"średnia sztuka"},{"name":"Dynia piżmowa","grams":390,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":40,"measure":"łyżka"},{"name":"Bulion drobiowy (Winiary)","grams":30,"measure":"łyżka"},{"name":"Woda","grams":2000,"measure":"ml"},{"name":"Bazylia suszona","grams":2,"measure":"szczypta"},{"name":"Oregano suszone","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Chili w proszku","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Zupa"},{"id":45613428,"name":"Ekspresowa (azjatycka) zupa z patelni","description":"1. Wszystkie składniki oprócz szczypiorku, limonki i jajka umieść w głębokiej patelni, przykryj i zagotuj. Gotuj przez 10 minut, co jakiś czas mieszając.\n2. W tym czasie ugotuj jajko na miękko i posiekaj szczypiorek.\n3. Gotową zupę podawaj z posiekanym szczypiorkiem, kawałkiem limonki i jajkiem na miękko.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/v0Z6CKmjlvSHPMBBVLaVpgCSjny9EA0cdXAovufk.jpg","kcal":605.14,"protein":17.79,"fat":23.84,"carbs":82.8,"ingredients":[{"name":"Makaron chiński","grams":65,"measure":"g"},{"name":"Pieczarki","grams":54,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Szalotka","grams":10,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Mleczko kokosowe 17-19%","grams":50,"measure":"ml"},{"name":"Miso","grams":20,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"},{"name":"Pasta Gochujang","grams":15,"measure":"łyżka"},{"name":"Bulion drobiowy (Winiary)","grams":20,"measure":"łyżeczka"},{"name":"Woda","grams":375,"measure":"szklanka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"}],"category":"Zupa"},{"id":45613439,"name":"Barszcz czerwony","description":"1. Buraki obierz i zetrzyj na tarce o grubych oczkach. Przełóż do garnka z przyprawami oraz czosnkiem. \n2. Zalej wszystko wrzątkiem i gotuj ok. 20 minut na dość wolnym ogniu (ale cały czas delikatnie gotując). \n3. Barszcz odstaw do lekkiego przestygnięcia (ok. 10-15 minut), a następnie przelej go przez drobne sitko.\n4. Podawaj do picia lub z krokietami, uszkami itp.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/Yyh6cHwqkuVoGY0kaxyGtWN4MCifB1wC1MBgTvYk.jpg","kcal":361.86,"protein":14.9,"fat":2.65,"carbs":81.65,"ingredients":[{"name":"Buraki","grams":700,"measure":"g"},{"name":"Liść laurowy","grams":3,"measure":"liść"},{"name":"Ziele angielskie","grams":6,"measure":"ziarenko"},{"name":"Erytrytol","grams":30,"measure":"łyżka"},{"name":"Ocet spirytusowy","grams":45,"measure":"łyżka"},{"name":"Sól","grams":9,"measure":"łyżeczka"},{"name":"Majeranek suszony","grams":6,"measure":"łyżka"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Woda","grams":1200,"measure":"ml"}],"category":"Zupa"},{"id":47308208,"name":"Makaron z pomidorkami i burratą (ekspres z patelni)","description":"1. Na patelni umieść makaron tagliatelle, posiekaną szalotkę, przeciśnięty przez praskę czosnek, pokrojone na pół pomidorki, serek śmietankowy, passatę, przyprawy i posiekaną bazylię. Zalej wszystko wrzącą wodą, przykryj i gotuj 10-12 minut co kilka minut mieszając. W razie potrzeby dodaj więcej wody, jeśli wolisz rzadszy sos.\n2. Na koniec dopraw jeszcze do smaku, przełóż na talerz i podawaj z burratą, listkami świeżej bazylii i świeżo mielonym pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/bYPuUj4vJ7n10PkyD93lDMRdMsq7wR15X5jBMPnb.jpg","kcal":577.49,"protein":22.53,"fat":22.06,"carbs":71.46,"ingredients":[{"name":"Makaron Tagiatelle","grams":70,"measure":"g"},{"name":"Passata","grams":75,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":120,"measure":"sztuka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"g"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Serek śmietankowy lekki (Delikate)","grams":40,"measure":"łyżka"},{"name":"Ser Burrata (Gusto Bello)","grams":65,"measure":"opakowanie"},{"name":"Papryczka chili suszona","grams":4,"measure":"sztuka"},{"name":"Woda","grams":200,"measure":"szklanka"}],"category":"Obiad"},{"id":47308211,"name":"Gnocchi w kremowym sosie pomidorowym (ekspres)","description":"1. Na patelni rozgrzej oliwę.\n2. Cebule drobno posiekaj, czosnek przeciśnij przez praskę. Pomidorki Pokrój na połówki.\n3. Na rozgrzanej patelni zeszklij cebulę, dodaj czosnek, pastę gochujang, przesmaż i dodaj pomidorki smaż 2-3 min.\n4. Dodaj gorącą wodę, pastę miso, serek i wymieszaj do gładkiej konsystencji.\n5. Dodaj gnocchi przykryj. Duś 5-7 minut, aż gnocchi będą miękkie. W razie potrzeby dodaj więcej wody.\n6. Na koniec dodaj mozzarellę i posiekaną bazylię. Dopraw solą i pieprzem do smaku.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/qsjAwi9tcQl5OKxqyf3Rw8Iz24JRIHVwYL6RrIqr.jpg","kcal":562.72,"protein":22.89,"fat":20.77,"carbs":73.48,"ingredients":[{"name":"Gnocchi","grams":150,"measure":"porcja"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Mozzarella tarta","grams":30,"measure":"g"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Pasta miso jasna","grams":15,"measure":"g"},{"name":"Pasta Gochujang","grams":5,"measure":"g"}],"category":"Obiad"},{"id":47308218,"name":"Udon z warzywami i tofu","description":"1.\tMakaron ugotuj zgodnie z instrukcją na opakowaniu. Składniki na sos (sos sojowy 1 łyżka, woda, miód, papryczka chilli, przeciśnięty przez praskę czosnek - wymieszaj).\n2. Cukinię i marchew pokrój w cienkie paski.\n3.\tTofu pokrój w kostkę.\n4.\tTofu wymieszaj z sosem sojowym (1 łyżeczka) i mąką ziemniaczaną.\n5.\tNa patelni rozgrzej oliwę i podsmaż tofu.\n6.\tPo około 2 minutach dodaj warzywa i czosnek.\n7.\tSmaż przez kilka minut, aż warzywa lekko zmiękną.\n8.\tDodaj sos, zagotuj i chwilę zredukuj.\n9.\tDodaj ugotowany makaron i dokładnie wymieszaj.\n10.Przełóż na talerz i posyp szczypiorkiem. Podawaj skropione limonką i opcjonalnie możesz posypać sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/2c9Uj72unh8Ks9ELkoTos1vS7FmxLHJhQkGceTfR.jpg","kcal":557.23,"protein":24.17,"fat":14.13,"carbs":84.73,"ingredients":[{"name":"Udon (Asia Style)","grams":200,"measure":"opakowanie"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Cukinia","grams":100,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Tofu wędzone","grams":90,"measure":"opakowanie"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sos sojowy o obniżonej zawartości sodu","grams":15,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Woda","grams":30,"measure":"szklanka"},{"name":"Papryczka chili suszona","grams":4,"measure":"sztuka"},{"name":"Limonka","grams":33,"measure":"sztuka"},{"name":"Mąka ziemniaczana","grams":6,"measure":"łyżeczka"}],"category":"Obiad"},{"id":47308231,"name":"Zapiekanka z ryżem, kurczakiem i brokułem","description":"1. Piekarnik rozgrzej do 190 stopni (góra-dół)\n2. Wodę zagotuj i przygotuj bulion.\n3. W naczyniu żaroodpornym umieść ryż, pokrojony na mniejsze różyczki brokuł, pokrojone pomidorki koktajlowe, pokrojonego w mniejszą kostkę kurczaka, przeciśnięty przez praskę czosnek, pokrojone na mniejsze kawałki suszone pomidory, przyprawy i bulion. Wymieszaj. Posyp startą mozzarellą i przykryj.\n4. Wstaw do nagrzanego piekarnika na ok. 45-50 minut.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/XawSoO5y7XrVqOgcjTNHQgUq53dIRdWw3aDtR2lX.jpg","kcal":1746.48,"protein":152.45,"fat":39.16,"carbs":199.44,"ingredients":[{"name":"Ryż basmati","grams":150,"measure":"łyżka"},{"name":"Bulion drobiowy (Winiary)","grams":30,"measure":"łyżka"},{"name":"Woda","grams":300,"measure":"szklanka"},{"name":"Kurczak pierś","grams":400,"measure":"sztuka"},{"name":"Brokuł","grams":500,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Mozzarella tarta","grams":100,"measure":"g"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Czosnek","grams":16,"measure":"ząbek"},{"name":"Pomidory suszone","grams":56,"measure":"sztuka"}],"category":"Obiad"},{"id":47308361,"name":"Risotto z kurczakiem i brokułem","description":"1. Kurczaka pokrój w kostkę i podsmaż na oliwie, aż straci surowość. Dopraw szczyptą soli. Przełóż na talerzyk i przejdź do dalszych kroków.\n2. Cebulę posiekaj i zeszklij na tej samej patelni. Dodaj brokuły podzielone na mniejsze kawałki, przeciśnięty przez praskę czosnek i ryż. Dopraw i przesmaż 2-3 minuty.\n3. Całość zalej gorącą wodą i bulionem, wymieszaj, przykryj i ok 15 minut, aż ryż będzie miękki. Przemieszaj co jakiś czas i w razie potrzeby dodaj więcej wody.\n4. Dodaj porwany na kawałki ser mozzarella, przygotowanego wcześniej kurczaka, wymieszaj i jak ser się rozpuści - przełóż na talerz - gotowe! W razie potrzeby dodaj więcej wody.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/j1RDRxPERqNt4hzLoZnsWTaEIwfYjGV3zuqmpJD6.jpg","kcal":513.03,"protein":41.97,"fat":14.52,"carbs":52.74,"ingredients":[{"name":"Ryż arborio","grams":50,"measure":"łyżka"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Brokuł","grams":120,"measure":"różyczka"},{"name":"Cebula","grams":25,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Mozzarella light","grams":50,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"}],"category":"Obiad"},{"id":47308370,"name":"Mięso do kebabu z piekarnika","description":"1. W misce umieść mięso, startą na tarce cebulę i przeciśnięty czosnek (możesz też zblendować cebulę z czosnkiem i tak dodać do masy) wraz z jogurtem i przyprawami.\n2. Wymieszaj wszystko razem i zagnieć dokładnie, by składniki się połączyły.\n3. Piekarnik rozgrzej do 190 stopni.\n4. Masę z mięsem podziel na 2-3 części, aby łatwiej Ci się pracowało.\n5. Każdą część umieść pomiędzy dwoma arkuszami papieru i rozwałkuj cienko. Zwiń jak rozpłaszczony naleśnik. Zrób to z każdą częścią mięsa. Wstaw do piekarnika na 25 minut.\n6. Podawaj z ulubionymi dodatkami.","servings":5,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/KKDSSE073VIE81NQUFHU8UU5bZUQPZWmwbgbkTY1.jpg","kcal":1357.97,"protein":89.84,"fat":102.41,"carbs":15.63,"ingredients":[{"name":"Wołowina mielona 20% tłuszczu","grams":500,"measure":"g"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"},{"name":"Czosnek","grams":12,"measure":"ząbek"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Sól","grams":3,"measure":"szczypta"},{"name":"Pieprz czarny","grams":3,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":5,"measure":"szczypta"},{"name":"Kumin w proszku (kmin rzymski)","grams":2,"measure":"szczypta"},{"name":"Papryka ostra przyprawa","grams":2,"measure":"łyżeczka"}],"category":"Obiad"},{"id":47308398,"name":"Sałatka a’la Drwal","description":"1.\tPokrój kurczaka w kostkę, dopraw solą, pieprzem i przyprawą do kurczaka. Usmaż na patelni na złoty kolor i odstaw do przestygnięcia.\n2.\tPokrój chleb żytni w kostkę, skrop oliwą i podsmaż na suchej patelni, aż będzie chrupiący.\n3.\tPorwij sałatę lodową na mniejsze kawałki.\n4.\tUsmaż boczek na suchej patelni, następnie odsącz na ręczniku papierowym i połam na mniejsze kawałki.\n5.\tWymieszaj jogurt naturalny z majonezem, ketchupem i musztardą, aż powstanie jednolity sos.\n6.\tZetrzyj lub porwij mozzarellę (chyba, że masz już tartą).\n7. Układaj sałatkę warstwami: sałata → sos → kurczak → sos → mozzarella → grzanki → boczek.\n8.\tNa końcu opcjonalnie posyp cebulą prażoną.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/9XUgYGiO7kgDWQqAfy3RAIhECCYybNKFMhs71TRb.jpg","kcal":1327.47,"protein":116.69,"fat":60.8,"carbs":76.53,"ingredients":[{"name":"Sałata lodowa","grams":320,"measure":"mała sztuka"},{"name":"Kurczak pierś","grams":400,"measure":"sztuka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Boczek plastry","grams":90,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Przyprawa do kurczaka","grams":4,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ketchup","grams":80,"measure":"łyżka"},{"name":"Majonez light","grams":50,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":50,"measure":"łyżka"},{"name":"Musztarda","grams":20,"measure":"łyżka"}],"category":"Sałatka"},{"id":47308405,"name":"Domowe pieguski","description":"1. Zmiksuj zimne masło z erytrolem/cukrem. Dodaj jajko. Zmiksuj.\n2. W oddzielnej misce wymieszaj wszystkie suche składniki.\n3. Przesyp suche składniki do mokrych, zmiksuj.\n4. Czekoladę posiekaj i dodaj do masy. Wymieszaj.\n5. Piecz w 170 stopniach przez 15 minut (termoobieg).","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/UPt9cIc64bp5TKz5Tm9I6nlbuJKydr0Zogg1D1SL.jpg","kcal":1866.68,"protein":39.69,"fat":103,"carbs":194.65,"ingredients":[{"name":"Masło","grams":100,"measure":"kostka"},{"name":"Mąka orkiszowa jasna","grams":240,"measure":"szklanka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":150,"measure":"łyżka"},{"name":"Sól","grams":3,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":4,"measure":"łyżka"},{"name":"Czekolada gorzka","grams":50,"measure":"opakowanie"}],"category":"Deser"},{"id":47590442,"name":"Mus czekoladowy z kaki","description":"1. Czekoladę rozpuść w kąpieli wodnej lub mikrofalówce.\n2. Kaki obierz ze skórki i wrzuć do blendera. Dodaj roztopioną czekoladę, sól, sok z pomarańczy oraz skyr. \n3. Miksuj do uzyskania gładkiego musu.\n4. Mus przelej do pucharków i wstaw do lodówki na min. 30 minut. \n5. Podawaj z ulubionymi dodatkami - świetnie pasują plastry pomarańczy lub skórka starta z oparzonej pomarańczy.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/zLgTSaASLnyRV79fyg1pSCPaFpuJL2yqT3KEY6dB.jpg","kcal":533.03,"protein":13.86,"fat":22.01,"carbs":75.19,"ingredients":[{"name":"Kaki (persymona)","grams":250,"measure":"g"},{"name":"Czekolada gorzka 70-85% kakao","grams":50,"measure":"kostka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Sok pomarańczowy","grams":30,"measure":"ml"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"}],"category":"Deser"},{"id":47590448,"name":"Koktajl wspierający zdrowie jelit","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. W razie potrzeby możesz dodać trochę wody, jeśli wolisz rzadszą konsystencję.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/goMu6dluQhuVfJlESkFVYqgThCXRpYRrntpS2gUf.jpg","kcal":369.6,"protein":14.32,"fat":14.99,"carbs":48.95,"ingredients":[{"name":"Kefir","grams":250,"measure":"szklanka"},{"name":"Borówki amerykańskie mrożone","grams":100,"measure":"garść"},{"name":"Siemię lniane","grams":10,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":10,"measure":"łyżka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Masło migdałowe bez soli","grams":10,"measure":"łyżka"}],"category":"Napój"},{"id":47590491,"name":"Pieczone bataty z jajkiem sadzonym i awokado","description":"1. Batata pokrój w plastry, posmaruj oliwą i przypraw solą, pieprzem oraz papryką i chili.  Przełóż na papier do pieczenia. Piecz ok. 20-25 minut w temp. 190 stopni (aż będzie miękki). \n2. Przygotuj jajka sadzone na pozostałej oliwie.\n3. Na talerzu rozłóż upieczone plastry batata. Na wierch dodaj rukolę, plastry awokado i jajka sadzone.\n4. Dopraw solą i pieprzem. Posyp posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/Yk46ztFbh58FRpYxXEe1HVl5iqsuYVez5904ZrL2.jpg","kcal":425.45,"protein":16.8,"fat":26.58,"carbs":33.31,"ingredients":[{"name":"Batat","grams":130,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Awokado","grams":45,"measure":"plaster"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":47590497,"name":"Wytrawne gofry z mozzarellą i warzywami","description":"1. Paprykę pokrój w drobną kostkę, a natkę i szczypiorek posiekaj. \n2. W misce wymieszaj mleko z mąką i proszkiem do pieczenia na gładką masę. \n3. Dodaj mozzarellę, pokrojone warzywa, oliwę i zioła oraz przyprawy. Wszystko wymieszaj. \n4. Rozgrzej gofrownicę. Wylewaj ciasto z warzywami i serem i smaż ok. 6-7 minut. Nie otwieraj gofrownicy podczas smażenia gofrów. \n5. Studź gofry na kratce - dzięki temu będą bardziej chrupiące.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/YKgX7R3SpnvlgV30VT7EHb17sz4FHApjerHeiKrZ.jpg","kcal":672.86,"protein":29.16,"fat":21.58,"carbs":92.85,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":100,"measure":"g"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Mozzarella tarta","grams":30,"measure":"g"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":47590500,"name":"Grzanki z kremem orzechowym, pieczonym bananem i czekoladą","description":"1. Banana pokrój w plasterki, posyp cynamonem i przełóż na papier do pieczenia. Piecz ok. 10 minut w temp. 200 stopni, aż się zarumieni i lekko skarmelizuje. \n2. Z pieczywa przygotuj grzanki. \n3. Skyr wymieszaj z masłem orzechowym. \n4. Grzanki posmaruj kremem orzechowym, na wierzch dodaj upieczonego banana i posyp startą czekoladą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/Lt3m4l3UjxK8bbc2bCksvAwYdm6EMvbyXp2aLWJl.jpg","kcal":426.9,"protein":19.37,"fat":15.55,"carbs":58.97,"ingredients":[{"name":"Chleb orkiszowy","grams":80,"measure":"kromka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Masło orzechowe","grams":20,"measure":"łyżka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":48119407,"name":"Pieczone warzywa z soczewicą i burratą","description":"1.\tRozgrzej piekarnik do 200°C (góra–dół).\n2. Oczyść i pokrój warzywa: pieczarki pokrój na połówki lub ćwiartki, cukinię i cebulę w duże kawałki, czosnek drobno posiekaj.\n3. Przełóż warzywa do formy, dodaj oliwę, sól, pieprz i pieprz cayenne. Dokładnie wymieszaj.\n4. Wstaw do piekarnika i piecz 25–30 minut, aż warzywa będą miękkie i lekko zrumienione.\n5. Wyjmij formę, dodaj pomidory z puszki, odsączoną i przepłukaną soczewicę oraz syrop klonowy. Dokładnie wymieszaj.\n6. Wstaw ponownie do piekarnika i piecz jeszcze 10–15 minut, aby smaki się połączyły.\n7. Wyjmij danie z piekarnika, dodaj posiekaną natkę pietruszki i/lub bazylię.\n8. Podawaj z burratą, porwaną na kawałki na wierzchu.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/jB0KnXVphfsj23LUbYkofyc0LwY37HpirKPKJD2b.jpg","kcal":1245.89,"protein":67.39,"fat":65.63,"carbs":110.54,"ingredients":[{"name":"Cukinia","grams":400,"measure":"średnia sztuka"},{"name":"Pieczarki","grams":276,"measure":"duża sztuka"},{"name":"Pomidory krojone w puszce","grams":400,"measure":"puszka"},{"name":"Cebula czerwona","grams":90,"measure":"sztuka"},{"name":"Czosnek","grams":16,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Oregano suszone","grams":4,"measure":"szczypta"},{"name":"Papryczka chili suszona","grams":8,"measure":"sztuka"},{"name":"Ser Burrata","grams":165,"measure":"sztuka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Soczewica (Bonduelle)","grams":240,"measure":"g"}],"category":"Obiad"},{"id":48167026,"name":"Lasagne z patelni","description":"1. Cebulę drobno posiekaj, marchew zetrzyj na tarce.\n2. Na patelni rozgrzej oliwę i zeszklij cebulę. Dodaj marchew i przeciśnięty przez praskę czosnek. Przesmaż chwilę. Dodaj mięso, dopraw solą, pieprzem, bazylią. Przesmaż chwilę.\n3. Wlej cassatę na patelnię i dopraw jeszcze w razie potrzeby, wymieszaj. Duś około 5 minut.\n4. Przygotuj w tym czasie sos beszamelowy. W małym garnuszku rozpuść masło, dodaj mąkę i energicznie mieszaj, by nie powstały grudki. Do takiej zasmażki dodaj mleko i ponownie mieszaj energicznie do zgęstnienia. Dopraw gałką, solą i pieprzem.\n5. Powciskaj makaron tak, by był przykryty sosem (makaron możesz połamać na mniejsze kawałki, a gdyby sos był zbyt gęsty - dolej odrobinę wody.\n6. Na wierzch przełóż przygotowany sos beszamelowy, porwaną na mniejsze kawałki mozzarellę i przykryj patelnię. Duś na mniejszej mocy całość przez ok. 15 minut.\n6. Podawaj posypane świeżą bazylią.","servings":3,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/t6xrKURw1EurW9S5vBwisUjGsBmHMtEc5GexuV14.jpg","kcal":1694.67,"protein":153.81,"fat":49.4,"carbs":161.05,"ingredients":[{"name":"Makaron","grams":120,"measure":"filiżanka"},{"name":"Mięso mielone z indyka","grams":400,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Marchew","grams":120,"measure":"średnia sztuka"},{"name":"Passata pomidorowa","grams":500,"measure":"łyżka"},{"name":"Bazylia suszona","grams":5,"measure":"szczypta"},{"name":"Oregano suszone","grams":5,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":3,"measure":"szczypta"},{"name":"Masło","grams":15,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":15,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":150,"measure":"szklanka"},{"name":"Gałka muszkatołowa mielona","grams":2,"measure":"łyżeczka"},{"name":"Ser Mozzarella light (Pilos)","grams":125,"measure":"sztuka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Czosnek","grams":16,"measure":"ząbek"}],"category":"Obiad"},{"id":48838387,"name":"Ciecierzyca na mleczku kokosowym z ryżem","description":"1.\tNa dużej patelni rozgrzej oliwę.\n2.\tDodaj drobno posiekaną cebulę i smaż 5–7 minut, aż będzie miękka i lekko złota.\n3. Dodaj czosnek, paprykę wędzoną, kolendrę mieloną i płatki chili – smaż ok. 30 sekund, aż przyprawy puszczą aromat.\n4.\tDodaj suszone pomidory, wymieszaj, dopraw solą i pieprzem.\n5.\tDodaj koncentrat, wlej bulion (125 ml) i mleczko kokosowe, dokładnie wymieszaj. Dodaj odcedzoną ciecierzycę i wymieszaj.\n6.\tGotuj 5–8 minut na średnim ogniu, aż sos zrobi się gęsty i kremowy.\n8.\tZdejmij z ognia, dodaj posiekaną natkę pietruszki.\n9.\tNa koniec skrop sokiem z limonki, wymieszaj.\n10. Podawaj z ryżem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/9seZNHV5Xk7dnlwcq0h3Ukv6AlPhwdhUJLXPsVzQ.jpg","kcal":1005.32,"protein":33.16,"fat":27.69,"carbs":153.75,"ingredients":[{"name":"Ciecierzyca konserwowa","grams":240,"measure":"puszka (odsączona)"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Czosnek","grams":16,"measure":"ząbek"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Mleczko kokosowe light 6%","grams":115,"measure":"szklanka"},{"name":"Bulion warzywny (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Papryka wędzona w proszku","grams":4,"measure":"łyżeczka"},{"name":"Kolendra liście suszone","grams":1,"measure":"łyżka"},{"name":"Płatki chili","grams":2,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Limonka","grams":33,"measure":"sztuka"},{"name":"Ryż basmati","grams":100,"measure":"łyżka"},{"name":"Koncentrat pomidorowy","grams":50,"measure":"łyżka"}],"category":"Obiad"},{"id":48840721,"name":"Fasolka Marry Me","description":"1. Na dużej patelni lub w średnim garnku rozgrzej oliwę na średnim ogniu. Dodaj posiekaną cebulę, przeciśnięty przez praskę czosnek, oregano, bazylię, pieprz, chilli i paprykę wędzoną. Smaż około 1 minutę, mieszając, aż czosnek zacznie pachnieć - nie powinien się zrumienić.\n2. Wlej wodę (możesz dodać najpierw nieco mniej, aby regulować później gęstość, jaką lubisz), bulion warzywny i dodaj serek kremowy. Zmniejsz ogień do średnio-niskiego i mieszaj, aż serek całkowicie się rozpuści, a sos będzie gładki i jednolity.\n3. Dodaj odsączoną fasolę. Gotuj bez przykrycia na małym ogniu przez około 12–15 minut, od czasu do czasu mieszając, aż sos zgęstnieje i dobrze oblepi fasolę. \n4. Zdejmij patelnię z ognia. Dodaj sok z cytryny i posiekaną natkę pietruszki, dokładnie wymieszaj. Dopraw solą do smaku.\n5. Podawaj z chlebkami z patelni lub ryżem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/r73PBFn1ggneulS2cu99SXWsSqNLUvMQlwXNx8wB.jpg","kcal":694.95,"protein":34.82,"fat":30.49,"carbs":74.71,"ingredients":[{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":16,"measure":"ząbek"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Papryka wędzona w proszku","grams":4,"measure":"łyżeczka"},{"name":"Papryczka chili suszona","grams":8,"measure":"sztuka"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":135,"measure":"opakowanie"},{"name":"Fasola biała konserwowa","grams":240,"measure":"puszka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Bazylia suszona","grams":1,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"}],"category":"Obiad"},{"id":48878264,"name":"Kopytka z kurczakiem i warzywami","description":"1. Rozgrzej oliwę na patelni. Wrzuć kurczaka pokrojonego w małą kostkę i podsmaż. Dopraw słodką papryką, czosnkiem, solą i pieprzem.\n2. Dodaj posiekaną cebulę i chwilę podsmaż. Następnie dorzuć pokrojoną paprykę. Na końcu dodaj pokrojone  pieczarki. Przykryj i duś około 10 minut.\n3. Dodaj koncentrat pomidorowy i wlej gorącą wodę z bulionem ze słoiczka. Przykryj i duś kolejne 20 minut.\n4. Wrzuć kopytka. Wymieszaj.\n5. Dodaj lekki serek kanapkowy, wymieszaj. Przykryj i duś około 10 minut na większym ogniu.\n6. Wyłącz palnik i zostaw pod przykryciem na około 10 minut, aż całość zgęstnieje.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/OIdkKGunujIyiWENZLFRAFXSHmeIirplQdXa4Exj.jpg","kcal":935.95,"protein":72.37,"fat":28.86,"carbs":101.95,"ingredients":[{"name":"Kurczak pierś","grams":200,"measure":"porcja"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":5,"measure":"szczypta"},{"name":"Papryka ostra przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Pieczarki","grams":180,"measure":"średnia sztuka"},{"name":"Bulion drobiowy (Winiary)","grams":30,"measure":"łyżka"},{"name":"Koncentrat pomidorowy","grams":25,"measure":"łyżka"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Kopytka","grams":200,"measure":"porcja"},{"name":"Woda","grams":200,"measure":"szklanka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"}],"category":"Obiad"},{"id":48878303,"name":"Makaron z łososiem w sosie śmietankowo-koperkowym","description":"1. Makaron ugotuj al dente.\n2. Na patelni rozgrzej oliwę, dodaj przeciśnięty przez praskę czosnek i łososia poszarpanego na mniejsze kawałki, przesmaż dosłownie chwilkę. Dodaj serek, dopraw i wymieszaj.\n3. Dodaj posiekany koperek, wymieszaj.\n4. Dodaj ugotowany makaron i całość wymieszaj.\n5. Podawaj z pomidorkami koktajlowymi i opcjonalnie skrop cytryną.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/j6KBhHbiJLeo7Au3vguA2PzHM8UvJN5nJgx7RSaj.jpg","kcal":521.92,"protein":28.68,"fat":25.79,"carbs":44.32,"ingredients":[{"name":"Makaron Spagetti","grams":50,"measure":"g"},{"name":"Serek śmietankowy lekki (Delikate)","grams":60,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Łosoś wędzony na gorąco","grams":63,"measure":"opakowanie"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Obiad"},{"id":48964270,"name":"Gofry twarogowe z duszonymi śliwkami z cynamonem","description":"1. Gofrownicę rozgrzej do największej mocy. \n2. Twaróg, jajko, budyń, mąkę, mleko, erytrol i proszek do pieczenia zmiksuj na gładką masę. Odstaw ciasto na 5-10 minut. \n3. W zależności od modelu gofrownicy spryskaj/posmaruj ją oliwą lub pomiń ten krok. \n4. Gofry piecz ok. 7-8 minut do zrumienienia aż będą chrupiące. \n5. Śliwki uduś z dodatkiem cynamonu i syropu klonowego. \n6. Gofry podawaj ze skyrem i duszonymi śliwkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/G9i8tvMx4NwL5geFpdQ8KDlLgCEB92Guk25ZNdIs.jpg","kcal":477.19,"protein":41.26,"fat":6.79,"carbs":63.6,"ingredients":[{"name":"Ser twarogowy chudy","grams":125,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Budyń bez cukru","grams":15,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"g"},{"name":"Mleko 1,5%","grams":30,"measure":"g"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Skyr waniliowy (Pilos)","grams":50,"measure":"łyżka"},{"name":"Śliwki","grams":110,"measure":"sztuka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":49504443,"name":"Prosty chlebek bananowy","description":"1. Rozgrzej piekarnik do 180°C. Przygotuj keksówkę ok. 24 × 10 cm (lub zbliżoną) i wyłóż ją papierem do pieczenia.\n2. W jednej misce wymieszaj mąkę orkiszową, sól, sodę, proszek do pieczenia i cynamon.\n3. W drugiej, większej misce rozgnieć widelcem bardzo dojrzałe banany.\n4. Dodaj jajka i dokładnie rozetrzyj je z bananami.\n5. Dodaj jogurt, erytrol i oliwę, dokładnie wymieszaj do połączenia składników.\n6. Wsyp suche składniki do mokrych i delikatnie wymieszaj widelcem, tylko do połączenia (nie mieszaj zbyt długo).\n7. Przełóż ciasto do foremki.\n8. Opcjonalnie: wciśnij przekrojonego banana na wierzch ciasta i posyp kawałkami gorzkiej czekolady.\n9. Piecz ok. 50–55 minut, do suchego patyczka.\n10. Wyjmij z piekarnika i ostudź w foremce przez 10–15 minut, następnie wyjmij na kratkę.","servings":10,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/UJPiUuukK1lZgeichQDkeNNrVHNq7NY3PUnvmNGQ.jpg","kcal":2031.28,"protein":49.3,"fat":92.08,"carbs":262.6,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":230,"measure":"szklanka"},{"name":"Soda oczyszczona","grams":4,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":100,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":100,"measure":"średnie opakowanie"},{"name":"Oliwa z oliwek","grams":75,"measure":"łyżka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Banan","grams":420,"measure":"średnia sztuka"}],"category":"Deser"},{"id":49504566,"name":"Serowy makaron z 1 patelni","description":"1. Na szerokiej patelni rozgrzej oliwę na średnim ogniu. Dodaj czosnek i podsmaż krótko, tylko do momentu aż zacznie pachnieć.\n2. Wlej bulion i mleko proteinowe, lekko dopraw solą i pieprzem. Dodaj suchy makaron i dociśnij, żeby był w większości przykryty płynem.\n3. Gotuj na małym–średnim ogniu około 10–12 minut, często mieszając, aż makaron będzie miękki, a sos zgęstnieje.\n4. Zmniejsz ogień, dodaj parmezan, wymieszaj do uzyskania kremowego sosu, a następnie dosyp płatki chilli według uznania.\n5. Podawaj od razu. Świetnie pasują pomidorki i świeża pietruszka lub bazylia.\n6. Opcjonalnie możesz dodać szynkę włoską albo grillowanego kurczaka.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/53u8t5vNJEFPfCUC4vSRYww2IhB0lXvM3wuAhI7A.jpg","kcal":478.72,"protein":23.49,"fat":14.85,"carbs":63.54,"ingredients":[{"name":"Makaron","grams":60,"measure":"filiżanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Bulion warzywny (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":175,"measure":"szklanka"},{"name":"Mleko 1,5%","grams":125,"measure":"szklanka"},{"name":"Ser Parmezan","grams":24,"measure":"łyżka"},{"name":"Płatki chili","grams":2,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}],"category":"Obiad"},{"id":50069594,"name":"Udon w klejącym sosie z kurczakiem i ogórkiem","description":"1. Kurczaka pokrój w cienkie paski lub małe kawałki.\n2. Rozgrzej patelnię na średnio-wysokim ogniu. Dodaj oliwę. Wrzuć kurczaka, lekko posól i smaż, aż złapie złoty kolor. Nie mieszaj od razu - daj mu się przypiec, potem dopiero przemieszaj. Smaż do momentu, aż będzie gotowy. Zdejmij z patelni i odstaw na chwilę.\n2. Zmniejsz ogień. Dodaj przeciśnięty przez praskę czosnek, drobno posiekany lub starty imbir, chili i sezam. Mieszaj 30–40 sekund - tylko do momentu, aż puszczą aromat.\n3. Składniki na sos (sos sojowy, sok z limonki, masło orzechowe, wodę) wymieszaj dokładnie i dodaj na patelnię. Jeśli sos będzie zbyt rzadki, w późniejszym etapie możesz dodać więcej wody.\n4. Udon wyjmij z opakowań i wrzuć bezpośrednio na patelnię. Dodaj dodatkowe 2–3 łyżki wody. Przykryj patelnię na ok. 1 minutę, żeby makaron się rozdzielił i podgrzał. Delikatnie porozdzielaj makaron szpatułką.\n5. Zdejmij pokrywkę i mieszaj całość 1–2 minuty, aż udon będzie miękki, śliski i dokładnie oblepiony sosem. Sos powinien być kremowy, nie suchy i nie wodnisty.\n6. Spróbuj i dopasuj smak - więcej limonki dla świeżości, więcej sojowego dla słoności, więcej chili jeśli lubisz ostro.\n7. Podawaj od razu, z przygotowanym kurczakiem, pokrojonym w kostkę ogórkiem obok i posypane szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/lUXumZr98rK5KLbZT5xAX7ywkA6lWa4GZunIKzwE.jpg","kcal":660.83,"protein":36.03,"fat":23.72,"carbs":73.86,"ingredients":[{"name":"Udon (Asia Style)","grams":200,"measure":"opakowanie"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":2,"measure":"łyżeczka"},{"name":"Sezam","grams":5,"measure":"łyżka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Masło orzechowe","grams":15,"measure":"łyżeczka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Woda","grams":50,"measure":"szklanka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Papryczka chili suszona","grams":2,"measure":"sztuka"}],"category":"Obiad"},{"id":50069654,"name":"Makaron ryżowy z brokułem, papryką, cukinią i kurczakiem po azjatycku","description":"1. Makaron ugotuj zgodnie z przepisem na opakowaniu i odcedź.\n2. Kurczaka pokrój w cienkie paski, posól i obtocz i obtocz w mące ziemniaczanej.\n3. Na patelni rozgrzej oliwę, rzuć kurczaka, smaż na średnim ogniu przez 3-4 minuty, aż będzie złoty i lekko chrupiący. Zdejmij na bok.\n4. Na tą samą patelnię wrzuć posiekaną szalotkę, przeciśnięty przez praskę czosnek, starty lub drobno posiekany imbir i smaż chwilkę aż szalotka się zarumieni i całość puści aromat.\n5. Dodaj pokrojonego w cienkie paski brokuła, pokrojone w cienkie paski paprykę i cukinię. Przesmaż całość chwilkę, przemieszaj. Możesz podlać 2-3 łyżkami wody opcjonalnie. Smaż warzywa przez ok. 5-6 minut, aż brokuł lekko zmięknie.\n6. Wymieszaj składniki na sos: sos sojowy, tahini, erytrol i wodę. Opcjonalnie możesz dodać papryczkę chilli. Dodaj na patelnię. Wymieszaj.\n7. Dodaj ugotowany wcześniej makaron i usmażonego kurczaka. Wymieszaj całość, aż sos oblepi każdy składnik.\n8. Podawaj z posiekanym szczypiorkiem i limonką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/H7Ym9zrPj35WQ4rwTxUeB7BEF6cBQxKEHxql3w2g.jpg","kcal":508.91,"protein":34.09,"fat":14.51,"carbs":62.1,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Makaron ryżowy","grams":50,"measure":"porcja"},{"name":"Brokuł","grams":100,"measure":"różyczka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Cukinia","grams":100,"measure":"średnia sztuka"},{"name":"Szalotka","grams":10,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":15,"measure":"łyżeczka"},{"name":"Tahini masło sezamowe","grams":10,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżka"},{"name":"Woda","grams":80,"measure":"szklanka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":2,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Limonka","grams":33,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}],"category":"Obiad"},{"id":50069691,"name":"Makaron z zielonym sosem z fasoli","description":"1. Makaron ugotuj w osolonej wodzie. Przed odcedzeniem zachowaj wodę z gotowania.\n2. Rozgrzej oliwę na patelni. Dodaj cebulę i szczyptę soli. Smaż 4–5 minut, aż zmięknie. Dodaj czosnek i smaż jeszcze minutę. Zdejmij patelnię z ognia.\n3. Wrzuć do blendera kielichowego cebulę z czosnkiem, przepłukaną fasolę, szpinak, fetę, sok i skórkę z cytryny oraz 1/2 wody z gotowania makaronu. Blenduj do uzyskania jednolitej konsystencji. Dodaj pozostałą wodę w razie potrzeby i zblenduj ponownie do uzyskania idealnie gładkiego, kremowego sosu. W razie potrzeby dodaj więcej wody.\n4. Przelej sos z powrotem na patelnię. Dodaj ugotowany makaron. Podgrzewaj na małym ogniu, mieszając, aż sos dokładnie oblepi makaron.\n5. Dopraw pieprzem, ewentualnie solą. Dodaj płatki chili, jeśli chcesz.\n6. Podawaj od razu z pokrojonymi pomidorkami koktajlowymi. Opcjonalnie posyp dodatkową fetą lub skórką z cytryny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/hPDuH3w0j2RCo3qLy8qQqeEOY1dCtLmihotpKJz5.jpg","kcal":538.94,"protein":24.48,"fat":16.41,"carbs":77.67,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":50,"measure":"g"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Fasola biała konserwowa","grams":120,"measure":"puszka"},{"name":"Ser Feta","grams":40,"measure":"plaster"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Papryczka chili suszona","grams":4,"measure":"sztuka"},{"name":"Woda","grams":75,"measure":"szklanka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Obiad"},{"id":50069755,"name":"Proteinowy pudding z manny w 5 minut","description":"1. W garnuszku umieść kaszę, mleko, erytrol i aromat waniliowy. Zagotuj, aż zgęstnieje, cały czas mieszając.\n2. Zdejmij z palnika, dodaj twarożek grani i zblenduj.\n3. Przełóż do miseczki, dodaj maliny, posiekane pistacje i posyp cynamonem,.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/ZXVH11dIMxkkbMf1VxeTx9ZZhy51Rl1QqlqKsxli.jpg","kcal":449.99,"protein":27.52,"fat":11.61,"carbs":59.82,"ingredients":[{"name":"Kasza manna","grams":50,"measure":"szklanka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Twarożek grani","grams":100,"measure":"duże opakowanie"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Pistacje","grams":8,"measure":"łyżka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"}],"category":"Śniadanie"},{"id":50070021,"name":"Czekoladowy pudding proteinowy z manny","description":"1. W garnuszku umieść wszystkie składniki, oprócz wiśni i twarożku grani. Zagotuj i gotuj do zgęstnienia, cały czas mieszając. Zdejmij z ognia, dodaj twarożek grani i zblenduj na gładką masę. Przełóż do miseczki.\n2. Wiśnie podduś w garnuszku, aby się rozmroziły, możesz dodać do nich odrobinę erytrolu.  Możesz podlać delikatnie wodą, a kiedy będą już rozmrożone i woda odparuje, przełóż je do puddingu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/WqZXtpVsmcXvbPSUbHNomLAVPeaUBTyN6CbFbYyw.jpg","kcal":417.22,"protein":24.98,"fat":10.79,"carbs":56.07,"ingredients":[{"name":"Kasza manna","grams":42,"measure":"łyżeczka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":5,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":180,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Wiśnie mrożone","grams":80,"measure":"garść"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Papryczka chili suszona","grams":1,"measure":"sztuka"},{"name":"Twarożek grani","grams":100,"measure":"duże opakowanie"}],"category":"Śniadanie"},{"id":50070540,"name":"Czekoladowy mus chia","description":"1. Wszystkie składniki umieść w blenderze kielichowym lub malakserze i zblenduj na jednolitą masę.\n2. Przełóż do miseczki i wstaw do lodówki na ok. 4-5 h lub na całą noc.\n3. Podawaj posypane kakao.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/Ka13xuJyhKvcOFwKYz50Md3IhzU68aYZYeeMwoij.jpg","kcal":281.32,"protein":39.13,"fat":7.3,"carbs":22.95,"ingredients":[{"name":"Nasiona chia","grams":15,"measure":"łyżka"},{"name":"Białko serwatkowe","grams":15,"measure":"porcja"},{"name":"Kakao w proszku","grams":15,"measure":"łyżeczka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Skyr naturalny","grams":200,"measure":"opakowanie"}],"category":"Deser"},{"id":50117503,"name":"Viralowy deser Lotus","description":"1. Serek wymieszaj z 15 g kremu. Jedno ciasto połam na 3 mniejsze części i wciśnij w serek.\n2. Na wierzchu rozprowadź 5 g kremu.\n3. Drugie ciasteczko rozkrusz i posyp po wierzchu. Udekoruj malinami. Wstaw do lodówki na 4-5 godzin.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/NvLY6eZzwKlrfdT7hBBVIaqF0smZyoJ4wyeSJ5wC.jpg","kcal":447.14,"protein":16.22,"fat":21.52,"carbs":48.05,"ingredients":[{"name":"Serek naturalny lekki (Bieluch)","grams":150,"measure":"opakowanie"},{"name":"Lotus Biscoff Krem do Smarowania","grams":20,"measure":"g"},{"name":"Ciastka Biscoff (Lotus)","grams":16,"measure":"sztuka"},{"name":"Maliny","grams":60,"measure":"garść"}],"category":"Deser"},{"id":50117511,"name":"Viralowy deser pistacjowy","description":"1. Serek wymieszaj z pastą, erytrolem i solą.\n2. Czekoladę rozpuść w kąpieli wodnej z odrobiną mleka. Wyłóż na serek.\n3. Pistacje posiekaj, posyp nimi deserek, udekoruj malinami. Wstaw do lodówki na 4-5 godzin.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/tAcm6VjSq9gIOG1VkHt2QZBKdDtKknHQZz86rdMe.jpg","kcal":420.05,"protein":18.4,"fat":29.22,"carbs":21.1,"ingredients":[{"name":"Pasta pistacjowa","grams":15,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Serek śmietankowy lekki (Delikate)","grams":135,"measure":"opakowanie"},{"name":"Biała czekolada","grams":6,"measure":"kostka"},{"name":"Mleko 1,5%","grams":15,"measure":"szklanka"},{"name":"Pistacje","grams":7,"measure":"łyżka"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"}],"category":"Deser"},{"id":50117512,"name":"Viralowy deser tiramisu","description":"1. Ricottę wymieszaj z espresso i erytrolem. Możesz dodać szczyptę soli dla podbicia smaku. Dodaj maliny i wymieszaj (zostaw kilka do dekoracji).\n2. Posyp kakao i posiekaną gorzką czekoladą. Udekoruj malinami. Wstaw na 4-5 h do lodówki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/bEkpqZTPONomLb95lYW1w7Ut6fZcKELTp9KEIzpY.jpg","kcal":537.99,"protein":23.57,"fat":30.98,"carbs":43.49,"ingredients":[{"name":"Ser Ricotta","grams":250,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Espresso","grams":30,"measure":"porcja"},{"name":"Biszkopty","grams":22,"measure":"sztuka"},{"name":"Kakao o obniżonej zawartości tłuszczu (Magnetic)","grams":5,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"kostka"},{"name":"Maliny","grams":60,"measure":"garść"}],"category":"Deser"},{"id":50701389,"name":"Zapiekanka z kaszą jaglaną i kurczakiem","description":"1. Kaszę jaglaną wsyp na sito i dokładnie przepłucz - najpierw gorącą wodą, potem zimną wodą. Odstaw.\n2. Kurczaka pokrój w mniejsze kawałki - kotki. Przełóż do miski, dodaj 20 g oliwy, sól, pieprz, paprykę słodką i wędzoną. Wymieszaj ręką.\n3. Szalotkę drobno posiekaj, paprykę pokrój w małą kostkę, suszone pomidory w paski.\n4. Do naczynia żaroodpornego wrzuć: kaszę, mięso, szalotkę, paprykę i suszone pomidory. Wymieszaj.\n5. W osobnej misce połącz: serek śmietankowy light, koncentrat pomidorowy, erytrol, oregano, pozostałe 15 g oliwy oraz gorącą wodę lub bulion. Wymieszaj dokładnie trzepaczką lub widelcem - sos ma być rzadki, bez grudek.\n6. Zalej nim zawartość naczynia. Płyn powinien lekko przykrywać całość, ale nie pływać wysoko ponad składnikami.\n7. Wstaw do piekarnika nagrzanego do 180°C, góra–dół, bez przykrycia, na 45 minut.\n8. Po tym czasie wyjmij zapiekankę, delikatnie przemieszaj wierzch, posyp startym serem lub w plastrach.\n9. Wstaw z powrotem na 5–10 minut, aż ser się roztopi i lekko przypiecze.\n10. Po wyjęciu odczekaj 5 minut - wtedy zapiekanka się „zwiąże” i ładnie się nakłada.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/b1dDNbqVLtT0LCHnZegtDbu3tLkAX09rQlWRhU4y.jpg","kcal":2082.9,"protein":153.93,"fat":83.67,"carbs":181.34,"ingredients":[{"name":"Kasza jaglana","grams":180,"measure":"szklanka"},{"name":"Kurczak pierś","grams":400,"measure":"sztuka"},{"name":"Szalotka","grams":40,"measure":"sztuka"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Pomidory suszone w zalewie","grams":80,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":30,"measure":"łyżka"},{"name":"Koncentrat pomidorowy","grams":20,"measure":"porcja"},{"name":"Serek śmietankowy lekki (Delikate)","grams":75,"measure":"g"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":4,"measure":"szczypta"},{"name":"Pieprz czarny","grams":5,"measure":"szczypta"},{"name":"Bulion drobiowy (Winiary)","grams":15,"measure":"łyżka"},{"name":"Woda","grams":450,"measure":"szklanka"},{"name":"Papryka wędzona w proszku","grams":4,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"szczypta"},{"name":"Papryka ostra przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":3,"measure":"szczypta"},{"name":"Mozzarella light","grams":125,"measure":"opakowanie"}],"category":"Obiad"},{"id":51171917,"name":"Pistacjowe tiramisu z malinami i mascarpone dla dwojga","description":"1. Zaparz mocną kawę i odstaw do całkowitego wystudzenia.\n2. W misce połącz mascarpone, erytrol i sok z cytryny. Wymieszaj krótko, do uzyskania gładkiej konsystencji.\n3. Dodaj ricottę oraz masło pistacjowe i delikatnie wymieszaj. Nie miksuj długo.\n4. Każdy biszkopt zanurz w kawie dosłownie na sekundę - nie dłużej.\n5. Ułóż po 2-3 biszkopty biszkopty na dnie każdego pucharka, nawet jeśli nie przykryją go idealnie.\n6. Na biszkopty nałóż część kremu i pozwól mu naturalnie spłynąć między nimi.\n7.\tRozłóż maliny. Możesz część lekko rozgnieść, a część zostawić w całości.\n8.\tUłóż drugą warstwę biszkoptów, znów krótko maczanych w kawie.\n9. Wyłóż resztę kremu i delikatnie wyrównaj wierzch.\n10.Posyp deser pozostałymi malinami i opcjonalnie posiekanymi pistacjami.\n11. Wstaw do lodówki na minimum 1 godzinę, najlepiej na 2–3.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/ruYjicxRWSbsWGiYevcUoCGSaP46X6YUQ9tqwCAI.jpg","kcal":918.27,"protein":24.25,"fat":60.52,"carbs":71.91,"ingredients":[{"name":"Biszkopty (Petitki)","grams":40,"measure":"sztuka"},{"name":"Ser Mascarpone","grams":75,"measure":"g"},{"name":"Ser Ricotta","grams":120,"measure":"łyżka"},{"name":"Pasta pistacjowa","grams":30,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Kawa espresso","grams":90,"measure":"porcja"},{"name":"Maliny","grams":180,"measure":"garść"},{"name":"Sok z cytryny","grams":6,"measure":"łyżeczka"}],"category":"Deser"},{"id":51187479,"name":"Fit pączki z piekarnika","description":"1. Piekarnik rozgrzej do 180 stopni (termoobieg).\n2. Wszystkie składniki oprócz dżemu wrzuć do miski i zagnieć na gładką masę. \n3. Stolnicę podsyp odrobiną mąki. Uformuj wałek i pokrój go na 9 równych części. \n4. Uformuj placki, na środek każdego z nich nałóż łyżeczkę dżemu i zamknij go w środku ciasta tworząc kulki.\n5. Każdą kulkę lekko spłaszcz i ułóż na blaszce wyłożonej papierem do pieczenia. \n6. Piecz przez 25-30 minut.\n7. Wystudzone pączki możesz posypać dodatkowo pudrem z erytrytolu. Przechowuj szczelnie owinięte folią spożywczą.","servings":9,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/2/Y2ouOep7OfmlWUPFC2C1aign2soa1BZBVSLtH0ON.jpg","kcal":1330.9,"protein":84.23,"fat":31.02,"carbs":181.09,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":65,"measure":"duża sztuka"},{"name":"Erytrytol","grams":80,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":10,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":200,"measure":"g"},{"name":"Dżem 100% owoców","grams":90,"measure":"łyżeczka"}],"category":"Deser"},{"id":51291913,"name":"Makaron z krewetkami w sosie pomidorowym","description":"1. Krewetki wyjmij wcześniej ro rozmrożenia, przepłucz i osusz. Makaron ugotuj al dente.\n2. Na oliwie zeszklij szalotkę, czosnek i chilli. Dodaj krewetki i koncentrat. Smaż 1-2 minuty. Dodaj pomidory i przyprawy oraz erytrol, wymieszaj i smaż ok. 8-10 minut.\n3. Dodaj ugotowany makaron, wymieszaj. Dopraw jeszcze w razie potrzeby. Dodaj posiekaną drobno natkę pietruszki.\n4. Podawaj udekorowane pomidorkami i natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/N86HCO3drVhooEhbYb730HEv2HaoVWM9afxcmOtB.jpg","kcal":532.24,"protein":40.17,"fat":8.82,"carbs":80.04,"ingredients":[{"name":"Makaron spaghetti pełnoziarnisty","grams":70,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Krewetki","grams":120,"measure":"mała sztuka"},{"nam
