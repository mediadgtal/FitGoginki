ć"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":18,"measure":"kostka"}]},{"id":53516467,"name":"Twarogowa pieczona owsianka z jagodami i kruszonką","description":"1. Zagnieć zimne masło, erytrol i mąkę na kruszonkę i wstaw na chwilę do lodówki. \n2. Twaróg zmiksuj z jajkiem, mlekiem, proszkiem do pieczenia, cynamonem i erytrolem na gładką masę. Dodaj płatki owsiane i wymieszaj. Przełóż do naczynia żaroodpornego. \n3. Na wierzch dodaj jagody i przygotowaną wcześniej, zimną kruszonkę. \n4. Piecz ok. 20 minut w 165 stopniach w airfryerze lub ok. 30 minut w 180 stopniach w piekarniku.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/rY2xF4d4BkgNIpqGOmoxEKL97jE0yLSuq6CxINlT.jpg","kcal":490.2,"protein":32.7,"fat":16.9,"carbs":53.0,"ingredients":[{"name":"Masło","grams":10,"measure":"porcja"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":15,"measure":"łyżeczka"},{"name":"Ser twarogowy chudy","grams":90,"measure":"plaster"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":40,"measure":"szklanka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Jagody mrożone","grams":60,"measure":"garść"}]},{"id":34528272,"name":"Twarogowe malinianki z kruszonką","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół). \n2. Twaróg zagnieć wraz z jajkami, mąką, erytrolem (20 g) i proszkiem do pieczenia na ciasto (będzie przypinać ciasto na kluski leniwe - będzie dość klejące). \n3. Ciasto podziel na 4 części i z każdej za pomocą zwilżonych dłoni uformuj kulką, a następnie ułóż ją na blaszce wyłożonej papierem do pieczenia i spłaszcz pozostawiając bardziej wypukłe brzegi.\n4. Do środka każdej bułeczki włóż maliny. \n5. Z masła, mąki i pozostałego erytrolu (10 g) zagnieć w palcach kruszonkę. Posyp nią bułeczki. \n6. Piecz ok. 25-30 minut.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/HB8LBAQzCbmuIcj1c7M45er5HhS5LOOt0jRtpm3w.jpg","kcal":1187.4,"protein":81.9,"fat":32.4,"carbs":141.6,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":150,"measure":"łyżeczka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Masło","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":20,"measure":"łyżeczka"}]},{"id":59199269,"name":"Twarożek grani z ogórkiem małosolnym i koperkiem","description":"1. Szczypiorek i koperek posiekaj, a ogórki pokrój w kostkę.\n2. Twarożek wymieszaj z warzywami, przyprawami i posyp pestkami dyni.\n3. Całość zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/DZD8kRUDdhSTiAYI1YBL4l8T1DPerxhJrKMaScUA.jpg","kcal":512.2,"protein":30.8,"fat":17.2,"carbs":60.1,"ingredients":[{"name":"Twarożek grani","grams":150,"measure":"duże opakowanie"},{"name":"Ogórek małosolny","grams":130,"measure":"średnia sztuka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pestki dyni","grams":15,"measure":"łyżka"}]},{"id":43687114,"name":"Udon w sosie orzechowym z brokułami","description":"1. Mięso pokrój w paseczki i wymieszaj z łyżeczką sosu sojowego, czosnkiem granulowanym i pieprzem. \n2. Na patelni rozgrzej oliwę i podsmaż mięso aż się zarumieni i straci surowość. \n3. W między czasie ugotuj makaron we wrzątku według czasu podanego przez producenta oraz ugotuj różyczki brokuła (jeśli będzie Ci wygodniej możesz zagotować wodę w garnku, wrzucić brokuły na ok. 5-7 minut i dorzucić do nich makaron na tyle minut, ile zaleca producent). \n4. Pozostały sos sojowy wymieszaj z masłem orzechowym, przeciśniętym ząbkiem czosnku, sosem sriracha, syropem klonowym, mąką ziemniaczaną i zimną wodą. Posiekaj orzechy nerkowca. \n5. Na patelnię do mięsa dodaj makaron wraz z brokułami, sos oraz posiekane orzechy. Wymieszaj wszystko razem i gotuj jeszcze przez chwilę aż sos lekko zgęstnieje. \n6. Makaron przełóż na talerze i posyp posiekanym szczypiorkiem oraz sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/wbX27wC7uCxZ6KUh7u92vGZHcZvhsJpvN6RzLIJl.jpg","kcal":571.0,"protein":48.0,"fat":19.6,"carbs":51.5,"ingredients":[{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sos sojowy","grams":5,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Makaron udon","grams":100,"measure":"g"},{"name":"Brokuł","grams":125,"measure":"sztuka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Masło orzechowe","grams":10,"measure":"łyżka"},{"name":"Woda","grams":25,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":3,"measure":"łyżeczka"},{"name":"Orzechy nerkowca","grams":8,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Mąka ziemniaczana","grams":4,"measure":"łyżeczka"}]},{"id":34528199,"name":"Viralowa pizza z serka wiejskiego","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Serek wiejski wymieszaj z jajkiem i mąką na jednolitą masę. Wylej na blaszkę wyłożoną papierem do pieczenia, uformuj w okrąg (ale nie za płaski) i wstaw do piekarnika na 10-15 minut.\n3. Po tym czasie posmaruj spód passatą, dopraw oregano i na wierzch dodaj starta mozzarellę. Zapiekaj ponownie 10-15 minut. \n4. Po upieczeniu udekoruj pizzę pokrojonymi pomidorkami, parmezanem oraz rukolą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/BDsYnIJdOeIe0KRJHyR2ZPln4mu21T7vr8InRgQ8.jpg","kcal":499.7,"protein":49.1,"fat":19.6,"carbs":32.1,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Passata pomidorowa","grams":45,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"}]},{"id":59199270,"name":"Waniliowa jaglanka z truskawkami i białą czekoladą","description":"1. Płatki jaglane ugotuj na mleku z dodatkiem erytrolu i ekstraktu waniliowego.\n2. Gotową jaglankę przełóż do miseczki, dodaj jogurt, pokrojone owoce, posiekane migdały i białą czekoladę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/kcCJYJlyatZXMCAipNEwcBkDfdMblz3MfIklzFdd.jpg","kcal":499.6,"protein":26.6,"fat":14.0,"carbs":68.1,"ingredients":[{"name":"Płatki jaglane","grams":45,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Ekstrakt waniliowy","grams":2,"measure":"kropla"},{"name":"Skyr waniliowy","grams":150,"measure":"łyżka"},{"name":"Truskawki","grams":100,"measure":"garść"},{"name":"Migdały","grams":15,"measure":"łyżeczka"},{"name":"Czekolada biała","grams":5,"measure":"kawałek"}]},{"id":38873219,"name":"Waniliowe naleśniki z prażonymi jabłkami","description":"1. Mąkę, mleko, jajko, wodę i proszek do pieczenia zmiksuj na gładką masę.\n2. Naleśniki smaż na bardzo dobrze rozgrzanej patelni z odrobiną oliwy.\n3. Jabłko uduś z odrobiną wody, erytrolem, cynamonem i sokiem z cytryny.\n4. Gotowe naleśniki posmaruj skyrem waniliowym, dodaj prażone jabłko, płatki migdałów i zawiń w trójkąty lub rulony.\n5. Naleśniki możesz dodatkowo posypać większą ilością cynamonu, jeśli lubisz.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/iVPdHkAth9roc29SprlWFgZokg4B4mZZ4FXhgczU.jpg","kcal":572.4,"protein":30.7,"fat":17.6,"carbs":75.9,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Woda","grams":30,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Skyr waniliowy (Pilos)","grams":150,"measure":"łyżka"},{"name":"Jabłko","grams":185,"measure":"mała sztuka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}]},{"id":41144628,"name":"Warstwowa sałatka z cieciorką i tuńczykiem","description":"1. Ciecierzycę odcedź i przepłucz pod wodą. Tuńczyka odcedź z zalewy.\n2. Ogórka i paprykę pokrój w kostkę, a cebulę czerwoną w piórka.\n4. Na dno słoika wlej oliwę i sok z cytryny. Następnie dodaj pokrojoną cebulę.\n5.Kolejno dodaj cieciorkę, paprykę, tuńczyka, ogórka oraz roszponkę.\n6. Dodaj szczyptę soli i pieprzu oraz pestki słonecznika.\n7. Sałatkę zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/Qcvcp3i1T1af82VLk2pPbGsMK7juLAQ5TXeEXcxm.jpg","kcal":474.0,"protein":32.3,"fat":20.1,"carbs":41.4,"ingredients":[{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Papryka czerwona","grams":75,"measure":"mała sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Cebula czerwona","grams":40,"measure":"plaster"},{"name":"Nasiona słonecznika","grams":12,"measure":"łyżeczka"},{"name":"Tuńczyk w puszce w sosie własnym","grams":80,"measure":"mała puszka"},{"name":"Ciecierzyca w zalewie","grams":60,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}]},{"id":53516450,"name":"Wiosenne kanapki z szybką pastą jajeczną","description":"1. Jajko ugotuj na półmiękko lub na twardo. Obierz i rozgnieć widelcem. Wymieszaj z majonezem, musztardą, posiekanym szczypiorkiem, solą i pieprzem. \n2. Pastę nałóż na pieczywo. Na wierzch dodaj pokrojone rzodkiewki i kiełki.\n3. Dodatkowo zjedz pokrojonego ogórka.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/l9WUGuUxPOjZZnsEFrPPpAGymeFK5FU1uorEjDwI.jpg","kcal":494.6,"protein":23.4,"fat":18.8,"carbs":58.1,"ingredients":[{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Majonez light","grams":15,"measure":"łyżka"},{"name":"Musztarda","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Kiełki mix","grams":16,"measure":"łyżka"}]},{"id":61928708,"name":"Wiosenne risotto z botwinką","description":"1. Cebulę pokrój w kosteczkę, a buraczki z botwinki zetrzyj na tarce. \n2. W garnku z grubym dnem lub na większej patelni rozgrzej oliwę i zeszklij cebulę. Dodaj pokrojonego kurczaka w paseczki, przypraw sola i pieprzem i podsmaż aż mięso straci surowość. Dorzuć buraczki, drobno posiekany czosnek  i smaż jeszcze przez chwilę . Następnie dodaj suchy ryż i smaż do momentu aż ryż stanie się szklisty. \n3. Do garnka dodaj pokrojone łodygi i liście botwinki i zacznij dolewać stopniowo wodę (lub bulion). \n4. Gotuj na wolnym ogniu do momentu aż ryż będzie miękki a risotto będzie miało kremową konsystencję. Na samym końcu dodaj zimne masło i parmezan i wszystko razem wymieszaj. Dopraw do smaku solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/jujUYGO2ybzxADFuSUoreaSk7weoLE6fkGWxihOx.jpg","kcal":573.3,"protein":40.9,"fat":18.6,"carbs":59.8,"ingredients":[{"name":"Ryż arborio","grams":60,"measure":"łyżka"},{"name":"Kurczak pierś","grams":120,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Botwinka","grams":140,"measure":"pęczek"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"}]},{"id":59199280,"name":"Wiosenny bowl ze szparagami","description":"1. Piekarnik nagrzej do 200 stopni (termoobieg).\n2. Ziemniaki umyj, wyszoruj skórkę, (większe pokrój w ćwiartki) i wrzuć do miski. Dodaj połowę oliwy, szczyptę soli, czosnku i papryki słodkiej.\n3. Całość dokładnie wymieszaj i odstaw na 5 minut, a następnie ułóż na blaszce wyłożonej papierem do pieczenia i wstaw do nagrzanego piekarnika na około 30-35 minut.\n4. Pod koniec pieczenia obok ziemniaków dodaj umyte szparagi, skrop je pozostałą częścią oliwy i posyp szczyptą soli. Zostaw na 7-8 minut.\n5. W międzyczasie serek wiejski zmiksuj na gładką masę. Rozsmaruj go na dnie głębokiego talerza, w którym chcesz podać bowla. \n6. Awokado pokrój w paseczki.\n7. Do miski z serkiem, włóż roszponkę, dodaj upieczone ziemniaki ze szparagami i pokrojone awokado. Całość posyp słonecznikiem i dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/UsuVCcPpkY3gJKrxJcrUdvMlSR4OdNKh8r3nOFGg.jpg","kcal":503.4,"protein":27,"fat":22.5,"carbs":55.1,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Nasiona słonecznika","grams":4,"measure":"łyżeczka"}]},{"id":56307448,"name":"Wiosenny serek wiejski z rzodkiewką i ogórkiem","description":"1. Serek przełóż do miseczki.\n2. Dodaj pokrojone rzodkiewki i ogórka oraz posiekany szczypiorek. Posyp pestkami i dopraw pieprzem.\n3. Zjedz z pieczywem posmarowanym masłem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/zUYjZmKOsAXsGc4Ao4gMkZ6cipgayaPyPtRug8nI.jpg","kcal":506.2,"protein":29.5,"fat":17.1,"carbs":59.8,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Masło","grams":5,"measure":"g"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":56307458,"name":"Wiosenny stir-fry z wołowiną i groszkiem cukrowym","description":"1. Makaron ugotuj zgodnie z instrukcją.\n2. Cebulę pokrój w piórka, paprykę i marchewkę w paseczki, a groszek umyj i pozbaw końcówek i włókien.\n3. Na patelni rozgrzej olej sezamowy i podsmaż cebulę. Dodaj mieloną wołowinę oraz przeciśnięty czosnek. Przypraw solą, pieprzem oraz papryką. Smaż do momentu aż mięso straci surowość.\n4. Dodaj na patelnię marchewkę, smaż razem przez chwilę, a następnie dodaj paprykę oraz groszek. \n5. Kiedy warzywa będą już al dente dodaj ugotowany makaron, sos sojowy, sok z limonki, syrop klonowy oraz chili. Wszystko razem wymieszaj i przełóż na talerz. \n6. Gotowy stir fry posyp posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/YSWuf1R1LiCvDPX7wvBTtbKytB3oJztxCirsVbgk.jpg","kcal":579.8,"protein":34.1,"fat":19.0,"carbs":76.8,"ingredients":[{"name":"Makaron soba","grams":65,"measure":"szklanka"},{"name":"Olej sezamowy","grams":5,"measure":"łyżka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Wołowina mielona","grams":100,"measure":"porcja"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Groszek cukrowy","grams":55,"measure":"garść"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":36694537,"name":"Wrap low carb z cukinii z serkiem i łososiem","description":"1. Piekarnik rozgrzej do 200 stopni. \n2. Cukinię pokrój w plastry (dość cienkie) i ułóż je na blaszce wyłożonej papierem do pieczenia w taki sposób, aby zachodziły na siebie i utworzyły spójny prostokąt. Mozzarellę odciśnij z nadmiaru płynu za pomocą ręcznika papierowego, zetrzyj na tarce i rozsyp wraz z parmezanem równomiernie na cukinii. Piecz 20-25 minut aż ser się rozpuści, a cukinia zarumieni. Wrapa po upieczeniu pozostaw do wystudzenia.\n3. Następnie posmaruj serkiem, ułóż roszponkę, kawałki łososia oraz plastry ogórka.\n4. Zwiń tak, jak tortillę lub złóż na pół.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/DqAABZOl5Vpcf44CUCBgmafnqRDG4g68iif1A6BE.jpg","kcal":482.8,"protein":55.5,"fat":25.6,"carbs":10.3,"ingredients":[{"name":"Cukinia","grams":150,"measure":"plaster"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Twarożek grani","grams":100,"measure":"duże opakowanie"},{"name":"Łosoś wędzony na gorąco","grams":75,"measure":"g"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}]},{"id":47967522,"name":"Wrap z awokado i pastą z tuńczyka","description":"1. Tuńczyka odsącz z zalewy i wymieszaj z serkiem, majonezem i posiekanym szczypiorkiem.\n2. Tortillę posmaruj przygotowaną pastą. Dodaj roszponkę, pokrojone awokado i pestki dyni.\n3. Wrapa zawiń w rulon (zawijając końce do środka). Możesz podsmażyć z obu stron na suchej patelni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/GPhHohHm1HPWV5pfhe2qSBSQ40tYq5cfmu1xzJUl.jpg","kcal":503.5,"protein":34.9,"fat":25.0,"carbs":36.6,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Tuńczyk w puszce w sosie własnym","grams":90,"measure":"łyżka"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":15,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Awokado","grams":50,"measure":"sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":34528183,"name":"Wrap z grillowanym serem halloumi","description":"1. Tortillę po ,"grams":1,"measure":"szczypta"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sałata zielona","grams":10,"measure":"liść"},{"name":"Łosoś wędzony","grams":50,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}]},{"id":59199271,"name":"Wrap z omletem, szparagami i suszonymi pomidorami","description":"1. Szparagi pozbaw twardych końcówek, pokrój na 3-4 części i wrzuć na lekko osolony wrzątek na 3-4 minuty. Odcedź i przelej zimną wodą - wówczas zachowają ładny kolor. \n2. Jajka wbij do miseczki, a następnie roztrzep widelcem razem z przyprawami.\n3. Na patelnię z rozgrzaną oliwą wylej przygotowaną masę jajeczną (masę jajeczną rozprowadź po całej patelni). Kiedy jajka delikatnie się zetną od spodu połóż na nich tortillę i smaż tak długo aż omlet całkiem się zetnie. Przewróć energicznym ruchem na drugą stronę i smaż jeszcze chwilkę.\n4. Suszone pomidory pokrój w paseczki. \n5. Na tortillę z omletem nałóż roszponkę, szparagi i suszone pomidory. Wszystko zawiń w rulon.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/zyilI7aYTJt0zNHgJc1xs4RJdZxzcDtTcQM8pF2N.jpg","kcal":490.8,"protein":23.9,"fat":26.3,"carbs":44.7,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"}]},{"id":36694523,"name":"Wrap z pastą jajeczną z awokado i łososiem","description":"1. Jajko ugotuj na twardo. Po przestudzeniu pokrój w drobną kostkę lub zetrzyj na tarce o grubych oczkach. \n2. Łososia wędzonego oraz awokado przełóż do miseczki i rozdrobnij za pomocą widelca. Dodaj rozdrobnione jajko i posiekany szczypiorek. Pastę wymieszaj i dopraw solą i pieprzem.\n2. Tortillę posmaruj serkiem. Dodaj rukolę, pestki dyni oraz pastę.\n3. Wrapa zawiń w rulon (zawijając końce do środka). Przekrój na pół pod skosem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/w4cx6hdUQxWx0rcTxo6w6Rg6eczx3FtQ0RPHbMES.jpg","kcal":505.9,"protein":30.9,"fat":28.5,"carbs":34.5,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Serek naturalny","grams":25,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Łosoś wędzony na gorąco","grams":50,"measure":"opakowanie"},{"name":"Awokado","grams":35,"measure":"sztuka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":46076311,"name":"Wrap z serka wiejskiego z szynką i warzywami","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Serek wiejski zmiksuj z jajkami i przyprawami na gładką masę i wylej ją na blaszkę wyłożoną papierem do pieczenia. \n3. Nadaj kształt okręgu lub prostokąta za pomocą łyżki. Nie rozsmarowuj ciasta zbyt cienko. \n4. Piecz ok. 20 minut. \n5. Gotowego wrapa pozostaw do przestudzenia. Następnie posmaruj serkiem, nałóż szpinak, posiekany szczypiorek, pokrojonego ogórka i plastry szynki. Posyp pestkami.\n6. Zwiń w rulon - tak, jak tortillę.\n7. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/T33TQYXyln1g5wsEpPxtjoDuLxqshf5uy5pKJ8uo.jpg","kcal":501.6,"protein":44.4,"fat":21.4,"carbs":36.3,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Szynka z indyka","grams":45,"measure":"plaster"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"},{"name":"Pomarańcza","grams":160,"measure":"mała sztuka"}]},{"id":47967526,"name":"Wytrawne kluski leniwe z boczniakami","description":"1. Twaróg rozgnieć widelcem razem z jajkiem, przyprawami i szczyptą soli. Następnie dodaj mąkę i wszystko razem wymieszaj.\n2. Z powstałej masy zrób wałek, pokrój kluski i wrzuć je od razu do garnka z gotującą się wodą.\n3. Po wypłynięciu na wierzch, kluski zostaw jeszcze na 2-3 minuty, a następnie odcedź.\n4. Boczniaki pokrój na paski i obsmaż na oliwie. Przypraw sosem sojowym.\n5. Kluski leniwe podawaj z podsmażonymi grzybami i natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/RuxreCg4E2A3BUEzZKGhpR7gY2aTqdxkkGLEIUCD.jpg","kcal":585.3,"protein":44.8,"fat":21.2,"carbs":73.5,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":60,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ser twarogowy półtłusty","grams":100,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Boczniaki","grams":300,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sos sojowy","grams":15,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}]},{"id":41144618,"name":"Wytrawne naleśniki ze szpinakiem, suszonymi pomidorami i szarpanym kurczakiem","description":"1. Mięso z kurczaka przełóż do garnka, zalej wodą, dodaj sól, liść laurowy, ziele angielskie i pieprz w ziarnach i ugotuj pierś do miękkości. \n2. Mąkę, mleko, jajko i proszek do pieczenia zmiksuj na gładką masę.\n3. Naleśniki smaż na bardzo dobrze rozgrzanej patelni z odrobiną oliwy.\n4. Szpinak podsmaż na pozostałej oliwie. Dodaj posiekane suszone pomidory. \n5. Pierś z kurczaka \"poszarp\" za pomocą dwóch widelców na długie włókna. Dodaj do szpinaku i wszystko dokładnie wymieszaj. Dopraw ewentualnie solą oraz pieprzem i czosnkiem granulowanym.\n6. Naleśniki nadziewaj przygotowanym farszem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/C39vUzXXnoLJZzEwxZcqRgHvj38UagpKgSwIuoAa.jpg","kcal":645.8,"protein":54.0,"fat":24.6,"carbs":54.4,"ingredients":[{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":100,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":60,"measure":"sztuka"},{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"}]},{"id":41144613,"name":"Wytrawny placek z cukinii z łososiem wędzonym","description":"1. Cukinię zetrzyj na tarce i odciśnij z niej nadmiar wody. \n2. Jajko wymieszaj z mlekiem, przyprawami, mąką i cukinią.\n3. Na patelni rozgrzej odrobinę oliwy (jeśli masz taką w sprayu - sprawdzi się świetnie) i wylej masę. Smaż pod przykryciem aż boki będą już dobrze ścięte, a następnie przewróć na drugą stronę. \n4. Gotowy placek przełóż na talerz, posmaruj serkiem, dodaj kawałki wędzonego łososia, koperek, plasterki rzodkiewki i roszponkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/KXTWc62XqeIGuF6G2FsWFDt8nr3gXA8QMeboOsXM.jpg","kcal":480.4,"protein":37.0,"fat":18.0,"carbs":43.7,"ingredients":[{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":60,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Łosoś wędzony na gorąco","grams":63,"measure":"opakowanie"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Rzodkiewka","grams":45,"measure":"sztuka"}]},{"id":36694528,"name":"Zapiekane bataty z warzywami, mięsem i serem","description":"1. Piekarnik rozgrzej do 200 stopni. Batata przekrój na pół, nakłuj za pomocą widelca i ułóż w naczyniu żaroodpornym. Piecz ok. godziny (aż będzie miękki).\n2. Cebulę, paprykę i cukinię pokrój w kostkę. Podsmaż warzywa wraz z mięsem na oliwie. Dodaj pomidory, dopraw solą, pieprzem, papryką oraz ziołami. \n3. Gotowy farsz wyłóż na połówki upieczonego batata, posyp serem i wstaw jeszcze do piekarnika do zapieczenia (aż ser się rozpuści).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/vGBe5MZUAbF8SlQIaaDr7og2CWTBfoJlwyXpdw84.jpg","kcal":588.3,"protein":53.6,"fat":14.1,"carbs":66.8,"ingredients":[{"name":"Batat","grams":250,"measure":"g"},{"name":"Mięso mielone z indyka","grams":130,"measure":"porcja"},{"name":"Cebula","grams":25,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Bazylia suszona","grams":1,"measure":"szczypta"},{"name":"Pomidory krojone w puszce","grams":100,"measure":"puszka"}]},{"id":51097583,"name":"Zapiekane naleśniki ze szpinakiem","description":"1. Jajko zmiksuj z mlekiem, mąką, oliwą i szczyptą soli. Ciasto odstaw na 10 minut. \n2. W tym czasie uduś na patelni szpinak z suszonymi pomidorami. Przypraw czosnkiem i pieprzem (nie dodawaj dużo soli, bo w farszu będzie feta, która jest bardzo słona). Pozostaw do lekkiego przestudzenia. \n3. Usmaż naleśniki bez tłuszczu. \n4. Do szpinaku dodaj rozdrobioną fetę i wymieszaj. \n5. Naleśniki nadziej farszem i zawiń jak krokiety. Ułóż w naczyniu żaroodpornym lub koszyczku airfryera. \n6. Passatę wymieszaj z oregano i dopraw solą i pieprzem. Sosem posmaruj naleśniki a następnie posyp mozzarellą. \n7. Zapiekaj ok. 8-10 minut w temp. 190 stopni (w airfryerze zmniejsz czas do ok. 5-6 minut) aż ser się rozpuści i zarumieni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/MAx6B7MubE9eCD2xfYG29JzvmgIJHtqG3xhtVpy4.jpg","kcal":588.0,"protein":32,"fat":29.5,"carbs":51.2,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":80,"measure":"szklanka"},{"name":"Woda","grams":40,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Pomidory suszone","grams":14,"measure":"sztuka"},{"name":"Ser Feta","grams":60,"measure":"plaster"},{"name":"Passata pomidorowa","grams":30,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Mozzarella tarta","grams":20,"measure":"g"}]},{"id":46076301,"name":"Zapiekanka makaronowa z łososiem, szpinakiem i suszonymi pomidorami","description":"1. Piekarnik nagrzej do 180 stopni (góra-dół).\n2. Makaron ugotuj, ale chwilę krócej niż al dente (tak, żeby nie był całkowicie surowy).\n3. Łososia pokrój w kostkę, przypraw solą i pieprzem i podsmaż na odrobinie oliwy. Przełóż na talerz.\n4. Szpinak podsmaż na pozostałej  oliwie wraz z przeciśniętym przez praskę czosnkiem i smaż aż liście całkowicie \"zwiędną\". Dopraw solą i pieprzem\n4. Dodaj na patelnię podgotowany makaron, posiekane suszone pomidory i serek śmietankowy. Wszystko dobrze wymieszaj i przełóż do małego naczynia żaroodpornego. Dodaj kawałki łososia i \"powciskaj\" je delikatnie do zapiekanki.\n5. Na wierzch dodaj porwaną lub startą na tarce mozzarellę.\n6. Zapiekankę włóż do nagrzanego piekarnika na około 20-25 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/3KYfo37vILUXt67VydV1aTRLNevmAOuatWeAzxDZ.jpg","kcal":593.7,"protein":36.3,"fat":27.2,"carbs":55.2,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":55,"measure":"porcja"},{"name":"Łosoś atlantycki","grams":75,"measure":"sztuka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Ser Mozzarella light 9%","grams":30,"measure":"plaster"}]},{"id":53516448,"name":"Zapiekany bajgiel z jajkiem i mozzarellą","description":"1. Bajgla przekrój na pół i ułóż na blaszce wyłożonej papierem do pieczenia lub w koszyczku airfryera. \n2. Połóż na pieczywie liście szpinaku, a następnie na środek delikatnie wbij jajko.\n3. Dodaj pokrojone pomidorki, mozzarellę i cienko pokrojoną czerwoną cebulę. \n3. Zapiekaj w piekarniku ok. 20-25 minut w temperaturze 180 stopni (w airfryerze skróć czas do 15-20 minut). \n4. Po upieczeniu dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/u1VUwaRzZk9k1jbgJk9xmkjuanSM95FP0tYnEEsT.jpg","kcal":519.0,"protein":29.9,"fat":15.7,"carbs":64.0,"ingredients":[{"name":"Bajgiel z makiem","grams":105,"measure":"średnia sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Mozzarella tarta","grams":20,"measure":"g"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}]},{"id":53516462,"name":"Zielona pinsa z kremowym szpinakiem i mozzarellą","description":"1. Szpinak uduś na patelni wraz z suszonymi pomidorami. Dopraw solą, pieprzem oraz czosnkiem i wymieszaj z serkiem śmietankowym. \n2. Pinsę posmaruj kremowym szpinakiem.\n3. Na wierzch dodaj pokrojoną w cienkie piórka cebulę oraz mozzarellę. \n4. Zapiekaj ok. 8-10 minut w 200-220 stopniach.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/JPTwvKse1mHGa1Geijf0INu35FTpyyvf4GU7iAbS.jpg","kcal":506.9,"protein":22.0,"fat":18.5,"carbs":68.8,"ingredients":[{"name":"Pinsa Gourmet pełnoziarnista","grams":115,"measure":"opakowanie"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Mozzarella tarta","grams":30,"measure":"g"}]},{"id":47967517,"name":"Zielona szakszuka","description":"1. Czosnek drobno posiekaj i podsmaż na oliwie.\n2. Następnie dodaj pokrojoną w plasterki cukinię i zostaw na 2-3 minuty.\n3. Dodaj szpinak, serek i przyprawy i zostaw na małym ogniu na około 5 minut.\n4. Następnie zrób w sosie wgłębienia i wbij jajka. Całość przykryj i duś pod przykryciem około 3-4 minut (do momentu, aż jajka się zetną).\n5. Gotową szakszukę posyp szczypiorkiem i zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/zGmdNAA0s52242v1JtuOmDZZaYtIPZqFNqVqwnPo.jpg","kcal":509.7,"protein":27.9,"fat":18.6,"carbs":59.1,"ingredients":[{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżeczka"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"}]},{"id":34528187,"name":"Zielony makaron pełen białka","description":"1. Makaron ugotuj al dente wg instrukcji na opakowaniu.\n2. Szalotkę pokrój w kostkę i podsmaż na oliwie wraz z czosnkiem. Następnie dodaj szpinak i smaż wszystko razem aż szpinak zwiędnie.\n3. Do blendera przełóż serek wiejski, podsmażone warzywa, odsączoną fasolę oraz przyprawy. Wszystko zmiksuj na gładki, kremowy, zielony sos.\n4. Ugotowany makaron wymieszaj z sosem. Na talerzu posyp parmezanem i udekoruj rukolą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/RiHY9soIZ9QWmREXGHP5SNh1W6VojEDYdRX2jPQD.jpg","kcal":586.1,"protein":37.6,"fat":14.9,"carbs":78.7,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":75,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Fasola biała konserwowa","grams":60,"measure":"łyżka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Ser Parmezan","grams":12,"measure":"łyżeczka"}]},{"id":41144625,"name":"Zupa krem z pomidorów z soczewicą i mozzarellą","description":"1. Cebulę oraz czosnek posiekaj na drobne kawałki i podsmaż na oliwie.\n2. Następnie dodaj pomidory z puszki, pokrojonego w kostkę świeżego pomidora, erytrol, soczewicę i przyprawy. Całość wymieszaj i zostaw na małym ogniu na około 10-15 minut aż soczewica będzie całkiem miękka.\n3. Garnek zdejmij z ognia i zblenduj wszystko na krem. W razie potrzeby dolej troszkę wrzątku.\n4. Chleb zgrilluj na suchej patelni na grzankę.\n5. Zupę przelej do miseczki, dodaj porwaną mozzarellę oraz pestki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/IkLXH5jRqoCsSTdwQ3JBOs70T9Gnk21AzzcQYNSe.jpg","kcal":465.1,"protein":32.5,"fat":17.4,"carbs":53.1,"ingredients":[{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Erytrytol","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Pomidory krojone w puszce","grams":400,"measure":"puszka"},{"name":"Soczewica czerwona","grams":30,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":63,"measure":"sztuka"}]},{"id":41144620,"name":"Łosoś po toskańsku w kremowym sosie ze szpinakiem i pomidorkami","description":"1. Na patelni rozgrzej oliwę i podsmaż łososia z każdej strony. Odłóż go na bok. \n2. Na tą samą patelnię dodaj pokrojoną w kostkę szalotkę, czosnek, posiekane suszone pomidory i wszystko razem podsmażaj. \n3. Dodaj wodę i serek i wszystko wymieszaj tworząc sos. Dopraw solą i pieprzem. \n4. Do sosu dodaj pomidorki oraz szpinak. Włóż także obsmażonego łososia i duś wszystko razem pod przykryciem ok. 5-8 minut. \n5. Danie podawaj z ugotowanym makaronem i bazylią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/IuVA80TvJUVI93vKxVefaKHGSxRKSWq78tLsUzXk.jpg","kcal":647.1,"protein":35.0,"fat":26.8,"carbs":68.6,"ingredients":[{"name":"Łosoś atlantycki","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Serek naturalny","grams":20,"measure":"g"},{"name":"Makaron","grams":65,"measure":"g"},{"name":"Bazylia świeża","grams":4,"measure":"łyżka"}]},{"id":43687116,"name":"Łosoś w sosie szpinakowym z kaszą jaglaną","description":"1. Piekarnik rozgrzej do 200 stopni. Filety z łososia przypraw solą i pieprzem (możesz użyć pieprz cytrynowy), włóż do naczynia żaroodpornego i piecz ok 12-15 minut. \n2. Suszone pomidory posiekaj i wrzuć na patelnię. Rozgrzej i następnie podsmaż na nich cebulę pokrojoną w drobną kostkę oraz posiekany czosnek. Dodaj szpinak i duś aż zwiędnie (jeśli używasz mrożonego to do całkowitego odparowania wody).\n3. Na końcu dodaj serek i dopraw solą, pieprzem oraz szczyptą gałki muszkatołowej. Możesz dodać odrobinę wrzątku, jeśli sos będzie zbyt gęsty.\n4. Do sosu przełóż upieczonego łososia.\n5. Danie podawaj z ugotowaną kaszą jaglaną.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/3CHauf9QolRTx2Dpl7xsr95FMYyZ6O5OIPM1SvJ5.jpg","kcal":578.3,"protein":34.5,"fat":25.1,"carbs":56.0,"ingredients":[{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Łosoś atlantycki","grams":100,"measure":"porcja"},{"name":"Kasza jaglana","grams":50,"measure":"łyżka"}]},{"id":53516458,"name":"Łosoś z salsą z mango, ryżem i świeżą sałatką","description":"1. Mango pokrój w kosteczkę. Dodaj posiekaną kolendrę, płatki chilli, sok z limonki i wymieszaj. Odstaw do przegryzienia. \n2. Ryż ugotuj według czasu podanego przez producenta. \n3. Syrop klonowy wymieszaj z sosem sojowym, i sokiem z limonki. Łososia posmaruj przygotowaną marynatą i odstaw na ok. 10 minut. Następnie posyp sezamem i upiecz przez ok. 12 minut w 180 stopniach. \n4. Przygotuj sałatkę: pomidorki przekrój na pół, a cebulę w cienkie piórka. Przełóż pokrojone warzywa wraz z roszponką do miski, dodaj oliwę, sok z cytryny, sól, pieprz i wymieszaj. \n5. Upieczonego łososia podawaj z ryżem, salsą mango i sałatką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/RcZ4N9w0rmBphReS6CEimcfUun6VDkzmm7FE6NWl.jpg","kcal":601.6,"protein":31.8,"fat":24,"carbs":65.0,"ingredients":[{"name":"Mango","grams":90,"measure":"plaster"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Kolendra liście","grams":5,"measure":"garść"},{"name":"Łosoś atlantycki","grams":120,"measure":"porcja"},{"name":"Syrop klonowy","grams":3,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}]},{"id":46076297,"name":"Śniadaniowa tortilla z omletem z pieczarkami","description":"1. Pieczarki pokrój w plastry i podsmaż na odrobinie oliwy. \n2. Jajka rozmąć widelcem, dopraw solą i pieprzem, wylej je na pieczarki i rozprowadź po całej powierzchni.\n3. Na masę jajeczną wyłóż tortillę i dociśnij łopatką, aby omlet przykleił się do niej. Smaż przez chwilę, a jak jajka będą już całkowicie ścięte to przełóż tortillę z omletem na drugą stronę. \n4. Na jednej połowie ułóż plastry mozzarelli i złóż na pół. Smaż jeszcze przez chwilę aż ser się rozpuści. \n5. Gotową tortillę pokrój na 3 lub 4 trójkąciki. Podawaj z garścią ulubionej zieleniny - np. szpinakiem, rukolą, roszponką itp. i pomidorkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/jPrRGFjznOHcLLTlEISbokyBqVt8hB0LQedVCccR.jpg","kcal":513.0,"protein":36,"fat":26.2,"carbs":35.2,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pieczarki","grams":54,"measure":"średnia sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":36694526,"name":"Śniadaniowy bowl z serkiem wiejskim i jajkiem na miękko","description":"1. Jajka ugotuj na miękko.\n2. Serek wiejski przełóż do mieseczki.\n3. Ogórka i rzodkiewki pokrój w kostkę.\n4. Do miski z serkiem dodaj na wierzch pokrojone warzywa i jajko przekrojone na pół. Posyp posiekanym szczypiorkiem.\n5. Całość posyp pestkami dyni.\n6. Zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/uMLM0xKCUyVsp7TBPYV9TdVrt4voU7TiXWPGpHlN.jpg","kcal":512.7,"protein":36.2,"fat":22.1,"carbs":43.4,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże o <script type="module">
  "use strict";
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDuX71iD6KNBrNwFQdPMFRBrTMgmvi0efg",
    authDomain: "fitgoginki.firebaseapp.com",
    projectId: "fitgoginki",
    storageBucket: "fitgoginki.firebasestorage.app",
    messagingSenderId: "86269772726",
    appId: "1:86269772726:web:5c36802723f483ac5a3717",
  };
  const fbApp = initializeApp(firebaseConfig);
  const fbAuth = getAuth(fbApp);
  const fbDb = getFirestore(fbApp);
  const SHARED_DOC = doc(fbDb, "household", "shared");

  const DATA = JSON.parse(document.getElementById("app-data").textContent);
  const RECIPES = DATA.recipes;
  const PLAN = DATA.plan;
  const recipeById = new Map(RECIPES.map(r => [r.id, r]));

  const LS_FAV = "fp_favorites_v1";
  const LS_WEEKPLAN = "fp_weekplan_dated_v3";
  const LS_CHECKED = "fp_checked_v1";
  const LS_RECIPE_OVERRIDES = "fp_recipe_overrides_v1";
  const LS_MONTH_NAMES = "fp_month_names_v1";
  const LS_SHOP_OVERRIDES = "fp_shop_overrides_v1";
  const LS_CUSTOM_ITEMS = "fp_custom_shop_items_v1";
  const LS_CUSTOM_STATS = "fp_custom_stats_v1";

  const load = (key, fallback) => {
    try { const v = JSON.parse(localStorage.getItem(key)); return v || fallback; }
    catch (e) { return fallback; }
  };
  const saveLocal = (key, val) => localStorage.setItem(key, JSON.stringify(val));
  const save = (key, val) => { saveLocal(key, val); pushToCloud(); };

  let favorites = new Set(load(LS_FAV, []));
  const MEALS = ["Śniadanie","Obiad","Kolacja"];
  const MEAL_ACCUSATIVE = { "Śniadanie": "śniadanie", "Obiad": "obiad", "Kolacja": "kolację" };
  const PEOPLE = ["Damian", "Marta"];
  const DAY_LABELS = ["Pon","Wt","Śr","Czw","Pt","Sob","Nd"];
  const DAY_NAMES_FULL = ["Niedziela","Poniedziałek","Wtorek","Środa","Czwartek","Piątek","Sobota"];
  const MONTHS_SHORT = ["sty","lut","mar","kwi","maj","cze","lip","sie","wrz","paź","lis","gru"];
  const MONTHS_FULL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  const MONTHS_GENITIVE = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];
  // weekPlan: { "YYYY-MM-DD": { "Śniadanie|Damian": {id, portions}, "Śniadanie|Marta": {...}, "Obiad|Damian": {...}, ... } }
  function slotKey(meal, person) { return `${meal}|${person}`; }
  let weekPlan = load(LS_WEEKPLAN, {});
  let checked = new Set(load(LS_CHECKED, []));
  let recipeOverrides = load(LS_RECIPE_OVERRIDES, {});
  let monthNames = load(LS_MONTH_NAMES, {});
  let shopOverrides = load(LS_SHOP_OVERRIDES, {});
  let customShopItems = load(LS_CUSTOM_ITEMS, {}); // { "YYYY-MM-DD-of-monday": [{id,name,qty,checked}] }
  let customStats = load(LS_CUSTOM_STATS, {}); // { "periodKey": [{label, value}] }

  // ---------- Cloud sync (Firebase Firestore, shared between Damian & Marta) ----------
  const syncStatusIcon = document.getElementById("syncStatusIcon");
  const syncStatusText = document.getElementById("syncStatusText");
  function setSyncStatus(icon, text) {
    if (syncStatusIcon) syncStatusIcon.textContent = icon;
    if (syncStatusText) syncStatusText.textContent = text;
  }
  let cloudReady = false;
  let pushTimer = null;
  function pushToCloud() {
    if (!cloudReady) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(() => {
      setDoc(SHARED_DOC, {
        favorites: Array.from(favorites),
        weekPlan, checked: Array.from(checked), recipeOverrides, monthNames,
        shopOverrides, customShopItems, customStats,
        updatedAt: Date.now(),
      }, { merge: true }).then(
        () => setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami."),
        () => setSyncStatus("⚠️", "Nie udało się zapisać w chmurze — sprawdź połączenie z internetem. Zmiany zostały zapisane lokalnie.")
      );
    }, 500);
  }
  function applyRemote(data) {
    favorites = new Set(data.favorites || []);
    weekPlan = data.weekPlan || {};
    checked = new Set(data.checked || []);
    recipeOverrides = data.recipeOverrides || {};
    monthNames = data.monthNames || {};
    shopOverrides = data.shopOverrides || {};
    customShopItems = data.customShopItems || {};
    customStats = data.customStats || {};
    saveLocal(LS_FAV, Array.from(favorites));
    saveLocal(LS_WEEKPLAN, weekPlan);
    saveLocal(LS_CHECKED, Array.from(checked));
    saveLocal(LS_RECIPE_OVERRIDES, recipeOverrides);
    saveLocal(LS_MONTH_NAMES, monthNames);
    saveLocal(LS_SHOP_OVERRIDES, shopOverrides);
    saveLocal(LS_CUSTOM_ITEMS, customShopItems);
    saveLocal(LS_CUSTOM_STATS, customStats);
    rebuildDietOptions(dietSelect);
    renderGrid();
    if (!document.getElementById("tab-week").hidden) renderWeek();
    if (!document.getElementById("tab-shopping").hidden) renderShopping();
    if (!document.getElementById("tab-stats").hidden) renderStats();
  }
  signInAnonymously(fbAuth).catch(() => setSyncStatus("⚠️", "Nie udało się połączyć z Firebase — aplikacja działa offline, dane zapisują się tylko lokalnie."));
  onAuthStateChanged(fbAuth, (user) => {
    if (!user) return;
    onSnapshot(SHARED_DOC, (snap) => {
      if (snap.exists()) applyRemote(snap.data());
      cloudReady = true;
      setSyncStatus("✅", "Zsynchronizowano z Martą/Damianem — dane na żywo między urządzeniami.");
    }, () => setSyncStatus("⚠️", "Błąd synchronizacji — sprawdź reguły Firestore. Dane zapisują się lokalnie."));
  });

  // ---------- Date helpers ----------
  function pad2(n) { return String(n).padStart(2, "0"); }
  function isoDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function mondayOf(d) {
    const r = new Date(d);
    r.setHours(0,0,0,0);
    const dow = r.getDay(); // 0=Sun..6=Sat
    const diff = dow === 0 ? -6 : 1 - dow;
    return addDays(r, diff);
  }
  function sameDate(a, b) { return isoDate(a) === isoDate(b); }
  function formatDayNum(d) { return `${d.getDate()}.${pad2(d.getMonth()+1)}`; }
  function formatRangeLabel(monday) {
    const sunday = addDays(monday, 6);
    const y = monday.getFullYear();
    if (monday.getMonth() === sunday.getMonth()) {
      return `${monday.getDate()}–${sunday.getDate()} ${MONTHS_SHORT[monday.getMonth()]} ${y}`;
    }
    return `${monday.getDate()} ${MONTHS_SHORT[monday.getMonth()]} – ${sunday.getDate()} ${MONTHS_SHORT[sunday.getMonth()]} ${y}`;
  }

  let viewedMonday = mondayOf(new Date());

  // ---------- Meal-type map (derived from the original diet plans) ----------
  const mealTypesOf = new Map(); // recipeId -> Set(meal names)
  PLAN.forEach(d => {
    d.meals.forEach(m => {
      m.recipe_ids.forEach(id => {
        if (!mealTypesOf.has(id)) mealTypesOf.set(id, new Set());
        mealTypesOf.get(id).add(m.name);
      });
    });
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- Recipe overrides: user edits layered on top of the original FitPatka data ----------
  function getRecipe(id) {
    const base = recipeById.get(id);
    if (!base) return null;
    const ov = recipeOverrides[id];
    return ov ? { ...base, ...ov } : base;
  }
  function effectiveRecipes() { return RECIPES.map(r => getRecipe(r.id)); }
  function saveRecipeOverride(id, patch) {
    recipeOverrides[id] = { ...(recipeOverrides[id] || {}), ...patch };
    save(LS_RECIPE_OVERRIDES, recipeOverrides);
  }
  function clearRecipeOverride(id) {
    delete recipeOverrides[id];
    save(LS_RECIPE_OVERRIDES, recipeOverrides);
  }

  // ---------- Month name overrides ----------
  function dietDisplayName(dietId) {
    if (monthNames[dietId]) return monthNames[dietId];
    const d = PLAN.find(x => String(x.diet_id) === String(dietId));
    return d ? d.name : "";
  }

  // ---------- Toast (small transient notice) ----------
  let toastTimer = null;
  function showToast(msg) {
    const old = document.getElementById("appToast");
    if (old) old.remove();
    const t = document.createElement("div");
    t.id = "appToast";
    t.className = "toast";
    t.textContent = msg;
    const shell = document.querySelector(".app-shell");
    shell.insertBefore(t, shell.firstChild);
    t.scrollIntoView({ block: "nearest", behavior: "smooth" });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.remove(), 3200);
  }

  // ---------- Custom confirm/prompt modals ----------
  // Sandboxed Artifact iframes silently block window.confirm()/prompt(), so we
  // build tiny in-page equivalents instead of relying on native dialogs.
  function customConfirm(message, onYes) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal confirm-modal" role="alertdialog" aria-modal="true">
        <div class="modal-head"><h2>Potwierdź</h2></div>
        <p>${escapeHtml(message)}</p>
        <div class="modal-actions">
          <button class="btn danger" id="ccYes">Tak, usuń</button>
          <button class="btn" id="ccNo">Anuluj</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    const close = () => bd.remove();
    bd.addEventListener("click", (e) => { if (e.target === bd) close(); });
    bd.querySelector("#ccNo").addEventListener("click", close);
    bd.querySelector("#ccYes").addEventListener("click", () => { close(); onYes(); });
  }
  function customPromptModal(title, defaultValue, onSave) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal confirm-modal" role="dialog" aria-modal="true">
        <div class="modal-head"><h2>${escapeHtml(title)}</h2></div>
        <input type="text" id="cpInput" value="${escapeHtml(defaultValue || "")}" />
        <div class="modal-actions">
          <button class="btn primary" id="cpSave">Zapisz</button>
          <button class="btn" id="cpCancel">Anuluj</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    const input = bd.querySelector("#cpInput");
    input.focus();
    input.select();
    const close = () => bd.remove();
    bd.addEventListener("click", (e) => { if (e.target === bd) close(); });
    bd.querySelector("#cpCancel").addEventListener("click", close);
    const doSave = () => {
      const v = input.value.trim();
      close();
      if (v) onSave(v);
    };
    bd.querySelector("#cpSave").addEventListener("click", doSave);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") doSave(); });
  }

  // ---------- Robust clipboard copy (async Clipboard API is also unreliable in the sandbox) ----------
  function execCommandCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      ta.remove();
      return ok;
    } catch (e) { return false; }
  }
  function openCopyFallback(text) {
    const bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML = `
      <div class="modal copy-fallback" role="dialog" aria-modal="true">
        <div class="modal-head"><h2>Kopiuj listę</h2><button class="modal-close" aria-label="Zamknij">✕</button></div>
        <p style="font-size:13px;color:var(--ink-soft);margin-top:0;">Automatyczne kopiowanie jest zablokowane w tym podglądzie. Tekst poniżej jest już zaznaczony — skopiuj go ręcznie (Cmd/Ctrl+C), żeby wkleić np. w SMS-ie.</p>

  function copyText(text) {
    // execCommand runs synchronously with no permission prompt, so it's the most
    // reliable option inside a sandboxed Artifact iframe. The async Clipboard API
    // can throw synchronously or silently hang forever there (permission prompt
    // never settles), so every step is wrapped defensively, with a manual
    // select-and-copy modal as the guaranteed-to-work last resort.
    try {
      if (execCommandCopy(text)) {
        showToast("Skopiowano do schowka ✓");
        return;
      }
    } catch (e) { /* fall through to clipboard API / manual fallback */ }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        let settled = false;
        const timer = setTimeout(() => { if (!settled) openCopyFallback(text); }, 700);
        navigator.clipboard.writeText(text).then(
          () => { settled = true; clearTimeout(timer); showToast("Skopiowano do schowka ✓"); },
          () => { settled = true; clearTimeout(timer); openCopyFallback(text); }
        );
        return;
      }
    } catch (e) { /* fall through to manual fallback */ }
    openCopyFallback(text);
  }

  function matchesSearch(r, q) {
    if (!q) return true;

    return r.ingredients.some(i => i.name.toLowerCase().includes(q));

  function sortList(list, sort) {
    if (sort === "name") list.sort((a,b) => a.name.localeCompare(b.name, "pl"));
    if (sort === "kcal-asc") list.sort((a,b) => a.kcal - b.kcal);
    if (sort === "kcal-desc") list.sort((a,b) => b.kcal - a.kcal);
    if (sort === "protein-desc") list.sort((a,b) => b.protein - a.protein);
    if (sort === "protein-asc") list.sort((a,b) => a.protein - b.protein);
    return list;
  }

  // Shared filter used by both the main recipe grid and the week-planner picker.
  function filterRecipes({ query = "", sort = "name", dietId = "", mealType = "", onlyFav = false } = {}) {
    let list = effectiveRecipes();
    if (dietId) {
      const ids = recipeIdsForDiet(dietId);
      list = list.filter(r => ids.has(r.id));
    }
    if (mealType) list = list.filter(r => mealTypesOf.get(r.id)?.has(mealType));
    if (onlyFav) list = list.filter(r => favorites.has(r.id));
    list = list.filter(r => matchesSearch(r, query.trim()));
    return sortList(list, sort);
  }

    save(LS_WEEKPLAN, weekPlan);
    renderWeek();

  function removeWeekSlot(dateISO, meal, person) {
    if (weekPlan[dateISO]) delete weekPlan[dateISO][slotKey(meal, person)];

    renderWeek();

  function updatePortions(dateISO, meal, person, portions) {
    const k = slotKey(meal, person);
    if (weekPlan[dateISO] && weekPlan[dateISO][k]) {
      weekPlan[dateISO][k].portions = Math.max(1, Math.min(9, portions));
      save(LS_WEEKPLAN, weekPlan);
      renderWeek();
