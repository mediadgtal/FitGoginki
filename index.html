 z bananem","description":"1. Do rondelka wsyp płatki i erytrol, a następnie zalej całość mlekiem i dobrze wymieszaj.\n2. Owsiankę gotuj na małym ogniu przez kilka minut, do momentu zgęstnienia masy.\n3. Gotową owsiankę przełóż do miseczki, dodaj pudding, pokrojonego banana i orzechy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/sjbgdiJqFKrVe2FHpTTy6AGgt5A7M7kUzhPro1Yb.jpg","kcal":465.1,"protein":24.7,"fat":18.7,"carbs":56.1,"ingredients":[{"name":"Płatki owsiane","grams":45,"measure":"łyżka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":200,"measure":"filiżanka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Pudding proteinowy o smaku karmelowym (Go Active)","grams":100,"measure":"opakowanie"},{"name":"Orzechy włoskie","grams":15,"measure":"łyżeczka"}]},{"id":47967529,"name":"Kasza z suszonymi pomidorami, grillowaną piersią z kurczaka i brokułami","description":"1. Brokuły ugotuj al dente we wrzątku, a kaszę wg instrukcji na opakowaniu.\n2. Mięso rozklep delikatnie i przypraw solą, pieprzem i papryką. Obsmaż pierś z obu stron na oliwie.\n3. Ugotowaną kaszę wymieszaj z posiekanymi suszonymi pomidorami i natką pietruszki. Przełóż na talerz. Podawaj z grillowaną piersią z kurczaka i ugotowanymi brokułami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/svoddIjYZgrfVRI2P73R6KU5k6suYXZtuHp0HJY9.jpg","kcal":617.8,"protein":49.0,"fat":20.2,"carbs":62.0,"ingredients":[{"name":"Brokuły mrożone","grams":100,"measure":"porcja"},{"name":"Kasza gryczana biała","grams":65,"measure":"łyżka"},{"name":"Pomidory suszone w zalewie","grams":60,"measure":"sztuka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szcz o","grams":70,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":56307459,"name":"Kolorowe leczo z cieciorką i kaszą","description":"1. Kaszę ugotuj według instrukcji na opakowaniu.\n2. Wszystkie warzywa pokrój w kostkę i podsmaż je na oliwie.\n3. Kiedy warzywa będą al dente dodaj passatę, szczyptę erytrolu i przyprawy. Na końcu dodaj odsączoną na sitku i przepłukaną z zalewy cieciorkę. Całość dokładnie wymieszaj i duś na małym ogniu około 5-10 minut.\n5. Gotowe leczo podawaj z ugotowaną kaszą i posypane natką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/pgFQbVU0bOMpEpWuvZEXCzYOiIdvkK5qaOTuHS8W.jpg","kcal":580.7,"protein":22.3,"fat":17.1,"carbs":79.8,"ingredients":[{"name":"Kasza gryczana biała","grams":65,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Passata pomidorowa","grams":200,"measure":"szklanka"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ciecierzyca w zalewie","grams":120,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}]},{"id":56307460,"name":"Koperkowe risotto ze szparagami","description":"1. Mięso pokrój w paseczki i dopraw solą i pieprzem. \n2. Szparagi pozbaw twardych końcówek i pokrój na krążki, a szalotkę pokrój w kosteczkę. \n3. Na patelni rozgrzej oliwę i podsmaż szalotkę oraz indyka. Następnie dodaj szparagi i smaż jeszcze przez chwilę. \n4. Dodaj suchy ryż i podsmaż go razem z pozostałymi składnikami. Po chwili zacznij stopniowo dolewać bulion i gotuj od czasu do czasu mieszając i patrząc czy nie brakuje płynu. Dolewaj bulion do momentu aż ryż będzie miękki, a w risotto pozostanie tylko odrobina płynu, aby miało kremową konsystencję. Jeśli zabraknie Ci wywaru możesz śmiało dolać wody. Na końcu dodaj parmezan i wymieszaj. Dopraw solą i pieprzem.\n5. Gotowe risotto przełóż na talerz i posyp koperkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/sD1PfCDTDLgsHQECLn1RXGwgfJlDJvSmj2U650dm.jpg","kcal":574.4,"protein":47.2,"fat":15.2,"carbs":65.5,"ingredients":[{"name":"Szparagi","grams":150,"measure":"g"},{"name":"Ryż arborio","grams":60,"measure":"łyżka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Indyk pierś","grams":150,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Wywar warzywny","grams":350,"measure":"szklanka"}]},{"id":61928714,"name":"Kotlet drobiowy z młodymi ziemniakami z koperkiem i mizerią","description":"1. Mięso ubij tłuczkiem. Dopraw do smaku solą i pieprzem.\n2. Mięso obtocz w mące, mleku, ponownie z mące i mleku, a na końcu w bułce tartej.\n3. Ziemniaki ugotuj do miękkości.\n4. Kotleta usmaż na małej ilości oliwy.\n5. Z ogórków i jogurtu przygotuj mizerię.\n6. Młode ziemniaki wyłóż na talerz i posyp koperkiem. Podawaj z kotletem i mizerią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/TpWHDI5j1avSluFFL3p3NVSH295SAi2xQjUHlrzJ.jpg","kcal":580.1,"protein":39.8,"fat":18.2,"carbs":65.9,"ingredients":[{"name":"Bułka tarta","grams":8,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ogórek gruntowy","gra koprem, ziołami i dopraw solą i pieprzem.\n5. Wszystkie składniki wymieszaj razem. Sałatkę posyp ziarnami słonecznika.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/CUg0qjqmL6dIbwdqKjYBGdzmt3BLD3BBaIRaMTSC.jpg","kcal":1000.2,"protein":55.2,"fat":73.2,"carbs":36.2,"ingredients":[{"name":"Brokuł","grams":250,"measure":"sztuka"},{"name":"Ser Feta","grams":100,"measure":"plaster"},{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Jogurt naturalny","grams":100,"measure":"łyżka"},{"name":"Majonez wegański","grams":40,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Nasiona słonecznika","grams":16,"measure":"łyżeczka"}]},{"id":53516451,"name":"Kremowy budyń owsiany z sosem truskawkowym","description":"1. Truskawki rozmroź, a następnie zmiksuj z erytrolem na mus. \n2. Płatki zmiel blenderem na mąkę i wsyp do rondelka.\n3. Dodaj mleko, pozostały erytrol i dokładnie wymieszaj. Gotuj na małym ogniu przez około 5-10 minut, do momentu uzyskania gęstej, budyniowej masy (cały czas mieszając).\n4. Gotowy budyń przełóż do miseczki, dodaj jogurt, mus truskawkowy i płatki migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/DqyVtdq3IaqwzkjPN9hPpQw9BgEJXCSFKqUskwVy.jpg","kcal":497.9,"protein":28.6,"fat":15.5,"carbs":63.8,"ingredients":[{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":300,"measure":"szklanka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Truskawki mrożone","grams":100,"measure":"garść"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Migdały płatki","grams":15,"measure":"łyżeczka"}]},{"id":51097582,"name":"Kremowy makaron orzo z brokułami i łososiem","description":"1. Brokuły umyj i podziel na małe różyczki.\n2. Na głębokiej patelni (lub w garnku - w naczyniu, które możesz potem przykryć) rozgrzej oliwę i podsmaż pokrojoną w drobną kostkę cebulę oraz posiekany czosnek. Wsyp suchy makaron i wymieszaj. Dodaj bulion i ułóż różyczki brokuła. Przykryj naczynie i całość duś ok. 15 minut na średniej mocy palnika. Możesz w trakcie zajrzeć do dania, żeby sprawdzić, czy nie trzeba zmniejszyć mocy i makaron się nie przypala. W razie potrzeby dodaj odrobinę wody. \n3. Po tym czasie dodaj serek naturalny, pokrojone suszone pomidory, rozdrobnionego łososia oraz posiekany koperek. Wszystko razem wymieszaj i dopraw do smaku solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/KHU5aTZ2UhRXIEg3s8XYrDL3cS4cCAmpIjaE06Hs.jpg","kcal":589.8,"protein":34.0,"fat":18.2,"carbs":78.3,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Makaron orzo","grams":65,"measure":"g"},{"name":"Brokuł","grams":125,"measure":"sztuka"},{"name":"Wywar warzywny","grams":250,"measure":"szklanka"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Łosoś wędzony na gorąco","grams":63,"measure":"opakowanie"},{"name":"Pomidory suszone","grams":21,"measure":"sztuka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"}]},{"id":36694530,"name":"Kremowy makaron z burratą i pomidorkami","description":"1. Makaron ugotuj al'dente.\n2. Czosnek posiekaj lub przeciśnij przez praskę, a następnie podsmaż na oliwie.\n3. Po chwili dodaj pomidory z puszki i zostaw na małym ogniu na kilka minut.\n4. Następnie dodaj listki bazylii, przyprawy i szczyptę erytrolu. Całość zblednuj za pomocą blendera na sos.\n5. Gotuj jeszcze chwilkę, a następnie dodaj ugotowany makaron. Całość dobrze wymieszaj.\n6. Makaron przełóż na talerz, dodaj burratę, pokrojone pomidorki, pieprz (możesz jeszcze dodać listki świeżej bazylii).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/7noEpiQ0f1Ku9RVVJFosb8DnkZRveT2M4Fj7eAoy.jpg","kcal":620.2,"protein":21.1,"fat":27.6,"carbs":76.8,"ingredients":[{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pomidory krojone w puszce","grams":100,"measure":"puszka"},{"name":"Erytrytol","grams":1,"measure":"łyżeczka"},{"name":"Makaron pełnoziarnisty","grams":85,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ser Burrata (Pilos)","grams":63,"measure":"sztuka"}]},{"id":61928721,"name":"Krewetki w emulsji maślanej z bagietką","description":"1. Krewetki obierz i oczyść.\n2. Papryczkę chili, czosnek i pietruszkę drobno posiekaj. \n3. Na patelni rozgrzej oliwę. Podsmaż czosnek i chili. Wrzuć krewetki i smaż ok. 2-3 minuty z każdej strony. Na końcu dodaj masło i szybko wymieszaj. Dodaj pietruszkę. \n4. Podawaj z bagietką i pomidorkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/O025WFjCYYrSnWtS13iYGEUVjs6ehycts5PShlD1.jpg","kcal":493.9,"protein":47.7,"fat":16.1,"carbs":41.2,"ingredients":[{"name":"Krewetki","grams":200,"measure":"duża sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Papryczka chili czerwona","grams":10,"measure":"kawałek"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Masło","grams":5,"measure":"porcja"},{"name":"Bagietka pełnoziarnista","grams":70,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":46076299,"name":"Kurczak po koreańsku z ryżem i brokułami","description":"1. Ryż ugotuj zgodnie z instrukcją. Brokuły ugotuj al dente. \n2. Kurczaka pokrój w grubą kostkę i wymieszaj z jajkiem, łyżeczką sosu sojowego i imbirem. \n3. Na talerzyk wysyp mąkę ziemniaczaną i obtocz w niej kawałki kurczaka.\n4. Mięso spryskaj oliwą i piecz 10-12 minut w temp. 200 stopni (w airfryerze lub piekarniku). \n5. Przygotuj sos (najlepiej na patelni): pozostały sos sojowy wymieszaj z pastą gochujang, keczupem, syropem klonowym i czosnkiem. Podgrzej sos do połączenia składników. Następnie do sosu dodaj upieczone mięso i wymieszaj aż sos oblepi każdy kawałek. \n6. Do miseczki włóż ryż, brokuły i kurczaka w sosie. Posyp posiekanym szczypiorkiem i sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/GOOSbn6enJQbngrtilnV6ixl89lYOvmMILRQsDHq.jpg","kcal":582.7,"protein":39.6,"fat":12.1,"carbs":77.3,"ingredients":[{"name":"Kurczak pierś","grams":125,"measure":"porcja"},{"name":"Sos sojowy","grams":5,"measure":"łyżka"},{"name":"Imbir mielony","grams":1,"measure":"szczypta"},{"name":"Mąka ziemniaczana","grams":24,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Brokuł","grams":100,"measure":"sztuka"},{"name":"Sos sojowy","grams":5,"measure":"łyżka"},{"name":"Pasta Gochujang","grams":10,"measure":"g"},{"name":"Ketchup bez dodatku cukru","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sezam","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":41144619,"name":"Kurczak w sosie curry z mango, ryżem i kolendrą","description":"1. Ryż ugotuj wg instrukcji na opakowaniu.\n2. Kurczaka pokrój w kostkę i zamarynuj w połowie oliwy i połowie soku z cytryny. Dodaj czosnek, imbir oraz curry.\n3. Szalotkę pokrój w kostkę i podsmaż na pozostałej oliwie. Dodaj paprykę - również pokrojoną w kostkę. Następnie dorzuć mięso i smaż aż straci surowość.\n4. W tym czasie wymieszaj mleczko kokosowe z masłem orzechowym, chilli i pozostałym sokiem z cytryny. Wlej na patelnię i gotuj aż sos zgęstnieje. Do sosu dodaj pokrojone w kostkę mango.\n5. Podawaj z ryżem i posiekaną kolendrą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/pB9JDTiYTLGAhKKgp5pwREkQ2vJF75gnw7dK8Lwp.jpg","kcal":639.3,"protein":34.3,"fat":19.7,"carbs":82.5,"ingredients":[{"name":"Sok z limonki","grams":6,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Curry przyprawa","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Ryż basmati","grams":65,"measure":"łyżka"},{"name":"Papryka żółta","grams":120,"measure":"średnia sztuka"},{"name":"Mleczko kokosowe light 6%","grams":50,"measure":"szklanka"},{"name":"Kurczak pierś","grams":100,"measure":"porcja"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"},{"name":"Mango mrożone","grams":60,"measure":"opakowanie"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Imbir mielony","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Szalotka","grams":20,"measure":"sztuka"}]},{"id":38873220,"name":"Kurczak w sosie porowo-kurkowym z kaszą","description":"1. Kurczaka pokrój na mniejsze kawałki i wymieszaj z przyprawami. Odstaw na min. 10 minut, a najlepiej zrób to dzień wcześniej i zostaw na noc w lodówce. \n2. Pora oczyść i pokrój w półplastry. Kurki umyj i odsącz na sitku z nadmiaru wody. Na połowie oliwy obsmaż kurczaka na patelni z dwóch stron i przełóż na talerz. Na pozostałej oliwie na tej samej patelni podsmaż pora i kurki. \n3. Dodaj z powrotem na patelnię mięso, wlej bulion i duś tak długo (ok. 15-20 minut) aż mięso będzie się z łatwością rozchodziło. \n4. W tym czasie ugotuj komosę według instrukcji na opakowaniu. \n5. Do sosu dodaj serek, wymieszaj i gotuj na mocniejszym ogniu aż sos lekko odparuje i zgęstnieje. Na końcu dodaj posiekany koper i dopraw wg potrzeby solą i pieprzem.\n6. Sos podawaj z ugotowaną kaszą i pokrojonym ogórkiem kiszonym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/NB6F73sIilZLsMZh9v0dHsVcAY7RW9V8Xl3V9Ep2.jpg","kcal":556.7,"protein":37.3,"fat":20.4,"carbs":58.7,"ingredients":[{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Por","grams":50,"measure":"kawałek"},{"name":"Kurki","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Komosa ryżowa (quinoa)","grams":55,"measure":"łyżka"},{"name":"Wywar warzywny","grams":75,"measure":"szklanka"},{"name":"Serek naturalny","grams":40,"measure":"łyżka"},{"name":"Koper świeży","grams":20,"measure":"łyżka"},{"name":"Ogórek kiszony","grams":130,"measure":"średnia sztuka"}]},{"id":61928712,"name":"Lekka sałatka cezar z grzankami i parmezanem","description":"1. Pokrojonego w paski kurczaka zamarynuj w oregano, soli, pieprzu i oliwie.\n2. Podsmaż mięso na patelni. Przełóż mięso na talerz do ostudzenia, a następnie na tej samej patelni podsmaż chleb pokrojony w kostkę na grzanki.\n3. W misce ułóż porwaną sałatę oraz pomidorki przekrojone na pół. Dodaj cebulę pokrojoną w cienkie piórka.\n4. Na wierzchu ułóż usmażonego kurczaka.\n5. Jogurt wymieszaj z majonezem, sokiem z cytryny, przeciśniętym przez praskę czosnkiem oraz solą i pieprzem.\n6. Sałatkę polej sosem, posyp parmezanem i dodaj grzanki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/wSNXAtKn34Rhu2FxY7eXzmiHqYYCMp4nYKaqTCkC.jpg","kcal":579.6,"protein":45.6,"fat":22.6,"carbs":47.8,"ingredients":[{"name":"Kurczak pierś","grams":130,"measure":"sztuka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":75,"measure":"małe opakowanie"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Majonez wegański","grams":10,"measure":"łyżeczka"},{"name":"Sałata rzymska","grams":40,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":61928710,"name":"Makaron na słodko z twarogiem i truskawkami","description":"1. Makaron ugotuj al'dente.\n2. Twaróg zblednuj razem z jogurtem i erytrolem na gładką masę.\n3. Truskawki pokrój na mniejsze kawałki (lub zrób z nich mus).\n4. Makaron wymieszaj z przygotowanym twarożkiem i truskawkami. Posyp migdałami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/PWsy3GCTBHVgrgk3JZ7eIyhGjtJAflyWTNKuIfRT.jpg","kcal":580.3,"protein":31.8,"fat":14.0,"carbs":87.6,"ingredients":[{"name":"Truskawki","grams":200,"measure":"garść"},{"name":"Ser twarogowy chudy","grams":62,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Migdały płatki","grams":15,"measure":"łyżka"},{"name":"Makaron pełnoziarnisty","grams":85,"measure":"g"},{"name":"Jogurt naturalny","grams":100,"measure":"małe opakowanie"}]},{"id":38873215,"name":"Makaron w kremowym sosie dyniowym","description":"1. Makaron ugotuj al dente w osolonym wrzątku wg czasu podanego na opakowaniu.\n2. Suszone pomidory pokrój w paseczki i podsmaż na patelni. Kurczaka pokrój w paseczki i również wrzuć na patelnię. Kiedy mięso straci surowość dodaj szpinak i smaż aż zmniejszy swoją objętość. \n3. Dodaj puree z dyni oraz serek i przyprawy. Wymieszaj. Dodaj do sosu trochę wody z gotowania makaronu - tyle, aby uzyskać kremowy sos o konsystencji jogurtu greckiego. \n4. Do sosu włóż ugotowany makaron i wymieszaj. Przełóż na talerz i posyp parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/sbQZUUf3FGybqAQbV6Ulv9Kb5G0RyVBDxi1fWbwF.jpg","kcal":564.7,"protein":57.7,"fat":14.0,"carbs":53.9,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":65,"measure":"g"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Dynia olbrzymia purre bez soli","grams":100,"measure":"g"},{"name":"Serek naturalny","grams":25,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Ser Parmezan","grams":4,"measure":"łyżeczka"}]},{"id":34528186,"name":"Makaron z domowym pesto i ricottą","description":"1. Makaron ugotuj zgodnie z instrukcją.\n2. Bazylię zmiksuj z oliwą, wodą, pestkami oraz czosnkiem. Dopraw pesto solą i pieprzem.\n3. Wymieszaj ricottę z pesto i startym parmezanem. Lekko podgrzej.\n3. Makaron wymieszaj z sosem i dopraw do smaku.\n4. Przełóż na talerz i dodaj porwaną mozzarellę i świeżą bazylię.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/ppQqXZFaAx9ZEbUDHq6FiV3XUSoQdnijAlJgfpZb.jpg","kcal":568.1,"protein":31.4,"fat":23.6,"carbs":59.8,"ingredients":[{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Woda","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Makaron pełnoziarnisty","grams":75,"measure":"g"},{"name":"Ser Ricotta","grams":40,"measure":"łyżka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"}]},{"id":56307455,"name":"Makaron z indykiem, szparagami w kremowym sosie z gorgonzolą","description":"1. Indyka pokrój w paseczki i dopraw solą i pieprzem. \n2. Szparagi pozbaw twardych końcówek i pokrój na kawałki. \n3. Na oliwie podsmaż mięso wraz ze szparagami. \n4. W tym czasie ugotuj makaron według czasu podanego na opakowaniu przez producenta.\n5. Na patelnię do indyka i szparagów dodaj serek naturalny, ser pleśniowy i odrobinę wody z gotowania makaronu (lub wrzątku). Dopraw sos solą, pieprzem, czosnkiem i tymiankiem. Wszystko wymieszaj, aby sos nabrał kremowej konsystencji. \n6. Makaron przełóż na talerz i udekoruj bazylią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/pz7cHnb8ONmj5F1nLKJRoEcrsviYM1kVs1PFbLDR.jpg","kcal":584.2,"protein":55.7,"fat":20.9,"carbs":46.3,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":70,"measure":"szklanka"},{"name":"Indyk pierś","grams":120,"measure":"porcja"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szparagi","grams":150,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Ser Gorgonzola","grams":30,"measure":"g"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"}]},{"id":59199274,"name":"Makaron z kremowym sosie z soczewicą i fetą","description":"1. Soczewicę opłucz i zalej wrzątkiem. Odstaw na bok.\n2. Makaron ugotuj al dente według instrukcji podanej przez producenta na opakowaniu.\n3. Paprykę i cukinię pokrój w kostkę. Posiekaj cebulę i czosnek.\n4. Na rozgrzanej patelni podsmaż na oliwie cebulę i czosnek. Dodaj cukinię oraz paprykę. Smaż ok. 5 minut. Następnie dodaj namoczoną soczewicę, pomidory oraz mleczko kokosowe. Dopraw solą i pieprzem. Smaż kolejne 10 minut. Dodaj ugotowany makaron i wymieszaj.\n5. Gotowy makaron posyp pokruszoną fetą i natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/xsUEkiIuu6bwG7rtjSXcMbhjafB8fysH8R70roUr.jpg","kcal":587.3,"protein":24.6,"fat":15.7,"carbs":93.7,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":70,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Soczewica","grams":24,"measure":"łyżka"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Mleczko kokosowe light 6%","grams":50,"measure":"łyżka"},{"name":"Natka pietruszki","grams":6,"measure":"łyżeczka"},{"name":"Ser Feta","grams":20,"measure":"plaster"}]},{"id":53516454,"name":"Makaron z krewetkami w sosie pomidorowym","description":"1. Krewetki wyjmij wcześniej ro rozmrożenia, przepłucz i osusz. Makaron ugotuj al dente.\n2. Na oliwie zeszklij szalotkę, czosnek i chilli. Dodaj krewetki i koncentrat. Smaż 1-2 minuty. Dodaj pomidory i przyprawy oraz erytrol, wymieszaj i smaż ok. 8-10 minut.\n3. Dodaj ugotowany makaron, wymieszaj. Dopraw jeszcze w razie potrzeby. Dodaj posiekaną drobno natkę pietruszki.\n4. Podawaj udekorowane pomidorkami i natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/N86HCO3drVhooEhbYb730HEv2HaoVWM9afxcmOtB.jpg","kcal":607.3,"protein":43.9,"fat":14.0,"carbs":83.7,"ingredients":[{"name":"Makaron spaghetti pełnoziarnisty","grams":75,"measure":"g"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Krewetki","grams":135,"measure":"mała sztuka"},{"name":"Koncentrat pomidorowy","grams":15,"measure":"łyżeczka"},{"name":"Pomidory krojone w puszce","grams":200,"measure":"puszka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":38873214,"name":"Makaron z kurkami i parmezanem","description":"1. Makaron ugotuj al dente.\n2. Kurczaka pokrój w kostkę i przypraw solą, pieprzem i papryką. Czosnek posiekaj. \n3. Podsmaż na oliwie czosnek i kurczaka. Następnie dodaj kurki, dopraw solą i pieprzem i smaż wszystko razem ok. 4 minuty. Możesz dodać odrobinę wrzątku na patelnię w połowie czasu. \n4. Dodaj na patelnię makaron i posiekaną pietruszkę i wszystko wymieszaj. Przełóż na talerz i posyp parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/7XLSmjaYdQM3H2d7jHQBma5DMZEKRAxkM4IG1GSs.jpg","kcal":576.3,"protein":60.1,"fat":14.8,"carbs":49.5,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":75,"measure":"g"},{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Kurki","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"}]},{"id":36694531,"name":"Makaron z pesto z awokado","description":"1. Awokado zmiksuj z sokiem z cytryny, przeciśniętym przez praskę czosnkiem, połową parmezanu, solą, pieprzem, bazylią i serkiem śmietankowym.\n3. Makaron ugotuj al dente.\n4. Pomidorki pokrój na pół.\n5. Makaron wymieszaj z pesto (w razie potrzeby dodaj odrobinę wody z gotowania makaronu lub wrzątku, aby uzyskać kremową konsystencję) i przełóż na talerz.\n6. Dodaj pomidorki i pozostały parmezan.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/gF2cyhCZKz9AOTrMYEzonLYvMk3wJb17vXQ17HAV.jpg","kcal":609.9,"protein":28.0,"fat":23.1,"carbs":77.4,"ingredients":[{"name":"Awokado","grams":70,"measure":"plaster"},{"name":"Sok z cytryny","grams":6,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Bazylia świeża","grams":20,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":60,"measure":"łyżka"},{"name":"Makaron pełnoziarnisty","grams":85,"measure":"g"},{"name":"Ser Parmezan","grams":24,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":34528274,"name":"Makaron z pieczoną fetą i pomidorami","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Fetę połóż w naczyniu żaroodpornym. Dookoła ułóż plastry cebuli, pomidorki przekrojone na pół i wszystko skrop oliwą. Posyp ziołami. Włóż do piekarnika na 20-25 minut.\n2. W tym czasie ugotuj makaron. \n3. Fetę rozgnieć widelcem wraz pieczonymi pomidorami. Dodaj w razie potrzeby kilka łyżek wody z gotowania makaronu. Przełóż ugotowany makaron i wszystko razem wymieszaj.\n4. Rozłóż makaron na talerze i udekoruj rukolą.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/N55gPiOLAED1AfGq04VgyRmkE07Wu6hH4nB7GOcf.jpg","kcal":1433.4,"protein":63.2,"fat":54.7,"carbs":183.4,"ingredients":[{"name":"Ser Feta","grams":200,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":500,"measure":"garść"},{"name":"Oliwa czosnkowa","grams":5,"measure":"łyżka"},{"name":"Cebula czerwona","grams":60,"measure":"plaster"},{"name":"Zioła prowansalskie przyprawa","grams":2,"measure":"szczypta"},{"name":"Makaron pełnoziarnisty","grams":200,"measure":"porcja"},{"name":"Rukola","grams":80,"measure":"garść"}]},{"id":56307457,"name":"Makaron z sosem z pieczonych pomidorów, bazylią i cieciorką","description":"1. Piekarnik rozgrzej do 190 stopni.\n2. Pomidory koktajlowe przekrój na połówki i wrzuć do naczynia żaroodpornego, dodaj posiekany czosnek i oliwę.\n3. Wstaw do piekarnika na ok. 30 minut.\n4. Makaron ugotuj al dente.\n5. Upieczone pomidory zmiksuj na gładki sos z dodatkiem świeżej bazylii, soli i pieprzu. Do sosu dodaj odsączoną z zalewy cieciorkę i wymieszaj.\n6. Do sosu przełóż ugotowany makaron, wszystko ze sobą połącz i przełóż na talerz. Udekoruj listkami świeżej bazylii i świeżo mielonym pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/cZQmaPIS4qCD2CZNzoKpW2SeLCbQ1n3Jm0uyUImQ.jpg","kcal":574.4,"protein":32.0,"fat":15.5,"carbs":73.1,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":80,"measure":"szklanka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Ciecierzyca w zalewie","grams":140,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":47967527,"name":"Makaron z sosem z pieczonych warzyw, bazylią i burratą","description":"1. Piekarnik rozgrzej do 190 stopni.\n2. Paprykę, dynię i pomidora pokrój w kostkę i ułóż na blaszce. Dodaj posiekany czosnek, skrop oliwą i przypraw solą i pieprzem.\n3. Wstaw do piekarnika na ok. 30 minut - do miękkości warzyw.\n4. Makaron ugotuj al dente.\n5. Upieczone warzywa zmiksuj na gładki sos z dodatkiem świeżej bazylii. Do sosu dodaj porwaną w rękach burratę i wymieszaj.\n6. Do sosu przełóż ugotowany makaron, wszystko ze sobą połącz i przełóż na talerz. Udekoruj listkami świeżej bazylii i świeżo mielonym pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/EFN8AogjGgIwcoTdZZIB9T0QC8gA2sDR0oOzh0Yo.jpg","kcal":593.0,"protein":19.9,"fat":31.6,"carbs":62.2,"ingredients":[{"name":"Dynia","grams":100,"measure":"plaster"},{"name":"Pomidor czerwony","grams":90,"measure":"mała sztuka"},{"name":"Papryka czerwona","grams":75,"measure":"mała sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Ser Burrata","grams":83,"measure":"sztuka"},{"name":"Makaron pełnoziarnisty","grams":60,"measure":"g"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":59199273,"name":"Makaron ze szparagami i ricottą","description":"1. Makaron ugotuj al dente zgodnie z instrukcją podaną na opakowaniu.\n2. Szparagi pozbaw twardych końcówek, pokrój na mniejsze kawałki i podsmaż na odrobinie oliwy. Dopraw solą i pieprzem.\n3. Ricottę wymieszaj z sokiem z cytryny, pozostałą oliwą, przeciśniętym przez praskę ząbkiem czosnku, startym parmezanem i chlustem wody z makaronu.\n4. Ugotowany makaron wymieszaj z sosem, szparagami i dopraw do smaku.\n5. Przełóż na talerz i dodaj świeżą bazylię.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/0NWesY0DXqHFg3pnnoGopIXqb0LbktqIlLgJ9yDE.jpg","kcal":593.0,"protein":27.5,"fat":26.3,"carbs":65.3,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":70,"measure":"g"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Ser Ricotta","grams":80,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Ser Parmezan","grams":24,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Bazylia świeża","grams":10,"measure":"garść"}]},{"id":59199282,"name":"Makaronowa sałatka z fetą","description":"1. Makaron ugotuj al dente według czasu zalecanego przez producenta na opakowaniu.\n2. Pomidorki pokrój w ćwiartki, a ogórka w paski.\n3. Do miski wrzuć roszponkę, a następnie dodaj pozostałe warzywa.\n4. Ser pokrusz w ręce na mniejsze kawałki (lub pokrój w kostkę) i dodaj do sałatki.\n5. Na koniec dodaj ugotowany i przestudzony makaron.\n6. Z oliwy, musztardy, soku z cytryny i przypraw zrób sos i polej nim sałatkę.\n7. Całość wymieszaj na sałatkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/f2sr71GKczf5zgQhJ2oRMm1lxmbsY9xVGzLWI34L.jpg","kcal":490.6,"protein":17.7,"fat":23.4,"carbs":56.0,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":60,"measure":"g"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Ser Feta","grams":50,"measure":"plaster"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":38873222,"name":"Makaronowa sałatka z mozzarellą i pomidorkami","description":"1. Ugotuj makaron według zaleceń producenta i poczekaj aż lekko ostygnie.\n2. Pomidorki przekrój na połówki, cebulę pokrój w drobną kostkę.\n3. Mozzarellę pokrój w kostkę lub porwij na mniejsze kawałki.\n4. Połącz makaron z pomidorkami, serem mozzarella, roszponką i cebulą.\n5. Dodaj oliwę, pestki dyni i przyprawy. Wymieszaj i udekoruj bazylią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/yprIR0OZEyyvn8U52wDxiSusNn9R4kX7D7mO2X01.jpg","kcal":499.4,"protein":37.1,"fat":23.4,"carbs":37.9,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":50,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":200,"measure":"garść"},{"name":"Ser Mozzarella light 9%","grams":80,"measure":"g"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Bazylia świeża","grams":1,"measure":"garść"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pestki dyni","grams":10,"measure":"łyżeczka"}]},{"id":46076309,"name":"Makowa owsianka z pomarańczą","description":"1. Płatki owsiane ugotuj na mleku z dodatkiem maku i erytrolu.\n2. Przełóż do miseczki, dodaj skyr, pokrojoną pomarańczę i płatki migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/wYwAILoZmkjOHxvSRlGdkhjKr6fzD2go6fvhqSOY.jpg","kcal":493.1,"protein":26.4,"fat":13.7,"carbs":70.2,"ingredients":[{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Płatki owsiane","grams":45,"measure":"łyżka"},{"name":"Mak","grams":5,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Pomarańcza","grams":160,"measure":"mała sztuka"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}]},{"id":46076294,"name":"Menemen - tureckie jajka z pomidorami i papryką","description":"1. Cebulę drobno posiekaj i podsmaż na oliwie.\n2. Następnie dodaj pokrojoną w kostkę paprykę i zostaw na 2-3 minuty.\n3. Dodaj pomidory, przyprawy i zostaw na małym ogniu na około 5 minut.\n4. Następnie wbij jajka. Możesz wszystko wymieszać i usmaż ption":"1. Owsiankę ugotuj wraz z chia i erytrolem na mleku. \n2. Owsiankę przełóż do miseczki, dodaj skyr, pokrojone w plastry kiwi oraz pestki dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/tgUnd6kUkZmw8disgHzJbdBbRdbC1VDFe1hpnuLM.jpg","kcal":507.8,"protein":29.0,"fat":14.9,"carbs":67.4,"ingredients":[{"name":"Płatki owsiane","grams":55,"measure":"łyżka"},{"name":"Nasiona chia","grams":7,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Kiwi","grams":75,"measure":"sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":53516464,"name":"Odżywcza pasta rybna z pieczywem i warzywami","description":"1. Jajka ugotuj na twardo. Ostudź, obierz i zetrzyj na tarce o grubych oczkach. \n2. Do jajek dodaj twaróg oraz obrane i pozbawione ości mięso z makreli. Wszystko wymieszaj za pomocą widelca do połączenia składników.\n3. Dodaj koncentrat, majonez, posiekany szczypiorek oraz sól i pieprz. Wszystko ponownie wymieszaj. \n4. Pastę podawaj z pieczywem, sałatą i ogórkami kiszonymi.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/cwT3GEgFBTnVe3w0ZStQxDVTBmYNZ6EuT28Zpp27.jpg","kcal":509.1,"protein":35.4,"fat":22.7,"carbs":41.6,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ser twarogowy chudy","grams":40,"measure":"łyżka"},{"name":"Makrela wędzona","grams":65,"measure":"porcja"},{"name":"Koncentrat pomidorowy","grams":10,"measure":"łyżeczka"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Ogórki kiszone","grams":80,"measure":"mała sztuka"}]},{"id":51097579,"name":"Odżywcze placuszki z jogurtem waniliowym i  borówkami","description":"1. Białka oddziel od żółtek i ubij na puszystą pianę.\n2. Żółtka zmiksuj z fasolą, mlekiem, bananem, erytrolem, mąką oraz proszkiem do pieczenia i ekstraktem waniliowym na gładką masę. Dodaj do niej białka i wymieszaj delikatnie.\n3. Rozgrzej patelnię z oliwą i nakładaj łyżką placuszki. Smaż kilka minut aż się zarumienią, a następnie przewróć na drugą stronę i smaż jeszcze przez chwilę.\n4. Placuszki udekoruj skyrem waniliowym, owocami oraz listkami świeżej mięty.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/zrLqzUiHmPsVGRCVdTIZM6Hnlyc8pRs89tBQMAGY.jpg","kcal":494.1,"protein":30.4,"fat":11.8,"carbs":68.2,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Fasola biała konserwowa","grams":60,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":35,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Borówki amerykańskie","grams":50,"measure":"garść"},{"name":"Skyr waniliowy (Pilos)","grams":150,"measure":"opakowanie"},{"name":"Mięta pieprzowa świeża","grams":5,"measure":"garść"}]},{"id":38873217,"name":"Odżywczy bowl z pieczonymi warzywami, czerwoną fasolą i fetą","description":"1. Warzywa pokrój w plastry, dopraw solą i pieprzem, skrop łyżeczką oliwy i upiecz w piekarniku w temp. 190 stopni przez ok. 20-30 minut. \n2. W tym czasie ugotuj kaszę wg instrukcji na opakowaniu.\n3. Na talerz wyłóż kaszę, pieczone warzywa, odsączoną z zalewy fasolę oraz pokruszoną fetę.\n4. Posiekaj zioła i wymieszaj je z pozostałą oliwą, sokiem z cytryny oraz przyprawami. Przygotowanym sosem polej bowla.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/vu2n7TmlyhRyvWE grams":10,"measure":"łyżeczka"},{"name":"Jabłko","grams":140,"measure":"średnia sztuka"},{"name":"Masło orzechowe","grams":20,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"}]},{"id":41144612,"name":"Omlet a’la brownie z fasoli z malinami","description":"1. Fasolę odsącz i przepłucz na sitku pod bieżącą wodą.\n2. Jajka zmiksuj z fasolą, bananem, proszkiem do pieczenia, sodą oczyszczoną, erytrolem, szczyptą soli oraz kakao na gładką masę.\n3. Na patelni rozgrzej oliwę i rozprowadź ją równomiernie po powierzchni. Wylej masę kakaową i smaż omleta na bardzo wolnym ogniu. Kiedy boki omleta będą już ścięte przewróć go delikatnie na drugą stronę.\n3. Gotowego omleta pokrój na 4 trójkąty. Pierwszy posmaruj skyrem i dodaj kilka malin. Dodaj kolejny trójkąt z omleta i powtórz czynność aż skończysz wszystkie składniki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/RXStZDnz6FwMt4y113h7wloTxXAmfeXYmYoyBm7W.jpg","kcal":484.3,"protein":33.9,"fat":17.5,"carbs":56.0,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Kakao w proszku","grams":10,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":1,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Fasola czerwona konserwowa","grams":100,"measure":"łyżka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Skyr waniliowy (Pilos)","grams":150,"measure":"opakowanie"},{"name":"Maliny","grams":120,"measure":"garść"}]},{"id":61928706,"name":"Omlet owsiany z rabarbarem i truskawkami","description":"1. Jajka zmiksuj na gładką masę z płatkami owsianymi, mąką oraz erytrolem i aromatem waniliowym. \n2. Rabarbar i truskawki pokrój w plastry.\n3. Na patelni podduś rabarbar z połową truskawek z dodatkiem syropu klonowego. \n4. Na owoce wylej masę jajeczną i smaż pod przykryciem aż omlet całkowicie się zetnie. \n5. Przełóż na talerz i posmaruj skyrem oraz udekoruj pozostałymi truskawkami i płatkami migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/yhqLYH4QfAdKMG9wXGS6qNPKwtyotLtguTH38PQV.jpg","kcal":504.5,"protein":31.8,"fat":15.1,"carbs":61.6,"ingredients":[{"name":"Truskawki","grams":150,"measure":"garść"},{"name":"Rabarbar","grams":51,"measure":"sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":30,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Skyr waniliowy","grams":100,"measure":"opakowanie"},{"name":"Migdały płatki","grams":5,"measure":"łyżeczka"}]},{"id":34528179,"name":"Omlet skyrnik z truskawkami","description":"1. Składniki na omlet (jajko, mąkę, proszek do pieczenia, skyr, erytrol i aromat) wymieszaj na jednolitą masę. \n2. Rozgrzej patelnię z oliwą i wlej masę omletową. \n3. Truskawki pokrój w plastry i powciskaj kilka w omlet (nie za dużo, byś dała radę przewrócić). Smaż ok. 5-7 minut pod przykryciem na niewielkiej mocy. Przewróć na druga stronę i smaż jeszcze chwilę. 4. Podawaj z pastą pistacjową i pozostałymi truskawkami. Opcjonalnie możesz posypać pudrem z erytrolu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/b9kOnOFUUrjUvJvDgTWOVFhl1F5kuLXAt009LEnU.jpg","kcal":495.0,"protein":28.6,"fat":24.4,"carbs":44.4,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Oliwa z kcji na opakowaniu. \n2. Kurczaka pokrój w kostkę i wymieszaj z przyprawą gyros. Cebulę oraz pieczarki również pokrój w kostkę. Na oliwie podsmaż cebulę, czosnek, dodaj mięso, a następnie pieczarki. Smaż wszystko do momentu aż mięso straci surowość, a pieczarki odparują wodę. Wymieszaj wszystko z ryżem, dodaj posiekaną natkę pietruszki. Dopraw solą i pieprzem. Do farszu dodaj połowę tartej mozzarelli. \n3. Paprykę przekrój wzdłuż na pół tworząc łódeczki. Każdą nadziej farszem i posyp pozostałym serem. Wstaw do piekarnika rozgrzanego do 180 stopni na ok. 30-40 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/il0zU4ouYiLQ7d5XAxvhNd11DrAfTS0DL6fDxEDV.jpg","kcal":574.4,"protein":42.3,"fat":17.9,"carbs":62.3,"ingredients":[{"name":"Papryka czerwona","grams":170,"measure":"duża sztuka"},{"name":"Cebula","grams":50,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Kurczak pierś","grams":100,"measure":"porcja"},{"name":"Gyros przyprawa","grams":3,"measure":"łyżeczka"},{"name":"Pieczarki","grams":100,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Mozzarella tarta","grams":40,"measure":"g"}]},{"id":61928702,"name":"Pasta rybna pełna wapnia","description":"1. Szproty wyjmij z puszki i przełóż do miski. Dodaj twaróg i wszystko wymieszaj widelcem tworząc pastę. \n2. Dodaj posiekaną drobno czerwoną cebulę. Wszystko wymieszaj i dopraw pieprzem. \n3. Pastą posmaruj pieczywo. Kanapki posyp posiekanym szczypiorkiem i pestkami dyni. Dodatkowo zjedz ogórka kiszonego i paprykę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/t7bquF71XaFWwyMLA0OzuCdHXaTeQaW4k4eNJ0s4.jpg","kcal":508.9,"protein":42.6,"fat":15.5,"carbs":50.7,"ingredients":[{ i wymieszaj ponownie na gładkie ciasto. \n3. Kiedy patelnia będzie bardzo dobrze rozgrzana rozprowadź na jej dnie masło, a następnie wylej ciasto. Naleśnika piecz ok. 15-20 minut. \n4. Borówki uduś na patelni z dodatkiem pozostałego słodzika. Kiedy będą już całkiem rozmrożone dodaj do nich mąkę ziemniaczaną rozmieszaną w 2 łyżkach zimnej wody. Gotuj ciągle mieszając aż sos wyraźnie się zagęści.\n5. Upieczonego naleśnika podawaj z jogurtem i gorącym sosem borówkowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/kBfF02Rtlsb7ut2AzaB9cyFEumDFQFlBfPyuNRHy.jpg","kcal":502.8,"protein":30.1,"fat":16,"carbs":63.2,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":60,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":20,"measure":"łyżeczka"},{"name":"Mąka pszenna pełnoziarnista","grams":25,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło","grams":5,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":150,"measure":"garść"},{"name":"Mąka ziemniaczana","grams":4,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"}]},{"id":41144627,"name":"Pieczona dynia z cieciorką i tahini","description":"1. Piekarnik nagrzej do 180 stopni (termoobieg).\n2. Dynię piżmową (najlepiej połówkę) umyj i wydrąż środek. Ułóż ją na blaszce wyłożonej papierem do pieczenia, skrop 1 łyżeczką oliwy i włóż do nagrzanego piekarnika na około 30-40 minut.\n3. W międzyczasie ciecierzycę przepłucz pod wodą, a następnie wymieszaj z pozostałą częścią oliwy, kminkiem, papryką wędzoną i szczyptą soli. Włóż do piekarnika obok dyni na około 5 minut (pod koniec pieczenia dyni).\n4. Pomidorki pokrój w ćwiartki, a natkę i czosnek posiekaj.\n5. Z tahini, odrobiny mleka, posiekanego czosnku, soku z cytryny pieprzu i szczypty soli zrób dip.\n6. Kiedy dynia się upiecze, włóż w wydrążony środek podpieczoną cieciorkę, pomidorki i posiekaną natkę. Całość polej przygotowanym sosem z tahini.\n7. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/D4BxbFxhtEcJDa7IdbFPP4mobqMNxOp1WcCUtziT.jpg","kcal":472.2,"protein":14.1,"fat":21.9,"carbs":62.5,"ingredients":[{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tahini masło sezamowe","grams":15,"measure":"łyżeczka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Papryka wędzona w proszku","grams":2,"measure":"łyżeczka"},{"name":"Dynia","grams":300,"measure":"g"},{"name":"Ciecierzyca w zalewie","grams":60,"measure":"łyżka"},{"name":"Kumin w proszku (kmin rzymski)","grams":1,"measure":"szczypta"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":20,"measure":"g"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Kiwi","grams":150,"measure":"sztuka"}]},{"id":36694520,"name":"Pieczona owsianka a'la lava cake z malinami","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Płatki owsiane zmiel na mąkę.\n3. W naczyniu żaroodpornym (kokilce) umieść banana i rozgnieć go widelcem na \"papkę\". Dodaj zmielone płatki, mleko, budyń, proszek do pieczenia oraz kakao i wszystko dokładnie wymieszaj.Na wierzch dodaj kostki czekolady i delikatnie zanurz je w środku owsianki.\n4. Owsiankę piecz 15 minut. Podawaj ze skyrem i malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/wonyowSch8aplgbE5Q2Wd0H80rQUWr4zRKmXiqUG.jpg","kcal":489.6,"protein":22.2,"fat":11.6,"carbs":79.8,"ingredients":[{"name":"Płatki owsiane","grams":55,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Budyń bez cukru","grams":5,"measure":"łyżka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Maliny","grams":60,"measure":"garść"}]},{"id":38873212,"name":"Pieczona owsianka sernikowa z borówkami","description":"1. Piekarnik nagrzej do 180 stopni.\n2. Twaróg, jajko, skyr i erytrol zmiksuj na gładką masę.\n3. Dodaj płatki i połowę borówek. Wymieszaj.\n4. Przełóż masę do naczynia żaroodpornego i wstaw do nagrzanego piekarnika na 30 minut.\n5. Podawaj z pozostałymi borówkami i masłem orzechowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/0fngvxrmiyRb0lNNQ9P36FD27YklvuwK6uiSygnQ.jpg","kcal":514.3,"protein":39.0,"fat":15.8,"carbs":58.0,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":150,"measure":"garść"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ser twarogowy chudy","grams":75,"measure":"g"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"}]},{"id":43687109,"name":"Pieczona owsianka z jabłkiem i cynamonem","description":"1. Poprzedniego dnia wieczorem płatki wymieszaj z mlekiem i schowaj do lodówki.\n2. Rano dodaj jajko, cynamon, słodzik i posiekane orzechy.\n3. Masę przelej do naczynia żaroodpornego.\n4. Jabłko pokrój w plastry i poukładaj na wierzchu wylanej masy.\n5. Całość włóż do nagrzanego piekarnika na około 20-30 minut (180 stopni).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/Mv7LLTFUSrTUbv2i7vBrKlvfp4KOkFAzWMxdR1o2.jpg","kcal":511.9,"protein":22.9,"fat":21.3,"carbs":60.9,"ingredients":[{"name":"Płatki owsiane","grams":55,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Jabłko","grams":70,"measure":"średnia sztuka"},{"name":"Orzechy włoskie","grams":15,"measure":"sztuka"}]},{"id":34528198,"name":"Pieczone bataty nadziewane szpinakiem z sosem czosnkowym","description":"1. Batata umyj, osusz i pokrój wzdłuż na dwie części. Przełożyć na blachę wyłożoną papierem do pieczenia, lekko posolić, skropić oliwą i piec około 40-60 minut w 200°C do miękkości.\n2. W tym czasie przygotuj farsz. Szpinak podsmaż na suszonych pomidorach aż całkowicie zwiędnie. Dodaj ricottę i dopraw solą, pieprzem oraz czosnkiem.\n3. Gdy bataty się upieką łyżką wydrąż miąższ. Miąższ rozgnieć widelcem, dodaj do farszu, ewentualnie dodatkowo przypraw i wymieszaj. Nałóż do wydrążonych batatów.\n4. Udekoruj rukolą.\n5. Jogurt wymieszaj z przeciśniętym przez praskę czosnkiem i posiekanym koperkiem. Dopraw solą i pieprzem. Nadziewane bataty podawaj z sosem czosnkowym.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/IVyhOSB830AzJzCntVTnNqHnFoxI8GZSfRYXdQRn.jpg","kcal":517.2,"protein":29.4,"fat":8.5,"carbs":85.8,"ingredients":[{"name":"Batat","grams":300,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"},{"name":"Pomidory suszone","grams":21,"measure":"sztuka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Ser Ricotta","grams":40,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}]},{"id":34528192,"name":"Pieczone ziemniaki z kalafiorem i jajkiem sadzonym","description":"1. Piekarnik nagrzej do 200 stopni.\n2. Ziemniaki obierz ze skórki, umyj i pokrój w cienkie talarki, a następnie wrzuć do miski.\n3. Kalafiora umyj, podziel na mniejsze różyczki i dodaj do ziemniaków.\n4. Całość skrop łyżeczką oliwy, posyp przyprawami i dokładnie wymieszaj. Odstaw na 5 minut, a następnie ułóż na blaszce wyłożonej papierem i włóż do nagrzanego piekarnika na około 20 minut.\n5. W tym czasie na pozostałej oliwie przygotuj jajka sadzone.\n6. Ziemniaki, kalafiora i jajka przełóż na talerz. Danie posyp szczypiorkiem.\n7. Do obiadu wypij kefir.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/v3F1fjvwk6y23GtNxYR0d8EhJBYoPtD9yWG28WE0.jpg","kcal":582.5,"protein":30.8,"fat":25.9,"carbs":62.8,"ingredients":[{"name":"Kalafior","grams":250,"measure":"g"},{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Kefir 2%","grams":240,"measure":"szklanka"}]},{"id":43687118,"name":"Pieczony dorsz z kaszą i surówką z kapusty pekińskiej","description":"1. Piekarnik nagrzej do 180 stopni.\n2. Kaszę ugotuj zgodnie z instrukcją.\n3. Rybę połóż na blachę wyłożoną papierem do pieczenia, skrop sokiem z cytryny, 1 łyżeczką oliwy oraz przypraw solą i pieprzem. Włóż do nagrzanego piekarnika na około 15 minut.\n4. Marchew zetrzyj na tarce i wrzuć do miski, dodaj poszatkowaną kapustę i posiekaną drobno cebulkę. Dodaj posiekany koperek, majonez i wymieszaj. Dopraw solą, pieprzem i szczyptą erytrolu.\n5. Kaszę podawaj z upieczoną rybą i przygotowaną surówką.\n6. Na deser zjedz skyr waniliowy.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/KROibiiSpQU5npciS77FGcEieq83DJqoeMh4XTF6.jpg", Masło","grams":5,"measure":"łyżeczka"},{"name":"Maliny mrożone","grams":100,"measure":"garść"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":60,"measure":"łyżka"},{"name":"Pistacje","grams":15,"measure":"łyżka"}]},{"id":59199275,"name":"Pieczony łosoś w sosie musztardowo-koperkowym z młodą kapustą i ziemniakami","description":"1. Ziemniaki ugotuj w osolonym wrzątku do miękkości (jeśli używasz młodych, małych ziemniaków nie musisz ich obierać ze skórki - ale porządnie ją wyszoruj). \n2. Kapustę poszatkuj, a cebulę pokrój w drobną kostkę. Na oliwie w garnku podsmaż cebulkę, a następnie dodaj kapustę. Duś do miękkości warzyw. Dopraw solą, pieprzem i szczyptą erytrolu.\n3. Piekarnik rozgrzej do 180 stopni. Łososia ułóż w naczyniu żaroodpornym. Musztardy wymieszaj miodem, sokiem z cytryny, posiekanym koperkiem oraz solą i pieprzem. Sosem posmaruj łososia i zapiekaj ok. 15 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/Bkc9NuAjTv01S55Gn6KOMBsM4VkL6QtSM5aQOFjg.jpg","kcal":587.8,"protein":34.5,"fat":25.3,"carbs":57.3,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Łosoś atlantycki","grams":130,"measure":"g"},{"name":"Musztarda","grams":15,"measure":"łyżka"},{"name":"Musztarda francuska","grams":15,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Kapusta młoda","grams":100,"measure":"g"},{"name":"Szalotka","grams":10,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}]},{"id":56307456,"name":"Pieczony łosoś z komosą i azjatycką surówką","description":"1. Piekarnik rozgrzej do 180 stopni.\n2. Komosę ugotuj według instrukcji na opakowaniu.\n3. W tym czasie ułóż kawałek łososia w naczyniu żaroodpornym, skrop ili dodaj odcedzona ciecierzyce oraz przyprawy, wymieszaj.\n5. Całość zalej passata i duś kilkanaście minut, aż nadmiar płynu odparuje.\n6. Dodaj na patelnie ugotowany makaron i wymieszaj. Dopraw jeszcze w razie potrzeby.\n7. Przełóż na talerz, podawaj ze świeżą bazylia i parmezanem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/JLjLNDN8fpGATMYvWfdZkBB413Wk5OWCcrOiaqGa.jpg","kcal":571.0,"protein":24.5,"fat":19.3,"carbs":74.4,"ingredients":[{"name":"Pełnoziarniste tagiatelle (AH)","grams":90,"measure":"g"},{"name":"Ciecierzyca w puszce","grams":120,"measure":"puszka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Passata pomidorowa","grams":200,"measure":"szklanka"},{"name":"Bazylia suszona","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":1,"measure":"szczypta"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"}]},{"id":47967533,"name":"Prosta i szybka sałatka z tofu","description":"1. Warzywa pokrój w kostkę i przełóż do miski.\n2. Dodaj roszponkę lub inną ulubioną sałatę.\n3. Tofu pokrój w kostkę i obsmaż na odrobinie oliwy. Dodaj do sałatki.\n4. Z oliwy musztardy, soku z cytryny i przypraw zrób sos i polej nim sałatkę.\n5. Całość wymieszaj i posyp pestkami dyni.\n6. Sałatkę zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/QzF3tRE3WsrNF4pThb5ZYIaJHrbekavy2AdcZ5eU.jpg","kcal":492.4,"protein":23.5,"fat":25.6,"carbs":45.2,"ingredients":[{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Tofu wędzone","grams":90,"measure":"opakowanie"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Muszta  sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Soczewica","grams":100,"measure":"szklanka"},{"name":"Natka pietruszki","grams":40,"measure":"pęczek"},{"name":"Pomidory krojone w puszce","grams":400,"measure":"puszka"},{"name":"Curry przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Pieprz cayenne","grams":1,"measure":"szczypta"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Pestki dyni","grams":20,"measure":"łyżka"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}]},{"id":34528195,"name":"Sałatka a'la grecka z grillowanym halloumi","description":"1. Pomidora i ogórka pokrój w kostkę (lub ćwiartki), a cebulę w piórka.\n2. Ser pokrój w plastry i zgrilluj razem z pieczywem na suchej patelni (2-3 minuty).\n3. Sałatę porwij w ręce na mniejsze kawałki i wrzuć do miski. Dodaj resztę pokrojonych warzyw.\n4. Grzankę z chleba pokrój w kostkę i dodaj do sałatki. Na wierzch dodaj zgrillowany ser.\n5. Oliwę wymieszaj z sokiem z cytryny, musztardą, oregano, pieprzem i szczyptą soli.\n6. Sałatkę polej przygotowanym sosem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/oI12HpSnr5cvBoz4LeJ4H4R2ScI5TnlBKIxQAC9N.jpg","kcal":512.6,"protein":26.8,"fat":28.5,"carbs":40.1,"ingredients":[{"name":"Pomidor czerwony","grams":170,"measure":"sztuka"},{"name":"Ogórek gruntowy","grams":70,"measure":"sztuka"},{"name":"Chleb żytni","grams":53,"measure":"kromka"},{"name":"Ser Halloumi","grams":70,"measure":"g"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Musztarda","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sałata lodowa","grams":40,"measure":"garść"}]},{"id":36694534,"name":"Sałatka panzanella z pomidorami, brzoskwinią i burratą"," ok z cytryny","grams":6,"measure":"łyżka"},{"name":"Nasiona słonecznika","grams":12,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Szpinak","grams":50,"measure":"garść"}]},{"id":46076312,"name":"Sałatka z chrupiącą cieciorką i burakiem","description":"1.  Ciecierzycę przepłucz pod wodą, wrzuć na patelnię, dodaj przyprawy i podpraż chwilę na suchej patelni.\n3. Buraka pokrój w ósemki, a ogórka w plastry. Cebulę pokrój w cienkie piórka.\n4. Do miski włóż wszystkie pokrojone warzywa i dodaj podsmażoną ciecierzycę.\n5. Z oliwy, musztardy, soku z cytryny, soli i pieprzu zrób dip, a następnie polej nim przygotowaną sałatkę.\n6. Posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/b89JEJc3oEOCyxE8US9TzkjHYbJzUCxNjuotpJ4j.jpg","kcal":495.3,"protein":18.2,"fat":21.2,"carbs":57.2,"ingredients":[{"name":"Ciecierzyca w zalewie","grams":120,"measure":"łyżka"},{"name":"Buraki ugotowane","grams":120,"measure":"sztuka"},{"name":"Ogórek kiszony","grams":130,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Cebula czerwona","grams":40,"measure":"plaster"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}]},{"id":56307463,"name":"Sałatka z grillowanym kurczakiem, serem pleśniowym i grzankami","description":"1. Mięso pokrój w paseczki, wrzuć do miski, dodaj musztardę, oliwę, erytrol, sok z cytryny, sól, pieprz. Całość dobrze wymieszaj i odstaw na 5-10 minut.\n2. Chleb pokrój w kostkę i przygotuj grzanki na suchej patelni.\n3. Następnie zdejmij grzanki i na tej samej patelni przygotuj zamarynowane mięso.\n4. Pomidorki pokrój na połówki, ogórka w plasterki, a cebulę w cienkie piórka.\n5. Do miski wrzuć umyty szpinak i pokrojone warzywa. Dodaj grillowane mięso oraz pokruszony ser.\n6. Całość skrop pozostałą oliwą i sokiem z cytryny, posyp pestkami i grzankami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/IoRv7LRUTt7DAMt37nt7SZ0Yn4jVn40czW3zk65Z.jpg","kcal":507.6,"protein":41.9,"fat":25.2,"carbs":30.4,"ingredients":[{"name":"Kurczak pierś","grams":120,"measure":"porcja"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Chleb żytni","grams":35,"measure":"kromka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżeczka"},{"name":"Ser Gorgonzola","grams":30,"measure":"plaster"}]},{"id":36694539,"name":"Sałatka z grillowanymi warzywami i fetą","description":"1. Cukinię pokrój w plastry, a paprykę w szerokie paski. Warzywa zgrilluj na oliwie z dodatkiem przypraw.\n2. Pozostałą oliwę wymieszaj z sokiem z cytryny, startym parmezanem, czosnkiem, solą i pieprzem.\n3. Na talerzu rozłóż rukolę lub inną ulubioną sałatę. Dodaj grillowane warzywa oraz czerwoną cebulę pokrojoną w cienkie piórka. Na wierzch dodaj pokruszony ser feta. \n4. Sałatkę polej przygotowanym dressingiem i posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/G394VxjhTnwwlVfdwESu7sgcCG50HY5sXpHWLE7c.jpg","kcal":498.1,"protein":26.1,"fat":37.7,"carbs":20.5,"ingredients":[{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Rukola","grams":40,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Ser Feta","grams":60,"measure":"plaster"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Pestki dyni","grams":20,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"}]},{"id":43687124,"name":"Sałatka z kaszą jaglaną, brokułem i serem feta","description":"1. Kaszę jaglaną ugotuj według zaleceń producenta. \n2. Brokuły ugotuj ale dente. \n3. Jogurt wymieszaj z oliwą, przeciśniętym czosnkiem, dopraw solą, pieprzem i szczyptą erytrolu. \n4. Fetę pokrój w kostkę lub pokrusz, a pomidorki koktajlowe pokrój na pół. \n5. Wszystkie składniki wymieszaj z sosem. \n6. Słonecznik podpraż na suchej patelni i posyp nim sałatkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/Yd7iGHc9GcHthmpXFAhspaSZNXZAJdxil1kfJHWB.jpg","kcal":503,"protein":29.4,"fat":22.7,"carbs":50.1,"ingredients":[{"name":"Brokuł","grams":250,"measure":"g"},{"name":"Kasza jaglana","grams":35,"measure":"łyżka"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Ser Feta","grams":50,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Nasiona słonecznika","grams":8,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"}]},{"id":51097590,"name":"Sałatka z kaszą, warzywami i szarpanym kurczakiem","description":"1. Kaszę ugotuj według zaleceń producenta i pozostaw do ostudzenia. \n2. Kurczaka umieść w naczyniu żaroodpornym, posmaruj go oliwą, skrop sokiem z cytryny i przypraw solą, pieprzem, papryką oraz czosnkiem. Upiecz w 180 stopniach przez ok. 30 minut. Po upieczeniu poszarp mięso za pomocą dwóch widelców. \n3. Cebulę pokrój w piórka, ogórka w półplastry, a pomidorki przekrój na pół. \n4. Przygotuj sos - pozostałą oliwę wymieszaj z sokiem z cytryny, musztardą francuską, miodem i solą i pieprzem. \n5. Do miski włóż szpinak, kaszę, poszarpanego kurczaka oraz warzywa. Sałatkę polej sosem i posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/2eqWMU4d03jyjIG7KdPSzsK4wWudiDbI4DG3JeSN.jpg","kcal":504.3,"protein":33.2,"fat":20.8,"carbs":48.0,"ingredients":[{"name":"Kasza jaglana","grams":40,"measure":"łyżka"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Musztarda francuska","grams":10,"measure":"łyżka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":34528193,"name":"Sałatka z młodymi ziemniaczkami, bobem i jajkiem","description":"1. Ziemniaki dobrze wyszoruj i ugotuj do miękkości w lekko osolonej wodzie.\n2. W tym czasie ugotuj także bób (również w lekko osolonej wodzi)e. Po ugotowaniu przelej go zimną wodą i obierz z łupin.\n3. Jajka ugotuj na twardo.\n4. Rzodkiewki pokrój w plasterki, a szczypiorek posiekaj. ,\n5. Wszystkie składniki przełóż do miski.\n6. Jogurt wymieszaj z majonezem, posiekanym koprem i przyprawami. Przygotowanym sosem polej sałatkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/0bOJpUmg0KvJQHNlSak3uFUygCFSR1lFFmusBRGr.jpg","kcal":511.9,"protein":29.4,"fat":20.6,"carbs":54.4,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Bób","grams":100,"measure":"garść"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Majonez wegański","grams":20,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":50,"measure":"g"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}]},{"id":47967532,"name":"Sałatka z pieczonymi batatami i kremową burratą","description":"1. Piekarnik rozgrzej do 180 stopni.\n2. Bataty pokrój w plastry lub na frytki - jak wolisz i przełóż na blaszkę wyłożoną papierem do pieczenia. Dopraw solą, pieprzem, czosnkiem oraz skrop łyżeczką oliwy z oliwek. Piecz ok. 20-25 minut do miękkości.\n3. W tym czasie pomidorki pokrój na pół, a cebulę w krążki.\n4. Na talerzu rozłóż szpinak, dodaj upieczone bataty, pomidorki, cebulę, a na wierzch dodaj kawałki burraty.\n5. Sałatkę skrop oliwą oraz sosem balsamicznym i dopraw solą i pieprzem. Posyp pestkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/cP1fxKHCH8BbeUQrvqGawPylTBKOg26pmONCw9T4.jpg","kcal":498.3,"protein":14.3,"fat":32,"carbs":41.1,"ingredients":[{"name":"Batat","grams":130,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5," description":"1. Łososia ułóż w naczyniu żaroodpornym. Sos sojowy wymieszaj z łyżeczką syropu klonowego oraz sezamem. Marynatą posmaruj rybę i odstaw na 10 minut. Następnie upiecz w 180 stopniach przez ok. 12-15 minut. \n2. Ryż ugotuj według czasu zalecanego przez producenta na opakowaniu. \n3. Ogórka i marchewkę pokrój w długie wstążki za pomocą obieraczki.\n4. Przygotuj sos: majonez wymieszaj z sosem sriracha.\n5. Do miski włóż ugotowany ryż, warzywa, upieczonego łososia i pokruszone algi. \n6. Bowla polej sosem i posyp szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/TWfaehW03boNQevZBHBCYodrKNvOXZL1rNLv4FVw.jpg","kcal":586.6,"protein":27.6,"fat":28.2,"carbs":54.3,"ingredients":[{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Łosoś atlantycki","grams":100,"measure":"porcja"},{"name":"Sos sojowy","grams":5,"measure":"łyżka"},{"name":"Sos Sriracha","grams":6,"measure":"łyżeczka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Majonez wegański","grams":25,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":3,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Algi nori","grams":2,"measure":"sztuka"}]},{"id":46076308,"name":"Szybka makaronowa sałatka z fetą","description":"1. Makaron ugotuj al'dente.\n2. Pomidorki pokrój w ćwiartki, a ogórka w plastry.\n3. Do miski wrzuć rukolę, a następnie dodaj pozostałe warzywa.\n4. Ser pokrusz w ręce na mniejsze kawałki (lub pokrój w kostkę) i dodaj do sałatki.\n5. Na koniec dodaj ugotowany i przestudzony makaron.\n6. Z oliwy, musztardy, soku z cytryny i przypraw zrób sos i polej nim sałatkę.\n7. Całość wymieszaj na sałatkę. Posyp pestkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/ZL8RY1zk5x8rfCJWiYbPM7PGmDrSqVZn86yxU0 otowe (trwa to kilka minut – w zależności od wielkości krewetek).\n6. Dodaj na patelnie ugotowany makaron, wymieszaj z krewetkami i dopraw jeszcze w razie potrzeby.\n7. Przełóż danie na talerz, podawaj udekorowane posiekana natka.\n8. Na deser zjedz pudding proteinowy o dowolnym smaku.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/PaZnLzyHRUQ8AiIkyeT9V2x5AFY05UhSDTRbw1ku.jpg","kcal":636.4,"protein":56.4,"fat":10.3,"carbs":79.6,"ingredients":[{"name":"Makaron","grams":75,"measure":"filiżanka"},{"name":"Krewetki","grams":120,"measure":"g"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Pomidory koktajlowe","grams":200,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pudding proteinowy o smaku czekoladowym (Go Active)","grams":200,"measure":"opakowanie"}]},{"id":59199285,"name":"Tajska zupa cytrynowa z tofu","description":"1. Cebulę posiekaj w kosteczkę. Cukinię pokrój w półplastry, a groszek cukrowy pozbaw włókien odcinając końce. Tofu pokrój w kostkę.\n2. W garnku rozgrzej oliwę i zeszklij cebulę. Dodaj pastę, smaż przez chwilę, a następnie dodaj tofu, groszek oraz cukinię. Podsmaż wszystko razem przez 1-2 minuty.\n3. Dodaj wodę i mleczko kokosowe, gotuj jeszcze chwilę i opcjonalnie dopraw jeszcze zupę do smaku. 4. Zupę podawaj z ugotowanym makaronem ryżowym i listkami kolendry.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/sKwPnxqdDC8oqNi0V4Emz4rRXo3LAffRfEpXNY5B.jpg","kcal":501.0,"protein":24.1,"fat":15.4,"carbs":70.9,"ingredients":[{"name":"Makaron ryżowy","grams":50,"measure":"porcja"},{"name":"Cukinia","grams":100,"measure":"g"},{"name":"Cebula","grams":50,"measure":"g"},{"name":"Tofu naturalne","grams":90,"measure":"opakowanie"}
