    document.body.appendChild(pickerBackdrop);
    pickerBackdrop.querySelector(".modal-close").addEventListener("click", closePicker);

    const pkSearch = pickerBackdrop.querySelector("#pkSearch");
    const pkSort = pickerBackdrop.querySelector("#pkSort");
    const pkMealType = pickerBackdrop.querySelector("#pkMealType");
    const pkDiet = pickerBackdrop.querySelector("#pkDiet");
    const pkFav = pickerBackdrop.querySelector("#pkFav");
    const pkList = pickerBackdrop.querySelector("#pkList");
    rebuildDietOptions(pkDiet);
    pkMealType.value = meal; // default to matching meal type, user can widen with "Wszystkie posiłki"
    let pkOnlyFav = false;
    let pkPortions = currentPortions || 1;
    const pkPortionsVal = pickerBackdrop.querySelector("#pkPortionsVal");
    const pkPortionsLabel = (n) => `${n} porcj${n === 1 ? "a" : "e"}`;
    pickerBackdrop.querySelector("#pkPortionsMinus").addEventListener("click", () => { pkPortions = Math.max(1, pkPortions - 1); pkPortionsVal.textContent = pkPortionsLabel(pkPortions); });
    pickerBackdrop.querySelector("#pkPortionsPlus").addEventListener("click", () => { pkPortions = Math.min(9, pkPortions + 1); pkPortionsVal.textContent = pkPortionsLabel(pkPortions); });

    function renderPickerList() {
      const list = filterRecipes({
        query: pkSearch.value,
        sort: pkSort.value,
        dietId: pkDiet.value,
        mealType: pkMealType.value,
        onlyFav: pkOnlyFav,
      });
      pkList.innerHTML = "";
      if (!list.length) {
        pkList.innerHTML = '<div class="empty-state">Brak przepisów spełniających kryteria.</div>';
        return;
      }
      const frag = document.createDocumentFragment();
      list.forEach(r => {
        const row = document.createElement("button");
        row.className = "picker-row-item";
        row.innerHTML = `
          <span class="prname">${favorites.has(r.id) ? "♥ " : ""}${escapeHtml(r.name)}</span>
          <span class="prmacro tabular">${Math.round(r.kcal)} kcal · B ${Math.round(r.protein)}g</span>
        `;
        row.addEventListener("click", () => {
          setWeekSlot(dateISO, meal, person, r.id, pkPortions);
          closePicker();
          showToast(`Dodano „${r.name}” — ${dayLabel}, ${meal.toLowerCase()} (${person})`);
        });
        frag.appendChild(row);
      });
      pkList.appendChild(frag);
    }
    pkSearch.addEventListener("input", renderPickerList);
    pkSort.addEventListener("change", renderPickerList);
    pkMealType.addEventListener("change", renderPickerList);
    pkDiet.addEventListener("change", renderPickerList);
    pkFav.addEventListener("click", () => { pkOnlyFav = !pkOnlyFav; pkFav.classList.toggle("active", pkOnlyFav); renderPickerList(); });
    renderPickerList();
    document.addEventListener("keydown", pickerEscHandler);
  }
  function pickerEscHandler(e) { if (e.key === "Escape") closePicker(); }
  function closePicker() {
    if (pickerBackdrop) { pickerBackdrop.remove(); pickerBackdrop = null; document.removeEventListener("keydown", pickerEscHandler); }
  }

  // ---------- Shopping list (for the currently viewed week) ----------
  const shopList = document.getElementById("shopList");
  const shopWeekRangeLabel = document.getElementById("shopWeekRangeLabel");

  function shopKey(name) { return `${isoDate(viewedMonday)}|${name}`; }
  function customKey(id) { return `${isoDate(viewedMonday)}|custom|${id}`; }
  function customItemsForWeek() { return customShopItems[isoDate(viewedMonday)] || []; }

  function aggregateIngredients() {
    const totals = new Map();
    weekDates().forEach(d => {
      const dayMeals = weekPlan[isoDate(d)];
      if (!dayMeals) return;
      Object.values(dayMeals).forEach(entry => {
        const r = getRecipe(entry.id);
        if (!r) return;
        const portions = entry.portions || 1;
        r.ingredients.forEach(ing => {
          const key = ing.name;
          const prev = totals.get(key) || { name: ing.name, grams: 0, measure: ing.measure };
          prev.grams += ing.grams * portions;
          totals.set(key, prev);
        });
      });
    });
    const list = Array.from(totals.values()).sort((a,b) => a.name.localeCompare(b.name, "pl"));
    list.forEach(item => {
      const ov = shopOverrides[shopKey(item.name)];
      if (ov != null) { item.computedGrams = item.grams; item.grams = ov; item.overridden = true; }
    });
    return list;
  }

  // Combined, sorted (unchecked first, then checked at the bottom) list of
  // recipe-derived ingredients and manually added custom items for the week.
  function shoppingRows() {
    const rows = aggregateIngredients().map(item => ({
      type: "ingredient", name: item.name, qtyLabel: `${Math.round(item.grams)} g`,
      overridden: item.overridden, key: shopKey(item.name), raw: item,
    }));
    customItemsForWeek().forEach(ci => {
      rows.push({ type: "custom", name: ci.name, qtyLabel: ci.qty || "", key: customKey(ci.id), id: ci.id });
    });
    rows.sort((a, b) => {
      const ca = checked.has(a.key) ? 1 : 0, cb = checked.has(b.key) ? 1 : 0;
      if (ca !== cb) return ca - cb;
      return a.name.localeCompare(b.name, "pl");
    });
    return rows;
  }

  function renderShopping() {
    shopWeekRangeLabel.textContent = formatRangeLabel(viewedMonday);
    const rows = shoppingRows();
    shopList.innerHTML = "";
    if (!rows.length) {
      shopList.innerHTML = '<div class="empty-state">Dodaj przepisy do planu na ten tydzień (w zakładce „Mój tydzień”) albo dopisz własny produkt poniżej.</div>';
      return;
    }
    rows.forEach(item => {
      const row = document.createElement("div");
      const isChecked = checked.has(item.key);
      row.className = "shop-item" + (isChecked ? " checked" : "") + (item.type === "custom" ? " custom" : "");
      row.innerHTML = `
        <input type="checkbox" ${isChecked ? "checked" : ""} />
        <span class="name">${escapeHtml(item.name)}</span>
        <span class="qty tabular ${item.overridden ? "overridden" : ""}">${escapeHtml(item.qtyLabel)}</span>
        <button class="edit-btn" type="button" aria-label="Edytuj ilość">✎</button>
        ${item.type === "ingredient" && item.overridden ? '<button class="reset-btn" type="button" aria-label="Przywróć wyliczoną ilość">↺</button>' : ""}
        ${item.type === "custom" ? '<button class="del-btn" type="button" aria-label="Usuń produkt">✕</button>' : ""}
      `;
      row.querySelector('input[type="checkbox"]').addEventListener("change", (e) => {
        if (e.target.checked) checked.add(item.key); else checked.delete(item.key);
        save(LS_CHECKED, Array.from(checked));
        renderShopping();
      });
      row.querySelector(".edit-btn").addEventListener("click", () => {
        const qtySpan = row.querySelector(".qty");
        qtySpan.outerHTML = `<span class="qty-edit"><input type="text" value="${escapeHtml(item.qtyLabel)}" /></span>`;
        const input = row.querySelector(".qty-edit input");
        input.focus(); input.select();
        function commit() {
          if (item.type === "ingredient") {
            const v = parseFloat(input.value);
            if (!isNaN(v)) { shopOverrides[shopKey(item.name)] = v; save(LS_SHOP_OVERRIDES, shopOverrides); }
          } else {
            const weekKey = isoDate(viewedMonday);
            const list = customShopItems[weekKey] || [];
            const ci = list.find(x => x.id === item.id);
            if (ci) { ci.qty = input.value; save(LS_CUSTOM_ITEMS, customShopItems); }
          }
          renderShopping();
        }
        input.addEventListener("blur", commit);
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") commit(); });
      });
      const resetBtn = row.querySelector(".reset-btn");
      if (resetBtn) resetBtn.addEventListener("click", () => {
        delete shopOverrides[shopKey(item.name)];
        save(LS_SHOP_OVERRIDES, shopOverrides);
        renderShopping();
      });
      const delBtn = row.querySelector(".del-btn");
      if (delBtn) delBtn.addEventListener("click", () => {
        const weekKey = isoDate(viewedMonday);
        customShopItems[weekKey] = (customShopItems[weekKey] || []).filter(x => x.id !== item.id);
        save(LS_CUSTOM_ITEMS, customShopItems);
        renderShopping();
      });
      shopList.appendChild(row);
    });
  }
  document.getElementById("shopPrevWeekBtn").addEventListener("click", () => { viewedMonday = addDays(viewedMonday, -7); renderShopping(); });
  document.getElementById("shopNextWeekBtn").addEventListener("click", () => { viewedMonday = addDays(viewedMonday, 7); renderShopping(); });

  const addItemInput = document.getElementById("addItemInput");
  const addItemQty = document.getElementById("addItemQty");
  function addCustomShopItem() {
    const name = addItemInput.value.trim();
    if (!name) return;
    const weekKey = isoDate(viewedMonday);
    customShopItems[weekKey] = customShopItems[weekKey] || [];
    customShopItems[weekKey].push({ id: Date.now() + Math.random(), name, qty: addItemQty.value.trim() });
    save(LS_CUSTOM_ITEMS, customShopItems);
    addItemInput.value = ""; addItemQty.value = "";
    addItemInput.focus();
    renderShopping();
  }
  document.getElementById("addItemBtn").addEventListener("click", addCustomShopItem);
  addItemInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addCustomShopItem(); });
  addItemQty.addEventListener("keydown", (e) => { if (e.key === "Enter") addCustomShopItem(); });

  document.getElementById("copyListBtn").addEventListener("click", () => {
    const text = `Lista zakupów (${formatRangeLabel(viewedMonday)}):\n` + shoppingRows().map(i => `- ${i.name}${i.qtyLabel ? ": " + i.qtyLabel : ""}`).join("\n");
    copyText(text);
  });

  function buildPrintableWeekHtml() {
    const rows = shoppingRows();
    const days = weekDates().map(d => {
      const dateISO = isoDate(d);
      const dayMeals = weekPlan[dateISO] || {};
      const mealsHtml = activeMealRows().map(({ meal, person }) => {
        const entry = dayMeals[slotKey(meal, person)];
        const r = entry ? getRecipe(entry.id) : null;
        if (!r) return "";
        return `<div><strong>${meal} (${person}):</strong> ${escapeHtml(r.name)}${entry.portions > 1 ? ` (×${entry.portions})` : ""}</div>`;
      }).join("");
      return `<section><h3>${DAY_NAMES_FULL[d.getDay()]} ${formatDayNum(d)}</h3>${mealsHtml || "<div>—</div>"}</section>`;
    }).join("");
    const shoppingHtml = rows.length
      ? `<ul>${rows.map(i => `<li>${escapeHtml(i.name)}${i.qtyLabel ? " — " + escapeHtml(i.qtyLabel) : ""}</li>`).join("")}</ul>`
      : "<p>Brak zaplanowanych posiłków.</p>";
    return `<!doctype html><html lang="pl"><head><meta charset="utf-8"><title>FitGoginki — tydzień ${formatRangeLabel(viewedMonday)}</title>
    <style>
      body{font-family:Georgia,serif;max-width:640px;margin:32px auto;padding:0 16px;color:#23201a;}
      h1{font-size:22px;} h2{font-size:16px;border-bottom:1px solid #ccc;padding-bottom:6px;margin-top:32px;}
      h3{font-size:14px;margin:14px 0 4px;} section{margin-bottom:6px;}
      ul{padding-left:18px;} li{margin-bottom:4px;}
      @media print { body{margin:0;} }
    </style></head><body>
    <h1>FitGoginki — plan tygodnia (${formatRangeLabel(viewedMonday)})</h1>
    ${days}
    <h2>Lista zakupów</h2>
    ${shoppingHtml}
    </body></html>`;
  }
  function openPrintableWeek() {
    try {
      const html = buildPrintableWeekHtml();
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast("Otworzono podgląd do druku w nowej karcie — użyj Cmd/Ctrl+P i wybierz „Zapisz jako PDF”.");
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (e) {
      const text = `Plan tygodnia (${formatRangeLabel(viewedMonday)}):\n\n` + shoppingRows().map(i => `- ${i.name}${i.qtyLabel ? ": " + i.qtyLabel : ""}`).join("\n");
      openCopyFallback(text);
    }
  }
  document.getElementById("printListBtn").addEventListener("click", openPrintableWeek);
  document.getElementById("pdfWeekBtn").addEventListener("click", openPrintableWeek);
  document.getElementById("resetCheckedBtn").addEventListener("click", () => {
    checked = new Set(); save(LS_CHECKED, []); renderShopping();
  });

  // ---------- Statistics ----------
  const statsGrid = document.getElementById("statsGrid");
  const statsRangeLabel = document.getElementById("statsRangeLabel");
  const statsPeriodType = document.getElementById("statsPeriodType");
  const statsPersonToggle = document.getElementById("statsPersonToggle");
  const statsJumpDate = document.getElementById("statsJumpDate");
  let statsAnchor = new Date();
  let statsPersonView = "Razem";

  function periodBounds(type, anchor) {
    const d = new Date(anchor); d.setHours(0, 0, 0, 0);
    if (type === "day") return { start: d, end: d };
    if (type === "week") { const start = mondayOf(d); return { start, end: addDays(start, 6) }; }
    if (type === "month") return { start: new Date(d.getFullYear(), d.getMonth(), 1), end: new Date(d.getFullYear(), d.getMonth() + 1, 0) };
    if (type === "quarter") { const q = Math.floor(d.getMonth() / 3); return { start: new Date(d.getFullYear(), q * 3, 1), end: new Date(d.getFullYear(), q * 3 + 3, 0) }; }
    return { start: new Date(d.getFullYear(), 0, 1), end: new Date(d.getFullYear(), 11, 31) };
  }
  function shiftPeriod(type, anchor, dir) {
    const d = new Date(anchor);
    if (type === "day") return addDays(d, dir);
    if (type === "week") return addDays(d, 7 * dir);
    if (type === "month") { d.setDate(1); d.setMonth(d.getMonth() + dir); return d; }
    if (type === "quarter") { d.setDate(1); d.setMonth(d.getMonth() + 3 * dir); return d; }
    d.setDate(1); d.setFullYear(d.getFullYear() + dir); return d;
  }
  function formatPeriodLabel(type, bounds) {
    if (type === "day") return `${DAY_NAMES_FULL[bounds.start.getDay()]}, ${bounds.start.getDate()} ${MONTHS_GENITIVE[bounds.start.getMonth()]} ${bounds.start.getFullYear()}`;
    if (type === "week") return formatRangeLabel(bounds.start);
    if (type === "month") return `${MONTHS_FULL[bounds.start.getMonth()]} ${bounds.start.getFullYear()}`;
    if (type === "quarter") return `Q${Math.floor(bounds.start.getMonth() / 3) + 1} ${bounds.start.getFullYear()}`;
    return `${bounds.start.getFullYear()}`;
  }
  function periodKey(type, bounds, person) { return `${type}|${isoDate(bounds.start)}|${person}`; }

  function computeStats(bounds, personFilter) {
    const dishCounts = new Map(); // recipeId -> count
    const ingredientTotals = new Map(); // name -> grams
    const macros = { kcal: 0, protein: 0, fat: 0, carbs: 0 };
    let mealCount = 0;
    for (let d = new Date(bounds.start); d <= bounds.end; d = addDays(d, 1)) {
      const dayMeals = weekPlan[isoDate(d)];
      if (!dayMeals) continue;
      Object.entries(dayMeals).forEach(([key, entry]) => {
        const person = key.split("|")[1];
        if (personFilter !== "Razem" && person !== personFilter) return;
        const r = getRecipe(entry.id);
        if (!r) return;
        const portions = entry.portions || 1;
        mealCount++;
        dishCounts.set(r.id, (dishCounts.get(r.id) || 0) + 1);
        macros.kcal += r.kcal * portions;
        macros.protein += r.protein * portions;
        macros.fat += r.fat * portions;
        macros.carbs += r.carbs * portions;
        r.ingredients.forEach(ing => {
          ingredientTotals.set(ing.name, (ingredientTotals.get(ing.name) || 0) + ing.grams * portions);
        });
      });
    }
    const topDishes = Array.from(dishCounts.entries())
      .map(([id, count]) => ({ name: getRecipe(id)?.name || "?", count }))
      .sort((a, b) => b.count - a.count).slice(0, 6);
    const topIngredients = Array.from(ingredientTotals.entries())
      .map(([name, grams]) => ({ name, grams }))
      .sort((a, b) => b.grams - a.grams).slice(0, 10);
    return { mealCount, macros, topDishes, topIngredients };
  }

  function svgDonut(segments) {
    const style = getComputedStyle(document.documentElement);
    const colors = segments.map(s => style.getPropertyValue(s.colorVar).trim());
    const total = segments.reduce((s, x) => s + x.value, 0) || 1;
    let angle = -90;
    const r = 58, cx = 70, cy = 70;
    let paths = "";
    segments.forEach((seg, i) => {
      const frac = seg.value / total;
      const sweep = Math.max(frac * 360, total > 0 && seg.value > 0 ? 0.5 : 0);
      const large = sweep > 180 ? 1 : 0;
      const a1 = angle * Math.PI / 180, a2 = (angle + sweep) * Math.PI / 180;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      if (seg.value > 0) paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${colors[i]}" />`;
      angle += sweep;
    });
    const bgColor = style.getPropertyValue("--bg-raised").trim();
    return `<svg class="chart-svg" viewBox="0 0 140 140" role="img" aria-label="Wykres kołowy makroskładników">${paths}<circle cx="${cx}" cy="${cy}" r="${r * 0.56}" fill="${bgColor}" /></svg>`;
  }

  function rankListHtml(items, valueLabel) {
    if (!items.length) return '<div class="empty-state">Brak danych w tym okresie.</div>';
    const max = Math.max(...items.map(x => x.value)) || 1;
    return `<ul class="rank-list">${items.map((x, i) => `
      <li>
        <span class="rk-num">${i + 1}.</span>
        <span class="rk-name">${escapeHtml(x.name)}</span>
        <span class="rk-bar-wrap"><span class="rk-bar" style="width:${Math.round((x.value / max) * 100)}%"></span></span>
        <span class="rk-val tabular">${valueLabel(x.value)}</span>
      </li>`).join("")}</ul>`;
  }

  function renderStats() {
    const type = statsPeriodType.value;
    const bounds = periodBounds(type, statsAnchor);
    statsRangeLabel.textContent = formatPeriodLabel(type, bounds);
    statsJumpDate.value = isoDate(statsAnchor);
    const stats = computeStats(bounds, statsPersonView);
    const pKey = periodKey(type, bounds, statsPersonView);
    const custom = customStats[pKey] || [];

    const macroKcalFromParts = stats.macros.protein * 4 + stats.macros.fat * 9 + stats.macros.carbs * 4;
    const donut = svgDonut([
      { value: stats.macros.protein * 4, colorVar: "--accent" },
      { value: stats.macros.fat * 9, colorVar: "--spice" },
      { value: stats.macros.carbs * 4, colorVar: "--chart3" },
    ]);

    statsGrid.innerHTML = `
      <div class="stat-card">
        <h3>Posiłki w tym okresie</h3>
        <div class="stat-headline">${stats.mealCount}<span class="unit">zaplanowanych</span></div>
        <div class="stat-subrow">
          <div>Suma kalorii<strong>${Math.round(stats.macros.kcal)} kcal</strong></div>
        </div>
      </div>
      <div class="stat-card">
        <h3>Wartości odżywcze razem</h3>
        <div class="stat-subrow" style="margin-top:0;">
          <div>Białko<strong>${Math.round(stats.macros.protein)} g</strong></div>
          <div>Tłuszcz<strong>${Math.round(stats.macros.fat)} g</strong></div>
          <div>Węglowodany<strong>${Math.round(stats.macros.carbs)} g</strong></div>
        </div>
        ${macroKcalFromParts > 0 ? `
          <div style="display:flex;align-items:center;gap:18px;margin-top:14px;">
            ${donut}
            <div class="chart-legend" style="margin-top:0;flex-direction:column;gap:8px;">
              <span><i style="background:var(--accent)"></i>Białko ${Math.round(stats.macros.protein * 4 / macroKcalFromParts * 100)}%</span>
              <span><i style="background:var(--spice)"></i>Tłuszcz ${Math.round(stats.macros.fat * 9 / macroKcalFromParts * 100)}%</span>
              <span><i style="background:var(--chart3)"></i>Węgl. ${Math.round(stats.macros.carbs * 4 / macroKcalFromParts * 100)}%</span>
            </div>
          </div>` : ""}
      </div>
      <div class="stat-card">
        <h3>Najczęściej przygotowywane danie</h3>
        ${rankListHtml(stats.topDishes.map(x => ({ name: x.name, value: x.count })), v => `${v}×`)}
      </div>
      <div class="stat-card wide">
        <h3>Najczęściej używane składniki</h3>
        ${rankListHtml(stats.topIngredients.map(x => ({ name: x.name, value: x.grams })), v => `${Math.round(v)} g`)}
      </div>
      <div class="stat-card wide">
        <h3>Statystyki własne</h3>
        <div id="customStatsList">${custom.length ? custom.map(cs => `
          <div class="custom-stat-row" data-id="${cs.id}">
            <span>${escapeHtml(cs.label)}</span>
            <span class="tabular" style="display:flex;align-items:center;gap:8px;">${escapeHtml(cs.value)}<button class="cs-del" type="button" aria-label="Usuń statystykę">✕</button></span>
          </div>`).join("") : '<div class="empty-state">Brak własnych statystyk w tym okresie.</div>'}</div>
        <div class="add-stat-form">
          <input type="text" class="cs-label" id="csLabel" placeholder="Nazwa (np. Litry wody)" />
          <input type="text" class="cs-value" id="csValue" placeholder="Wartość" />
          <button class="btn primary" id="csAddBtn">+ Dodaj statystykę</button>
        </div>
      </div>
    `;
    statsGrid.querySelectorAll(".cs-del").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.closest(".custom-stat-row").dataset.id;
        customStats[pKey] = (customStats[pKey] || []).filter(x => String(x.id) !== id);
        save(LS_CUSTOM_STATS, customStats);
        renderStats();
      });
    });
    const csAddBtn = document.getElementById("csAddBtn");
    csAddBtn.addEventListener("click", () => {
      const label = document.getElementById("csLabel").value.trim();
      const value = document.getElementById("csValue").value.trim();
      if (!label || !value) { showToast("Podaj nazwę i wartość statystyki."); return; }
      customStats[pKey] = customStats[pKey] || [];
      customStats[pKey].push({ id: Date.now() + Math.random(), label, value });
      save(LS_CUSTOM_STATS, customStats);
      renderStats();
    });
  }

  statsPeriodType.addEventListener("change", renderStats);
  statsJumpDate.addEventListener("change", () => {
    if (!statsJumpDate.value) return;
    statsAnchor = new Date(statsJumpDate.value + "T00:00:00");
    renderStats();
  });
  document.getElementById("statsPrevBtn").addEventListener("click", () => { statsAnchor = shiftPeriod(statsPeriodType.value, statsAnchor, -1); renderStats(); });
  document.getElementById("statsNextBtn").addEventListener("click", () => { statsAnchor = shiftPeriod(statsPeriodType.value, statsAnchor, 1); renderStats(); });
  statsPersonToggle.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      statsPersonView = btn.dataset.person;
      statsPersonToggle.querySelectorAll("button").forEach(b => b.setAttribute("aria-selected", String(b === btn)));
      renderStats();
    });
  });

  renderGrid();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
