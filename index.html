oda","grams":100,"measure":"szklanka"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Chili w proszku","grams":2,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":34528191,"name":"Tortilla a'la kebab","description":"1. Mięso mielone dopraw solą, pieprzem i papryką oraz czosnkiem. Usmaż je na oliwie. \n2. Majonez wymieszaj z keczupem i rozsmaruj na tortilli. \n3. Dodaj porwaną sałatę, pokrojone warzywa oraz usmażone mięso.\n4. Tortillę zwiń w rulon i zgrilluj z obu stron (możesz też użyć tostera/opiekacza).\n5. Jogurt wymieszaj z przeciśniętym przez praskę czosnkiem oraz posiekanym koperkiem. Dopraw solą i pieprzem. Wrapa podawaj z sosem czosnkowym. \n6. Warzywa, które się nie zmieszczą do tortilli zjedz osobno.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/fH4FhF6SrmnYqoTx0Af1VOF94RV72vKARjFQF70h.jpg","kcal":575.4,"protein":43.2,"fat":19.4,"carbs":59.5,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":90,"measure":"sztuka"},{"name":"Sałata lodowa","grams":20,"measure":"garść"},{"name":"Ketchup","grams":10,"measure":"łyżeczka"},{"name":"Majonez wegański","grams":10,"measure":"łyżeczka"},{"name":"Mięso mielone z indyka","grams":100,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżka"},{"name":"Papryka żółta","grams":75,"measure":"mała sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}]},{"id":61928719,"name":"Tortilla pełnoziarnista z serkiem, łososiem wędzonym i warzywami","description":"1. Tortillę posmaruj serkiem. \n2. Dodaj szpinak lub dowolną sałatę, którą masz w lodówce, plastry łososia oraz pokrojone warzywa. \n3. Posyp pestkami dyni i zwiń wszystko w rulon.\n4. Dodatkowo zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/Cqsbi9vRrJKjSUVASq0gXBR38LOHdyAEXQZV2vXQ.jpg","kcal":500.7,"protein":27.4,"fat":18.5,"carbs":60.8,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Serek naturalny","grams":45,"measure":"łyżeczka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Łosoś wędzony","grams":50,"measure":"plaster"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Kiwi","grams":150,"measure":"sztuka"}]},{"id":47967524,"name":"Tradycyjne spaghetti bolognese","description":"1. Makaron ugotuj zgodnie z instrukcją.\n2. Na oliwie podduś mielone mięso z solą i pieprzem.\n3. Kiedy się zarumieni dodaj pokrojone w drobną kostkę marchewkę i seler naciowy. Zostaw na ok. 5-10 minut aż zmiękną.\n4. Następnie dodaj passatę, resztę przypraw i szczyptę erytrolu. Całość dokładnie wymieszaj i zostaw na małym ogniu na 15-20 minut.\n5. Podawaj z ugotowanym makaronem, posypane parmezanem i natką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/T3oBiWmbNtaDF8ygrHjOjSitpdmYOLO8QYSDILl3.jpg","kcal":614,"protein":36.0,"fat":21.6,"carbs":70.4,"ingredients":[{"name":"Makaron spaghetti pełnoziarnisty","grams":75,"measure":"g"},{"name":"Passata pomidorowa","grams":150,"measure":"szklanka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Wołowina mielona 15% tłuszczu","grams":75,"measure":"porcja"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Seler naciowy","grams":45,"measure":"sztuka"},{"name":"Zioła prowansalskie przyprawa","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Ser Parmezan","grams":8,"measure":"łyżeczka"}]},{"id":53516463,"name":"Tropikalna owsianka z kokosem i mango","description":"1. Do rondelka wsyp płatki, połowę wiórków kokosowych i erytrol, a następnie zalej całość mlekiem i dobrze wymieszaj.\n2. Owsiankę gotuj na małym ogniu przez kilka minut, do momentu zgęstnienia masy.\n3. Gotową owsiankę wymieszaj z odżywką i przełóż do miseczki. Na wierzch dodaj pozostałe wiórki oraz pokrojone w kostkę mango.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/Pg01nOBzOsY7p58cwdjU914tBF7gek4WYhjkb4ch.jpg","kcal":512.2,"protein":31.9,"fat":12.6,"carbs":69.8,"ingredients":[{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Wiórki kokosowe","grams":6,"measure":"łyżeczka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":20,"measure":"miarka"},{"name":"Mango","grams":135,"measure":"plaster"}]},{"id":53516447,"name":"Truskawkowa nocna owsianka z czekoladą","description":"1. Truskawki rozmroź, a następnie zmiksuj wraz z erytrolem na mus. \n2. Płatki owsiane wymieszaj z nasionami chia, mlekiem, połową skyru i zmiksowanymi truskawkami.\n3. Przykryj i wstaw do lodówki, najlepiej na całą noc. \n4. Rano na wierzch dodaj pozostały skyr i posiekaną czekoladę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/OzMcaRrDhP2Ed1fA42AjNaE3nogAuJhpy1tHGJnH.jpg","kcal":503.9,"protein":29.8,"fat":14.7,"carbs":64.6,"ingredients":[{"name":"Płatki owsiane","grams":50,"measure":"łyżka"},{"name":"Nasiona chia","grams":5,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":120,"measure":"szklanka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Truskawki mrożone","grams":100,"measure":"garść"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":18,"measure":"kostka"}]},{"id":53516467,"name":"Twarogowa pieczona owsianka z jagodami i kruszonką","description":"1. Zagnieć zimne masło, erytrol i mąkę na kruszonkę i wstaw na chwilę do lodówki. \n2. Twaróg zmiksuj z jajkiem, mlekiem, proszkiem do pieczenia, cynamonem i erytrolem na gładką masę. Dodaj płatki owsiane i wymieszaj. Przełóż do naczynia żaroodpornego. \n3. Na wierzch dodaj jagody i przygotowaną wcześniej, zimną kruszonkę. \n4. Piecz ok. 20 minut w 165 stopniach w airfryerze lub ok. 30 minut w 180 stopniach w piekarniku.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/rY2xF4d4BkgNIpqGOmoxEKL97jE0yLSuq6CxINlT.jpg","kcal":490.2,"protein":32.7,"fat":16.9,"carbs":53.0,"ingredients":[{"name":"Masło","grams":10,"measure":"porcja"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":15,"measure":"łyżeczka"},{"name":"Ser twarogowy chudy","grams":90,"measure":"plaster"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":40,"measure":"szklanka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Jagody mrożone","grams":60,"measure":"garść"}]},{"id":34528272,"name":"Twarogowe malinianki z kruszonką","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół). \n2. Twaróg zagnieć wraz z jajkami, mąką, erytrolem (20 g) i proszkiem do pieczenia na ciasto (będzie przypinać ciasto na kluski leniwe - będzie dość klejące). \n3. Ciasto podziel na 4 części i z każdej za pomocą zwilżonych dłoni uformuj kulką, a następnie ułóż ją na blaszce wyłożonej papierem do pieczenia i spłaszcz pozostawiając bardziej wypukłe brzegi.\n4. Do środka każdej bułeczki włóż maliny. \n5. Z masła, mąki i pozostałego erytrolu (10 g) zagnieć w palcach kruszonkę. Posyp nią bułeczki. \n6. Piecz ok. 25-30 minut.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/HB8LBAQzCbmuIcj1c7M45er5HhS5LOOt0jRtpm3w.jpg","kcal":1187.4,"protein":81.9,"fat":32.4,"carbs":141.6,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":150,"measure":"łyżeczka"},{"name":"Erytrytol","grams":30,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Masło","grams":10,"measure":"łyżeczka"},{"name":"Mąka orkiszowa jasna","grams":20,"measure":"łyżeczka"}]},{"id":59199269,"name":"Twarożek grani z ogórkiem małosolnym i koperkiem","description":"1. Szczypiorek i koperek posiekaj, a ogórki pokrój w kostkę.\n2. Twarożek wymieszaj z warzywami, przyprawami i posyp pestkami dyni.\n3. Całość zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/DZD8kRUDdhSTiAYI1YBL4l8T1DPerxhJrKMaScUA.jpg","kcal":512.2,"protein":30.8,"fat":17.2,"carbs":60.1,"ingredients":[{"name":"Twarożek grani","grams":150,"measure":"duże opakowanie"},{"name":"Ogórek małosolny","grams":130,"measure":"średnia sztuka"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Pestki dyni","grams":15,"measure":"łyżka"}]},{"id":43687114,"name":"Udon w sosie orzechowym z brokułami","description":"1. Mięso pokrój w paseczki i wymieszaj z łyżeczką sosu sojowego, czosnkiem granulowanym i pieprzem. \n2. Na patelni rozgrzej oliwę i podsmaż mięso aż się zarumieni i straci surowość. \n3. W między czasie ugotuj makaron we wrzątku według czasu podanego przez producenta oraz ugotuj różyczki brokuła (jeśli będzie Ci wygodniej możesz zagotować wodę w garnku, wrzucić brokuły na ok. 5-7 minut i dorzucić do nich makaron na tyle minut, ile zaleca producent). \n4. Pozostały sos sojowy wymieszaj z masłem orzechowym, przeciśniętym ząbkiem czosnku, sosem sriracha, syropem klonowym, mąką ziemniaczaną i zimną wodą. Posiekaj orzechy nerkowca. \n5. Na patelnię do mięsa dodaj makaron wraz z brokułami, sos oraz posiekane orzechy. Wymieszaj wszystko razem i gotuj jeszcze przez chwilę aż sos lekko zgęstnieje. \n6. Makaron przełóż na talerze i posyp posiekanym szczypiorkiem oraz sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/wbX27wC7uCxZ6KUh7u92vGZHcZvhsJpvN6RzLIJl.jpg","kcal":571.0,"protein":48.0,"fat":19.6,"carbs":51.5,"ingredients":[{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Sos sojowy","grams":5,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Makaron udon","grams":100,"measure":"g"},{"name":"Brokuł","grams":125,"measure":"sztuka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Masło orzechowe","grams":10,"measure":"łyżka"},{"name":"Woda","grams":25,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sos Sriracha","grams":3,"measure":"łyżeczka"},{"name":"Orzechy nerkowca","grams":8,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Mąka ziemniaczana","grams":4,"measure":"łyżeczka"}]},{"id":34528199,"name":"Viralowa pizza z serka wiejskiego","description":"1. Piekarnik rozgrzej do 180 stopni (góra-dół).\n2. Serek wiejski wymieszaj z jajkiem i mąką na jednolitą masę. Wylej na blaszkę wyłożoną papierem do pieczenia, uformuj w okrąg (ale nie za płaski) i wstaw do piekarnika na 10-15 minut.\n3. Po tym czasie posmaruj spód passatą, dopraw oregano i na wierzch dodaj starta mozzarellę. Zapiekaj ponownie 10-15 minut. \n4. Po upieczeniu udekoruj pizzę pokrojonymi pomidorkami, parmezanem oraz rukolą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/BDsYnIJdOeIe0KRJHyR2ZPln4mu21T7vr8InRgQ8.jpg","kcal":499.7,"protein":49.1,"fat":19.6,"carbs":32.1,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":30,"measure":"łyżeczka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Passata pomidorowa","grams":45,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"}]},{"id":59199270,"name":"Waniliowa jaglanka z truskawkami i białą czekoladą","description":"1. Płatki jaglane ugotuj na mleku z dodatkiem erytrolu i ekstraktu waniliowego.\n2. Gotową jaglankę przełóż do miseczki, dodaj jogurt, pokrojone owoce, posiekane migdały i białą czekoladę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/kcCJYJlyatZXMCAipNEwcBkDfdMblz3MfIklzFdd.jpg","kcal":499.6,"protein":26.6,"fat":14.0,"carbs":68.1,"ingredients":[{"name":"Płatki jaglane","grams":45,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Ekstrakt waniliowy","grams":2,"measure":"kropla"},{"name":"Skyr waniliowy","grams":150,"measure":"łyżka"},{"name":"Truskawki","grams":100,"measure":"garść"},{"name":"Migdały","grams":15,"measure":"łyżeczka"},{"name":"Czekolada biała","grams":5,"measure":"kawałek"}]},{"id":38873219,"name":"Waniliowe naleśniki z prażonymi jabłkami","description":"1. Mąkę, mleko, jajko, wodę i proszek do pieczenia zmiksuj na gładką masę.\n2. Naleśniki smaż na bardzo dobrze rozgrzanej patelni z odrobiną oliwy.\n3. Jabłko uduś z odrobiną wody, erytrolem, cynamonem i sokiem z cytryny.\n4. Gotowe naleśniki posmaruj skyrem waniliowym, dodaj prażone jabłko, płatki migdałów i zawiń w trójkąty lub rulony.\n5. Naleśniki możesz dodatkowo posypać większą ilością cynamonu, jeśli lubisz.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/iVPdHkAth9roc29SprlWFgZokg4B4mZZ4FXhgczU.jpg","kcal":572.4,"protein":30.7,"fat":17.6,"carbs":75.9,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Woda","grams":30,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Skyr waniliowy (Pilos)","grams":150,"measure":"łyżka"},{"name":"Jabłko","grams":185,"measure":"mała sztuka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"szczypta"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}]},{"id":41144628,"name":"Warstwowa sałatka z cieciorką i tuńczykiem","description":"1. Ciecierzycę odcedź i przepłucz pod wodą. Tuńczyka odcedź z zalewy.\n2. Ogórka i paprykę pokrój w kostkę, a cebulę czerwoną w piórka.\n4. Na dno słoika wlej oliwę i sok z cytryny. Następnie dodaj pokrojoną cebulę.\n5.Kolejno dodaj cieciorkę, paprykę, tuńczyka, ogórka oraz roszponkę.\n6. Dodaj szczyptę soli i pieprzu oraz pestki słonecznika.\n7. Sałatkę zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/Qcvcp3i1T1af82VLk2pPbGsMK7juLAQ5TXeEXcxm.jpg","kcal":474.0,"protein":32.3,"fat":20.1,"carbs":41.4,"ingredients":[{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Papryka czerwona","grams":75,"measure":"mała sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Cebula czerwona","grams":40,"measure":"plaster"},{"name":"Nasiona słonecznika","grams":12,"measure":"łyżeczka"},{"name":"Tuńczyk w puszce w sosie własnym","grams":80,"measure":"mała puszka"},{"name":"Ciecierzyca w zalewie","grams":60,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Chleb żytni","grams":35,"measure":"kromka"}]},{"id":53516450,"name":"Wiosenne kanapki z szybką pastą jajeczną","description":"1. Jajko ugotuj na półmiękko lub na twardo. Obierz i rozgnieć widelcem. Wymieszaj z majonezem, musztardą, posiekanym szczypiorkiem, solą i pieprzem. \n2. Pastę nałóż na pieczywo. Na wierzch dodaj pokrojone rzodkiewki i kiełki.\n3. Dodatkowo zjedz pokrojonego ogórka.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/l9WUGuUxPOjZZnsEFrPPpAGymeFK5FU1uorEjDwI.jpg","kcal":494.6,"protein":23.4,"fat":18.8,"carbs":58.1,"ingredients":[{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Majonez light","grams":15,"measure":"łyżka"},{"name":"Musztarda","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Kiełki mix","grams":16,"measure":"łyżka"}]},{"id":61928708,"name":"Wiosenne risotto z botwinką","description":"1. Cebulę pokrój w kosteczkę, a buraczki z botwinki zetrzyj na tarce. \n2. W garnku z grubym dnem lub na większej patelni rozgrzej oliwę i zeszklij cebulę. Dodaj pokrojonego kurczaka w paseczki, przypraw sola i pieprzem i podsmaż aż mięso straci surowość. Dorzuć buraczki, drobno posiekany czosnek  i smaż jeszcze przez chwilę . Następnie dodaj suchy ryż i smaż do momentu aż ryż stanie się szklisty. \n3. Do garnka dodaj pokrojone łodygi i liście botwinki i zacznij dolewać stopniowo wodę (lub bulion). \n4. Gotuj na wolnym ogniu do momentu aż ryż będzie miękki a risotto będzie miało kremową konsystencję. Na samym końcu dodaj zimne masło i parmezan i wszystko razem wymieszaj. Dopraw do smaku solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/jujUYGO2ybzxADFuSUoreaSk7weoLE6fkGWxihOx.jpg","kcal":573.3,"protein":40.9,"fat":18.6,"carbs":59.8,"ingredients":[{"name":"Ryż arborio","grams":60,"measure":"łyżka"},{"name":"Kurczak pierś","grams":120,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Botwinka","grams":140,"measure":"pęczek"},{"name":"Masło","grams":7,"measure":"łyżeczka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"}]},{"id":59199280,"name":"Wiosenny bowl ze szparagami","description":"1. Piekarnik nagrzej do 200 stopni (termoobieg).\n2. Ziemniaki umyj, wyszoruj skórkę, (większe pokrój w ćwiartki) i wrzuć do miski. Dodaj połowę oliwy, szczyptę soli, czosnku i papryki słodkiej.\n3. Całość dokładnie wymieszaj i odstaw na 5 minut, a następnie ułóż na blaszce wyłożonej papierem do pieczenia i wstaw do nagrzanego piekarnika na około 30-35 minut.\n4. Pod koniec pieczenia obok ziemniaków dodaj umyte szparagi, skrop je pozostałą częścią oliwy i posyp szczyptą soli. Zostaw na 7-8 minut.\n5. W międzyczasie serek wiejski zmiksuj na gładką masę. Rozsmaruj go na dnie głębokiego talerza, w którym chcesz podać bowla. \n6. Awokado pokrój w paseczki.\n7. Do miski z serkiem, włóż roszponkę, dodaj upieczone ziemniaki ze szparagami i pokrojone awokado. Całość posyp słonecznikiem i dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/UsuVCcPpkY3gJKrxJcrUdvMlSR4OdNKh8r3nOFGg.jpg","kcal":503.4,"protein":27,"fat":22.5,"carbs":55.1,"ingredients":[{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Awokado","grams":70,"measure":"sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Nasiona słonecznika","grams":4,"measure":"łyżeczka"}]},{"id":56307448,"name":"Wiosenny serek wiejski z rzodkiewką i ogórkiem","description":"1. Serek przełóż do miseczki.\n2. Dodaj pokrojone rzodkiewki i ogórka oraz posiekany szczypiorek. Posyp pestkami i dopraw pieprzem.\n3. Zjedz z pieczywem posmarowanym masłem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/zUYjZmKOsAXsGc4Ao4gMkZ6cipgayaPyPtRug8nI.jpg","kcal":506.2,"protein":29.5,"fat":17.1,"carbs":59.8,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"},{"name":"Masło","grams":5,"measure":"g"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":56307458,"name":"Wiosenny stir-fry z wołowiną i groszkiem cukrowym","description":"1. Makaron ugotuj zgodnie z instrukcją.\n2. Cebulę pokrój w piórka, paprykę i marchewkę w paseczki, a groszek umyj i pozbaw końcówek i włókien.\n3. Na patelni rozgrzej olej sezamowy i podsmaż cebulę. Dodaj mieloną wołowinę oraz przeciśnięty czosnek. Przypraw solą, pieprzem oraz papryką. Smaż do momentu aż mięso straci surowość.\n4. Dodaj na patelnię marchewkę, smaż razem przez chwilę, a następnie dodaj paprykę oraz groszek. \n5. Kiedy warzywa będą już al dente dodaj ugotowany makaron, sos sojowy, sok z limonki, syrop klonowy oraz chili. Wszystko razem wymieszaj i przełóż na talerz. \n6. Gotowy stir fry posyp posiekanym szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/YSWuf1R1LiCvDPX7wvBTtbKytB3oJztxCirsVbgk.jpg","kcal":579.8,"protein":34.1,"fat":19.0,"carbs":76.8,"ingredients":[{"name":"Makaron soba","grams":65,"measure":"szklanka"},{"name":"Olej sezamowy","grams":5,"measure":"łyżka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Wołowina mielona","grams":100,"measure":"porcja"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"łyżeczka"},{"name":"Marchew","grams":50,"measure":"mała sztuka"},{"name":"Papryka żółta","grams":60,"measure":"średnia sztuka"},{"name":"Groszek cukrowy","grams":55,"measure":"garść"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}]},{"id":36694537,"name":"Wrap low carb z cukinii z serkiem i łososiem","description":"1. Piekarnik rozgrzej do 200 stopni. \n2. Cukinię pokrój w plastry (dość cienkie) i ułóż je na blaszce wyłożonej papierem do pieczenia w taki sposób, aby zachodziły na siebie i utworzyły spójny prostokąt. Mozzarellę odciśnij z nadmiaru płynu za pomocą ręcznika papierowego, zetrzyj na tarce i rozsyp wraz z parmezanem równomiernie na cukinii. Piecz 20-25 minut aż ser się rozpuści, a cukinia zarumieni. Wrapa po upieczeniu pozostaw do wystudzenia.\n3. Następnie posmaruj serkiem, ułóż roszponkę, kawałki łososia oraz plastry ogórka.\n4. Zwiń tak, jak tortillę lub złóż na pół.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/DqAABZOl5Vpcf44CUCBgmafnqRDG4g68iif1A6BE.jpg","kcal":482.8,"protein":55.5,"fat":25.6,"carbs":10.3,"ingredients":[{"name":"Cukinia","grams":150,"measure":"plaster"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Twarożek grani","grams":100,"measure":"duże opakowanie"},{"name":"Łosoś wędzony na gorąco","grams":75,"measure":"g"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}]},{"id":47967522,"name":"Wrap z awokado i pastą z tuńczyka","description":"1. Tuńczyka odsącz z zalewy i wymieszaj z serkiem, majonezem i posiekanym szczypiorkiem.\n2. Tortillę posmaruj przygotowaną pastą. Dodaj roszponkę, pokrojone awokado i pestki dyni.\n3. Wrapa zawiń w rulon (zawijając końce do środka). Możesz podsmażyć z obu stron na suchej patelni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/GPhHohHm1HPWV5pfhe2qSBSQ40tYq5cfmu1xzJUl.jpg","kcal":503.5,"protein":34.9,"fat":25.0,"carbs":36.6,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Tuńczyk w puszce w sosie własnym","grams":90,"measure":"łyżka"},{"name":"Majonez light","grams":15,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":15,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Awokado","grams":50,"measure":"sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":34528183,"name":"Wrap z grillowanym serem halloumi","description":"1. Tortillę podgrzej na suchej patelni, a następnie zdejmij ją i na ten samej patelni zgrilluj plastry sera halloumi.\n2. Tortillę posmaruj serkiem. Dodaj rukolę, pokrojone warzywa oraz przyprawy.\n3. Tortillę zwiń w rulonik lub trójkąt i zgrilluj na odrobinie oliwy (możesz też użyć tostera/opiekacza).\n4. Warzywa, które się nie zmieszczą do tortilli zjedz osobno.\n5. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/mwDeYiSEklBV1hdQntVloLisrD1dcXDMmQLTALJE.jpg","kcal":497.7,"protein":25.1,"fat":23.8,"carbs":49.8,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Ser Halloumi","grams":50,"measure":"g"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Serek naturalny (Bieluch)","grams":25,"measure":"łyżka"},{"name":"Truskawki","grams":200,"measure":"garść"}]},{"id":46076310,"name":"Wrap z hummusem, serem i warzywami","description":"1. Tortillę posmaruj hummusem.\n2. Dodaj szpinak, ser i pokrojone warzywa.\n3. Tortillę zwiń w rulonik lub trójkąt i zgrilluj na ten samej patelni (możesz też użyć tostera/opiekacza).\n4. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/nnInN0qkFDOj6i1J7HDoS0C4QYLiTADtDVvWTEhH.jpg","kcal":497.9,"protein":28.3,"fat":21.4,"carbs":52.7,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Hummus","grams":60,"measure":"łyżeczka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Papryka czerwona","grams":75,"measure":"mała sztuka"},{"name":"Ser żółty Active Protein (Ryki)","grams":51,"measure":"plaster"},{"name":"Kiwi","grams":75,"measure":"sztuka"}]},{"id":56307465,"name":"Wrap z jajecznicą ze szparagami, suszonymi pomidorami i parmezanem","description":"1. Szalotkę pokrój w drobną kostkę, a szparagi pozbaw twardych końcówek i pokrój w krążki. Rozgrzej patelnię i dodaj na nią pokrojone suszone pomidory w oliwie. Podsmaż warzywa wraz z suszonymi pomidorami. Dodaj szpinak i podsmaż do momentu aż \"zwiędnie\".\n2. Następnie wbij jajka i usmaż jajecznicę z warzywami.\n3. Na środek tortilli wyłóż przygotowaną jajecznicę, posyp parmezanem.\n4. Tortillę zwiń tak, jak krokieta, a następnie połóż na suchej patelni z jednej i z drugiej strony, aż się zarumieni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/tern0XFYoezdmiK3savTKx55ZvnWfNo09t0u5c62.jpg","kcal":493.0,"protein":28.9,"fat":23.8,"carbs":44.3,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Pomidory suszone w zalewie","grams":30,"measure":"g"},{"name":"Szparagi","grams":100,"measure":"g"}]},{"id":56307452,"name":"Wrap z omletem i łososiem wędzonym","description":"1. Jajka wbij do miseczki, a następnie roztrzep widelcem razem z przyprawami.\n2. Na patelnię z rozgrzaną oliwą wylej przygotowaną masę jajeczną, a na nią połóż po chwili tortillę.\n3. Całość smaż na małym ogniu przez kilka minut. Kiedy jajka się całkowicie zetną, to zamaszystym ruchem przewróć tortillę na drugą stronę i smaż jeszcze przez chwilę \n4. Przełóż na talerz, dodaj pokrojone warzywa, łososia, pestki oraz sałatę.\n5. Tortillę z omletem zawiń w rulon.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/3/1eMgGr9WrsLTb2X0RA684MJWPnCW55Huy6Kih1gA.jpg","kcal":506.3,"protein":32.8,"fat":26.6,"carbs":35.2,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Sałata zielona","grams":10,"measure":"liść"},{"name":"Łosoś wędzony","grams":50,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}]},{"id":59199271,"name":"Wrap z omletem, szparagami i suszonymi pomidorami","description":"1. Szparagi pozbaw twardych końcówek, pokrój na 3-4 części i wrzuć na lekko osolony wrzątek na 3-4 minuty. Odcedź i przelej zimną wodą - wówczas zachowają ładny kolor. \n2. Jajka wbij do miseczki, a następnie roztrzep widelcem razem z przyprawami.\n3. Na patelnię z rozgrzaną oliwą wylej przygotowaną masę jajeczną (masę jajeczną rozprowadź po całej patelni). Kiedy jajka delikatnie się zetną od spodu połóż na nich tortillę i smaż tak długo aż omlet całkiem się zetnie. Przewróć energicznym ruchem na drugą stronę i smaż jeszcze chwilkę.\n4. Suszone pomidory pokrój w paseczki. \n5. Na tortillę z omletem nałóż roszponkę, szparagi i suszone pomidory. Wszystko zawiń w rulon.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/4/zyilI7aYTJt0zNHgJc1xs4RJdZxzcDtTcQM8pF2N.jpg","kcal":490.8,"protein":23.9,"fat":26.3,"carbs":44.7,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Szparagi","grams":125,"measure":"g"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Roszponka","grams":25,"measure":"garść"}]},{"id":36694523,"name":"Wrap z pastą jajeczną z awokado i łososiem","description":"1. Jajko ugotuj na twardo. Po przestudzeniu pokrój w drobną kostkę lub zetrzyj na tarce o grubych oczkach. \n2. Łososia wędzonego oraz awokado przełóż do miseczki i rozdrobnij za pomocą widelca. Dodaj rozdrobnione jajko i posiekany szczypiorek. Pastę wymieszaj i dopraw solą i pieprzem.\n2. Tortillę posmaruj serkiem. Dodaj rukolę, pestki dyni oraz pastę.\n3. Wrapa zawiń w rulon (zawijając końce do środka). Przekrój na pół pod skosem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/w4cx6hdUQxWx0rcTxo6w6Rg6eczx3FtQ0RPHbMES.jpg","kcal":505.9,"protein":30.9,"fat":28.5,"carbs":34.5,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Serek naturalny","grams":25,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Łosoś wędzony na gorąco","grams":50,"measure":"opakowanie"},{"name":"Awokado","grams":35,"measure":"sztuka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"}]},{"id":46076311,"name":"Wrap z serka wiejskiego z szynką i warzywami","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Serek wiejski zmiksuj z jajkami i przyprawami na gładką masę i wylej ją na blaszkę wyłożoną papierem do pieczenia. \n3. Nadaj kształt okręgu lub prostokąta za pomocą łyżki. Nie rozsmarowuj ciasta zbyt cienko. \n4. Piecz ok. 20 minut. \n5. Gotowego wrapa pozostaw do przestudzenia. Następnie posmaruj serkiem, nałóż szpinak, posiekany szczypiorek, pokrojonego ogórka i plastry szynki. Posyp pestkami.\n6. Zwiń w rulon - tak, jak tortillę.\n7. Na deser zjedz owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/T33TQYXyln1g5wsEpPxtjoDuLxqshf5uy5pKJ8uo.jpg","kcal":501.6,"protein":44.4,"fat":21.4,"carbs":36.3,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Szynka z indyka","grams":45,"measure":"plaster"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"},{"name":"Pomarańcza","grams":160,"measure":"mała sztuka"}]},{"id":47967526,"name":"Wytrawne kluski leniwe z boczniakami","description":"1. Twaróg rozgnieć widelcem razem z jajkiem, przyprawami i szczyptą soli. Następnie dodaj mąkę i wszystko razem wymieszaj.\n2. Z powstałej masy zrób wałek, pokrój kluski i wrzuć je od razu do garnka z gotującą się wodą.\n3. Po wypłynięciu na wierzch, kluski zostaw jeszcze na 2-3 minuty, a następnie odcedź.\n4. Boczniaki pokrój na paski i obsmaż na oliwie. Przypraw sosem sojowym.\n5. Kluski leniwe podawaj z podsmażonymi grzybami i natką pietruszki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/RuxreCg4E2A3BUEzZKGhpR7gY2aTqdxkkGLEIUCD.jpg","kcal":585.3,"protein":44.8,"fat":21.2,"carbs":73.5,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":60,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ser twarogowy półtłusty","grams":100,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Kurkuma mielona","grams":1,"measure":"szczypta"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Boczniaki","grams":300,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sos sojowy","grams":15,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"}]},{"id":41144618,"name":"Wytrawne naleśniki ze szpinakiem, suszonymi pomidorami i szarpanym kurczakiem","description":"1. Mięso z kurczaka przełóż do garnka, zalej wodą, dodaj sól, liść laurowy, ziele angielskie i pieprz w ziarnach i ugotuj pierś do miękkości. \n2. Mąkę, mleko, jajko i proszek do pieczenia zmiksuj na gładką masę.\n3. Naleśniki smaż na bardzo dobrze rozgrzanej patelni z odrobiną oliwy.\n4. Szpinak podsmaż na pozostałej oliwie. Dodaj posiekane suszone pomidory. \n5. Pierś z kurczaka \"poszarp\" za pomocą dwóch widelców na długie włókna. Dodaj do szpinaku i wszystko dokładnie wymieszaj. Dopraw ewentualnie solą oraz pieprzem i czosnkiem granulowanym.\n6. Naleśniki nadziewaj przygotowanym farszem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/C39vUzXXnoLJZzEwxZcqRgHvj38UagpKgSwIuoAa.jpg","kcal":645.8,"protein":54.0,"fat":24.6,"carbs":54.4,"ingredients":[{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":100,"measure":"g"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":60,"measure":"sztuka"},{"name":"Kurczak pierś","grams":150,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"}]},{"id":41144613,"name":"Wytrawny placek z cukinii z łososiem wędzonym","description":"1. Cukinię zetrzyj na tarce i odciśnij z niej nadmiar wody. \n2. Jajko wymieszaj z mlekiem, przyprawami, mąką i cukinią.\n3. Na patelni rozgrzej odrobinę oliwy (jeśli masz taką w sprayu - sprawdzi się świetnie) i wylej masę. Smaż pod przykryciem aż boki będą już dobrze ścięte, a następnie przewróć na drugą stronę. \n4. Gotowy placek przełóż na talerz, posmaruj serkiem, dodaj kawałki wędzonego łososia, koperek, plasterki rzodkiewki i roszponkę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/KXTWc62XqeIGuF6G2FsWFDt8nr3gXA8QMeboOsXM.jpg","kcal":480.4,"protein":37.0,"fat":18.0,"carbs":43.7,"ingredients":[{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":60,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Łosoś wędzony na gorąco","grams":63,"measure":"opakowanie"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Rzodkiewka","grams":45,"measure":"sztuka"}]},{"id":36694528,"name":"Zapiekane bataty z warzywami, mięsem i serem","description":"1. Piekarnik rozgrzej do 200 stopni. Batata przekrój na pół, nakłuj za pomocą widelca i ułóż w naczyniu żaroodpornym. Piecz ok. godziny (aż będzie miękki).\n2. Cebulę, paprykę i cukinię pokrój w kostkę. Podsmaż warzywa wraz z mięsem na oliwie. Dodaj pomidory, dopraw solą, pieprzem, papryką oraz ziołami. \n3. Gotowy farsz wyłóż na połówki upieczonego batata, posyp serem i wstaw jeszcze do piekarnika do zapieczenia (aż ser się rozpuści).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/vGBe5MZUAbF8SlQIaaDr7og2CWTBfoJlwyXpdw84.jpg","kcal":588.3,"protein":53.6,"fat":14.1,"carbs":66.8,"ingredients":[{"name":"Batat","grams":250,"measure":"g"},{"name":"Mięso mielone z indyka","grams":130,"measure":"porcja"},{"name":"Cebula","grams":25,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Bazylia suszona","grams":1,"measure":"szczypta"},{"name":"Pomidory krojone w puszce","grams":100,"measure":"puszka"}]},{"id":51097583,"name":"Zapiekane naleśniki ze szpinakiem","description":"1. Jajko zmiksuj z mlekiem, mąką, oliwą i szczyptą soli. Ciasto odstaw na 10 minut. \n2. W tym czasie uduś na patelni szpinak z suszonymi pomidorami. Przypraw czosnkiem i pieprzem (nie dodawaj dużo soli, bo w farszu będzie feta, która jest bardzo słona). Pozostaw do lekkiego przestudzenia. \n3. Usmaż naleśniki bez tłuszczu. \n4. Do szpinaku dodaj rozdrobioną fetę i wymieszaj. \n5. Naleśniki nadziej farszem i zawiń jak krokiety. Ułóż w naczyniu żaroodpornym lub koszyczku airfryera. \n6. Passatę wymieszaj z oregano i dopraw solą i pieprzem. Sosem posmaruj naleśniki a następnie posyp mozzarellą. \n7. Zapiekaj ok. 8-10 minut w temp. 190 stopni (w airfryerze zmniejsz czas do ok. 5-6 minut) aż ser się rozpuści i zarumieni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/1/MAx6B7MubE9eCD2xfYG29JzvmgIJHtqG3xhtVpy4.jpg","kcal":588.0,"protein":32,"fat":29.5,"carbs":51.2,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":80,"measure":"szklanka"},{"name":"Woda","grams":40,"measure":"szklanka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Pomidory suszone","grams":14,"measure":"sztuka"},{"name":"Ser Feta","grams":60,"measure":"plaster"},{"name":"Passata pomidorowa","grams":30,"measure":"łyżka"},{"name":"Oregano suszone","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Mozzarella tarta","grams":20,"measure":"g"}]},{"id":46076301,"name":"Zapiekanka makaronowa z łososiem, szpinakiem i suszonymi pomidorami","description":"1. Piekarnik nagrzej do 180 stopni (góra-dół).\n2. Makaron ugotuj, ale chwilę krócej niż al dente (tak, żeby nie był całkowicie surowy).\n3. Łososia pokrój w kostkę, przypraw solą i pieprzem i podsmaż na odrobinie oliwy. Przełóż na talerz.\n4. Szpinak podsmaż na pozostałej  oliwie wraz z przeciśniętym przez praskę czosnkiem i smaż aż liście całkowicie \"zwiędną\". Dopraw solą i pieprzem\n4. Dodaj na patelnię podgotowany makaron, posiekane suszone pomidory i serek śmietankowy. Wszystko dobrze wymieszaj i przełóż do małego naczynia żaroodpornego. Dodaj kawałki łososia i \"powciskaj\" je delikatnie do zapiekanki.\n5. Na wierzch dodaj porwaną lub startą na tarce mozzarellę.\n6. Zapiekankę włóż do nagrzanego piekarnika na około 20-25 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/3KYfo37vILUXt67VydV1aTRLNevmAOuatWeAzxDZ.jpg","kcal":593.7,"protein":36.3,"fat":27.2,"carbs":55.2,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":55,"measure":"porcja"},{"name":"Łosoś atlantycki","grams":75,"measure":"sztuka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Ser Mozzarella light 9%","grams":30,"measure":"plaster"}]},{"id":53516448,"name":"Zapiekany bajgiel z jajkiem i mozzarellą","description":"1. Bajgla przekrój na pół i ułóż na blaszce wyłożonej papierem do pieczenia lub w koszyczku airfryera. \n2. Połóż na pieczywie liście szpinaku, a następnie na środek delikatnie wbij jajko.\n3. Dodaj pokrojone pomidorki, mozzarellę i cienko pokrojoną czerwoną cebulę. \n3. Zapiekaj w piekarniku ok. 20-25 minut w temperaturze 180 stopni (w airfryerze skróć czas do 15-20 minut). \n4. Po upieczeniu dopraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/u1VUwaRzZk9k1jbgJk9xmkjuanSM95FP0tYnEEsT.jpg","kcal":519.0,"protein":29.9,"fat":15.7,"carbs":64.0,"ingredients":[{"name":"Bajgiel z makiem","grams":105,"measure":"średnia sztuka"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Mozzarella tarta","grams":20,"measure":"g"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}]},{"id":53516462,"name":"Zielona pinsa z kremowym szpinakiem i mozzarellą","description":"1. Szpinak uduś na patelni wraz z suszonymi pomidorami. Dopraw solą, pieprzem oraz czosnkiem i wymieszaj z serkiem śmietankowym. \n2. Pinsę posmaruj kremowym szpinakiem.\n3. Na wierzch dodaj pokrojoną w cienkie piórka cebulę oraz mozzarellę. \n4. Zapiekaj ok. 8-10 minut w 200-220 stopniach.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/JPTwvKse1mHGa1Geijf0INu35FTpyyvf4GU7iAbS.jpg","kcal":506.9,"protein":22.0,"fat":18.5,"carbs":68.8,"ingredients":[{"name":"Pinsa Gourmet pełnoziarnista","grams":115,"measure":"opakowanie"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Mozzarella tarta","grams":30,"measure":"g"}]},{"id":47967517,"name":"Zielona szakszuka","description":"1. Czosnek drobno posiekaj i podsmaż na oliwie.\n2. Następnie dodaj pokrojoną w plasterki cukinię i zostaw na 2-3 minuty.\n3. Dodaj szpinak, serek i przyprawy i zostaw na małym ogniu na około 5 minut.\n4. Następnie zrób w sosie wgłębienia i wbij jajka. Całość przykryj i duś pod przykryciem około 3-4 minut (do momentu, aż jajka się zetną).\n5. Gotową szakszukę posyp szczypiorkiem i zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/12/zGmdNAA0s52242v1JtuOmDZZaYtIPZqFNqVqwnPo.jpg","kcal":509.7,"protein":27.9,"fat":18.6,"carbs":59.1,"ingredients":[{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":3,"measure":"łyżeczka"},{"name":"Cukinia","grams":100,"measure":"plaster"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Chleb żytni","grams":105,"measure":"kromka"}]},{"id":34528187,"name":"Zielony makaron pełen białka","description":"1. Makaron ugotuj al dente wg instrukcji na opakowaniu.\n2. Szalotkę pokrój w kostkę i podsmaż na oliwie wraz z czosnkiem. Następnie dodaj szpinak i smaż wszystko razem aż szpinak zwiędnie.\n3. Do blendera przełóż serek wiejski, podsmażone warzywa, odsączoną fasolę oraz przyprawy. Wszystko zmiksuj na gładki, kremowy, zielony sos.\n4. Ugotowany makaron wymieszaj z sosem. Na talerzu posyp parmezanem i udekoruj rukolą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/RiHY9soIZ9QWmREXGHP5SNh1W6VojEDYdRX2jPQD.jpg","kcal":586.1,"protein":37.6,"fat":14.9,"carbs":78.7,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":75,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"g"},{"name":"Fasola biała konserwowa","grams":60,"measure":"łyżka"},{"name":"Rukola","grams":20,"measure":"garść"},{"name":"Ser Parmezan","grams":12,"measure":"łyżeczka"}]},{"id":41144625,"name":"Zupa krem z pomidorów z soczewicą i mozzarellą","description":"1. Cebulę oraz czosnek posiekaj na drobne kawałki i podsmaż na oliwie.\n2. Następnie dodaj pomidory z puszki, pokrojonego w kostkę świeżego pomidora, erytrol, soczewicę i przyprawy. Całość wymieszaj i zostaw na małym ogniu na około 10-15 minut aż soczewica będzie całkiem miękka.\n3. Garnek zdejmij z ognia i zblenduj wszystko na krem. W razie potrzeby dolej troszkę wrzątku.\n4. Chleb zgrilluj na suchej patelni na grzankę.\n5. Zupę przelej do miseczki, dodaj porwaną mozzarellę oraz pestki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/IkLXH5jRqoCsSTdwQ3JBOs70T9Gnk21AzzcQYNSe.jpg","kcal":465.1,"protein":32.5,"fat":17.4,"carbs":53.1,"ingredients":[{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Erytrytol","grams":2,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Pomidory krojone w puszce","grams":400,"measure":"puszka"},{"name":"Soczewica czerwona","grams":30,"measure":"łyżka"},{"name":"Ser Mozzarella light 9%","grams":63,"measure":"sztuka"}]},{"id":41144620,"name":"Łosoś po toskańsku w kremowym sosie ze szpinakiem i pomidorkami","description":"1. Na patelni rozgrzej oliwę i podsmaż łososia z każdej strony. Odłóż go na bok. \n2. Na tą samą patelnię dodaj pokrojoną w kostkę szalotkę, czosnek, posiekane suszone pomidory i wszystko razem podsmażaj. \n3. Dodaj wodę i serek i wszystko wymieszaj tworząc sos. Dopraw solą i pieprzem. \n4. Do sosu dodaj pomidorki oraz szpinak. Włóż także obsmażonego łososia i duś wszystko razem pod przykryciem ok. 5-8 minut. \n5. Danie podawaj z ugotowanym makaronem i bazylią.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/9/IuVA80TvJUVI93vKxVefaKHGSxRKSWq78tLsUzXk.jpg","kcal":647.1,"protein":35.0,"fat":26.8,"carbs":68.6,"ingredients":[{"name":"Łosoś atlantycki","grams":100,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Szalotka","grams":20,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Serek naturalny","grams":20,"measure":"g"},{"name":"Makaron","grams":65,"measure":"g"},{"name":"Bazylia świeża","grams":4,"measure":"łyżka"}]},{"id":43687116,"name":"Łosoś w sosie szpinakowym z kaszą jaglaną","description":"1. Piekarnik rozgrzej do 200 stopni. Filety z łososia przypraw solą i pieprzem (możesz użyć pieprz cytrynowy), włóż do naczynia żaroodpornego i piecz ok 12-15 minut. \n2. Suszone pomidory posiekaj i wrzuć na patelnię. Rozgrzej i następnie podsmaż na nich cebulę pokrojoną w drobną kostkę oraz posiekany czosnek. Dodaj szpinak i duś aż zwiędnie (jeśli używasz mrożonego to do całkowitego odparowania wody).\n3. Na końcu dodaj serek i dopraw solą, pieprzem oraz szczyptą gałki muszkatołowej. Możesz dodać odrobinę wrzątku, jeśli sos będzie zbyt gęsty.\n4. Do sosu przełóż upieczonego łososia.\n5. Danie podawaj z ugotowaną kaszą jaglaną.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/3CHauf9QolRTx2Dpl7xsr95FMYyZ6O5OIPM1SvJ5.jpg","kcal":578.3,"protein":34.5,"fat":25.1,"carbs":56.0,"ingredients":[{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Łosoś atlantycki","grams":100,"measure":"porcja"},{"name":"Kasza jaglana","grams":50,"measure":"łyżka"}]},{"id":53516458,"name":"Łosoś z salsą z mango, ryżem i świeżą sałatką","description":"1. Mango pokrój w kosteczkę. Dodaj posiekaną kolendrę, płatki chilli, sok z limonki i wymieszaj. Odstaw do przegryzienia. \n2. Ryż ugotuj według czasu podanego przez producenta. \n3. Syrop klonowy wymieszaj z sosem sojowym, i sokiem z limonki. Łososia posmaruj przygotowaną marynatą i odstaw na ok. 10 minut. Następnie posyp sezamem i upiecz przez ok. 12 minut w 180 stopniach. \n4. Przygotuj sałatkę: pomidorki przekrój na pół, a cebulę w cienkie piórka. Przełóż pokrojone warzywa wraz z roszponką do miski, dodaj oliwę, sok z cytryny, sól, pieprz i wymieszaj. \n5. Upieczonego łososia podawaj z ryżem, salsą mango i sałatką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/RcZ4N9w0rmBphReS6CEimcfUun6VDkzmm7FE6NWl.jpg","kcal":601.6,"protein":31.8,"fat":24,"carbs":65.0,"ingredients":[{"name":"Mango","grams":90,"measure":"plaster"},{"name":"Płatki chili","grams":1,"measure":"szczypta"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Kolendra liście","grams":5,"measure":"garść"},{"name":"Łosoś atlantycki","grams":120,"measure":"porcja"},{"name":"Syrop klonowy","grams":3,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Ryż basmati","grams":50,"measure":"łyżka"},{"name":"Roszponka","grams":25,"measure":"garść"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"}]},{"id":46076297,"name":"Śniadaniowa tortilla z omletem z pieczarkami","description":"1. Pieczarki pokrój w plastry i podsmaż na odrobinie oliwy. \n2. Jajka rozmąć widelcem, dopraw solą i pieprzem, wylej je na pieczarki i rozprowadź po całej powierzchni.\n3. Na masę jajeczną wyłóż tortillę i dociśnij łopatką, aby omlet przykleił się do niej. Smaż przez chwilę, a jak jajka będą już całkowicie ścięte to przełóż tortillę z omletem na drugą stronę. \n4. Na jednej połowie ułóż plastry mozzarelli i złóż na pół. Smaż jeszcze przez chwilę aż ser się rozpuści. \n5. Gotową tortillę pokrój na 3 lub 4 trójkąciki. Podawaj z garścią ulubionej zieleniny - np. szpinakiem, rukolą, roszponką itp. i pomidorkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/11/jPrRGFjznOHcLLTlEISbokyBqVt8hB0LQedVCccR.jpg","kcal":513.0,"protein":36,"fat":26.2,"carbs":35.2,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pieczarki","grams":54,"measure":"średnia sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Ser Mozzarella light 9%","grams":60,"measure":"plaster"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}]},{"id":36694526,"name":"Śniadaniowy bowl z serkiem wiejskim i jajkiem na miękko","description":"1. Jajka ugotuj na miękko.\n2. Serek wiejski przełóż do mieseczki.\n3. Ogórka i rzodkiewki pokrój w kostkę.\n4. Do miski z serkiem dodaj na wierzch pokrojone warzywa i jajko przekrojone na pół. Posyp posiekanym szczypiorkiem.\n5. Całość posyp pestkami dyni.\n6. Zjedz z pieczywem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/7/uMLM0xKCUyVsp7TBPYV9TdVrt4voU7TiXWPGpHlN.jpg","kcal":512.7,"protein":36.2,"fat":22.1,"carbs":43.4,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Pestki dyni","grams":10,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Chleb żytni","grams":70,"measure":"kromka"}]},{"id":61928705,"name":"Śniadaniowy talerz z łososiem i jajkiem","description":"1. Jajko ugotuj na półmiękko lun na twardo - jak wolisz. Obierz, przekrój na pół i połóż na talerzu. Udekoruj majonezem.\n2. Obok połóż plastry łososia. \n3. Pomidora i ogórka pokrój w plastry i ułóż na talerzu obok jajek i łososia. \n4. Dodaj pieczywo posmarowane serkiem. \n5. Jajko posyp posiekanym szczypiorkiem i przypraw solą i pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/UPYLOfZB2KJBP7xseWleaPkb0n7idcSknulBzABL.jpg","kcal":509.4,"protein":34.0,"fat":22.7,"carbs":42.4,"ingredients":[{"name":"Chleb żytni","grams":70,"measure":"kromka"},{"name":"Łosoś wędzony","grams":50,"measure":"plaster"},{"name":"Serek naturalny","grams":30,"measure":"łyżeczka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Majonez wegański","grams":10,"measure":"łyżeczka"}]},{"id":43687108,"name":"Śniadaniowy wrap z jajecznicą ze szpinakiem i parmezanem","description":"1. Cebulę pokrój w drobną kostkę i podsmaż na odrobinie oliwy. Dodaj szpinak i podsmaż do momentu aż \"zwiędnie\". Dopraw solą, pieprzem i czosnkiem.\n2. Następnie wbij jajka i usmaż jajecznicę ze szpinakiem.\n3. Na środek tortilli wyłóż przygotowaną jajecznicę, dodaj pokrojone pomidorki, pestki dyni i posyp startym parmezanem.\n4. Tortillę zwiń tak, jak krokieta, a następnie połóż na suchej patelni z jednej i z drugiej strony.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/10/E0SOE1odbKo26Pprv5ugAxhZ9EHYKUiq4bVMjKI7.jpg","kcal":500.4,"protein":27.9,"fat":27.2,"carbs":37.5,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Cebula","grams":25,"measure":"g"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"}]},{"id":38873213,"name":"Śniadaniowy wrap z jajecznicą, czerwoną fasolą i mozzarellą","description":"1. Cebulę i pomidorki pokrój w drobną kostkę. Fasolę dokładnie opłucz z zalewy.\n2. Jajko rozmąć, dopraw solą i pieprzem i usmaż jajecznicę na odrobinie oliwy.\n3. Na środek tortilli wyłóż startą mozzarellę, przygotowaną jajecznicę, fasolę oraz pokrojone warzywa i posiekaną kolendrę.\n4. Tortillę zwiń tak, jak krokieta, a następnie połóż na suchej patelni z jednej i z drugiej strony, aż się zarumieni, a mozzarella się rozpuści.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/8/SyOz0D6XpYI0ZcRBhjTtryOl9OhfeCbxRsLGLGuQ.jpg","kcal":512.9,"protein":32.7,"fat":24.8,"carbs":40.9,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":60,"measure":"sztuka"},{"name":"Ser Mozzarella light 9%","grams":45,"measure":"plaster"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Fasola czerwona konserwowa","grams":40,"measure":"łyżka"},{"name":"Kolendra liście","grams":5,"measure":"garść"}]},{"id":53516452,"name":"Świeża sałatka i grahamka z serem","description":"1. Do miski przełóż szpinak i pokrojone warzywa. Dodaj oliwę, sok z cytryny, pestki dyni oraz sól i pieprz. Wymieszaj sałatkę. \n2. Bułkę przekrój na pół. Na każdej kromce połóż ser. \n3. Grahamkę z serem zjedz z sałatką.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/2/uQjZ1LVBIbHUtar1YsV5RC66vnYBcaUgnRs3hlqt.jpg","kcal":492.1,"protein":25.1,"fat":24.1,"carbs":45.7,"ingredients":[{"name":"Bułka grahamka","grams":70,"measure":"sztuka"},{"name":"Ser żółty Active Protein (Ryki)","grams":34,"measure":"plaster"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Ogórek","grams":45,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Pestki dyni","grams":20,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}]},{"id":61928720,"name":"Świeża sałatka tabbouleh z cieciorką","description":"1. Ciecierzycę opłucz z zalewy na sitku pod bieżącą wodą i pozostaw do odsączenia.\n2. Natkę pietruszki oraz szczypiorek drobno posiekaj.\n3. Pomidora, ogórka i czerwoną cebulę pokrój w kosteczkę. \n4. Do miski dodaj cieciorkę, pokrojone warzywa oraz posiekane zioła. Dodaj oliwę i ocet winny. Wszystko wymieszaj i dopraw solą i pieprzem. \n5. Na deser zjedz pudding proteinowy o dowolnym smaku.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/5/BvpLJeg5GQN49eeoHVTNWLsxusSzbrHMWfhxkCqu.jpg","kcal":507.8,"protein":32.4,"fat":17.3,"carbs":54.6,"ingredients":[{"name":"Ciecierzyca w zalewie","grams":120,"measure":"łyżka"},{"name":"Ogórek gruntowy","grams":70,"measure":"sztuka"},{"name":"Pomidor czerwony","grams":120,"measure":"średnia sztuka"},{"name":"Mięta pieprzowa świeża","grams":10,"measure":"garść"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżeczka"},{"name":"Ocet winny","grams":5,"measure":"łyżeczka"},{"name":"Pudding proteinowy o smaku czekoladowym (Go Active)","grams":200,"measure":"opakowanie"},{"name":"Truskawki","grams":150,"measure":"garść"}]},{"id":35831665,"name":"Jednoporcjowe słodkości  - Wilgotne brownie z płynną czekoladą","description":"1. Piekarnik rozgrzej do 180 stopni (grzanie góra-dół).\n    2. Banana, kakao, jajko, proszek do pieczenia, sól i erytrol zblenduj na jednolitą masę i przelej do foremki wysmarowanej tłuszczem.\n    3. Czekoladę wciśnij w ciasto i wstaw do nagrzanego piekarnika na około 20-25 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/nvjIersdjMFGm4DCmqZZitfrSltHo4wNTTgIAXYz.jpg","kcal":286.45,"protein":13.04,"fat":13.45,"carbs":43.12,"ingredients":[{"name":"Banan","grams":100,"measure":"mała sztuka"},{"name":"Kakao w proszku","grams":24,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"kostka"}],"category":"Deser"},{"id":35831668,"name":"Jednoporcjowe słodkości - Banoffee","description":"1. Ciasteczka rozkrusz na drobny pył, odłóż troszkę do dekoracji na koniec, a resztę wymieszaj z mlekiem, wyłóż na dno słoiczka.\n    2 Serek wymieszaj z pudrem z erytrolu i aromatem.\n    3. Na wyłożonych w słoiczku ciasteczkach układaj warstwami: Bieluch, plastry banana, kajmak, Bieluch, plastry banana, kajmak. Udekoruj pozostałymi ciasteczkami i bananem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/VRCYZd1vPHynscDKANkXxE56NnsiCbzC567pbfup.jpg","kcal":377.62,"protein":20,"fat":11.11,"carbs":55.07,"ingredients":[{"name":"Ciasteczka owsiane","grams":20,"measure":"g"},{"name":"Mleko 2%","grams":10,"measure":"szklanka"},{"name":"Serek naturalny lekki (Bieluch)","grams":150,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Kajmak bez cukru Krukam","grams":30,"measure":"łyżeczka"},{"name":"Banan","grams":100,"measure":"mała sztuka"}],"category":"Deser"},{"id":35831672,"name":"Jednoporcjowe słodkości - Czekoladowy pudding chia z malinami","description":"1. Serek, mleko, kakao, erytrol i sól umieść w naczyniu blendera i zmiksuj na jednolitą masę. Dodaj nasiona chia i wymieszaj. Przełóż do słoiczka i wstaw do lodówki na co najmniej 5 godzin. Najlepiej przygotować dzień wcześniej.\n    2. Przed podaniem posyp kakao i udekoruj malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/QWQCM6LNB9qZW8CkLoHvtQlbi0zviaId5HlQ8Fni.jpg","kcal":335.4,"protein":21.85,"fat":15.79,"carbs":31.89,"ingredients":[{"name":"Nasiona chia","grams":30,"measure":"łyżka"},{"name":"Serek naturalny lekki (Bieluch)","grams":150,"measure":"opakowanie"},{"name":"Mleko 2%","grams":50,"measure":"szklanka"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Maliny","grams":60,"measure":"garść"}],"category":"Deser"},{"id":35831673,"name":"Jednoporcjowe słodkości - Deser a’la Kinder Country","description":"1. Herbatniki pokrusz na drobne kawałki. Na spodzie naczynia wyłóż warstwę z herbatników.\n2. Ricottę zblenduj ze skyrem, erytrolem i aromatem. Dodaj orkisz ekspandowany (zostaw troszkę do posypania na wierzch) i wymieszaj.Wyłóż masę na pokruszone herbatniki, a na nią wysyp pozostałe ziarenka orkiszu.\n3. Czekoladę rozpuść w kąpieli wodnej. Dla ułatwienia jej rozprowadzania możesz dodać odrobinę wody lub mleka. Rozpuszczoną czekoladę rozprowadź po wierzchu deseru. Wstaw do lodówki na 1-2 godziny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/9XyrmFo7bgg4tzacTm5dL8RrEb4WxV8eyTDTWS1i.jpg","kcal":405.94,"protein":28.07,"fat":16.37,"carbs":37.57,"ingredients":[{"name":"Herbatniki","grams":15,"measure":"sztuka"},{"name":"Ser Ricotta","grams":75,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Orkisz ekspandowany","grams":20,"measure":"garść"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Czekolada gorzka 70-85% kakao","grams":12,"measure":"g"}],"category":"Deser"},{"id":35831675,"name":"Jednoporcjowe słodkości - Deser a’la Kopiec Kreta","description":"Spód:\n    1. Białko oddziel od żółtka i ubij na sztywną pianę ze szczyptą proszku do pieczenia.\n    2. Dodaj resztę składników na spód i zmiksuj jedynie do połączenia składników.\n    3. Rozgrzej patelnię przesmarowaną oliwą i usmaż niewielki omlet. Smaż z dwóch stron pod przykryciem i odstaw do wystudzenia.\n\nKrem:\n    1. Zmiksuj wszystkie składniki, oprócz czekolady.\n    2. Czekoladę posiekaj i dodaj do kremu. Wymieszaj\n\nCałość:\n    1. Z omletu delikatnie zetnij wierzch nożem i dopasuj jego kształt do pojemnika, w którym będziesz  robić jednoporcjowego kopca (polecam położyć pojemnik na omlecie i odkroić wystające poza pojemnik boki).\n    2. Umieść dopasowany i zeskrobany spód w pojemniku i skrop 1-2 łyżkami kawy.\n    3. Banana pokrój w grubsze plastry i połóż na skropionym kawą omlecie i skrop go odrobiną soku z cytryny.\n    4. Nałóż przygotowany wcześniej krem, a na jego wierzchu pokrusz zeskrobane wcześniej i odkrojone części omletu. Wstaw do lodówki na 2-3 godziny.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/SrmEcnbfXkx676y4xLxA6EMKNeHiwi98dTAuB7kH.jpg","kcal":537.39,"protein":35.04,"fat":18.46,"carbs":61.54,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":25,"measure":"g"},{"name":"Mąka ziemniaczana","grams":5,"measure":"g"},{"name":"Kakao w proszku","grams":5,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Kawa czarna","grams":20,"measure":"ml"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"},{"name":"Ser Ricotta","grams":75,"measure":"łyżka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Śmietan fix (Dr Oetker)","grams":9,"measure":"opakowanie"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Czekolada gorzka 70-85% kakao","grams":6,"measure":"g"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Banan","grams":60,"measure":"mała sztuka"},{"name":"Sok z cytryny","grams":1,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831676,"name":"Jednoporcjowe słodkości - Deser a’la monte","description":"1. Zblenduj ricottę, jogurt naturalny i erytrol. Podziel na dwie części.\n    2. Do jednej części dodaj kakao i sól, a do drugiej masło orzechowe i aromat waniliowy. Zblenduj każdą z tych części.\n    3. Na spód słoiczka wyłóż połowę ciemnej części, następnie połowę jasnej, połowę ciemnej i na wierzch połowę jasnej.\n    4. Udekoruj prawdziwym kakao.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/i3IpTYqEvikeZQHZvP7EbA0LQujld1FNuJIiwqyk.jpg","kcal":363.26,"protein":18.67,"fat":24.82,"carbs":23.63,"ingredients":[{"name":"Ser Ricotta","grams":125,"measure":"opakowanie"},{"name":"Jogurt naturalny","grams":100,"measure":"średnie opakowanie"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Kakao w proszku","grams":10,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Masło orzechowe","grams":15,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"}],"category":"Deser"},{"id":35831677,"name":"Jednoporcjowe słodkości - Deser a’la Ptasie Mleczko","description":"1. Jogurt zmiksuj z wystudzoną żelatyną i aromatem. Przelej masę do słoiczka i wstaw do lodówki na 2-3 godziny do całkowitego stężenia.\n    2 Czekoladę rozpuść w kąpieli wodnej z dodatkiem mleka. Polej nią stężoną masę jogurtową i wstaw do lodówki do zastygnięcia.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/mu5KzN6QxCVBKcSdalQR4GcYKhHMRMz5bUCtBrhG.jpg","kcal":306.26,"protein":20.05,"fat":16.13,"carbs":21.4,"ingredients":[{"name":"Jogurt naturalny","grams":250,"measure":"średnie opakowanie"},{"name":"Żelatyna","grams":10,"measure":"opakowanie"},{"name":"Woda","grams":30,"measure":"szklanka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Czekolada gorzka 70-85% kakao","grams":18,"measure":"kostka"},{"name":"Mleko 2%","grams":10,"measure":"łyżka"}],"category":"Deser"},{"id":35831678,"name":"Jednoporcjowe słodkości - Deser z ricottą i owocami leśnymi","description":"1. W małym garnku umieść owoce i sok z cytryny i podduś, aż puszczą wodę i się zagotują. Możesz podlać odrobiną wody.\n    2. Mąkę ziemniaczaną wymieszaj z wodą i dodaj do gotujących się owoców. Mieszaj energicznie do zgęstnienia. Odstaw do wystudzenia.\n    3.. Ricottę, serek, erytrol i aromat zmiksuj na jednolitą, puszystą masę.\n    4. W słoiczku układaj naprzemiennie owoce, ricottę, owoce, ricottę, owoce i zakończ ricottą. Podawaj posypane migdałami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/8NIpuRCF434GAz8TUM2G9Pg3uVx90WVbmtjtxbHV.jpg","kcal":446.21,"protein":26.65,"fat":18.7,"carbs":46.34,"in nie"},{"name":"Woda","grams":60,"measure":"szklanka"},{"name":"Cynamon mielony","grams":1,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831687,"name":"Jednoporcjowe słodkości - Malinowa chmurka w pucharku","description":"1. Galaretkę z dodatkiem 10 g erytrolu zalej gorącą wodą, wymieszaj i odstaw do wystudzenia. Dodaj do niej maliny (zostaw trochę do dekoracji) i ponownie odstaw do lekkiego stężenia (nie całkowitego).\n    2 W pucharku/słoiczku wyłóż biszkopty i wylej na nie tężejącą galaretkę (jeśli wylejesz zbyt płynną to biszkopty ją wchłoną) i wstaw do lodówki do całkowitego stężenia.\n    3. Skyr zmiksuj z pozostałym erytrolem (10 g), śmietan fixem i aromatem. Wyłóż na stężoną galaretkę, udekoruj malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/nHuYuv7eExw5cXu24lkJuFtWdXCtHTLLIxiCOGMM.jpg","kcal":256.44,"protein":23.96,"fat":1.8900000000000001,"carbs":37.38,"ingredients":[{"name":"Herbatniki","grams":18,"measure":"mała sztuka"},{"name":"Galaretka bez cukru","grams":4,"measure":"łyżka"},{"name":"Woda","grams":125,"measure":"szklanka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Maliny","grams":120,"measure":"garść"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Śmietan fix (Dr Oetker)","grams":4,"measure":"opakowanie"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"}],"category":"Deser"},{"id":35831688,"name":"Jednoporcjowe słodkości - Odchudzone tiramisu","description":"1. Zaparz kawę i lekko przestudź.\n    2. Ricottę zmiksuj ze skyrem, aromatem i erytrolem na gładką masę.\n    3. W słoiczku wyłóż pierwszą (z 3) warstwę biszkoptów (2 sztuki), skrop je kawą za pomocą łyżeczki, na nie wyłóż warstwę z ricottą, następie ponownie biszkopty, które ponownie skrop kawą, warstwę z ricottą i ostatnią warstwę z biszkoptów skropionych kawą, a następnie kremu z ricottą. Całość oprósz prawdziwym kakao.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/rkGjXXCAM9DWodqgx9qDoukh6aHcKbIiR4H0aJtc.jpg","kcal":427.8,"protein":31.23,"fat":14.96,"carbs":42.78,"ingredients":[{"name":"Herbatniki","grams":35,"measure":"g"},{"name":"Kawa espresso","grams":50,"measure":"porcja"},{"name":"Ser Ricotta","grams":125,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Kakao w proszku","grams":2,"measure":"łyżka"}],"category":"Deser"},{"id":35831689,"name":"Jednoporcjowe słodkości - Orzechowy deser z granolą i bananem","description":"1. Serek, skyr, masło orzechowe, sól i erytrol zblenduj na jednolitą, gładką masę. Jeśli Twoje masło orzechowe jest gęste, dolej odrobinę mleka, by uzyskać bardziej kremową konsystencję.\n    2. Granolę rozdrobnij na mniejsze kawałki, jeśli są zbyt duże.\n    3. Do słoiczka nałóż 1/2 porcji granoli, 1/2 porcji orzechowego kremu, plastry banana, 1/2 porcji granoli, 1/2 porcji orzechowego kremu i na wierzch plastry banana.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/HzWjiigUkfJq1jEPVGXUnrV6cBHWm2U5VWTv0CxE.jpg","kcal":347.79,"protein":32.78,"fat":13.62,"carbs":26.41,"ingredients":[{"name":"Serek wiejski lekki 3%","grams":100,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Masło orzechowe","grams":20,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Granola proteinowa   (AH)","grams":1,"measure":"g"},{"name":"Banan","grams":60,"measure":"średnia sztuka"}],"category":"Deser"},{"id":35831690,"name":"Jednoporcjowe słodkości - Pistacjowy serniczek z malinami","description":"1. Herbatniki rozkrusz na pył w malakserze. Wyłóż je na spód słoiczka.\n    2. Serki zblenduj na jednolitą masę z pastą pistacjową (20 g), erytrolem i szczyptą soli. Wyłóż je na herbatniki.\n    3. Wierzch posmaruj pastą pistacjową (10 g), udekoruj malinami i posiekanymi pistacjami (10 g)","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/qsNubEO3RJ2OBqSLlR3QZAZ5wI6dh05inxRRXYYK.jpg","kcal":463.6,"protein":37.12,"fat":24.68,"carbs":26.21,"ingredients":[{"name":"Herbatniki","grams":10,"measure":"sztuka"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Serek naturalny lekki (Bieluch)","grams":150,"measure":"opakowanie"},{"name":"Pistacje","grams":30,"measure":"łyżka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Maliny","grams":30,"measure":"garść"}],"category":"Deser"},{"id":35831691,"name":"Jednoporcjowe słodkości - Proteinowa cynamonka","description":"1. Piekarnik rozgrzej do 180 stopni (termoobieg).\n    2. Wszystkie składniki na ciasto umieść w misce i zagnieć w kulkę. Rozwałkuj na prostokąt i pokrój na 3 mniej więcej równe paski.\n    3. Przygotuj nadzienie: na patelni rozpuść masło. Dodaj cynamon i erytrol. Wymieszaj.\n   4. Przygotowanym nadzieniem posmaruj każdy pasek ciasta, zostawiając brzegi bez nadzienia.\n    5. Zacznij zwijać pierwszy pasek doklejając jego końcówkę do początku kolejnego tak, aby jeden przechodził w drugi. To samo zrób z ostatnim.\n 6. Przełóż gotową cynamonkę do kokilki, posmaruj białkiem jajka i wstaw do piekarnika na około 25-30 minut (do zarumienienia).\n7. Podawaj z ulubionymi dodatkami, np. świeżymi owocami, polewą z odżywki białkowej czy pudrem z erytrolu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/mqMLu0i3gjhdGxox5Di6krgF1d45Uw6qscLWKc7S.jpg","kcal":407.11,"protein":23.79,"fat":13.85,"carbs":46.98,"ingredients":[{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Mąka orkiszowa jasna","grams":60,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Białko jaja","grams":15,"measure":"sztuka"},{"name":"Masło","grams":10,"measure":"łyżeczka"},{"name":"Cynamon mielony","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831696,"name":"Jednoporcjowe słodkości - Proteinowa malinianka z kruszonką","description":"1. Piekarnik rozgrzej do 180 stopni (grzanie góra-dół).\n    2 Składniki na kruszonkę zagnięć i odstaw na bok.\n    3. Twaróg z jajkiem umieć w misce i rozgnieć widelcem. Dodaj mąkę, erytrol, aromat, proszek do pieczenia. Wymieszaj na jednolitą masę.\n    4. Na papierze do pieczenia uformuj okrąg o średnicy ok. 8-10 cm z nieco grubszymi bokami, a w środek powkładaj maliny. Posyp całość wcześniej przygotowaną kruszonką i wstaw do nagrzanego piekarnika na około 25 minut.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2025/6/a57SHU6YFd30Pt511aRo3f0WXXlgvv0QBIzAFqSL.jpg","kcal":463.72,"protein":35.55,"fat":11.32,"carbs":55.57,"ingredients":[{"name":"Mąka orkiszowa jasna","grams":50,"measure":"łyżeczka"},{"name":"Ser twarogowy chudy","grams":100,"measure":"plaster"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Mąka orkiszowa jasna","grams":12,"measure":"łyżeczka"},{"name":"Erytrytol","grams":6,"measure":"łyżeczka"},{"name":"Masło","grams":6,"measure":"łyżeczka"}],"category":"Deser"},{"id":35831697,"name":"Jednoporcjowe słodkości - Pudding a’la Bounty","description":"1. Jogurt wymieszaj z mleczkiem (użyj tylko stałą część), mąką i erytrolem. W razie potrzeby dodaj go więcej.\n    2. Wiórki podpraż na suchej patelni przez chwilę, do zarumienienia. Odstaw do lekkiego przestudzenia i dodaj do masy z mąką kokosową. Wymieszaj i przełóż masę do słoic
