, posyp parmezanem i udekoruj listkami bazylii.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/d8j08JoWpbFyAuCUFXB8OcGN7rBX1H29hpkRd1bY.jpg","kcal":999.23,"protein":41.48,"fat":39.25,"carbs":126.1,"ingredients":[{"name":"Pinsa Gourmet pełnoziarnista","grams":230,"measure":"opakowanie"},{"name":"Ser Ricotta","grams":125,"measure":"opakowanie"},{"name":"Ser Feta","grams":40,"measure":"plaster"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szparagi","grams":100,"measure":"g"},{"name":"Cukinia","grams":50,"measure":"plaster"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"}],"category":"Obiad"},{"id":61785204,"name":"Domowa lemoniada truskawkowa","description":"1. Truskawki pozbaw szypułek i zmiksuj z 2 szklankami wody i erytrolem. Następnie przecedź przez sitko.\n2. Dodaj resztę wody, sok z cytryny i opcjonalnie dodaj więcej erytrolu, jeśli wolisz słodsze napoje. \n3. Lemoniadę podawaj mocno schłodzoną z kostkami lodu, plastrami cytryny i świeżą miętą.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/HwvSpVJCeaUtE8JJdk6hBKGsgySD2zUMtqrPodlz.jpg","kcal":167.98,"protein":3.74,"fat":1.63,"carbs":43.32,"ingredients":[{"name":"Truskawki","grams":400,"measure":"g"},{"name":"Erytrytol","grams":20,"measure":"łyżeczka"},{"name":"Woda","grams":1000,"measure":"szklanka"},{"name":"Sok z cytryny","grams":125,"measure":"szklanka"},{"name":"Cytryna","grams":40,"measure":"plaster"},{"name":"Mięta","grams":2,"measure":"garść"}],"category":"Napój"},{"id":61785461,"name":"Truskawkowa chmurka","description":"1. Jogurtem naturalnym posmaruj wewnętrzne brzegi szklanki tworząc łatki.\n2. Wszystkie pozostałe składniki zmiksuj na gładki koktajl.\n3. Koktajl przelej do szklanki i udekoruj opcjonalnie świeżą truskawką i miętą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/MD53aKZOpW1cjEf2vpAqx8dAhUZAEhB6rYVsTP9E.jpg","kcal":359.05,"protein":24.95,"fat":12.6,"carbs":40.92,"ingredients":[{"name":"Truskawki","grams":200,"measure":"g"},{"name":"Banan","grams":60,"measure":"średnia sztuka"},{"name":"Serek wiejski lekki 3%","grams":150,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"}],"category":"Napój"},{"id":61786311,"name":"Lekkie tiramisu truskawkowe","description":"1. 200 g truskawek zmiksuj z połową erytrolu na mus.\n2. Ricottę zmiksuj ze skyrem waniliowym i pozostałym erytrolem na gładki krem. \n3. Pozostałe truskawki pokrój w plastry.\n4. Połowę biszkoptów zanurz w truskawkowym musie i ułóż na dnie foremki. Na wierzch dodaj połowę kremu i połowę pokrojonych truskawek. \n5. Następnie powtórz czynność drugi raz tworząc drugą warstwę deseru - namoczone w truskawkach biszkopty i krem. \n6. Deser oprósz kakao i udekoruj pozostałymi plastrami truskawek. \n7. Deser włóż do lodówki na min. 2 godziny.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/SAsUYKODohxrHNXKvyhDWNlWKOPfXbxG7HjkWAJf.jpg","kcal":670.56,"protein":37.99,"fat":22.57,"carbs":79.91,"ingredients":[{"name":"Biszkopty typu Ladyfingers","grams":60,"measure":"sztuka"},{"name":"Ricotta","grams":250,"measure":"opakowanie"},{"name":"Skyr waniliowy","grams":150,"measure":"opakowanie"},{"name":"Truskawki","grams":300,"measure":"g"},{"name":"Erytrytol","grams":40,"measure":"łyżka"},{"name":"Kakao w proszku","grams":2,"measure":"łyżeczka"}],"category":"Deser"},{"id":61908742,"name":"Rodzinny dutch baby z letnimi owocami","description":"1. Piekarnik rozgrzej do 200 stopni. Pozostaw w nim blaszkę, aby się nagrzała.\n2. Jajka zmiksuj z mlekiem, mąką, oliwą, erytrolem i aromatem waniliowym na gładkie ciasto. \n3. Na rozgrzanej blaszce rozpuść masło i rozprowadź po całej powierzchni. Wylej ciasto i piecz naleśnika 20-25 minut aż wyrośnie i wyraźnie się zarumieni. \n4. Truskawki i borówki umyj.\n5. Upieczonego naleśnika podawaj z kleksami ze skyru waniliowego i owocami.\n6. Opcjonalnie możesz udekorować go świeżą miętą i posypać pudrem z erytrolu.","servings":6,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/EkWKNuPiGYFPToTJ2l0Gi1c9EDBs8sYygyBBgEnL.jpg","kcal":2654.22,"protein":136.34,"fat":100.22,"carbs":301.12,"ingredients":[{"name":"Jajko kurze","grams":400,"measure":"średnia sztuka"},{"name":"Mąka orkiszowa jasna","grams":320,"measure":"g"},{"name":"Mleko 1,5%","grams":550,"measure":"ml"},{"name":"Oliwa z oliwek","grams":40,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Masło","grams":10,"measure":"g"},{"name":"Skyr waniliowy","grams":300,"measure":"opakowanie"},{"name":"Truskawki","grams":200,"measure":"g"},{"name":"Borówki amerykańskie","grams":150,"measure":"garść"}],"category":"Śniadanie"},{"id":62049472,"name":"Puszysty omlet sernikowy z truskawkami","description":"1. Jajka wymieszaj z twarożkiem grani na gładką masę (np. trzepaczką).\n2. Dodaj mąkę, proszek do pieczenia, erytrol i aromat waniliowy i wymieszaj do połączenia składników.\n3. Na patelni rozgrzej odrobinę oliwy. Wylej masę omletową i smaż na małej mocy palnika pod przykryciem ok. 5 minut. \n4. Gdy boki omleta będą wyraźnie ścięte, a na powierzchni pojawią się bąbelki, przewróć omlet na drugą stronę i smaż jeszcze 2-3 minuty pod przykryciem. \n5. Gotowy omlet przełóż na talerz i podawaj z pokrojonymi truskawkami i opcjonalnie pudrem z erytrolu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/RsYMXRpjyfysHUXTi14Ss2MJz3nwWVC1QpPGSB4x.jpg","kcal":459.04,"protein":31.23,"fat":16.54,"carbs":47.49,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Twarożek grani","grams":100,"measure":"duże opakowanie"},{"name":"Mąka orkiszowa jasna","grams":45,"measure":"g"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"},{"name":"Truskawki","grams":150,"measure":"g"}],"category":"Śniadanie"},{"id":62049486,"name":"Nocna owsianka oreo z truskawkami","description":"1. Płatki owsiane zmiksuj razem ze skyrem, mlekiem i słodzikiem. \n2. Dodaj do masy nasiona chia i jedno pokruszone ciasteczko oreo. \n3. Owsiankę włóż na noc do lodówki. \n4. Truskawki pokrój w kostkę. \n5. Do słoiczka przełóż połowę owsianki i połowę truskawek. Następnie powtórz czynność tworząc drugą warstwę. \n6. Owsiankę udekoruj drugim ciasteczkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Z9qC72jNT64tCVl4xwGBt8fkFD9FhIt9wWLLSzuC.jpg","kcal":451.05,"protein":27,"fat":11.21,"carbs":61.7,"ingredients":[{"name":"Płatki owsiane","grams":40,"measure":"łyżka"},{"name":"Nasiona chia","grams":10,"measure":"łyżeczka"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Ciasteczka oreo (Kraft)","grams":22,"measure":"sztuka"},{"name":"Truskawki","grams":100,"measure":"g"}],"category":"Śniadanie"},{"id":62049516,"name":"Bajgiel z pastą z łososia z awokado i ogórkiem","description":"1. Łososia wędzonego rozdrobnij widelcem, a koperek i szczypiorek posiekaj. Wymieszaj je z serkiem, sokiem z cytryny i majonezem na pastę. Dopraw pieprzem.\n2. Bajgla przekrój na pół. Dolną część posmaruj przygotowaną pastą. \n3. Awokado i ogórka pokrój w plastry, a cebulę w cienkie piórka. Połóż warzywa na paście z łososia i przykryj górną częścią bajgla.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/1qm1INnN0l2YDKMvJYPkl8SxTyM12MQPiHFWqXnF.jpg","kcal":534.97,"protein":28.67,"fat":21.33,"carbs":57.88,"ingredients":[{"name":"Bajgiel pełnoziarnisty","grams":100,"measure":"sztuka"},{"name":"Łosoś wędzony na gorąco","grams":63,"measure":"opakowanie"},{"name":"Majonez light","grams":5,"measure":"łyżeczka"},{"name":"Serek śmietankowy","grams":25,"measure":"łyżka"},{"name":"Sok z cytryny","grams":1,"measure":"łyżeczka"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Awokado","grams":35,"measure":"sztuka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}],"category":"Śniadanie"},{"id":62049552,"name":"Wytrawne wysokobiałkowe placki z szynką, serem i warzywami","description":"1. Skyr połącz w misce z mlekiem i jajkami. Dodaj mąkę oraz przyprawy i odstaw ciasto na 10 minut.\n2. Papryki, cebulę oraz szynkę pokrój w drobną kostkę. Dodaj do masy razem z mozzarellą i wymieszaj. \n3. Na patelni rozgrzej oliwę. \n4. Smaż placki na małej patelni - tak, jak naleśniki.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/8y41yXc9pGWVC73maPRBMvdNYADMlT86BezZGqzA.jpg","kcal":750,"protein":60.97,"fat":28.31,"carbs":62.21,"ingredients":[{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Mleko 1,5%","grams":80,"measure":"ml"},{"name":"Mąka orkiszowa jasna","grams":60,"measure":"g"},{"name":"Szynka z indyka","grams":60,"measure":"plaster"},{"name":"Mozzarella tarta","grams":40,"measure":"g"},{"name":"Papryka czerwona","grams":30,"measure":"średnia sztuka"},{"name":"Papryka żółta","grams":30,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":2,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"}],"category":"Śniadanie"},{"id":62049616,"name":"Orzeźwiający koktajl tropikalny","description":"1. Przygotuj wysoką przezroczystą szklankę. Jej wewnętrzne ścianki posmaruj musem mango i jogurtem naturalnym tworząc biało-żółte łatki.\n2. Wszystkie pozostałe składniki zmiksuj na gładki koktajl. \n3. Przygotowany koktajl przelej do ozdobionej szklanki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/pmk7d7DENoV6KL9pt7lIqHOMhr932s8Jh3nLb4No.jpg","kcal":343.15,"protein":31.48,"fat":6.17,"carbs":40.08,"ingredients":[{"name":"Mango mrożone","grams":100,"measure":"opakowanie"},{"name":"Ananas mrożony","grams":50,"measure":"g"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"measure":"miarka"},{"name":"Mus z mango 100%","grams":15,"measure":"łyżka"},{"name":"Jogurt naturalny","grams":25,"measure":"łyżka"}],"category":"Napój"},{"id":62214179,"name":"Sernikowa kasza manna z truskawkami","description":"1. Kaszę manną wsyp do rondelka. Dodaj mleko, erytrol i aromat waniliowy. Gotuj na małej mocy palnika, mieszając, aż kasza zgęstnieje. \n2. Po ugotowaniu odstaw na chwilę do wystudzenia, a następnie dodaj twaróg i zmiksuj na gładką masę. \n3. Sernikową kaszę manną przełóż do miseczki, dodaj pokrojone truskawki i płatki migdałów.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/VSay2ZIuLKnTBKivdNGWNUtvYLH7cnIYSktBsTOw.jpg","kcal":497.42,"protein":42.49,"fat":10.26,"carbs":60.6,"ingredients":[{"name":"Kasza manna","grams":40,"measure":"g"},{"name":"Mleko 1,5%","grams":250,"measure":"szklanka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Ser twarogowy chudy","grams":125,"measure":"duże opakowanie"},{"name":"Truskawki","grams":150,"measure":"g"},{"name":"Migdały płatki","grams":10,"measure":"łyżka"}],"category":"Śniadanie"},{"id":62215016,"name":"Kuskus z chrupiącym tofu i warzywami","description":"1. Kuskus ugotuj w lekko osolonym wrzątku według zaleceń podanych przez producenta na opakowaniu. \n2. Tofu pokrój w kostkę i przełóż do miski. Dodaj odrobinę oliwy, wymieszaj i wsyp mąkę ziemniaczaną. Wymieszaj potrząsając miskę, aby każdy kawałek tofu obtoczył się w skrobi. Przełóż tofu do airfryera (lub na blaszkę piekarnika wyłożoną papierem do pieczenia) i piecz ok. 15 minut w temperaturze 180-190 stopni. W połowie czasu pieczenia przemieszaj tofu, aby równomiernie się zarumieniło i stało się chrupiące.\n3. Na pozostałej oliwie podsmaż warzywa. Kiedy już będą miękkie dodaj do nich ugotowaną kaszę, serek, odrobinę wrzątku i przyprawy. Wszystko wymieszaj. Na końcu dodaj chrupiące tofu i ponownie wymieszaj. \n4. Potrawę wyłóż do miseczek i udekoruj rukolą.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/MLFNPikCEBaHgLC3v8tkyHhtX9ZcWP7Y104U9S2W.jpg","kcal":898.29,"protein":45.19,"fat":29.75,"carbs":112.34,"ingredients":[{"name":"Kuskus perłowy","grams":100,"measure":"g"},{"name":"Tofu marynowane sweet chili (Go Vege)","grams":180,"measure":"opakowanie"},{"name":"Warzywa mrożone","grams":200,"measure":"g"},{"name":"Mąka ziemniaczana","grams":24,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Serek naturalny","grams":45,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":2,"measure":"szczypta"},{"name":"Rukola","grams":40,"measure":"garść"}],"category":"Obiad"},{"id":62215806,"name":"Serowe kluski ze szparagami i groszkiem","description":"1. W misce umieść twaróg, starty parmezan, jajko, mąkę, bułkę tartą, skórkę z cytryny i przyprawy. Wszystkie składniki zagnieć na ciasto (jak na kluski leniwe). \n2. Z ciasta uformuj kulki i ugotuj je w lekko osolonym wrzątku. Gotuj ok. 1 minuty od wypłynięcia ich na powierzchnię. Odcedź i przełóż na talerz. \n3. Szparagi pozbaw twardych końcówek i pokrój w krążki. Czosnek obierz i posiekaj w plasterki. \n4. Na patelni rozgrzej oliwę i masło i podsmaż czosnek, szparagi i groszek. Kiedy warzywa będą miękkie dodaj do nich sok z cytryny, przyprawy i łyżkę wody i energicznie zamieszaj aż stworzy się emulsja. \n5. Do warzyw w emulsji przełóż ugotowane kluski serowe i smaż przez chwilę aż każda obklei się delikatnie sosem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/H0uanMlvWBv8VUXxfbxtNfzan3OQCUt7pkZv39Sm.jpg","kcal":878.43,"protein":79.66,"fat":36.52,"carbs":62.21,"ingredients":[{"name":"Ser twarogowy chudy","grams":240,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Ser Parmezan","grams":32,"measure":"łyżka"},{"name":"Bułka tarta","grams":16,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":24,"measure":"łyżka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"},{"name":"Masło","grams":14,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Woda","grams":15,"measure":"łyżka"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Szparagi","grams":250,"measure":"g"},{"name":"Groszek zielony mrożony","grams":60,"measure":"łyżka"}],"category":"Obiad"},{"id":62216410,"name":"Zapiekanka z batatami i fetą","description":"1. Piekarnik rozgrzej do 200 stopni. \n2. Batata obierz i pokrój w cienkie plastry - najlepiej za pomocą mandoliny. \n3. Szparagi pozbaw twardych końcówek i pokrój w krążki. Główki zachowaj w całości i odłóż na bok. Pomidorki przekrój na pół. \n4. Jajka rozmąć widelcem lub zmiksuj z jogurtem, solą, pieprzem i czosnkiem.\n5. Naczynie żaroodporne posmaruj odrobiną oliwy. Wyłóż pierwszą warstwę batatów. Dodaj część szparagów i część pokruszonej fety. Powtórz czynność tyle razy aż wypełnisz całą foremkę i skończysz składniki. \n6. Tak przygotowane warstwy zalej masą jajeczną. Na górze ułóż pomidorki i główki szparagów.\n7. Zapiekankę piecz ok. 45 minut aż będzie zrumieniona i całkowicie ścięta.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/mSfQck5dTb16LOfewahnnM7sbM7D8ntMufsaJn8c.jpg","kcal":941.75,"protein":54.83,"fat":53.64,"carbs":64.22,"ingredients":[{"name":"Batat","grams":200,"measure":"mała sztuka"},{"name":"Szparagi","grams":200,"measure":"g"},{"name":"Ser Feta","grams":80,"measure":"plaster"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":250,"measure":"średnia sztuka"},{"name":"Jogurt grecki","grams":100,"measure":"g"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżeczka"}],"category":"Obiad"},{"id":62217611,"name":"Tradycyjna zupa szczawiowa z jajkiem","description":"1. Cebulę pokrój w kosteczkę, a pora w talarki. Czosnek posiekaj lub przeciśnij przez praskę. Marchew obierz i zetrzyj na tarce o grubych oczkach. \n2. Warzywa podsmaż w dużym garnku na oliwie. \n3. Dodaj bulion i gotuj do miękkości warzyw. Następnie dodaj posiekany szczaw i gotuj kilka minut.\n4. W trakcie gotowania zupy ugotuj ziemniaki do miękkości oraz jajka - na półmiękko lub na twardo. \n5. Śmietanę wymieszaj z kilkoma łyżkami gorącej zupy, aby ją zahartować, a następnie wlej do garnka. Dodaj posiekany koperek i przypraw zupę solą i pieprzem.\n6. Zupę podawaj z ziemniakami i jajkiem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/eoQ4AF2FSYIUVxLGfJB8LlQvwauKvlmrFNPpWTYo.jpg","kcal":1304.44,"protein":52.62,"fat":54.15,"carbs":174.15,"ingredients":[{"name":"Cebula","grams":70,"measure":"mała sztuka"},{"name":"Por","grams":50,"measure":"kawałek"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Wywar warzywny","grams":1500,"measure":"szklanka"},{"name":"Szczaw","grams":350,"measure":"garść"},{"name":"Śmietana 18%","grams":75,"measure":"łyżka"},{"name":"Koper świeży","grams":40,"measure":"pęczek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Jajko kurze","grams":200,"measure":"średnia sztuka"},{"name":"Ziemniaki","grams":600,"measure":"g"}],"category":"Zupa"},{"id":62312021,"name":"Proteinowa Dalgona Coffee","description":"1. Zagotuj wodę. \n2. W naczyniu do miksowania umieść kawę rozpuszczalną, erytrol i 2 łyżki ciepłej wody. Wszystko zmiksuj do czasu aż utworzy się kawowa pianka. \n3. Do szklanki dodaj kostki lodu i wlej napój proteinowy o smaku waniliowym. Na wierzch dodaj ubitą kawę.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/xLHfH72JB7m4OZ9nsyQWPbV6EsTjYMbQdUe4H8eL.jpg","kcal":179.12,"protein":21.74,"fat":2.77,"carbs":16.77,"ingredients":[{"name":"Kawa rozpuszczalna","grams":4,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Woda","grams":30,"measure":"łyżka"},{"name":"Napój proteinowy waniliowy (Zott)","grams":250,"measure":"butelka"},{"name":"Kostki lodu","grams":80,"measure":"kostka"}],"category":"Napój"},{"id":62312417,"name":"Proteinowa matcha ice latte z truskawkami","description":"1. Truskawki zmiksuj i dodaj na dno szklanki (napój proteinowy jest bardzo słodki, więc nie musisz ich dosładzać, ale jeśli potrzebujesz to dodaj do nich erytrol).\n2. Do szklanki wsyp kostki lodu. Dodaj napój proteinowy oraz wlej mleko.\n3. Matchę rozmieszaj w 50-60 ml wody (najlepiej za pomocą ręcznego spieniacza do mleka lub specjalnej bambusowej trzepaczki).\n4. Przygotowaną matchę dodaj na wierzch napoju.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/j2y2Hu0HjXD6wUGuNkI5Iazln3a0ncAgvkA1q71P.jpg","kcal":165.1,"protein":15.13,"fat":3.24,"carbs":19.6,"ingredients":[{"name":"Truskawki","grams":70,"measure":"garść"},{"name":"Napój proteinowy waniliowy (Zott)","grams":120,"measure":"butelka"},{"name":"Mleko 1,5%","grams":100,"measure":"szklanka"},{"name":"Matcha tradycyjna (Ekogram)","grams":5,"measure":"łyżeczka"},{"name":"Woda","grams":60,"measure":"szklanka"},{"name":"Kostki lodu","grams":80,"measure":"kostka"}],"category":"Napój"},{"id":62316485,"name":"Domowa lemoniada arbuzowa","description":"1. Cytryny sparz wrzątkiem. Jedną z nich pokrój w plastry i przełóż do dużego szklanego dzbanka i odstaw na bok. \n2. Z jednej cytryny obierz cienko skórkę (bez białej części), przełóż ją do rondelka i dodaj sok wyciśnięty z dwóch cytryn.  Dodaj erytrol i wodę i zagotuj aż słodzik całkowicie się rozpuści. Następnie pozostaw syrop do wystudzenia i wyjmij skórkę z cytryny. \n3. Arbuza pozbawionego skóry i pestek zmiksuj na gładkie puree. \n4. Do dzbanka z plastrami cytryny dodaj sporą ilość kostek lodu, zmiksowanego arbuza oraz syrop cytrynowy. \n5. Lemoniadę możesz uzupełnić jeszcze dodatkową zimną wodą. Udekoruj świeżą miętą. Podawaj schłodzoną.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/W5X9NJMWi6EbIp2leCviGTepFVcypoGlBJJ1Jtrk.jpg","kcal":375.71,"protein":8.94,"fat":1.79,"carbs":99.1,"ingredients":[{"name":"Erytrytol","grams":100,"measure":"g"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Cytryna","grams":255,"measure":"średnia sztuka"},{"name":"Arbuz","grams":1000,"measure":"g"},{"name":"Mięta","grams":4,"measure":"garść"}],"category":"Napój"},{"id":62320436,"name":"Domowa ice tea brzoskwiniowa","description":"1. Zaparz mocną herbatę i pozostaw do całkowitego wystudzenia. \n2. Cytryny sparz wrzątkiem. Jedną z nich pokrój w plastry i przełóż do dużego szklanego dzbanka i odstaw na bok. \n3. Z jednej cytryny obierz cienko skórkę (bez białej części), przełóż ją do rondelka i dodaj sok wyciśnięty z dwóch cytryn.  Dodaj erytrol i wodę i zagotuj aż słodzik całkowicie się rozpuści. Następnie pozostaw syrop do wystudzenia i wyjmij skórkę z cytryny. \n4. Trzy brzoskwinie pozbawione pestek zmiksuj na gładkie puree. Pozostałą pokrój w plastry i dodaj do dzbanka.\n5. Do dzbanka z plastrami cytryny i brzoskwini dodaj sporą ilość kostek lodu, zmiksowane brzoskwinie, herbatę oraz syrop cytrynowy. \n6. Uzupełnij dzbanek zimną wodą. Udekoruj świeżą miętą. \n7. Ice tea podawaj schłodzoną.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/yrIVHgdP13dImf6q1K98Q62FDxXNJsAmPs9BXoez.jpg","kcal":234.21,"protein":6.54,"fat":1.99,"carbs":62.85,"ingredients":[{"name":"Erytrytol","grams":100,"measure":"g"},{"name":"Woda","grams":250,"measure":"szklanka"},{"name":"Cytryna","grams":255,"measure":"średnia sztuka"},{"name":"Brzoskwinia","grams":400,"measure":"średnia sztuka"},{"name":"Herbata czarna (napar)","grams":250,"measure":"szklanka"},{"name":"Mięta","grams":4,"measure":"garść"}],"category":"Napój"},{"id":62324531,"name":"Słoneczny koktajl z malinami","description":"1. Banana pokrój w plasterki i zamroź. \n2. Maliny zmiksuj z łyżką jogurtu i łyżeczką erytrolu na gładką masę. Posmaruj nią wewnętrzne ścianki szklanki tworząc różowe łatki. \n3. Mrożonego banana zmiksuj z mango, pozostałym jogurtem, odżywką oraz mlekiem. Jeśli wolisz słodsze koktajle dodaj erytrol. \n4. Jeśli koktajl wyszedł zbyt gęsty możesz śmiało dodać nieco zimnej wody i ponownie zmiksować. \n5. Koktajl przelej do szklanki z malinami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/YxzHB0K6BlqK0cw7tbUnjhCUFotXmNSsFKO5Nfox.jpg","kcal":404.95,"protein":25.5,"fat":9.69,"carbs":55.02,"ingredients":[{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"},{"name":"Jogurt naturalny","grams":150,"measure":"małe opakowanie"},{"name":"Banan mrożony","grams":60,"measure":"średnia sztuka"},{"name":"Mango mrożone","grams":100,"measure":"g"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Mleko 1,5%","grams":200,"measure":"szklanka"}],"category":"Napój"},{"id":62354620,"name":"Gryczane placuszki na serku wiejskim","description":"1. Wszystkie suche składniki (mąka, soda, erytrol i sól) wymieszaj w misce.\n2. Serek wiejski, mleko, aromat i jajko zblenduj na jednolitą masę.\n3. Dodaj suche skłądniki do mokrych i wymieszaj. Dodaj ocet.\n4. Na patelni rozgrzej odrobinę oliwy i smaż placuszki po 2-3 minuty z każdej ze stron.\n5. Podawaj z ulubionymi dodatkami (pamiętaj, by dodać je do składników).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/JVjEtnwfthBUrZsm7FDFQV2ovzX3pnUt2Ym3HiHa.jpg","kcal":583.99,"protein":38.5,"fat":22.82,"carbs":60.74,"ingredients":[{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Mąka gryczana","grams":75,"measure":"łyżka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Ocet spirytusowy","grams":8,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":50,"measure":"szklanka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"}],"category":"Śniadanie"},{"id":62356320,"name":"Owsiany omlet nadziany malinami","description":"1. Wymieszaj jajka i jogurt na jednolitą masę. Dodaj mąkę, sól, erytrol i proszek do pieczenia. Opcjonalnie możesz dodać cynamon i aromat waniliowy. Wymieszaj ponownie.\n2. Na patelni rozgrzej odrobinę oliwy i wlej połowę masy na mocno rozgrzaną patelnię. Nałożę i na to pozostałą porcję masy. Przykryj patelnię i smaż omlet pod przykryciem na średnim ogniu. Jak będzie wyraźnie ścięty - przewróć na drugą i smaż jeszcze chwilę.\n3. Podawaj z ulubionymi dodatkami (pamiętaj, by wpisać je do aplikacji).","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/AjppxwTv63HUtjkQUynsTXG9E3T3XZKz6OdFMjNd.jpg","kcal":344.52,"protein":24.01,"fat":11.12,"carbs":38.22,"ingredients":[{"name":"Jajko kurze","grams":51,"measure":"średnia sztuka"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Mąka owsiana","grams":40,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Proszek do pieczenia","grams":2,"measure":"łyżeczka"},{"name":"Maliny","grams":60,"measure":"garść"},{"name":"Oliwa z oliwek","grams":2,"measure":"łyżka"}],"category":"Śniadanie"},{"id":62358233,"name":"Bananowe gofry z odżywką białkową","description":"1. Banana zblenduj z jajkami. Dodaj odżywkę i skrobię. Wymieszaj na jednolitą masę. \n2. Wlej masę do rozgrzanej gofrownicy wysmarowanej tłuszczem (np. oliwą) i piecz ok. 5 minut (w zależności od mocy Twojej gofrownicy, ale staraj się nie otwierać w trakcie pieczenia, bo są wtedy mniej chrupiące). Studź na kratce piekarnika.\n3. Podawaj z pudrem z erytrolu.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/GjFFoKFhiJI3VjIdUunew8YxBcov4FZEu1vN3lA0.jpg","kcal":442.1,"protein":37.05,"fat":11.68,"carbs":47.66,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Banan","grams":120,"measure":"średnia sztuka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"measure":"miarka"},{"name":"Skrobia ziemniaczana","grams":20,"measure":"łyżka"}],"category":"Śniadanie"},{"id":62360106,"name":"Odżywcza sałatka z soczewicą i fetą","description":"1. Pomidorki umyj i pokrój na połówki. Cebulkę posiekaj.\n2. Soczewicę odcedź z zalewy i opłucz (możesz użyć też soczewicy surowej i ugotować).\n3. Oliwę, sok z cytryny, musztardę, miód i sól wymieszaj. w Razie potrzeby dodaj kapkę wody.\n4. W naczyniu umieść pomidorki, soczewicę, cebulę, posiekaną bazylię, pokruszony ser feta. Całość polej sosem i posyp sezamem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Pz8p5mNfAFEeadfqMRDBzJ9pl5F0Pp7jCCslvDFE.jpg","kcal":472.67,"protein":20.67,"fat":23.23,"carbs":49.7,"ingredients":[{"name":"Soczewica konserwowa","grams":120,"measure":"łyżka"},{"name":"Pomidory koktajlowe","grams":160,"measure":"garść"},{"name":"Ser Feta","grams":40,"measure":"plaster"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Musztarda","grams":20,"measure":"łyżka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Sezam","grams":5,"measure":"łyżka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"}],"category":"Sałatka"},{"id":62430130,"name":"Pełnoziarniste gofry proteinowe","description":"1. Wszystkie składniki zblenduj na jednolitą masę i wlej do natłuszczonej i mocno rozgrzanej gofrownicy porcję ciasta (powinny wyjść 4 gofry, ale jest to zależne od wielkości gofrownicy).\n2. Piecz 4-5 minut (nie otwieraj gofrownicy w trakcie pieczenia).\n3. Podawaj z ulubionymi dodatkami (pamiętaj, by dodać je do składników posiłku).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/SbfPvz27znBND49MbhwVTYeY5J5cyFR7Rv1PanGW.jpg","kcal":643.12,"protein":59.98,"fat":19.57,"carbs":54.95,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":50,"measure":"duża sztuka"},{"name":"Mąka orkiszowa typ 1850","grams":70,"measure":"łyżka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"measure":"miarka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Mleko 1,5%","grams":75,"measure":"szklanka"}],"category":"Śniadanie"},{"id":62440983,"name":"Chłodnik z botwinki z jajkiem","description":"1. Botwinkę umyj i oddziel łodygi od liści. Buraczki obierz i zetrzyj na tarce o grubych oczkach, a łodygi pokrój na małe kawałki. Przełóż do garnka, zalej wywarem (lub wodą) i gotuj ok. 15 minut. \n2. Dodaj pokrojone liście botwinki i gotuj jeszcze przez 5 minut. Następnie odstaw do wystudzenia. \n3. Jajka ugotuj na twardo.\n4. Ogórka oraz rzodkiewki zetrzyj na tarce o grubych oczkach. Szczypiorek i koperek posiekaj (część koperku odłóż do dekoracji chłodnika). \n5. Starte warzywa, szczypiorek i koperek dodaj do wystudzonej botwinki. Wlej maślankę, dodaj sok z cytryny i dopraw solą i pieprzem. \n6. Chłodnik podawaj z jajkiem. Udekoruj koperkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/chHZNREqnCHlZ5iqbOmNVO3Vgnj9SPG92YKYxYNp.jpg","kcal":540.35,"protein":35.98,"fat":27.13,"carbs":48.54,"ingredients":[{"name":"Botwinka","grams":280,"measure":"pęczek"},{"name":"Wywar warzywny","grams":750,"measure":"szklanka"},{"name":"Ogórek gruntowy","grams":35,"measure":"sztuka"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Koper świeży","grams":20,"measure":"pęczek"},{"name":"Maślanka","grams":250,"measure":"szklanka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"}],"category":"Zupa"},{"id":62441924,"name":"Azjatycka zupa z pierożkami gyoza","description":"1. Czosnek i imbir zatrzyj na tarce lub drobno posiekaj. Marchew pokrój w paseczki, a brokuły podziel na małe różyczki. Mięso pokrój w cienkie paseczki i dopraw solą i pieprzem.\n2. W garnku rozgrzej oliwę i podsmaż czosnek z imbirem z dodatkiem pasty tom yum. \n3. Następnie dodaj mleczko kokosowe oraz wywar warzywny (lub wodę). Dodaj marchew i brokuły i gotuj zupę ok. 7-8 minut. \n4. Do zupy wrzuć pokrojonego kurczaka i gotuj kolejne 7-8 minut aż mięso całkowicie straci surowość. \n5. Zupę dopraw sosem sojowym i wrzuć do niej pierożki gyoza. Gotuj jeszcze 3-4 minuty. \n6. Zupę podawaj z posiekaną kolendrą, olejem chilli oraz kawałkiem limonki.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/6bLAsClwdeA5kJSfDzaku0DGnef8r62xPbE2RUBH.jpg","kcal":923.42,"protein":49.88,"fat":35.17,"carbs":106.34,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":8,"measure":"plaster"},{"name":"Pasta Tom Yum","grams":30,"measure":"łyżka"},{"name":"Mleczko kokosowe light 6%","grams":200,"measure":"puszka"},{"name":"Wywar warzywny","grams":500,"measure":"szklanka"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Brokuł","grams":250,"measure":"sztuka"},{"name":"Kurczak pierś","grams":100,"measure":"sztuka"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Pierożki gyoza z kurczakiem","grams":230,"measure":"opakowanie"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Limonka","grams":20,"measure":"plaster"},{"name":"Olej chilli","grams":5,"measure":"łyżeczka"}],"category":"Zupa"},{"id":62442821,"name":"Błyskawiczny ramen z boczniakami","description":"1. Cebulę pokrój w piórka, a boczniaki porwij na paseczki. Czosnek i imbir zetrzyj na tarce lub drobno posiekaj.\n2. W garnku rozgrzej oliwę i podsmaż cebulę wraz z mięsem. Dodaj boczniaki i smaż aż wszystko się zarumieni. \n3. Dodaj wrzątek i napój sojowy oraz sos sojowy i rybny, pastę miso, czosnek, imbir oraz szpinak. Wszystko gotuj razem ok. 3-4 minuty. Na sam koniec dodaj makaron i gotuj jeszcze przez chwilę (według czasu podanego na instrukcji na opakowaniu). \n4. Zupę podawaj z sezamem i posiekanym szczypiorkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/44MJY9LCtxFLIieQUIOXAOUCTsZv4AynjF9jQ8TP.jpg","kcal":1119.66,"protein":81.32,"fat":45.39,"carbs":105.43,"ingredients":[{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Boczniaki","grams":200,"measure":"g"},{"name":"Wołowina mielona","grams":200,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Makaron ramen gotowy (Asia Style)","grams":200,"measure":"opakowanie"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":8,"measure":"plaster"},{"name":"Pasta miso ciemna","grams":30,"measure":"łyżka"},{"name":"Woda","grams":500,"measure":"szklanka"},{"name":"Napój sojowy niesłodzony wzbogacony o wapń","grams":500,"measure":"ml"},{"name":"Sos rybny","grams":36,"measure":"łyżka"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Sezam","grams":5,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"}],"category":"Zupa"},{"id":62444374,"name":"Toskańska zupa z indykiem i tortellini","description":"1. Cebulę pokrój w drobną kostkę, a marchewkę zetrzyj na tarce o grubych oczkach. \n2. W garnku rozgrzej oliwę i podsmaż warzywa. Kiedy cebula się zeszkli dodaj mięso mielone oraz przeciśnięty przez praskę czosnek. Podsmaż wszystko razem przez chwilę. \n3. Dodaj posiekane suszone pomidory, koncentrat pomidorowy, passatę, wywar (lub wodę) oraz przyprawy. Gotuj wszystko razem ok. 10 minut.\n4. Następnie dodaj świeże tortellini i gotuj jeszcze 3 minuty. \n5. Na końcu dodaj śmietankę, starty parmezan i wszystko wymieszaj. Wrzuć szpinak i gotuj jeszcze 2-3 minuty aż liście całkowicie zwiędną. \n6. Dopraw ewentualnie zupę solą i pieprzem. Podawaj z posiekaną natką pietruszki.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/mmPPqm7HWQSuE58tzgsP3ghsRBvtENdNLcYUBX5e.jpg","kcal":2141.15,"protein":158.16,"fat":69.05,"carbs":229.98,"ingredients":[{"name":"Mięso mielone z indyka","grams":400,"measure":"porcja"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Cebula","grams":110,"measure":"średnia sztuka"},{"name":"Marchew","grams":120,"measure":"średnia sztuka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Koncentrat pomidorowy","grams":45,"measure":"łyżeczka"},{"name":"Passata pomidorowa","grams":500,"measure":"g"},{"name":"Wywar warzywny","grams":500,"measure":"szklanka"},{"name":"Tortellini z serem ricotta i szpinakiem","grams":250,"measure":"opakowanie"},{"name":"Ser Parmezan","grams":16,"measure":"łyżka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Śmietanka 30 % (Mleczna Dolina)","grams":80,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Chili w proszku","grams":1,"measure":"szczypta"},{"name":"Tymianek suszony","grams":2,"measure":"szczypta"},{"name":"Oregano suszone","grams":2,"measure":"szczypta"},{"name":"Bazylia suszona","grams":2,"measure":"szczypta"},{"name":"Natka pietruszki","grams":24,"measure":"łyżeczka"}],"category":"Zupa"},{"id":62445354,"name":"Zupa krem z zielonych warzyw z grzankami i fetą","description":"1. Pora pokrój w krążki, a cukinię w kostkę. Ziemniaki obierz i również pokrój w kostkę. Brokuły podziel na małe różyczki.\n2. W garnku rozgrzej oliwę i podsmaż pora. Następnie dodaj cukinię oraz przeciśnięty czosnek. Podsmaż wszystko razem przez chwilę. \n3. Dodaj ziemniaki i brokuły. Zalej wszystko bulionem i gotuj ok. 20 minut aż ziemniaki będą całkowicie miękkie.\n4. W trakcie gotowania zupy pokrój pieczywo w kosteczkę i podsmaż na pozostałej oliwie na złoty kolor. Jeśli lubisz ostrzejsze potrawy możesz doprawić grzanki ostrą papryką lub chili.\n5. Do zupy dodaj liście szpinaku i gotuj jeszcze zupę przez chwilę aż całkowicie zwiędną. Następnie zmiksuj zupę na gładki krem. \n6. Dodaj śmietankę i dopraw solą i pieprzem. \n7. Zupę podawaj z grzankami i pokruszoną fetą. Udekoruj koperkiem.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/CCNcfeJKgjRQ8rACG8fxSD6M7xNX9bAxTRM5ayvy.jpg","kcal":1162.98,"protein":40.19,"fat":62.86,"carbs":126.72,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Por","grams":100,"measure":"kawałek"},{"name":"Cukinia","grams":250,"measure":"mała sztuka"},{"name":"Brokuł","grams":250,"measure":"sztuka"},{"name":"Ziemniaki","grams":200,"measure":"mała sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Wywar warzywny","grams":750,"measure":"szklanka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Śmietanka 30 % (Mleczna Dolina)","grams":80,"measure":"łyżka"},{"name":"Chleb graham","grams":60,"measure":"kromka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ser Feta","grams":100,"measure":"opakowanie"},{"name":"Koper świeży","grams":20,"measure":"łyżeczka"}],"category":"Zupa"},{"id":62477444,"name":"Carpaccio z pomidora z burratą","description":"1. Natkę pietruszki oraz kapary drobno posiekaj. Dodaj do nich oliwę, ocet balsamiczny oraz sól i pieprz. Wymieszaj tworząc sos. \n2. Pomidory pokrój w duże cienkie plastry i rozłóż na dużym talerzu. Polej równomiernie sosem.\n3. Na środku dodaj kulkę burraty.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/xCc9VnazDxg2J6kfqb41yJgy8YeD4fE06zSS8prL.jpg","kcal":424.62,"protein":12.96,"fat":35.7,"carbs":15.39,"ingredients":[{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ocet balsamiczny","grams":6,"measure":"łyżka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Kapary","grams":10,"measure":"łyżka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Pomidor czerwony","grams":240,"measure":"średnia sztuka"},{"name":"Ser Burrata","grams":125,"measure":"sztuka"}],"category":"Sałatka"},{"id":62478732,"name":"Przeciwzapalna sałatka portugalska z cieciorką","description":"1. Natkę pietruszki posiekaj, a czerwoną cebulę pokrój w drobną kostkę. Paprykę pokrój w kostkę - mniej więcej wielkości ciecierzycy. \n2. Cieciorkę odsącz z zalewy i przepłucz na sitku pod bieżącą wodą. \n3. Wszystkie składniki umieść w misce i wymieszaj z oliwą, octem oraz solą i pieprzem. \n4. Tuńczyka odciśnij z nadmiaru oleju na ręczniku papierowym. Kawałki ułóż na wierzchu sałatki.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/3WVyanj2seC4ijO7FIsU2HKhAfaPbhTILCHZWjLA.jpg","kcal":359.43,"protein":29.45,"fat":16.1,"carbs":21.43,"ingredients":[{"name":"Ciecierzyca konserwowa","grams":120,"measure":"puszka (odsączona)"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Papryka czerwona","grams":60,"measure":"średnia sztuka"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Ocet winny","grams":5,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Tuńczyk kawałki w oleju roślinnym","grams":85,"measure":"opakowanie"}],"category":"Sałatka"},{"id":62480209,"name":"Sałatka a'la spring rolls z sosem orzechowym","description":"1. Pierś z kurczaka ugotuj w osolonej wodzie do miękkości. Wyjmij i poszarp za pomocą dwóch widelców na mniejsze kawałki.\n2. Makaron przygotuj według instrukcji podanej na opakowaniu. Następnie przepłucz dokładnie na sitku po bieżącą wodą, aby się nie kleił i pozostaw do wystudzenia i odsączenia. \n3. Kapustę poszatkuj, a ogórka i marchew pokrój w cienkie paski. Kolendrę i dymkę posiekaj.\n4. Masło orzechowe wymieszaj z olejem sezamowym, sosem sojowym, syropem klonowym, sokiem z limonki i przeciśniętym czosnkiem. W razie potrzeby dodaj do sosu odrobinę wody dla odpowiedniej konsystencji i wymieszaj ponownie. \n5. Wszystkie składniki umieść w misce i wymieszaj z sosem. Sałatkę posyp sezamem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/5N6LCIlzdy4nVCcUfB7z56dW9myWzgkvV8NuGxk7.jpg","kcal":1004.33,"protein":55.05,"fat":23.4,"carbs":147.14,"ingredients":[{"name":"Makaron vermicelli sojowy","grams":140,"measure":"filiżanka"},{"name":"Kapusta czerwona","grams":100,"measure":"g"},{"name":"Marchew","grams":120,"measure":"średnia sztuka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Kurczak pierś","grams":200,"measure":"sztuka"},{"name":"Masło orzechowe","grams":20,"measure":"łyżka"},{"name":"Olej sezamowy","grams":5,"measure":"łyżeczka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Cebula dymka","grams":5,"measure":"mała sztuka"},{"name":"Sezam","grams":5,"measure":"łyżeczka"}],"category":"Sałatka"},{"id":62481040,"name":"Azjatycka pikantna surówka z ogórków","description":"1. W dużej misce umieść sos sojowy, olej sezamowy i chili, syrop klonowy i przeciśnięty czosnek. Wszystko wymieszaj na sos. \n2. Ogórki pokrój w plastry, a papryczkę chili w cienkie plastry lub paseczki. Dodaj warzywa do sosu. \n3. Dodaj sezam i wszystko wymieszaj.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/yWPB3yQYg6P2YOyo01CSiCZUGDiUVdzRfNYY2u0P.jpg","kcal":194.83,"protein":5.1,"fat":12.4,"carbs":19.11,"ingredients":[{"name":"Ogórek","grams":360,"measure":"sztuka"},{"name":"Sos sojowy","grams":15,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Olej sezamowy","grams":5,"measure":"łyżeczka"},{"name":"Olej chilli","grams":5,"measure":"łyżeczka"},{"name":"Papryczka chili czerwona","grams":10,"measure":"kawałek"},{"name":"Sezam","grams":5,"measure":"łyżeczka"},{"name":"Czosnek","grams":2,"measure":"ząbek"}],"category":"Sałatka"},{"id":62481064,"name":"Orzechowa surówka z marchewki","description":"1. Masło orzechowe wymieszaj z sosem sojowym, syropem klonowym i sokiem z limonki na jednolity sos.\n2. Marchew obierz i pokrój w cienkie paski.\n3. Kolendrę, dymkę oraz orzechy posiekaj.\n4. Wymieszaj wszystkie składniki i odstaw do lodówki na ok. 10-15 minut, żeby smaki  się \"przegryzły\".","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/o7bh3Eyrya9ELq8kFPDN8y8zUTdEM5zGXdCi1PqQ.jpg","kcal":257.15,"protein":9.88,"fat":15.3,"carbs":26.92,"ingredients":[{"name":"Marchew","grams":180,"measure":"średnia sztuka"},{"name":"Masło orzechowe","grams":20,"measure":"łyżka"},{"name":"Sos sojowy","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Cebula dymka","grams":5,"measure":"mała sztuka"},{"name":"Kolendra liście","grams":10,"measure":"garść"},{"name":"Orzechy ziemne","grams":10,"measure":"garść"}],"category":"Sałatka"},{"id":62507120,"name":"Sernikowe pancakes waniliowe (bez glutenu)","description":"1. Wszystkie składniki (oprócz oliwy) zblenduj na jednolitą masę.\n2. Rozgrzej nieprzywierającą patelnię z odrobiną oliwy i smaż pancakes na małym ogniu pod przykryciem przez 3-4 minuty, a następnie przewróć na drugą stronę i smaż do zarumienienie.\n3. Podawaj z ulubionymi dodatkami (pamiętaj, by dodać je do składników).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/4KkPE47Pujhh3wQGxg1y5vkOhusvXx9EONWPnwKp.jpg","kcal":658.44,"protein":61.1,"fat":26.59,"carbs":42.22,"ingredients":[{"name":"Ser twarogowy półtłusty","grams":250,"measure":"duże opakowanie"},{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Budyń waniliowy bez cukru","grams":16,"measure":"łyżka"},{"name":"Mąka ryżowa","grams":20,"measure":"łyżka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"},{"name":"Proszek do pieczenia bezglutenowy","grams":4,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"}],"category":"Śniadanie"},{"id":62518603,"name":"Kolagenowe pianki brzoskwiniowe","description":"1. Brzoskwinie pozbaw pestek i zmiksuj dokładnie na gładką masę. Jeśli masa będzie bardzo gęsta możesz dodać nieco wody - powinna mieć konsystencję jogurtu naturalnego.\n2. Przełóż mus brzoskwiniowy do garnka i dodaj żelatynę. Podgrzewaj na małej mocy palnika, aż żelatyna całkowicie się rozpuści. Nie gotuj masy!\n3. Następnie miksuj masę przez ok. 15-20 minut, aż będzie wyraźnie jaśniejsza, puszysta i sprężysta.\n4. Przelej do foremki wyłożonej folią spożywczą i odstaw do lodówki na 2-3 godziny, a najlepiej na całą noc. \n5. Piankę pokrój w kostkę.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/TKhcDceMaLK5sHLt1pOM6czUSos56nnFmoFGSf3e.jpg","kcal":429.25,"protein":37.16,"fat":2.44,"carbs":76,"ingredients":[{"name":"Brzoskwinia","grams":800,"measure":"średnia sztuka"},{"name":"Żelatyna","grams":35,"measure":"g"}],"category":"Deser"},{"id":62519419,"name":"Proteinowy pudding lotus z borówkami","description":"1. Skyr wymieszaj z odżywką białkową i erytrolem.\n2. Połowę ciastek pokrusz i dodaj do masy skyrowej. \n3. Nakładaj deser warstwami - masa skyrowa, borówki itd. \n4. Udekoruj dodatkowym ciasteczkiem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/hCbmM6VOIcvP2tRBpRC5JmojoyQAOQWFAzODx7f2.jpg","kcal":520.88,"protein":58.28,"fat":8.78,"carbs":51.35,"ingredients":[{"name":"Skyr naturalny","grams":300,"measure":"opakowanie"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"measure":"miarka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Ciastka Biscoff (Lotus)","grams":32,"measure":"sztuka"},{"name":"Borówki amerykańskie","grams":100,"measure":"garść"}],"category":"Deser"},{"id":62519429,"name":"Placuszki z warzywami na serku wiejskim","description":"1. Szalotkę drobno posiekaj. Pieczarki posiekaj również drobno lub zetrzyj na tarce o dużych oczkach. Paprykę pokrój w drobną kosteczkę.\n2. Wymieszaj serek, jajko, mąkę oraz przyprawy. Dodaj posiekane warzywa.\n3. Na patelni rozgrzej odrobinę oliwy.\n4. Nadkładaj placuszki łyżką na rozgrzaną patelnię i smaż pod przykryciem z dwóch stron, aż będą złociste.\n5. Podawaj placuszki posikane szczypiorkiem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/i3cBu94nYcCHH6PGsJwW89DzwZZ9l5A7gZMRBGGL.jpg","kcal":495.35,"protein":34.24,"fat":20.67,"carbs":43.81,"ingredients":[{"name":"Serek wiejski","grams":200,"measure":"duże opakowanie"},{"name":"Mąka orkiszowa jasna","grams":48,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Szalotka","grams":10,"measure":"sztuka"},{"name":"Pieczarki","grams":36,"measure":"średnia sztuka"},{"name":"Papryka czerwona","grams":36,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"}],"category":"Śniadanie"},{"id":62519430,"name":"Proteinowy milkshake lotus","description":"1. Wszystkie składniki zmiksuj na gładki koktajl. Możesz zostawić kawałek ciasteczka do pokruszenia na wierzch milkshake'a.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/UtvOyAPftjHeEWseNc3DZWOBx8T29Ie1WW7PnWy0.jpg","kcal":244.33,"protein":25.63,"fat":6.85,"carbs":18.83,"ingredients":[{"name":"Kostki lodu","grams":120,"measure":"kostka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":30,"measure":"miarka"},{"name":"Napój migdałowy wzbogacony w wapń","grams":200,"measure":"szklanka"},{"name":"Aromat waniliowy","grams":2,"measure":"kropla"},{"name":"Ciastka Biscoff (Lotus)","grams":16,"measure":"sztuka"},{"name":"Cynamon mielony","grams":1,"measure":"szczypta"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"}],"category":"Deser"},{"id":62523353,"name":"Puszyste ciasto z jabłek","description":"1. Piekarnik rozgrzej do 180 stopni. \n2. Jabłka obierz, pozbaw gniazd nasiennych i pokrój w kostkę. \n3. Dodaj jajka, odżywkę, jogurt oraz proszek do pieczenia. Wszystko zmiksuj na gładką masę i przełóż do małej foremki wyłożonej papierem do pieczenia. \n4. Ciasto piecz ok. 40 minut. \n5. Po wystudzeniu posyp pudrem z erytrolu.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/IUzvi503uqREKIy7GHnX1dr0FoB9dnOiXve544li.jpg","kcal":537.02,"protein":44.21,"fat":15.98,"carbs":57.06,"ingredients":[{"name":"Jabłko","grams":280,"measure":"średnia sztuka"},{"name":"Jogurt grecki waniliowy 0%","grams":150,"measure":"g"},{"name":"Jajko kurze","grams":150,"measure":"średnia sztuka"},{"name":"Koncentrat białka serwatkowego (WPC)","grams":15,"measure":"miarka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Erytrytol","grams":5,"measure":"łyżeczka"}],"category":"Deser"},{"id":62641754,"name":"Jednoporcjowy serniczek z truskawkowym dżemem z chia i białą czekoladą","description":"1. Zacznij od przygotowania „dżemu” z truskawek i chia. Truskawki zblenduj na jednolitą masę z sokiem z cytryny - opcjonalnie dodaj erytrol, jeśli Twoje truskawki nie są wystarczająco słodkie. Dodaj nasiona chia i wymieszaj dokładnie. Wstaw do lodówki na 15-30 minut, aż nabierze odpowiedniej konsystencji.\n2. Herbatniki pokrusz i wyłóż na spód słoiczka.\n3. Zblenduj twaróg, skyr, mleko (zostaw 10 ml do polewy), aromat i erytrol.\n4. Na ciasteczka wyłóż połowę warstwy serowej, „dżem” z truskawek, a następnie drugą porcję warstwy serowej.\n5. Czekoladę rozpuść w kąpieli wodnej z łyżką mleka i polej deserek z wierzchu. Choć można jeść od razu to najlepiej wstawić do lodówki na kilka godzin do połączenia smaków.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/GRtghCmfD9zXiF32vcNbFaboMjZGmff4hiH9kjTm.jpg","kcal":385.85,"protein":31.91,"fat":12.34,"carbs":38.95,"ingredients":[{"name":"Herbatniki","grams":6,"measure":"mała sztuka"},{"name":"Ser twarogowy chudy","grams":90,"measure":"plaster"},{"name":"Skyr waniliowy","grams":75,"measure":"łyżka"},{"name":"Mleko 1,5%","grams":60,"measure":"łyżka"},{"name":"Aromat waniliowy","grams":1,"measure":"kropla"},{"name":"Truskawki","grams":140,"measure":"garść"},{"name":"Nasiona chia","grams":18,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Erytrytol","grams":10,"measure":"łyżeczka"},{"name":"Biała czekolada","grams":12,"measure":"kostka"}],"category":"Deser"},{"id":62868802,"name":"Meksykańska pasta z czerwonej fasoli","description":"1. Czerwoną cebulę pokrój w bardzo drobną kosteczkę, a kolendrę posiekaj. \n2. Fasolę przepłucz z zalewy pod bieżącą wodą. Po odsączeniu zmiksuj na gładką pastę z koncentratem, sokiem z limonki, oliwą oraz przyprawami. W razie potrzeby dodaj 2-3 łyżki wody. \n3. Pastę wymieszaj z cebulą i kolendrą. Podawaj z pieczywem/tortillą i warzywami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/x7A9hDIXXzJHh7iKVAWSDLyvatCjnZNnTmlDemBI.jpg","kcal":177.75,"protein":7.93,"fat":6.14,"carbs":24.52,"ingredients":[{"name":"Fasola czerwona konserwowa","grams":120,"measure":"łyżka"},{"name":"Cebula czerwona","grams":20,"measure":"plaster"},{"name":"Koncentrat pomidorowy","grams":15,"measure":"łyżeczka"},{"name":"Sok z limonki","grams":3,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Kumin w proszku (kmin rzymski)","grams":1,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"},{"name":"Papryka ostra przyprawa","grams":1,"measure":"szczypta"},{"name":"Kolendra liście","grams":10,"measure":"garść"}],"category":"Pasta"},{"id":62869315,"name":"Twarożek z czerwonym pesto","description":"1. Twaróg rozgnieć widelcem wraz ze skyrem. Możesz również go zblendować, jeśli wolisz całkiem gładką konsystencję. \n2. Dodaj pesto, sezam, posiekaną bazylię i wszystko wymieszaj.\n3. Pastę dopraw solą i pieprzem. Podawaj z pieczywem i warzywami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/u6cEvlgpkKqxcLSKCd6bEHGdy1HjHNMYgid2i8LM.jpg","kcal":249.17,"protein":26.61,"fat":12.84,"carbs":6.75,"ingredients":[{"name":"Ser twarogowy chudy","grams":100,"measure":"g"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Pesto czerwone","grams":15,"measure":"łyżka"},{"name":"Sezam","grams":3,"measure":"łyżeczka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":62869862,"name":"Toskański twarożek kanapkowy","description":"1. Suszone pomidory oraz oliwki pokrój w drobną kosteczkę, a bazylię posiekaj. \n2. Twaróg rozgnieć widelcem i połącz ze skyrem - lub zmiksuj, jeśli wolisz całkiem gładką konsystencję. \n3. Pastę twarogową wymieszaj z posiekanymi dodatkami oraz przyprawami. \n4. Podawaj na pieczywie, udekoruj rukolą.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/uNSDIg6AoMZzPChOkdkvy7yILgyXIfIuwViom1QO.jpg","kcal":241.62,"protein":30.33,"fat":7.35,"carbs":15.86,"ingredients":[{"name":"Ser twarogowy chudy","grams":100,"measure":"g"},{"name":"Skyr naturalny","grams":75,"measure":"opakowanie"},{"name":"Pomidory suszone w zalewie","grams":30,"measure":"sztuka"},{"name":"Oliwki czarne bez pestki","grams":20,"measure":"sztuka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Płatki chili","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":62870489,"name":"Cytrynowy hummus z bobu z koperkiem","description":"1. Bób ugotuj w lekko osolonym wrzątku do miękkości. Pozostaw do wystudzenia, a następnie obierz z łupin. \n2. Cytrynę sparz wrzątkiem i zetrzyj z niej odrobinę skórki - ok. 1 łyżeczki. Koperek posiekaj.\n3. Obrany bób zmiksuj z oliwą, sokiem z cytryny oraz przyprawami. W razie potrzeby dodaj odrobinę wody, aby uzyskać odpowiednią konsystencję pasty. \n4. Hummus połącz ze skórką z cytryny oraz posiekanym koperkiem. Podawaj z pieczywem, tortillą lub jako dip do pokrojonych warzyw.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/TODErhwfhEAxKu3Ym4hA37EH79ta0kwBWXS3i7sG.jpg","kcal":371.49,"protein":14.88,"fat":21.79,"carbs":32.44,"ingredients":[{"name":"Bób","grams":250,"measure":"g"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Skórka z cytryny","grams":2,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Koper świeży","grams":20,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Pasta"},{"id":62871516,"name":"Pasta z białej fasoli i pieczonego czosnku","description":"1. Piekarnik rozgrzej do 180 stopni. Główkę czosnku natnij w taki sposób, aby odciąć plaster z góry - tak, aby wszystkie ząbki były widoczne. Posmaruj odrobiną oliwy i piecz ok. 30-40 minut, aby ząbki czosnku były całkowicie miękkie. Pozostaw do wystudzenia.\n2. Fasolę odsącz dokładnie z zalewy i przepłucz na sitku pod bieżącą wodą.\n3. Z główki czosnku wyciśnij wszystkie ząbki i zmiksuj z fasolą, oliwą, sokiem z cytryny oraz przyprawami. W razie potrzeby dodaj odrobinę wody, aby konsystencja pasty była odpowiednia. \n4. Podawaj z pieczywem i warzywami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/fnxsZvRGqqAy2XlwrZTfbRfV6mnE6RvauRtpVu9i.jpg","kcal":441.35,"protein":20.6,"fat":11.3,"carbs":68.53,"ingredients":[{"name":"Czosnek","grams":45,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Fasola biała konserwowa","grams":240,"measure":"puszka"},{"name":"Rozmaryn suszony","grams":2,"measure":"szczypta"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Pasta"},{"id":62881277,"name":"Ekspresowy deser pełen antyoksydantów","description":"1.  Płatki owsiane podpraż na patelni wraz z posiekanymi migdałami. Dodaj syrop klonowy, wymieszaj i pozostaw do przestudzenia.\n2. Połowę skyru przełóż do słoiczka.\n3. Na wierzch dodaj połowę \"granoli\" i połowę owoców.\n4. Następnie wyłóż drugą warstwę - pozostały skyr, drugą część \"granoli\" i owoce.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/QkWtSZnA8000cUqRhVL109i0KEr92tL153fru2GN.jpg","kcal":314.2,"protein":22.6,"fat":7.22,"carbs":42.2,"ingredients":[{"name":"Skyr waniliowy","grams":150,"measure":"opakowanie"},{"name":"Płatki owsiane","grams":25,"measure":"łyżka"},{"name":"Migdały","grams":10,"measure":"łyżka"},{"name":"Syrop klonowy","grams":5,"measure":"łyżeczka"},{"name":"Borówki amerykańskie","grams":100,"measure":"garść"}],"category":"Przekąska"},{"id":62881694,"name":"Szybki makaron z brokułem i mozzarellą","description":"1. Makaron ugotuj zgodnie z instrukcją. Pod koniec gotowania dodaj umyty i podzielony na małe różyczki brokuł (na około 4-5 minut).\n2. Po tym czasie odcedź wodę, ale makaron i brokuły zostaw w garnku (nie wyłączaj kuchenki).\n3. Dodaj serek oraz przyprawy. Całość energicznie wymieszaj i zostaw na 2-3 minuty.\n4. Dodaj mozzarellę oraz pomidorki koktajlowe i wymieszaj. Jeśli masz czas możesz pokroić pomidorki na pół.\n5. Przygotowany makaron przełóż na talerz. Całość możesz przyprawić jeszcze świeżo mielonym pieprzem.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/AlzS2DNFfvrl6rxgqa77tBpV9tnAu5TRuFQg0RNP.jpg","kcal":440.08,"protein":38.81,"fat":10.46,"carbs":49.89,"ingredients":[{"name":"Makaron z czerwonej soczewicy","grams":60,"measure":"łyżka"},{"name":"Brokuł","grams":200,"measure":"sztuka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Czosnek w proszku","grams":2,"measure":"szczypta"},{"name":"Serek naturalny","grams":50,"measure":"łyżka"},{"name":"Ser Mozzarella mini light","grams":63,"measure":"opakowanie"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"}],"category":"Przekąska"},{"id":62882063,"name":"Najprostsza przekąska z kefirem","description":"1. Zjedz produkty tak, jak lubisz - razem lub osobno.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/EXNmtgVLuvSxDgkCL0zEF8LfhEIH0gzX1dZw7Hae.jpg","kcal":350.9,"protein":16.3,"fat":16.06,"carbs":39.77,"ingredients":[{"name":"Kefir 1.5%","grams":400,"measure":"opakowanie"},{"name":"Jabłko","grams":140,"measure":"średnia sztuka"},{"name":"Orzechy włoskie","grams":15,"measure":"garść"}],"category":"Przekąska"},{"id":62882475,"name":"Makaron a'la pierogi ruskie","description":"1. Makaron ugotuj al dente według czasu podanego przez producenta na opakowaniu. \n2. Cebulę pokrój w kosteczkę i podsmaż na oliwie na rumiany kolor. Przypraw solą i szczyptą erytrolu. \n3. Twaróg rozdrobnij widelcem i wymieszaj z podsmażoną cebulą i ugotowanym makaronem. Przypraw pieprzem. \n4. Makaron udekoruj kiełkami.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/3q7VVyk87J9Obwj9CL4pqq5vNNRWGENhynaT22cb.jpg","kcal":439.23,"protein":28.86,"fat":11.93,"carbs":56.51,"ingredients":[{"name":"Makaron pełnoziarnisty","grams":65,"measure":"g"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Cebula","grams":55,"measure":"średnia sztuka"},{"name":"Ser twarogowy półtłusty","grams":100,"measure":"g"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Kiełki mix","grams":8,"measure":"łyżka"}],"category":"Przekąska"},{"id":62882751,"name":"Gotowe pierogi ze szpinakiem z sosem czosnkowym","description":"1. Pierogi przygotuj we wrzątku według zaleceń producenta na opakowaniu.\n2. Jogurt wymieszaj z przyprawami oraz przeciśniętym czosnkiem.\n3. Pierogi wyłóż na talerz. Polej sosem czosnkowym i oliwą. Udekoruj pomidorkami i rukolą lub inną zieleniną np. kiełkami, roszponką itp.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/goNyMuOcZqXS5m3ULWDbp5gJsvVgEbT2NNtRueuq.jpg","kcal":450.08,"protein":23.48,"fat":12.37,"carbs":66.42,"ingredients":[{"name":"Pierogi ze szpinakiem i serem (Nasze Smaki)","grams":200,"measure":"opakowanie"},{"name":"Skyr naturalny","grams":100,"measure":"opakowanie"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Erytrytol","grams":1,"measure":"szczypta"},{"name":"Zioła prowansalskie przyprawa","grams":1,"measure":"szczypta"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Rukola","grams":20,"measure":"garść"}],"category":"Przekąska"},{"id":62950787,"name":"Sałatka z chrupiącym tofu i orzechowym sosem","description":"Przygotowanie sosu:\n\nDo miseczki dodaj masło orzechowe, przeciśnięty przez praskę czosnek, starty imbir, olej sezamowy, sok z limonki i sos sojowy (10 ml). Stopniowo dolewaj wodę, mieszając do uzyskania gładkiej, kremowej konsystencji.\n\nPrzygotowanie tofu:\n\nTofu dokładnie odsącz z nadmiaru wody i pokrój na mniejsze kawałki. Wymieszaj z sosem sojowym (10 ml), olejem i przyprawami. Następnie dodaj skrobię i dokładnie obtocz każdy kawałek.\n\nPiecz w air fryerze w temperaturze 180–200°C przez 10–15 minut, aż tofu będzie złociste i chrupiące. W połowie czasu pieczenia potrząśnij koszem.\n\nSałatka:\n\nJeśli używasz makaronu - ugotuj go zgodnie z instrukcją na opakowaniu (możesz go pominąć lub użyć makaronu konjac - nie musisz go wliczać do kaloryczności). Przełóż do miski. Dodaj fasolkę edamame lub groszek, czerwoną kapustę, paprykę, marchew i tofu\n\nPolej sałatkę sosem, posyp szczypiorkiem oraz drobno posiekanymi orzeszkami.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/bTBzVNFCs2didlaMo2yLHPMXkcu59NILYi1H2djk.jpg","kcal":933.31,"protein":54.3,"fat":45.3,"carbs":104.28,"ingredients":[{"name":"Edamame","grams":75,"measure":"porcja"},{"name":"Kapusta czerwona","grams":89,"measure":"filiżanka"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Marchew","grams":60,"measure":"średnia sztuka"},{"name":"Szczypiorek","grams":10,"measure":"łyżka"},{"name":"Masło orzechowe","grams":30,"measure":"łyżka"},{"name":"Czosnek","grams":8,"measure":"ząbek"},{"name":"Korzeń imbiru","grams":2,"measure":"plaster"},{"name":"Limonka","grams":325,"measure":"sztuka"},{"name":"Sos sojowy","grams":20,"measure":"łyżka"},{"name":"Tofu naturalne","grams":180,"measure":"opakowanie"},{"name":"Olej sezamowy","grams":10,"measure":"łyżka"},{"name":"Skrobia ziemniaczana","grams":25,"measure":"łyżka"},{"name":"Papryka wędzona w proszku","grams":2,"measure":"łyżeczka"},{"name":"Czosnek w proszku","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Orzechy ziemne","grams":10,"measure":"garść"}],"category":"Sałatka"},{"id":63044044,"name":"Greckie placuszki pomidorowe - Tomatokeftedes","description":"1. Pomidory pokrój w kostkę, posól i pozostaw na 20 minut. \n2. Piekarnik rozgrzej do 210 stopni.\n3. Cebulę pokrój w drobną kostkę, oliwki w talarki, a zioła posiekaj. \n4. Z pomidorów odciśnij sok i przełóż do miski. Dodaj cebulę, zioła, mąkę oraz pokruszoną fetę.  Wymieszaj masę aż zacznie być kleista. \n5. Blaszkę wyłóż papierem do pieczenia. Z przygotowanej masy wykładaj kulki i delikatnie je spłaszcz (tak, jak przy pieczeniu ciasteczek). Placuszki posmaruj lub spryskaj odrobiną oliwy. Piecz ok. 25-30 minut. \n6. W tym czasie zetrzyj ogórki na tarce, a ząbek czosnku przeciśnij przez praskę. Wszystko wymieszaj z sokiem z cytryny, jogurtem i przyprawami. \n7. Placuszki podawaj z sosem tzatziki i pozostałą oliwą.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/WJ3uynN1HlCC3ZTSBb91Uqo0EfLXJNyhekzqb9J1.jpg","kcal":784.56,"protein":41.77,"fat":31.27,"carbs":87.01,"ingredients":[{"name":"Pomidor czerwony","grams":270,"measure":"mała sztuka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Ser Feta","grams":75,"measure":"g"},{"name":"Mąka orkiszowa jasna","grams":75,"measure":"g"},{"name":"Oliwki czarne bez pestki","grams":72,"measure":"sztuka"},{"name":"Proszek do pieczenia","grams":1,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Natka pietruszki","grams":12,"measure":"łyżka"},{"name":"Bazylia świeża","grams":10,"measure":"garść"},{"name":"Skyr naturalny","grams":150,"measure":"opakowanie"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Ogórek gruntowy","grams":70,"measure":"sztuka"},{"name":"Sok z cytryny","grams":3,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"}],"category":"Obiad"},{"id":63046978,"name":"Pikantne szaszłyki z tortilli","description":"1. Cebulę i paprykę pokrój w drobną kostkę. Natkę pietruszki posiekaj. \n2. Do miski przełóż mięso mielone, dodaj pokrojone warzywa i natkę, jajko, koncentrat pomidorowy i przyprawy. Wszystko dokładnie wymieszaj, jak na kotlety mielone. \n3. Połóż jedną tortillę i posmaruj ją połową masy z mięsa. Na nią połóż drugą tortillę i wyłóż drugą część mięsa. Rozsmaruj i przykryj trzecią tortillą. \n4. Tak przygotowane tortille pokrój w paski, a następnie w kwadraty (ok. 3x3 cm). Nadziewaj je na patyczki do szaszłyków (od strony tortilli, tak aby było widać warstwy). \n5. Szaszłyki upiecz na grillu lub przygotuj w piekarniku (180 stopni ok. 30 minut).\n6. Podawaj z ulubionym sosem np. czosnkowym na jogurcie lub keczupem. \n5.","servings":4,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/nEYN87T022dUfHAaR7ka4sK1ubvwZ3NFGnAJJIMf.jpg","kcal":1313.27,"protein":98.62,"fat":56.58,"carbs":106.76,"ingredients":[{"name":"Tortilla pszenna pełnoziarnista","grams":180,"measure":"sztuka"},{"name":"Mięso mielone z kurczaka","grams":400,"measure":"porcja"},{"name":"Papryka czerwona","grams":120,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Natka pietruszki","grams":24,"measure":"łyżka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Koncentrat pomidorowy","grams":30,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Oregano suszone","grams":1,"measure":"łyżeczka"},{"name":"Słodka papryka przyprawa","grams":4,"measure":"łyżeczka"},{"name":"Papryka ostra przyprawa","grams":2,"measure":"łyżeczka"}],"category":"Obiad"},{"id":63048600,"name":"Ciasto jogurtowe z budyniem i truskawkami","description":"1. Budyń ugotuj na mleku z dodatkiem erytrolu (15 g) według instrukcji podanej na opakowaniu. Pozostaw do wystudzenia. \n2. Truskawki pozbaw szypułek i pokrój na ćwiartki. \n3. Piekarnik rozgrzej do 180 stopni (góra-dół)\n4. W misce umieść mokre składniki - jajka, jogurt oraz olej. Wymieszaj je za pomocą trzepaczki do uzyskania jednolitej konsystencji.\n5. Dodaj mąkę, proszek do pieczenia, sodę, erytrol (70 g) i szczyptę soli i wymieszaj szybko do połączenia składników. Nie mieszaj masy zbyt długo!\n6. Przełóż masę do okrągłej foremki wyłożonej papierem do pieczenia (ok. 20 cm średnicy) i wyrównaj ciasto. Na górę wyłóż budyń, a na sam wierzch truskawki i delikatnie wciśnij je w ciasto. \n7. Ciasto piecz ok. 50 minut. \n8. Po wystudzeniu możesz posypać pudrem z erytrolu.","servings":8,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/Kg8GiaxzVrC4Adx0VhRhPvoruxgJZXMPF3npYN0s.jpg","kcal":1943.96,"protein":64.7,"fat":76.15,"carbs":254.34,"ingredients":[{"name":"Jajko kurze","grams":100,"measure":"średnia sztuka"},{"name":"Jogurt naturalny","grams":230,"measure":"g"},{"name":"Olej rzepakowy","grams":50,"measure":"łyżka"},{"name":"Mąka orkiszowa jasna","grams":250,"measure":"g"},{"name":"Proszek do pieczenia","grams":3,"measure":"łyżeczka"},{"name":"Soda oczyszczona","grams":2,"measure":"łyżeczka"},{"name":"Erytrytol","grams":70,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Truskawki","grams":400,"measure":"g"},{"name":"Budyń waniliowy bez cukru","grams":25,"measure":"opakowanie"},{"name":"Mleko 1,5%","grams":300,"measure":"szklanka"},{"name":"Erytrytol","grams":15,"measure":"łyżeczka"}],"category":"Obiad"},{"id":63050996,"name":"Faszerowane pieczarki ze szpinakiem i suszonymi pomidorami","description":"1. Cebulę pokrój w kosteczkę i podsmaż na oliwie. Dodaj szpinak wraz z przeciśniętym ząbkiem czosnku. Podsmaż razem aż szpinak straci swoją objętość. Zdejmij z palnika i pozostaw do lekkiego przestudzenia. \n2. Do farszu dodaj posiekane suszone pomidory, przyprawy oraz 3/4 mozzarelli. Wszystko wymieszaj. \n3. Farsz nałóż do 4 kapeluszy portobello. Posyp je pozostałym serem. \n4. Przygotuj na grillu lub upiecz w piekarniku (180 stopni ok. 20-30 minut).","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/387WuNWBIC4t0SoQL4cB9nT5kZ0J1OZ2RvbQzczm.jpg","kcal":585.13,"protein":38.59,"fat":34.01,"carbs":41.24,"ingredients":[{"name":"Pieczarki Portobello","grams":480,"measure":"sztuka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżeczka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Szpinak","grams":100,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":40,"measure":"sztuka"},{"name":"Czosnek","grams":4,"measure":"ząbek"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Gałka muszkatołowa mielona","grams":1,"measure":"szczypta"},{"name":"Mozzarella tarta","grams":100,"measure":"g"}],"category":"Obiad"},{"id":63051770,"name":"Sałatka ziemniaczana z bobem i ogórkiem małosolnym","description":"1. Ziemniaki ugotuj do miękkości w osolonej wodzie. Pozostaw do wystudzenia, a następnie pokrój w grubą kostkę. \n2. Bob ugotuj w lekko osolonej wodzie. Pozostaw do wystudzenia, a następnie obierz z łupin. \n3. Koper i szczypiorek posiekaj, a czerwoną cebulę pokrój w małą kosteczkę. Ogórki małosolne pokrój w grubszą kostkę (jak ziemniaki).\n4. Skyr wymieszaj z majonezem, musztardą i przyprawami. Wszystkie składniki wymieszaj z sosem. \n5. Sałatkę wstaw do lodówki na 1-2 godziny, żeby się przegryzła. Podawaj schłodzoną.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/3Kk9yBAEXkkC4RY9YiRwopa4EmEBe4t5JuPKLrEy.jpg","kcal":553.54,"protein":25.32,"fat":11.27,"carbs":92.42,"ingredients":[{"name":"Ziemniaki","grams":300,"measure":"średnia sztuka"},{"name":"Cebula czerwona","grams":45,"measure":"sztuka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":4,"measure":"łyżeczka"},{"name":"Bób","grams":200,"measure":"g"},{"name":"Ogórek małosolny","grams":195,"measure":"średnia sztuka"},{"name":"Skyr naturalny","grams":50,"measure":"opakowanie"},{"name":"Majonez light","grams":25,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Sól","grams":2,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"},{"name":"Słodka papryka przyprawa","grams":1,"measure":"szczypta"}],"category":"Obiad"},{"id":63054779,"name":"Sałatka dla żelaza z burakami, cieciorką i halloumi","description":"1. Ser halloumi pokrój w kostkę i zgrilluj na suchej patelni z obu stron aż się zarumieni. \n2. Cieciorkę przepłucz pod bieżącą wodą z zalewy. \n3. Buraki pokrój w kostkę. \n4. Oliwę wymieszaj z miodem i sokiem z cytryny.  W razie potrzeby dodaj 1-2 łyżeczki wody. \n5. W misce umieść szpinak, buraki, cieciorkę oraz pestki dyni. Wszystko wymieszaj z sosem. Na górze połóż kawałki grillowanego sera.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/kPYx1eDrYkpLVBDVt8XLLavL6iBDHfKhh01DjEyO.jpg","kcal":492.17,"protein":24.96,"fat":24.81,"carbs":48.51,"ingredients":[{"name":"Buraki ugotowane","grams":240,"measure":"sztuka"},{"name":"Szpinak","grams":50,"measure":"garść"},{"name":"Ser Halloumi","grams":40,"measure":"plaster"},{"name":"Ciecierzyca w puszce","grams":120,"measure":"puszka"},{"name":"Pestki dyni","grams":10,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"}],"category":"Sałatka"},{"id":63057724,"name":"Sałatka lunchowa z kuskusem perłowym, indykiem i bobem","description":"1. Bób ugotuj w lekko osolonej wodzie do miękkości. Pozostaw do wystudzenia, a następnie obierz z łupin. \n2. Kuskus przygotuj według instrukcji producenta na opakowaniu. Również pozostaw do lekkiego przestudzenia. \n3. Indyka pokrój w paski, wymieszaj z przyprawą gyros i usmaż na niewielkiej ilości oliwy (pozostałą część pozostaw do przygotowania sosu).\n4. Pomidorki koktajlowe przekrój na pół, a suszone pomidory i koperek posiekaj. \n5. Pozostałą oliwę wymieszaj z sokiem z cytryny, miodem, musztardą orz solą i pieprzem do smaku. W razie potrzeby dodaj 1-2 łyżeczki wody. \n6. W misce umieść kuskus, indyka oraz bób. Dodaj pomidory, suszone pomidory oraz koperek. Wszystko wymieszaj z sosem. \n7. Sałatkę posyp pestkami dyni.","servings":1,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/LnjO0UfZtQP0hnQVIhNsSvcs78zLrMASYOFB98iJ.jpg","kcal":498.76,"protein":34.91,"fat":19.44,"carbs":49.76,"ingredients":[{"name":"Kuskus perłowy","grams":30,"measure":"łyżka"},{"name":"Indyk pierś","grams":100,"measure":"porcja"},{"name":"Przyprawa do Gyrosa","grams":1,"measure":"łyżeczka"},{"name":"Oliwa z oliwek","grams":10,"measure":"łyżka"},{"name":"Bób","grams":80,"measure":"garść"},{"name":"Szpinak","grams":25,"measure":"garść"},{"name":"Pomidory koktajlowe","grams":100,"measure":"garść"},{"name":"Pomidory suszone w zalewie","grams":20,"measure":"sztuka"},{"name":"Pestki dyni","grams":5,"measure":"łyżka"},{"name":"Sok z cytryny","grams":6,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Miód","grams":6,"measure":"łyżeczka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":1,"measure":"szczypta"},{"name":"Koper świeży","grams":5,"measure":"łyżeczka"}],"category":"Sałatka"},{"id":63059084,"name":"Sałatka z tuńczykiem, fetą i fasolą w kremowym sosie","description":"1. Jajko ugotuj na twardo. Pozostaw do wystudzenia, a następnie obierz ze skorupki. \n2. Fasolę przepłucz po bieżącą wodą na sitku z zalewy, a tuńczyka odcedź. \n3. Ogórka i paprykę pokrój w kostkę. Szczypiorek i koperek posiekaj. Fetę pokrój w kostkę lub pokrusz. \n4. Jajko umieść w naczyniu blendera. Dodaj oliwę, sok z cytryny, musztardę, miód, wodę oraz sól i pieprz. Składniki zmiksuj na gładki, kremowy sos. W razie potrzeby dodaj ciut więcej wody. \n5. Wszystkie składniki umieść w misce i wymieszaj z kremowym sosem.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/LuznoM7bIvPNUdFWtHDcGQauXPgB9r0AqWzsqBv3.jpg","kcal":826.84,"protein":67.85,"fat":38.43,"carbs":55.44,"ingredients":[{"name":"Tuńczyk w puszce w sosie własnym","grams":165,"measure":"duża puszka"},{"name":"Fasola biała konserwowa","grams":120,"measure":"puszka"},{"name":"Ser Feta","grams":50,"measure":"plaster"},{"name":"Ogórek","grams":180,"measure":"sztuka"},{"name":"Papryka żółta","grams":120,"measure":"średnia sztuka"},{"name":"Koper świeży","grams":10,"measure":"łyżeczka"},{"name":"Szczypiorek","grams":5,"measure":"łyżka"},{"name":"Oliwa z oliwek","grams":20,"measure":"łyżka"},{"name":"Sok z cytryny","grams":12,"measure":"łyżka"},{"name":"Musztarda","grams":10,"measure":"łyżeczka"},{"name":"Miód","grams":12,"measure":"łyżeczka"},{"name":"Jajko kurze","grams":50,"measure":"średnia sztuka"},{"name":"Woda","grams":15,"measure":"łyżka"},{"name":"Sól","grams":1,"measure":"szczypta"},{"name":"Pieprz czarny","grams":2,"measure":"szczypta"}],"category":"Sałatka"},{"id":63060074,"name":"Sałatka z młodej kapusty z odżywczym sosem i chrupiącym kurczakiem","description":"1. Polędwiczki z kurczaka przypraw solą i pieprzem. Jajko rozmąć widelcem. Parmezan zetrzyj na tarce, a płatki kukurydziane pokrusz i wymieszaj je razem. Mięso obtocz w jajku, a następnie w panierce z płatków i sera. \n2. Upiecz kurczaka w airfryerze (lub piekarniku) w temperaturze 180 stopni przez ok. 12-13 minut. \n3. W naczyniu blendera umieść skyr, awokado i fetę. Zmiksuj je na gładki sos i przypraw świeżo mielonym pieprzem. \n4. Kapustę poszatkuj, ogórka i rzodkiewki pokrój w cienkie półplastry, a koperek i cebulkę dymkę posiekaj. \n5. Pokrojone warzywa wymieszaj z sosem i przełóż na talerze. Na górze ułóż chrupiącego kurczaka.","servings":2,"photo":"https://d1wxteijfk37ar.cloudfront.net/media/250/recipe/2026/6/X76wbKSHug7SgRA5VPpfFx2vk8Sk2V8kxrOGw9uk.jpg","kcal":797.41,"protein":85.31,"fat":31.19,"carbs":38.15,"ingredients":[{"name":"Kapusta młoda","grams":100,"measure":"g"},{"name":"Rzodkiewka","grams":60,"measure":"sztuka"},{"name":"Ogórek","grams":90,"measure":"sztuka"},{"name":"Cebula dymka","grams":15,"measure":"
